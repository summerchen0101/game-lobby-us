syntax = "proto3";
package activity;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/activity";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/pagination/pagination.proto";

service ActivityService {
    rpc ListActivities(ListActivitiesReq) returns (ListActivitiesResp);
    rpc GetActivity(GetActivityReq) returns (GetActivityResp);
    rpc AddActivity(AddActivityReq) returns (AddActivityResp);
    rpc UpdateActivity(UpdateActivityReq) returns (google.protobuf.Empty);

    rpc ListActivityImages(ListActivityImagesReq) returns (ListActivityImagesResp);
    rpc GetActivityImage(GetActivityImageReq) returns (GetActivityImageResp);
    rpc UpdateActivityImage(UpdateActivityImageReq) returns (google.protobuf.Empty);

    rpc ListLotteryDraws(ListLotteryDrawsReq) returns (ListLotteryDrawsResp);
    rpc GetLotteryDraw(GetLotteryDrawReq) returns (GetLotteryDrawResp);
    rpc AddLotteryDraw(AddLotteryDrawReq) returns (AddLotteryDrawResp);
    rpc UpdateLotteryDraw(UpdateLotteryDrawReq) returns (google.protobuf.Empty);
    rpc DeleteLotteryDraw(DeleteLotteryDrawReq) returns (google.protobuf.Empty);
    rpc ReviewLotteryDraw(ReviewLotteryDrawReq) returns (google.protobuf.Empty);

    rpc GetUserLastLotteryDraw(GetUserLastLotteryDrawReq) returns (GetUserLastLotteryDrawResp);
    rpc AddUserLastDrawRecord(AddUserLastDrawRecordReq) returns (google.protobuf.Empty);

    rpc ListLotteryTickets(ListLotteryTicketsReq) returns (ListLotteryTicketsResp);

    rpc GetUserActivityNotificationRed(GetUserActivityNotificationRedReq) returns (GetUserActivityNotificationRedResp);
    rpc UpsertUserReadLatestTicket(UpsertUserLatestReadTicketReq) returns (google.protobuf.Empty);

    rpc ListMissions(ListMissionsReq) returns (ListMissionsResp);
    rpc GetMission(GetMissionReq) returns (GetMissionResp);
    rpc AddMission(AddMissionReq) returns (AddMissionResp);
    rpc UpdateMission(UpdateMissionReq) returns (google.protobuf.Empty);
    rpc DeleteMission(DeleteMissionReq) returns (google.protobuf.Empty);

    rpc InitializeUserDailyMissions(InitializeUserDailyMissionsReq) returns (InitializeUserDailyMissionsResp);
    rpc TouchUserDailyMission(TouchUserDailyMissionReq) returns (TouchUserDailyMissionResp);

    rpc ListDailyMissions(ListDailyMissionsReq) returns (ListDailyMissionsResp);
    rpc GetDailyMission(GetDailyMissionReq) returns (GetDailyMissionResp);
    rpc CreateDailyMissions(CreateDailyMissionsReq) returns (CreateDailyMissionsResp);
    rpc UpdateDailyMission(UpdateDailyMissionReq) returns (UpdateDailyMissionResp);
    rpc DeleteDailyMission(DeleteDailyMissionReq) returns (DeleteDailyMissionResp);

    rpc ReplaceActivityDailyMissionCreditRewards(ReplaceActivityDailyMissionCreditRewardsReq) returns (ReplaceActivityDailyMissionCreditRewardsResp);

    rpc ListDailyMissionRewardDrawRecords(ListDailyMissionRewardDrawRecordsReq) returns (ListDailyMissionRewardDrawRecordsResp);

    rpc ListUserDailyMissions(ListUserDailyMissionsReq) returns (ListUserDailyMissionsResp);
    rpc ListUserDailyMissionCreditSummeriztion(ListUserDailyMissionCreditSummeriztionReq) returns (ListUserDailyMissionCreditSummeriztionResp);

    rpc CollectReward(CollectRewardReq) returns (CollectRewardResp);
    rpc SystemCollectRemainingRewards(SystemCollectRemainingRewardsReq) returns (SystemCollectRemainingRewardsResp);
    

    rpc GetUserGainAmount(GetUserGainAmountReq) returns (GetUserGainAmountResp);
    rpc UpsertUserGainAmount(UpsertUserGainAmountReq) returns (UpsertUserGainAmountResp);

    rpc CheckActivity(google.protobuf.Empty) returns (google.protobuf.Empty);
    rpc CheckActivityImage(google.protobuf.Empty) returns (google.protobuf.Empty);
    rpc CheckLotteryDraw(google.protobuf.Empty) returns (CheckLotteryDrawResp);
    rpc CheckMission(google.protobuf.Empty) returns (google.protobuf.Empty);

    rpc GetUserLuckyTime(GetUserLuckyTimeRequest) returns (GetUserLuckyTimeResponse);                                      // 取得玩家幸運輪盤次數
    rpc ReceiveLuckyProductGroup(ReceiveLuckyProductRequest) returns (ReceiveLuckyProductResponse);                        // 抽獎
    rpc CreateLuckyProductGroup(CreateLuckyProductGroupRequest) returns (google.protobuf.Empty);                           // 新增幸運轉盤群組的抽獎內容
    rpc UpdateLuckyProductGroup(UpdateLuckyProductGroupRequest) returns (google.protobuf.Empty);                           // 更新幸運轉盤群組的抽獎內容
    rpc CreateActivityLuckyMission(CreateActivityLuckyMissionRequest) returns (google.protobuf.Empty);                     // 新增幸運轉盤的任務
    rpc UpdateActivityLuckyMission(UpdateActivityLuckyMissionRequest) returns (google.protobuf.Empty);                     // 更新幸運轉盤的任務
    rpc GetActivityLuckyMission(GetActivityLuckyMissionRequest) returns (GetActivityLuckyMissionResponse);                 // 取得幸運轉盤的任務
    rpc ListActivityLuckyMission(ListActivityLuckyMissionRequest) returns (ListActivityLuckyMissionResponse);              // 取得幸運轉盤的任務清單
    rpc ListLuckyProductGroup(ListActivityLuckyMissionGroupRequest) returns (ListActivityLuckyMissionGroupResponse);       // 取得幸運轉盤群組清單
    rpc ListUserActivityLuckyMission(ListUserActivityLuckyMissionRequest) returns (ListUserActivityLuckyMissionResponse);  // 取得玩家幸運轉盤清單

    rpc GetReferralCampaign(GetReferralCampaignRequest) returns (GetReferralCampaignResponse);                      // 取得推廣活動資訊
    rpc GetReferralStats(GetReferralStatsRequest) returns (GetReferralStatsResponse);                               // 取得目前的推廣好友統計數據
    rpc SyncReferralTaskCompletion(SyncReferralTaskCompletionRequest) returns (SyncReferralTaskCompletionResponse); // 同步被推薦人(好友)的任務完成情況，並更新推薦人的獎勵資格狀態
    rpc ClaimReferralRewards(ClaimReferralRewardsRequest) returns (ClaimReferralRewardsResponse);                   // 獲得推廣獎勵
}

message GetReferralStatsRequest {
    uint64 referrerUID = 1; // 推薦人(上線)
}

message GetReferralStatsResponse {
    int64 referredCnt          = 1; // 被推薦人(下線)總數
    int64 completedReferredCnt = 2; // 已完成推薦任務條件的被推薦人(下線)總數
}

enum WalletType {
    UNKNOWN_WALLET_TYPE = 0;
    GC                  = 1; // GC
    SC                  = 2; // SC
}

message ClaimReferralRewardsRequest {
    uint64 referrerUID = 1; // 推薦人(上線)
}

message ClaimReferralRewardsResponse {
    repeated ReferralReward rewards = 1; // 該次領取成功的獎勵明細
}

message SyncReferralTaskCompletionRequest {
    uint64 referrerUID = 1; // 推薦人(上線)
}

message SyncReferralTaskCompletionResponse {
    int64 referredCnt          = 1; // 被推薦人(下線)總數
    int64 completedReferredCnt = 2; // 已完成推薦任務條件的被推薦人(下線)總數
}

message ReferralCampaign {
    string depositThreshold         = 1; // 儲值門檻
    string currencyCode             = 2; // Currency Code ISO 4217
    repeated ReferralReward rewards = 3; // 獎勵明細
}

message GetReferralCampaignRequest {
    google.protobuf.BoolValue enabled = 1; // 是否開啟
}

message GetReferralCampaignResponse {
    ReferralCampaign data = 1; // 詳情
}

message ReferralReward {
    WalletType walletType = 1; // 錢包類型
    int64 amount          = 2; // 金額
}

message ReferralTask {
    uint64 ID                             = 1;
    uint64 referrerUID                    = 2; // 推薦人(上線)
    uint64 referredUID                    = 3; // 被推薦人(下線)
    ReferralTaskStatus taskStatus         = 4; // 是否達成條件
    ReferralRewardStatus rewardStatus     = 5; // 獎勵狀態
    int64 claimAtMs                       = 6; // 領取獎勵時間
    int64 createdAtMs                     = 7;
    int64 updatedAtMs                     = 8;
}

// 推廣任務狀態
enum ReferralTaskStatus {
    TASK_STATUS_UNKNOWN = 0;
    NOT_STARTED         = 1; // 尚未開始
    IN_PROGRESS         = 2; // 進行中/未達標（先預留）
    COMPLETED           = 3; // 已滿足所有條件
}

// 推廣獎勵發放狀態
enum ReferralRewardStatus {
    REFERRAL_TASK_REWARD_STATUS_UNKNOWN = 0;
    NONE                                = 1; // 獎勵流程尚未啟動
    PENDING                             = 2; // 已觸發發獎
    SUCCESS                             = 3; // 成功
    FAILED                              = 4; // 失敗
    PARTIAL                             = 5; // 部分失敗
}

message ReferralTaskOption {
    repeated uint64 referrerUIDIn                = 1; // 推薦人(上線)
    repeated uint64 referredUIDIn                = 2; // 被推薦人(下線)
    repeated ReferralTaskStatus taskStatusIn     = 3; // 任務達成狀態
    repeated ReferralRewardStatus rewardStatusIn = 4; // 獎勵狀態
}

enum ActivityCategory {
    UNKNOWN_ACTIVITY_TYPE = 0;
    Lottery               = 1; // 樂透
    Lucky                 = 2; // 幸運抽抽樂
    JackPot               = 3; // 活動ＪＰ
    DailyTask             = 4; // 每日任務
    DailySignIn           = 5; // 每日登入
}

enum AppType {
    UNKNOWN_RELEASE_KIND = 0;
    APK                  = 1;
    IOS                  = 2;
    Android              = 3;
}

enum ImagePosition {
    UNKNOWN_IMAGE_POSITION = 0;
    LotteryTitle           = 1; // 樂透活動標題
    DirectionOne           = 2; // 玩法說明第一頁
    DirectionTwo           = 3; // 玩法說明第二頁
    AwardPublicity         = 4; // 獎項宣傳
    SlotGames              = 5; // 老虎機任務
    Fishing                = 6; // 魚機任務
    Video                  = 7; // 視訊遊戲任務
    Sratchoff              = 8; // 刮刮樂任務
    TwentyOne              = 9; // 21點任務
    LotteryGame            = 10; // 彩票任務 （體育競猜, 彈珠, 賓果）
}

enum ImageType {
    ImageTypeALL = 0; // 新增時禁用
    ImgURL       = 1; // 圖片url
    ICON_ID      = 2; // 素材ID
    ImgSource    = 3; // 圖片檔案
}

enum ActionType {
    ActionTypeALL   = 0; // 新增時禁用
    Payment         = 1; // 商城購買
    OpenURL         = 2; // 跳轉到外部網址
    RedirectURL     = 3; // inbox 內部跳轉url
    GoToCharacter   = 4; // 跳轉到角色頁面
    GoToGame        = 5; // 跳轉到某一款遊戲
    NOACTION        = 6; // 沒有動作
    GoToCard        = 7; // 跳轉到卡牌
    GoToGuild       = 8; // 跳轉到俱樂部
    GoToActivity    = 9; // 跳轉到活動
    GoToRanking     = 10; // 跳轉到排行榜
    GoToChat        = 11; // 跳轉到聊天
    GoToRedEnvelope = 12; // 跳轉到紅包
    GoToBackPack    = 13; // 跳轉到道具背包
    GoToStore       = 14; // 跳轉到商城
    GoToKaixilo     = 15; // 跳轉到賭場
}

enum TicketType {
    UNKNOWN_TICKET_TYPE = 0;
    GOLD                = 1; // 金彩券
    SILVER              = 2; // 銀彩券
    COPPER              = 3; // 銅彩券
}

enum SortMode {
    UNKNOWN_SORT_MODE = 0;
    FRONT             = 1; // 前台特殊排序(頭獎,二獎,三獎,未中獎, 金銀銅)
    LAST              = 2; // 最新排序
}

enum PrizeRanking {
    UNKNOWN_PRIZE_RANKING_TYPE = 0;
    FIRST                      = 1; // 頭獎
    SECOND                     = 2; // 二獎
    THIRD                      = 3; // 三獎
}

enum MissionType {
    UNKNOWN_MISSON_TYPE = 0;
    GAIN_AMOUNT         = 1; // 累積贏分
}

message ListActivitiesReq {
    ActivityCategory activityCategory = 1; // 活動類型
    yesno.YesNo enable                = 2; // 活動開關
    int64 page                        = 3; // 頁數
    int64 perPage                     = 4; // 幾筆
    repeated uint64 activityIDs       = 5; // 活動 IDs
    string activityNameLike           = 6; // 活動名稱
}

message ListActivitiesResp {
    repeated GetActivityResp activities = 1;
    uint64 total                        = 2;
}

message GetActivityReq {
    uint64 activityID = 1; // 活動 ID
}
message GetActivityResp {
    uint64 activityID                 = 1; // 活動 ID
    ActivityCategory activityCategory = 2; // 活動類型
    string activityName               = 3; // 活動名稱
    int64 sort                        = 4; // 排序
    int64 displayStartTime            = 5; // 顯示活動開始時間
    int64 displayEndTime              = 6; // 顯示活動結束時間
    int64 realStartTime               = 7; // 真實活動開始時間
    int64 realEndTime                 = 8; // 真實活動結束時間
    yesno.YesNo enable                = 9; // 活動開關
    uint64 createdUser                = 10; // 創建使用者 ID
    uint64 updatedUser                = 11; // 更新使用者 ID
    int64 createdTime                 = 12; // 創建時間
    int64 updatedTime                 = 13; // 修改時間

    repeated GetActivityRespDailyMissionCreditReward dailyMissionCreditRewards = 14;
}
message GetActivityRespDailyMissionCreditReward {
    int64 requiredCreditAmount = 1;
    int64 itemID               = 2;
    int64 itemAmount           = 3;
}

message AddActivityReq {
    ActivityCategory activityCategory                                         = 1; // 活動類型
    string activityName                                                       = 2; // 活動名稱
    int64 sort                                                                = 3; // 排序
    int64 displayStartTime                                                    = 4; // 顯示活動開始時間
    int64 displayEndTime                                                      = 5; // 顯示活動結束時間
    int64 realStartTime                                                       = 6; // 真實活動開始時間
    int64 realEndTime                                                         = 7; // 真實活動結束時間
    yesno.YesNo enable                                                        = 8; // 活動開關
    uint64 createdUser                                                        = 9; // 創建使用者 ID
    repeated AddActivityReqDailyMissionCreditReward dailyMissionCreditRewards = 10; // 每日任務活動積分獎勵
}
message AddActivityReqDailyMissionCreditReward {
    int64 requiredCreditAmount = 1;
    int64 itemID               = 2;
    int64 itemAmount           = 3;
}
message AddActivityResp {
    uint64 activityID = 1; // 活動 ID
}

message UpdateActivityReq {
    uint64 activityID                           = 1; // 活動 ID
    int64 sort                                  = 2; // 排序
    string activityName                         = 3; // 活動名稱
    google.protobuf.Int64Value displayStartTime = 4; // 顯示活動開始時間
    google.protobuf.Int64Value displayEndTime   = 5; // 顯示活動結束時間
    int64 realStartTime                         = 6; // 真實活動開始時間
    int64 realEndTime                           = 7; // 真實活動結束時間
    yesno.YesNo enable                          = 8; // 活動開關
    uint64 updatedUser                          = 9; // 更新使用者 ID
}

message ReviewLotteryDrawReq {
    uint64 lotteryDrawID = 1; // 樂透開獎 ID
    uint64 reviewerID = 2; // 審核人 UID
}

message ListActivityImagesReq {
    uint64 activityID = 1; // 活動 ID
    int64 page        = 2; // 頁數
    int64 perPage     = 3; // 幾筆
}
message ListActivityImagesResp {
    repeated ActivityImage activityImages = 1;
    uint64 total                          = 2;
}
message Image {
    ImageType type = 1;
    string value   = 2;
}
message Action {
    ActionType type        = 1;
    string value           = 2; // 動作的值(ex:導轉網址)
    uint64 storeGameItemID = 3; // 商品id, 遊戲ID, 角色ItemID
}
message ActivityImage {
    uint64 activityImageID            = 1; // 活動圖片 ID
    uint64 activityID                 = 2; // 活動 ID
    ActivityCategory activityCategory = 3; // 活動類型 1:樂透
    AppType appType                   = 4; // 釋出類型 1:APK 2:Apple 3:Google
    ImagePosition imagePosition       = 5; // 圖片位置
    Image currentImage                = 6; // 目前圖片資訊
    Action currentAction              = 7; // 目前圖片動作資訊
    int64 changeTime                  = 8; // 預計更換圖片時間
    Image nextImage                   = 9; // 預計更換圖片資訊
    Action nextAction                 = 10; // 預計更換圖片動作資訊
}

message GetActivityImageReq {
    uint64 activityImageID      = 1; // 活動圖片 ID
    uint64 activityID           = 2; // 活動 ID
    AppType appType             = 3; // 釋出類型 1:APK 2:Apple 3:Google
    ImagePosition imagePosition = 4; // 圖片位置
}
message GetActivityImageResp {
    ActivityImage activityImage = 1;
}

message UpdateActivityImageReq {
    uint64 activityImageID = 1; // 活動圖片 ID
    Image currentImage     = 2; // 目前圖片資訊
    Action currentAction   = 3; // 目前圖片動作資訊
    int64 changeTime       = 4; // 預計更換圖片時間
    Image nextImage        = 5; // 預計更換圖片
    Action nextAction      = 6; // 預計更換圖片動作資訊
}

message ListLotteryDrawsReq {
    int64 drawName                 = 1; // 期別
    uint64 activityID              = 2; // 活動 ID
    yesno.YesNo status             = 3; // 開獎狀態
    int64 page                     = 4; // 頁數
    int64 limit                    = 5; // 筆數上限
    repeated uint64 lotteryDrawIDs = 7; // 開獎 ID
}
message ListLotteryDrawsResp {
    repeated LotteryDraw lotteryDrawRecord = 1; // 開獎紀錄
    uint64 total                           = 2;
}
message LotteryDraw {
    uint64 lotteryDrawID               = 1; // 開獎 ID
    uint64 activityID                  = 2; // 活動 ID
    int64 drawName                     = 3; // 期別
    int64 drawTime                     = 4; // 開獎日期
    repeated int32 drawNumbers         = 5; // 開獎號碼
    repeated PrizeContent prizeContent = 6; // 獎項細節
    yesno.YesNo status                 = 7; // 開獎狀態
    yesno.YesNo enable                 = 8; // 是否可以使用的狀態
    int64 createdTime                  = 9; // 創建時間
    int64 updatedTime                  = 10; // 修改時間
    yesno.YesNo isReviewed             = 11; // 是否審核過
    uint64 reviewer_id                 = 12; // 審核uid
    int64 reviewedTime                 = 13; // 審核時間
}
message PrizeContent {
    PrizeRanking ranking       = 1; // 中獎獎項
    repeated uint64 awardUsers = 2; // 中獎名單 （只有頭獎會有資料）
    uint64 awardUserNumber     = 3; // 中獎人數
    uint64 itemID              = 4; // 獎項
    uint32 awardCount          = 5; // 獎項數量
    uint32 number              = 6; // 中幾碼
}

message GetLotteryDrawReq {
    uint64 lotteryDrawID = 1; // 開獎 ID
    uint64 activityID    = 2; // 活動 ID
    yesno.YesNo status   = 3; // 開獎狀態
    yesno.YesNo enable   = 4; // 是否可以使用的狀態
}
message GetLotteryDrawResp {
    LotteryDraw lotteryDraw = 1; // 開獎資訊
}

message AddLotteryDrawReq {
    uint64 activityID                   = 1; // 活動 ID
    int64 drawName                      = 2; // 期別
    int64 drawTime                      = 3; // 開獎日期
    repeated int32 drawNumbers          = 4; // 開獎號碼
    repeated PrizeContent prizeContents = 5; // 獎項細節
    yesno.YesNo status                  = 6; // 開獎狀態
}
message AddLotteryDrawResp {
    uint64 lotteryDrawID = 1; // 開獎 ID
}

message UpdateLotteryDrawReq {
    uint64 lotteryDrawID               = 1; // 開獎 ID
    int64 drawName                     = 2; // 期別
    int64 drawTime                     = 3; // 開獎日期
    repeated int32 drawNumbers         = 4; // 開獎號碼
    repeated PrizeContent prizeContent = 5; // 獎項細節
}

message DeleteLotteryDrawReq {
    uint64 lotteryDrawID = 1; // 開獎 ID
}

message GetUserLastLotteryDrawReq {
    uint64 userID = 1; // 使用者 ID
}
message GetUserLastLotteryDrawResp {
    UserLastDrawRecord userLastDrawRecord = 1;
}
message AddUserLastDrawRecordReq {
    UserLastDrawRecord userLastDrawRecord = 1;
}
message UserLastDrawRecord {
    uint64 userID        = 1; // 使用者 ID
    uint64 lotteryDrawID = 2; // 開獎 ID
}

message ListMissionsReq {
    uint64 activityID  = 1; // 活動 ID
    int64 page         = 2; // 頁數
    int64 perPage      = 3; // 幾筆
    yesno.YesNo enable = 4; // 任務開關
}
message ListMissionsResp {
    repeated GetMissionResp missions = 1; // 任務列表
    uint64 total                     = 2;
}

message GetMissionReq {
    uint64 missionID = 1; // 任務ID
}
message GetMissionResp {
    uint64 missionID                       = 1; // 任務 ID
    uint64 activityID                      = 2; // 活動 ID
    repeated uint64 gameIDs                = 3; // 遊戲 ID
    uint32 gameCategory                    = 4; // 遊戲類型
    int64 sort                             = 5; // 排序
    MissionType missionType                = 6; // 任務類型
    repeated MissionSetting missionSetting = 7; // 任務配置
    int64 startTime                        = 8; // 活動開始時間
    int64 endTime                          = 9; // 活動結束時間
    uint64 createdUser                     = 10; // 創建使用者 ID
    int64 createdTime                      = 11; // 創建時間
    int64 updatedTime                      = 12; // 修改時間
    yesno.YesNo enable                     = 13; // 任務開關
    uint64 lotteryDrawID                   = 14; // 開獎 ID
}

message AddMissionReq {
    uint64 activityID                      = 1; // 活動 ID
    repeated uint64 gameIDs                = 2; // 遊戲 ID
    uint32 gameCategory                    = 3; // 遊戲類型
    int64 sort                             = 4; // 排序
    MissionType missionType                = 5; // 任務類型
    repeated MissionSetting missionSetting = 6; // 任務配置
    int64 startTime                        = 7; // 活動開始時間
    int64 endTime                          = 8; // 活動結束時間
    uint64 createdUser                     = 9; // 創建使用者 ID
    uint64 updatedUser                     = 10; // 創建使用者 ID
    int64 createdTime                      = 11; // 創建時間
    int64 updatedTime                      = 12; // 修改時間
    yesno.YesNo enable                     = 13; // 任務開關
    uint64 lotteryDrawID                   = 14; // 樂透開獎ID
}
message MissionSetting {
    TicketType ticketType = 1; // 彩券類型
    uint32 ticketCount    = 2; // 彩券數量
    int64 gainAmount      = 3; // 贏分
    int32 count           = 4; // 任務次數
    string comment        = 5; // 任務說明
    uint32 ballNumber     = 6; // 號碼球數
}
message AddMissionResp {
    uint64 missionID = 1; // 任務 ID
}

message UpdateMissionReq {
    uint64 missionID                       = 1; // 任務 ID
    int64 sort                             = 2; // 排序
    repeated uint64 gameIDs                = 3; // 遊戲 ID
    uint32 gameCategory                    = 4; // 遊戲類型
    repeated MissionSetting missionSetting = 5; // 任務配置
    uint64 updatedUser                     = 6; // 更新的用戶
    int64 startTime                        = 7; // 活動開始時間
    int64 endTime                          = 8; // 活動結束時間
    uint64 lotteryDrawID                   = 9; // 樂透開獎ID
}

message DeleteMissionReq {
    uint64 missionID = 1; // 任務 ID
}

message GetUserGainAmountReq {
    uint64 gainAmountID = 1; // 總贏分 ID
