enum DailyMissionType {
    UNKNOWN_DailyMissionType = 0;
    SLOT01                   = 1; // 以任意金額轉動指定老虎機Ｎ次
    SLOT02                   = 2; // 以指定金額以上的押分，轉動指定老虎機Ｎ次
    SLOT03                   = 3; // 在指定老虎機上累積押分達N
    SLOT04                   = 4; // 在指定老虎機上累積獲得BIG WIN達N次
    SLOT05                   = 5; // 在指定老虎機上累積贏取N金額
    SLOT06                   = 6; // 在指定老虎機上單次贏取指定金額以上，累積N次
    BAT01                    = 7; // 以任意金額下注指定遊戲N次
    BAT02                    = 8; // 以指定金額以上，下注指定遊戲N次
    BAT03                    = 9; // 在指定遊戲中累積下注達N金額
    BAT04                    = 10; // 在指定遊戲中累積贏取N金額
    BAT05                    = 11; // 在指定遊戲上單次贏取指定金額以上，累積N次
    FISH01                   = 12; // 在指定魚機上累積消耗N額金額
    // FISH02                   = 13;  // 以指定金額以上，下注指定遊戲N次
    FISH03                   = 14; // 在指定魚機上累積贏取N金額
    FISH04                   = 15; // 在指定魚機上累積打死到N條魚
    FISH05                   = 16; // 在指定魚機上累積打死指定的魚種N次
    MJ01                     = 17; // 進行N次麻將 (每1/4圈即計次)
    GK01                     = 18; // 購買任意刮刮卡N張
    GK02                     = 19; // 購買指定金額以上的刮刮卡N張
    NN01                     = 20; // 以任意注額進行搶莊妞妞或鬼牌妞妞N次
    NN02                     = 21; // 以指定注額以上的金額進行搶莊妞妞或鬼牌妞妞N次
    SP01                     = 22; // 以任意押分進行超模之夜遊戲N次
    SP02                     = 23; // 以指定押分以上金額，進行超模之夜遊戲N次
    ML01                     = 24; // 以任意押分進行小瑪莉遊戲N次
    ML02                     = 25; // 以指定押分以上金額，進行小瑪莉遊戲N次
    SEEVENTPK01              = 26; // 以任意押分進行7PK遊戲N次
    SEEVENTPK02              = 27; // 以指定押分以上金額，進行7PK遊戲N次
    REF01                    = 28; // 邀請N名新好友輸入玩家的推薦碼
    REF02                    = 29; // 邀請N名新好友輸入玩家的推薦碼，且好友皆有達到指定VIP等級
    DAILY01                  = 30; // 每日登入N次
}


