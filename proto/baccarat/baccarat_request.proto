syntax = "proto3";
package baccarat;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/baccarat";

import "google/protobuf/empty.proto";

import "gitlab.ffglobaltech.com/us888/ciri/commonpb/pagination/pagination.proto";
import "proto/baccarat/baccarat.proto";

service GameRoundService {
    rpc GetGameRound(GetGameRoundRequest) returns (GetGameRoundResponse);
    rpc UpdateGameRound(UpdateGameRoundRequest) returns (google.protobuf.Empty);
    rpc ListGameRounds(ListGameRoundsRequest) returns (ListGameRoundsResponse);
    rpc ListPrizeMoneyWinRecords(baccarat.ListPrizeMoneyWinRecordsRequest) returns (baccarat.ListPrizeMoneyWinRecordsResponse);
}

enum OriginStatus {
    OriginStatus_UNKNOW            = 0;
    OriginStatus_Completed         = 1; // 已完成
    OriginStatus_WaitingSettlement = 2; // 等待開獎
    OriginStatus_Exception         = 3; // 開獎異常
}

enum CurrentStatus {
    CurrentStatus_UNKNOW            = 0;
    CurrentStatus_Settlement        = 1; // 已開獎
    CurrentStatus_HandSettlement    = 2; // 手動開獎
    CurrentStatus_WaitingSettlement = 3; // 等待開獎
    CurrentStatus_Exception         = 4; // 開獎異常
    CurrentStatus_Invalid           = 5; // 作廢
}

message ListGameRoundsRequest {
    uint32 page                 = 1; // 頁碼
    uint32 perPage              = 2; // 筆數
    int64 gameType              = 3; // 遊戲ＩＤ
    string gameRoundID          = 4; // 局號
    OriginStatus OriginStatus   = 5; // 原始狀態
    CurrentStatus currentStatus = 6; // 當前狀態
    int64 startedAt             = 7; // 開始時間
    int64 endedAt               = 8; // 結束時間
}

enum DealerWinLostType {
    WinLostType_UNKNOW  = 0;
    WinLostType_Win     = 1; // 輸
    WinLostType_Lose    = 2; // 贏
    WinLostType_Invalid = 3; // 作廢
}

message ListGameRoundsResponse {
    repeated GameRound gameRounds    = 1;
    pagination.Pagination pagination = 2;
}

message GameRound {
    int64 startedAt             = 1;  // 開始時間
    string gameRoundID          = 2;  // 局號
    int64 gameType              = 3;  // 遊戲ＩＤ
    string deskID               = 4;  // 桌號
    OriginStatus originStatus   = 5;  // 原始狀態
    CurrentStatus currentStatus = 6;  // 當前狀態
    int64 totalBetUsers         = 7;  // 下注人數
    uint64 totalBetAmount       = 8;  // 總押
    DealerWinLostType winLost   = 9;  // 輸贏
    int64 winLoseAmount         = 10; // 收入
}

message GetGameRoundRequest {
    string gameRoundID = 1;  // 局號
}

message GetGameRoundResponse {
    string gameRoundID                         = 1;  // 局號
    int64 gameType                             = 2;  // 遊戲ＩＤ
    string deskID                              = 3;  // 桌號
    int64 totalBetUsers                        = 4;  // 下注人數
    uint64 totalBetAmount                      = 5;  // 總押
    DealerWinLostType winLost                  = 6;  // 輸贏
    int64 totalWinLoseAmount                   = 7;  // 總收入
    int32 BankerPoint                          = 8;  // 莊家點數
    int32 PlayerPoint                          = 9;  // 閒家點數
    repeated int32 bankerCards                 = 10; // 莊家牌
    repeated int32 playerCards                 = 11; // 閒家牌
    BetAreaInfo betAreaInfosBanker             = 12; // 押注區 “莊” 資訊
    BetAreaInfo betAreaInfosPlayer             = 13; // 押注區 “閒” 資訊
    BetAreaInfo betAreaInfosTie                = 14; // 押注區 “和” 資訊
    BetAreaInfo betAreaInfosBankerPair         = 15; // 押注區 “莊對” 資訊
    BetAreaInfo betAreaInfosPlayerPair         = 16; // 押注區 “閒對” 資訊
    BetAreaInfo betAreaInfosSuperSix           = 17; // 押注區 “免擁-莊” 資訊
    BetAreaInfo betAreaInfosNoCommissionBanker = 18; // 押注區 “Super6” 資訊
    OriginStatus originStatus                  = 19; // 原始狀態
}

message BetAreaInfo {
    float odds                = 1; // 賠率
    bool result               = 2; // 結果
    int64 totalBetUsers       = 3; // 下注人數
    uint64 totalBetAmount     = 4; // 總押
    DealerWinLostType winLost = 5; // 勝負
    int64 winLoseAmount       = 6; // 收入
}

message UpdateGameRoundRequest {
    string gameRoundID          = 1; // 局號
    OperationType operationType = 2; // 操作類型
    repeated int32 bankerCards  = 3; // 莊家牌
    repeated int32 playerCards  = 4; // 閒家牌
}

enum OperationType {
    OperationType_UNKNOW   = 0;
    OperationType_Invalid  = 1; // 作廢
    OperationType_Manual   = 2; // 手動輸入結果
}