syntax = "proto3";
package bank;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/bank";

import "google/protobuf/empty.proto";

service bankService {
    // CoinByBet  coin when user play a game
    rpc CoinByBet(GameReceipt) returns (google.protobuf.Empty);
}

// OperationMode bank Cast or Destroy
enum OperationMode {
    // ModeUnknown means Unknown
    ModeUnknown = 0;
    // ModeCast means Cast coin
    ModeCast = 1;
    // ModeDestroy means Destroy coin
    ModeDestroy = 2;
}

enum OperationEvent {
    // EventUnknown means Unknown
    EventUnknown = 0;
    // EventPayment means Cast or destroy by which Receipt
    EventPayment = 1;
    // EventBet means Cast or destroy by which Bet
    EventBet = 2;
    // EventCampaign means Cast or destroy by which campaign
    EventCampaign = 3;
}
// CoinType express coin Golden or Silver
enum CoinType {
    UNKNOWN_COIN_TYPE = 0;
    GOLDEN            = 1;
    //    SILVER            = 2;
}

// BagStatus express coin bag enable or disable
enum BagStatus {
    ALL_BAG_STATUS = 0;
    OPEN           = 1;
    CLOSE          = 2;
}

// Campaign from system or bonus
message Campaign {
    uint64 ID                = 1;
    OperationMode mode       = 2;
    uint64 priceAmountMicros = 3;  // order price(using micro-units(means price*1,000,000
    string priceCurrencyCode = 4;  // Currency Code ISO 4217 currency code
    string from              = 5;
    string to                = 6;  // admin who Initiate event
}

message Coin {
    int64 amount      = 1;  // amount
    CoinType coinType = 2;  // coin type 1.golden 2.silver/
}

// TradeCoin means Bank Receipt trade detail
message TradeCoin {
    uint64 recordID    = 1;
    int64 amount       = 2;
    OperationMode mode = 3;
    CoinType type      = 4;
}

// CoinBag means product of coin
message CoinBag {
    uint64 ID                = 1;  // coin bag id
    string name              = 2;  // coin bag name
    uint64 priceAmountMicros = 3;  // order price(using micro-units(means price*1,000,000
    string priceCurrencyCode = 4;  // Currency Code ISO 4217 currency code
    repeated Coin content    = 7;
}

// 遊戲會先產生round,再透過roundid去反查消費紀錄
message GameReceipt {
    uint64 userID           = 1;
    uint64 roundID          = 2;
    CoinType coinType       = 3;
    int64 amount            = 4;
    OperationMode tradeMode = 5;
}