syntax = "proto3";
package bingo;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/bingo";

enum BingoType {
    PING_PONG        = 0;
    JOIN_ROOM        = 1;  // 加入房間
    USER_KICK_BEFORE = 2;
    SERVER_UPDATE    = 3;

    LEAVE     = 11;  // 離開
    SPIN      = 12;  // bingo spin
    GAME_INFO = 13;  // 遊戲初始資訊
}

message PlayerInfo {
    uint64 userID   = 1;
    string nickname = 2;
    string imageURL = 3;
    uint64 vipLevel = 4;
    uint64 level    = 5;
    int64 balance   = 6;  // 餘額
}

// 加入房間 response
message JoinRoomResponse {
    PlayerInfo playerInfo = 1;  // 玩家
}
// bingo spin request
message SpinRequest {
    uint64 userID = 1;
    int64 amount  = 2;
    string roomID = 3;
}

// bingo spin result
message SpinResult {
    string roundID                             = 1;
    repeated BingoTableResult bingoTableResult = 2;
    int64 winCoin                              = 3;
    repeated EventSet eventSet                 = 4;
    int64 balance                              = 5;
    repeated string bingoBallResult            = 6;  // 開獎球結果
}
message BingoTableResult {
    message BingoTable {
        repeated string row = 1;
    }
    repeated BingoTable bingoData = 2;
}
// bingo 的事件設定
message EventSet {
    int64 code      = 1;
    int64 winCoin   = 2;
    bytes extraData = 3;
}
message GameInfoRequest {
    uint64 gameID = 1;
    int64 amount  = 2;
}
message GameInfoResponse {
    bytes gameInfo = 1;
}
