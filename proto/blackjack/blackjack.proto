syntax = "proto3";
package blackjack;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/blackjack";

import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";

enum BlackType {
    PING_PONG        = 0;
    JOIN_ROOM        = 1;
    USER_KICK_BEFORE = 2;
    SERVER_UPDATE    = 3;
    SIT              = 11;
    STAND_UP         = 12;
    LEAVE            = 13;
    GET_DESK         = 14;
    BET              = 15;
    SAFE             = 16;
    HIT              = 17;
    STAND            = 18;
    BLACK_DOUBLE     = 19;
    SPLIT            = 20;
    SURRENDER        = 21;
    DEAL_FINISH      = 22;
    BLACKJACK        = 23;
    COUNT_COIN       = 24;
    START_BET        = 25;
    ACE_TIME         = 26;
    PLAYER_START     = 27;
    WISH_CARD        = 28;
    Room_Close       = 29;
}

enum BetType {
    UNKNOWN_BET_TYPE  = 0;
    TYPE_BET          = 1;
    TYPE_SAFE         = 2;
    TYPE_SAFE_COUNT   = 3;
    TYPE_SPLIT        = 4;
    TYPE_DOUBLE       = 5;
    TYPE_FIRST_COUNT  = 6;
    TYPE_SECOND_COUNT = 7;
}

enum SitBase {
    UNKNOWN_SIT_BASE = 0;
    FIRST            = 1;
    SECOND           = 2;
    THIRD            = 3;
}

enum Card {
    UNKNOWN_CARD = 0;
    FIRST_CARD   = 1;
    SECOND_CARD  = 2;
}

enum TableStatus {
    UNKNOWN_TABLE_STATUS      = 0;
    IDLE_TIME                 = 1;
    BET_TIME                  = 2;
    DEAL_TIME                 = 11;
    SAFE_TIME                 = 3;
    FIRST_PLAYER_FIRST_CARD   = 4;
    FIRST_PLAYER_SECOND_CARD  = 5;
    SECOND_PLAYER_FIRST_CARD  = 6;
    SECOND_PLAYER_SECOND_CARD = 7;
    THIRD_PLAYER_FIRST_CARD   = 8;
    THIRD_PLAYER_SECOND_CARD  = 9;
    Count_coin                = 10;
}

message SitRequest {
    SitBase baseID = 1;
}

message BetRequest {
    SitBase baseID  = 1;
    int64 BetAmount = 2;
}

message StandRequest {
    SitBase baseID = 1;
}

message LeaveRequest {
    SitBase baseID = 1;
}

message BuySafeRequest {
    SitBase baseID  = 1;
    yesno.YesNo buy = 2;
}

message UserSitInfo {
    SitBase baseID = 1;
    uint64 userID  = 2;
}

message SitInfo {
    SitBase baseID     = 1;
    PlayerInfo player  = 2;
    uint64 time        = 3;
    TableStatus status = 4;
}

message UserBuySafe {
    yesno.YesNo isBuy = 1;
    SitBase baseID    = 2;
    int64 balance     = 3;
}

message PlayerBet {
    uint64 userID   = 1;
    int64 betAmount = 2;
    int64 amount    = 3;
}

message NeedSafe {
    yesno.YesNo safe = 1;
}

message DeskInfo {
    string roundID              = 8;
    repeated PlayerInfo players = 1;
    repeated int64 DealerCards  = 2;
    int64 DealerPoint           = 7;
    TableStatus status          = 3;
    int64 time                  = 4;
    int64 cardCount             = 5;
    int64 cut                   = 6;
}

message PlayerStart {
    SitBase baseID = 1;
    Card cardID    = 2;
}

message PlayerInfo {
    uint64 userID           = 1;
    string nickname         = 2;
    string imageURL         = 3;
    repeated CardInfo cards = 4;
    int64 betAmount         = 5;
    int64 amountGap         = 15;
    int64 amount            = 6;
    Card cardID             = 7;
    yesno.YesNo isFinish    = 8;
    yesno.YesNo isSplit     = 9;
    int64 countTime         = 10;
    yesno.YesNo safe        = 11;
    int64 balance           = 12;
    uint64 vipLevel         = 13;
    uint64 level            = 14;
}

message CardInfo {
    repeated int64 cards   = 1;
    int64 point            = 2;
    yesno.YesNo stand      = 3;
    yesno.YesNo double     = 4;
    yesno.YesNo spadesJack = 5;
    yesno.YesNo lastFinish = 6;
    yesno.YesNo surrender  = 10;
    int64 betAmount        = 7;
    uint64 check           = 8;
    int64 round            = 9;
}

message Action {
    uint64 userID    = 1;
    string requestID = 2;
    BlackType action = 3;
}

message OK {
    yesno.YesNo ok = 1;
}
message BetTime {
    int64 betTime  = 1;
    string roundID = 2;
}