syntax = "proto3";
package campaign;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/campaign";

import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";
import "google/protobuf/empty.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/pagination/pagination.proto";

service EventService {
    // Event 活動
    rpc ListEvents(ListEventsReq) returns (ListEventsResp);
    rpc GetEvent(GetEventReq) returns (Event);
    rpc CreateEvent(CreateEventReq) returns (google.protobuf.Empty);
    rpc UpdateEvent(UpdateEventReq) returns (google.protobuf.Empty);
    // rpc CheckFinishedEvent(google.protobuf.Empty) returns (google.protobuf.Empty);

    rpc CheckEventStatus(google.protobuf.Empty) returns (google.protobuf.Empty);  // for 排程

    rpc AddVoucherToUser(AddVoucherToUserRequest) returns (google.protobuf.Empty);  // 對玩家添加 實體票卷

    rpc NewPlayerNotice(NewPlayerNoticeRequest) returns (google.protobuf.Empty);  // 新玩家加入通知 用來做活動檢查與補償 決不噴錯 !!

    // // EventRecord 事件派發紀錄
    // rpc ListEventRecords(ListEventRecordsReq) returns (ListEventRecordsResp);

    // UserEventRecord 玩家在事件內獲得物品的紀錄
    rpc ListUserEventRecords(ListUserEventRecordsReq) returns (ListUserEventRecordsResp);
    rpc CreateUserEventRecord(CreateUserEventRecordReq) returns (google.protobuf.Empty);
    rpc GetUserAccumulatedInfo(GetUserAccumulatedInfoReq) returns (GetUserAccumulatedInfoResp);

    // Reward 獎勵
    rpc ListRewards(ListRewardsReq) returns (ListRewardsResp);
    rpc BatchCreateRewards(BatchCreateRewardsReq) returns (google.protobuf.Empty);
    rpc GetReward(GetRewardReq) returns (GetRewardResp);
    rpc UpdateReward(UpdateRewardReq) returns (google.protobuf.Empty);

    // note: `prize` is more specific than `reward` for this case.
    rpc CreateRewardRecord(CreateRewardRecordRequest) returns (google.protobuf.Empty);    // 建立玩家得獎紀錄
    rpc ListRewardRecords(ListRewardRecordsRequest) returns (ListRewardRecordsResponse);  // 列出玩家得獎紀錄
    rpc GetRewardRecord(GetRewardRecordReq) returns (GetRewardRecordResp);
    rpc UpdateRewardRecord(UpdateRewardRecordRequest) returns (google.protobuf.Empty);  // 更新玩家紀錄
    rpc ExchangeReward(ExchangeRewardRequest) returns (ExchangeRewardResponse);         // 玩家兌換獎品（兌換成物品|遊戲幣）
}

// EventCategory
// note: enum 暫時不支援復用
// 新增 enum 時，請在 worker & schedule 實作各自邏輯
enum EventCategory {
    UNKNOWN_EVENT_CATEGORY = 0;
    SERIAL_NUMBER          = 1;  // 序號活動
    PRIZE_VOUCHER          = 2;  // 實體獎券
    CLUB_RACING            = 3;  // 俱樂部競賽
    RANKING                = 4;  // 排行榜競賽
    RETURN_PLAYER          = 5;  // 回饋活動
}

// 玩家參與限制過濾
enum PlayerLimit {
    NoSet = 0;
}

message Event {
    uint64 id              = 1;
    string name            = 2;
    EventCategory category = 3;  // 活動類型

    EventState status = 4;
    string eventCode  = 5;  // 活動代碼

    int64 startedShowAtMs = 6;   // 可視開始時間
    int64 endedShowAtMs   = 7;   // 可視結束時間
    int64 startedAtMs     = 8;   // 活動開始日期
    int64 endedAtMs       = 9;   // 活動結束日期
    yesno.YesNo enable    = 10;  // 是否啟用

    PlayerLimit playerLimit                             = 11;
    repeated AppPlatformEventInfo appInfo               = 12;
    repeated BetEventRewardCondition rewardConditions   = 13;
    repeated OtherRewardCondition otherRewardConditions = 14;

    // repeated uint64 gameIDs = 21;  // 關聯遊戲
    // EventConfig config      = 22;  // 事件設定（包含獎勵, 附件, 雜項）

    int64 createdAtMs = 15;
    uint64 creatorID  = 16;
    int64 updatedAtMs = 17;
    uint64 updaterID  = 18;
    int64 deletedAtMs = 19;
    uint64 deleterID  = 20;
}

message AppPlatformEventInfo {
    enum AppType {
        UNKNOW = 0;
        APK    = 1;  // apk版
        Apple  = 2;  // apple平台
        Google = 3;  // google平台
    }
    AppType type       = 1;
    string webURL      = 2;  // 活動資訊頁面
    string imageSource = 3;  // 活動圖片
}

enum EventState {
    UNKNOWN_EVENT_STATE = 0;
    NOT_START           = 1;  // 未開始
    IN_PROGRESS         = 2;  // 進行中
    END                 = 3;  // 結束
    DELETED             = 4;  // 已刪除
}

enum OtherRewardCategory {
    VipLevel = 0;
}
message OtherRewardCondition {
    OtherRewardCategory category = 1;
    EventRewardType type         = 2;  // 獎勵類型
    int64 value                  = 3;
    uint64 count                 = 4;  // 派講數量
    int32 vgItemType             = 5;
    uint64 vgItemID              = 6;
}

message BetEventRewardCondition {
    EventRewardType type              = 1;  // 獎勵類型
    int32 judanGameCategory           = 2;  // 遊戲分類 必填!
    uint64 gameID                     = 3;  // 遊戲id => id = 0 不限制
    EventRewardConditionFilter filter = 4;  // 資格過濾條件
    int32 vgItemType                  = 5;
    uint64 vgItemID                   = 6;
}

message EventRewardConditionFilter {
    uint64 betAmountMin         = 1;
    uint64 betAmountMax         = 2;
    uint64 onceGainAmount       = 3;  // 單局贏分
    uint64 grandTotalGainAmount = 4;  // 累計贏分
}

enum EventRewardType {
    UNKNOW       = 0;
    GoldenTicket = 1;
    SilverTicket = 2;
    CopperTicket = 3;
}

enum EventRecordStatus {
    UNKNOWN_EVENT_RECORD_STATUS = 0;
    SEND_IN_PROCESSING          = 1;
    SEND_IS_DONE                = 2;
    SEND_IS_FAIL                = 3;
}

message EventRecord {
    uint64 id                = 1;
    uint64 eventID           = 2;
    EventRecordStatus status = 3;
    Event event              = 4;
    int64 RecordStart        = 5;
    int64 RecordEnd          = 6;
    string memo              = 7;
    int64 createdAtMs        = 8;
}

message ListEventRecordsReq {
    uint32 page    = 1;
    uint32 perPage = 2;
}

message ListEventRecordsResp {
    pagination.Pagination page   = 1;
    repeated EventRecord records = 2;
}

message UserEventRecord {
    uint64 id               = 1;
    uint64 userID           = 2;
    EventRewardType type    = 3;
    int32 vgItemType        = 4;
    uint64 itemID           = 5;
    string serialNo         = 6;
    uint64 amount           = 7;
    string memo             = 8;
    string recordID         = 11;  // 單號
    EventRecordFrom from    = 9;
    int64 createdAtMs       = 10;
    uint64 eventID          = 12;
    uint64 gameID           = 13;
    int32 judanGameCategory = 14;
}

enum EventRecordFrom {
    FromUNKNOW                   = 0;
    FromBET                      = 1;
    FromVIPLEVELUP               = 2;
    FromPackage                  = 3;  // 產包
    OFFICIAL_SYSTEM_MANAGER_SEND = 4;
    FROM_TOURNAMENTS_AWARD       = 5;  // 錦標賽獎勵
}

message ListUserEventRecordsReq {
    uint32 page             = 1;
    uint32 perPage          = 2;
    int64 recordStart       = 3;
    int64 recordEnd         = 4;
    uint64 userID           = 5;
    uint64 eventID          = 6;
    uint64 itemID           = 7;
    repeated uint64 itemIDs = 8;
    EventRecordFrom from    = 9;

    string recordID = 10;
}

message ListUserEventRecordsResp {
    pagination.Pagination page       = 1;
    repeated UserEventRecord records = 2;
}

message CreateUserEventRecordReq {
    UserEventRecord record = 1;
    uint64 eventID         = 2;
}

message GetUserAccumulatedInfoReq {
    uint64 userID  = 1;
    uint64 eventID = 2;
}

message GetUserAccumulatedInfoResp {
    // map<string, uint64> accumulatedBetMap = 1;
    uint64 userID        = 1;
    uint64 eventID       = 2;
    uint64 totalBet      = 3;
    uint64 totalGain     = 4;
    uint64 totalExp      = 5;
    uint64 totalRecharge = 6;

    uint64 goldenTicketConditionCurrentGainAmount = 7;  // 金券條件地目前累計總額
    uint64 silverTicketConditionCurrentGainAmount = 8;  // 銀券條件地目前累計總額
    uint64 copperTicketConditionCurrentGainAmount = 9;  // 銅券條件地目前累計總額

    uint64 goldenTicketsByVipLevel = 10;
    uint64 silverTicketsByVipLevel = 11;
    uint64 copperTicketsByVipLevel = 12;

    uint64 goldenTicketsByGainAccum = 13;
    uint64 silverTicketsByGainAccum = 14;
    uint64 copperTicketsByGainAccum = 15;

    uint64 goldenTicketsByOnceGain = 16;
    uint64 silverTicketsByOnceGain = 17;
    uint64 copperTicketsByOnceGain = 18;

    uint64 goldenTicketsByRecharge = 19;
    uint64 silverTicketsByRecharge = 20;
    uint64 copperTicketsByRecharge = 21;

    uint64 goldenTicketsByPackage = 22;
    uint64 silverTicketsByPackage = 23;
    uint64 copperTicketsByPackage = 24;
}

message ListEventsReq {
    uint32 page                = 1;
    uint32 perPage             = 2;
    EventState state           = 3;
    repeated EventState states = 4;
    string name                = 5;
    EventCategory category     = 6;
    yesno.YesNo enable         = 7;
    uint64 gameID              = 8;
    string eventCode           = 9;

    int64 startedShowAtMsLte = 10;  // 可視開始時間
    int64 endedShowAtMsGte   = 11;  // 可視結束時間
}

message ListEventsResp {
    pagination.Pagination page = 1;
    repeated Event events      = 2;
}

message GetEventReq {
    uint64 id        = 1;
    string eventCode = 2;
}

message CreateEventReq {
    string name            = 1;
    EventCategory category = 2;  // 活動類型

    int64 startedShowAtMs = 3;  // 可視開始時間
    int64 endedShowAtMs   = 4;  // 可視結束時間

    int64 startedAtMs  = 5;  // 活動開始日期
    int64 endedAtMs    = 6;  // 活動結束日期
    yesno.YesNo enable = 7;  // 是否啟用

    PlayerLimit playerLimit = 8;

    repeated AppPlatformEventInfo appInfo = 9;

    repeated BetEventRewardCondition rewardConditions   = 11;
    repeated OtherRewardCondition otherRewardConditions = 12;
    int64 createdAtMs                                   = 13;
    uint64 creatorID                                    = 14;
    string eventCode                                    = 15;
}

message UpdateEventReq {
    uint64 id              = 1;
    string name            = 2;
    EventCategory category = 3;  // 活動類型

    int64 startedShowAtMs = 4;  // 可視開始時間
    int64 endedShowAtMs   = 5;  // 可視結束時間

    int64 startedAtMs  = 6;  // 活動開始日期
    int64 endedAtMs    = 7;  // 活動結束日期
    yesno.YesNo enable = 8;  // 是否啟用

    PlayerLimit playerLimit               = 9;
    repeated AppPlatformEventInfo appInfo = 10;

    repeated BetEventRewardCondition rewardConditions   = 12;
    repeated OtherRewardCondition otherRewardConditions = 13;
    int64 updatedAtMs                                   = 14;
    uint64 updaterID                                    = 15;
    yesno.YesNo delete                                  = 16;
    string eventCode                                    = 17;
}

// message EventConfig {
//     map<string, Rewards> rewardMap = 1;  // 獎勵表
//     map<string, string> miscMap    = 2;  // 雜項表
// }

message ListRewardsReq {
    uint32 page               = 1;
    uint32 perPage            = 2;
    RewardType type           = 3;
    repeated RewardType types = 4;
    uint64 itemID             = 5;
    repeated uint64 itemIDs   = 6;
}

message ListRewardsResp {
    repeated Reward rewards          = 1;
    pagination.Pagination pagination = 2;
}

message BatchCreateRewardsReq {
    repeated Reward rewards = 1;
}

message GetRewardReq {
    uint64 id   = 1;
    string name = 2;
}

message GetRewardResp {
    Reward reward = 1;
}

message UpdateRewardReq {
    GetRewardReq opt = 1;
    Reward reward    = 2;
}

// RewardType 獎勵類型
enum RewardType {
    UNKNOWN_REWARD_TYPE = 0;
    PHYSICAL            = 1;  // 實體獎項
    VOUCHER             = 2;  // 電子票券
    VIRTUAL             = 3;  // 虛擬獎項
}

// Reward 獎勵品（可能是實體獎項|電子票券|虛擬獎項）
message Reward {
    uint64 id            = 1;
    string name          = 2;
    RewardType type      = 3;
    uint64 price         = 4;   // 法幣價值
    string unit          = 5;   // 法幣單位
    uint64 gold          = 6;   // 遊戲內等值金幣
    yesno.YesNo needForm = 7;   // 是否需要領獎單
    string cardSerial    = 8;   // 卡片序號
    string cardSecret    = 9;   // 卡片密碼
    int32 vgItemType     = 10;  // 物品ID
    uint64 itemID        = 11;
    uint64 amount        = 12;  // 發送數量
}

// Rewards 多項獎勵品
message Rewards {
    repeated Reward rewards = 1;
}

// RewardStatus 領獎狀態
enum RewardStatus {
    UNKNOWN_REWARD_STATE = 0;
    UNRECEIVED           = 1;  // 未領取
    ACCEPTED             = 2;  // 受理中
    RECEIVED             = 3;  // 已領取
    UNACCEPTED           = 4;  // 不可領
}

// RemitStatus 匯款狀態
enum RemitStatus {
    UNKNOWN_REMIT_STATUS = 0;
    NOT_YET              = 1;  // 未匯款
    DONE                 = 2;  // 完成匯款
}

// RewardRecord 領獎紀錄
message RewardRecord {
    uint64 id                 = 1;  // 領獎紀錄ID
    uint64 userID             = 2;
    string realName           = 3;  // 真實姓名
    string socialID           = 4;  // 身分證字號
    int64 receiveDate         = 5;  // 領獎日期
    uint64 rewardID           = 6;  // 領獎品項ID
    RewardStatus rewardStatus = 7;  // 領獎狀態
    RemitStatus remitStatus   = 8;  // 匯款狀態

    // appended data
    Reward reward = 21;
}

message CreateRewardRecordRequest {
    uint64 userID             = 1;
    string realName           = 2;
    string socialID           = 3;
    int64 receiveDate         = 4;
    uint64 rewardID           = 5;
    RewardStatus rewardStatus = 6;
    RemitStatus remitStatus   = 7;
}

message ListRewardRecordsRequest {
    uint64 userID             = 1;
    repeated uint64 userIDs   = 2;
    RewardStatus rewardStatus = 3;
    RemitStatus remitStatus   = 4;
    uint32 page               = 11;
    uint32 perPage            = 12;
    int64 startedAtMs         = 13;
    int64 endedAtMs           = 14;

    uint64 eventID        = 9;
    yesno.YesNo onlyCount = 8;  // 是否僅要傯 數量 (pagination.totalCount)
}

message ListRewardRecordsResponse {
    repeated RewardRecord records    = 1;
    pagination.Pagination pagination = 2;
}

message GetRewardRecordReq {
    uint64 id = 1;
}

message GetRewardRecordResp {
    RewardRecord record = 1;
}

message UpdateRewardRecordRequest {
    uint64 id                 = 1;
    uint64 userID             = 2;
    string realName           = 3;
    string socialID           = 4;
    int64 receiveDate         = 5;
    uint64 rewardID           = 6;
    RewardStatus rewardStatus = 7;
    RemitStatus remitStatus   = 8;
}

enum ExchangeType {
    UNKNOWN_EXCHANGE_TYPE = 0;
    NORMAL_EXCHANGE       = 1;  // 一般兌換
    TO_GOLD               = 2;  // 兌換成等值遊戲幣
}

message ExchangeRewardRequest {
    ExchangeType type = 1;
    uint64 userID     = 2;
    uint64 record_id  = 3;
}

message ExchangeRewardResponse {
    yesno.YesNo isSuccess = 1;
    RewardRecord record   = 2;
}

// message EventNatsMsg {
//     // map<string, string> dataMap = 1;
//     uint64 userID     = 1;
//     uint64 gameID     = 2;
//     uint64 betAmount  = 3;
//     uint64 gainAmount = 4;
// }

message UserRewardInfo {
    uint64 user_id = 1;
    uint64 item_id = 2;
    uint64 amount  = 3;
}

message AddVoucherToUserRequest {
    uint64 UserID                                     = 1;
    uint64 createdAtMs                                = 2;  // 發生當下的時間戳
    EventRecordFrom from                              = 3;  // 以什麼名義添加
    string recordID                                   = 4;  // 單號
    repeated AddVoucherToUserRequest_Voucher vouchers = 5;
}

message AddVoucherToUserRequest_Voucher {
    int32 vgType  = 1;
    uint64 itemID = 2;
    uint32 amount = 3;  // 數量
}

message NewPlayerNoticeRequest {
    uint64 userID = 1;
    uint64 vipLV  = 2;
    uint64 lv     = 3;
}