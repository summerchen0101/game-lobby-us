syntax = "proto3";
package campaign;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/campaign";

import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";
import "google/protobuf/empty.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/pagination/pagination.proto";

service PopMsgService {
    // CreatePopUpMsg 新增彈窗訊息
    rpc CreatePopUpMsg(CreatePopUpMsgRequest) returns (google.protobuf.Empty);

    // ListPopUpMsg 彈窗訊息列表
    rpc ListPopUpMsg(ListPopUpMsgRequest) returns (ListPopUpMsgResponse);
}

enum PopUPMsgCondition {
    All                      = 0;
    RechargeCompleted        = 1;  //儲值完成後
    VipLevelDowngrade        = 2;  // VIP降等
    ReservedSeatTimeout      = 3;  //保留座位時間到
    SystemMaintainAfter30Min = 4;  //維護前30分鐘
    SystemMaintainAfter10Sec = 5;  //維護前10秒
}

message CreatePopUpMsgRequest {
    PopUPMsgCondition condition = 1;
    repeated Message messages   = 2;
}

message ListPopUpMsgRequest {
    uint32 page                 = 1;
    uint32 perPage              = 2;
    PopUPMsgCondition condition = 3;
}

message PopMsg {
    uint64 id                   = 1;
    PopUPMsgCondition condition = 2;
    repeated Message messages   = 3;

    int64 createdAtMs = 4;
    uint64 creatorID  = 5;
    int64 updatedAtMs = 6;
    uint64 updaterID  = 7;
}

message Message {
    uint64 language       = 1;
    string msg            = 2;
    yesno.YesNo isDefault = 3;
}

message ListPopUpMsgResponse {
    pagination.Pagination page  = 1;
    repeated PopMsg popMessages = 2;
}
