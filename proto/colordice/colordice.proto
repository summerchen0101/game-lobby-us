syntax = "proto3";
package colordice;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/colordice";


// 繽紛骰

enum MessageType {
  PING_PONG = 0;
  // [RPC] 加入房間
  // * req: JoinRoomRequest
  // * resp: JoinRoomResponse
  JOIN_ROOM = 1;
  // [RPC] 離開房間
  LEAVE_ROOM = 2;
  // [RPC] 取得房間資訊
  // * resp: GetRoomResponse
  GET_ROOM = 10;
  // [RPC] 下注
  // * req: BetRequest
  // * resp: BetResponse
  BET = 11;

  // [推播] 離開房間
  // data: LeaveEventData
  LEAVE_EVENT = 20;
}

enum Color {
  COLOR_UNKNOWN = 0;
  RED           = 1;
  YELLOW        = 2;
  GREEN         = 3;
}

message JoinRoomRequest {
  string roomID = 1;
}

message JoinRoomResponse {
  Player me = 1;  // 玩家詳情
}

message Player {
  uint64 userID            = 1;
  string nickname          = 2;
  string imageURL          = 3;
  uint64 vipLevel          = 4;
  uint64 level             = 5;
  int64 balance            = 6;  // 餘額
  int64 betAmount          = 7;  // 押注額
}

message BetRequest {
  uint64 betAmount         = 1;  // 押注額
}

message BetResponse {
  repeated ColorCount result = 1;
  uint64 gainAmount          = 2;  // 收入
  int64 balance              = 3;  // 玩家餘額
  string nextRoundID         = 4;  // 下一場局號
}

message Room {
  string roomID  = 1;  // 房號
  string roundID = 2;  // 當前局號
}

message GetRoomResponse {
  Room room  = 1;
}

message ColorCount {
  Color color  = 1;
  uint32 count = 2;
}

enum LeaveReason {
  LEAVE_REASON_UNKNOWN    = 0;
  LEAVE_REASON_LEAVE      = 1; // 用戶主動離開房間
  LEAVE_REASON_IDLE       = 2; // 用戶閒置
}

message LeaveEventData {
  string roomID           = 1;  // 房號
  LeaveReason leaveReason = 2;  // 離開原因
}

// +++++++++++++++++++
// Tape
// +++++++++++++++++++

message BetOrderTape {
  string roomID              = 1;  // 房號
  string roundID             = 2;  // 當前局號
  uint64 betAmount           = 3;  // 注額
  string multiple            = 4;  // 倍率
  uint64 gainAmount          = 5;  // 收入
  repeated ColorCount result = 6;  // 開獎結果
  PlayerTape player          = 7;  // 玩家
}

message PlayerTape {
  uint64 userID   = 1;
  string nickname = 2;
}