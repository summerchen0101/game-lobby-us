syntax = "proto3";
package domino;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/domino";


// GameMode 遊戲模式
enum GameMode {
  UnknownGameMode = 0;
  Draw            = 1;
	Block           = 2;
	All5s           = 3;
}


// RoomStage 房間階段
enum RoomStage {
  UnknownRoomStage = 0;
  Waiting          = 1;  // 等待玩家進入階段
  Playing          = 2;  // 遊戲中階段
  Paused           = 3;  // 暫停階段
}


// RoundStage 回合階段
enum RoundStage {
  UnknownRoundStage = 0;
  Shuffling         = 1;  // 洗牌階段
  Dealing           = 2;  // 發牌階段
  WaitingPlayerPlay = 3;  // 等待玩家出牌階段
  PlayerPlaying     = 4;  // 玩家出牌階段
  WaitingPlayerDraw = 5;  // 等待玩家抽牌階段
  PlayerDrawing     = 6;  // 玩家抽牌階段
  Settlement        = 10; // 結算階段
}


// CardNo 骨牌編號
enum CardNo {
  UnknownCardNo = 0;
  ZeroZero      = 1;   // 0|0
  OneZero       = 2;   // 1|0
  OneOne        = 3;   // 1|1
  TwoZero       = 4;   // 2|0
  TwoOne        = 5;   // 2|1
  TwoTwo        = 6;   // 2|2
  ThreeZero     = 7;   // 3|0
  ThreeOne      = 8;   // 3|1
  ThreeTwo      = 9;   // 3|2
  ThreeThree    = 10;  // 3|3
  FourZero      = 11;  // 4|0
  FourOne       = 12;  // 4|1
  FourTwo       = 13;  // 4|2
  FourThree     = 14;  // 4|3
  FourFour      = 15;  // 4|4
  FiveZero      = 16;  // 5|0
  FiveOne       = 17;  // 5|1
  FiveTwo       = 18;  // 5|2
  FiveThree     = 19;  // 5|3
  FiveFour      = 20;  // 5|4
  FiveFive      = 21;  // 5|5
  SixZero       = 22;  // 6|0
  SixOne        = 23;  // 6|1
  SixTwo        = 24;  // 6|2
  SixThree      = 25;  // 6|3
  SixFour       = 26;  // 6|4
  SixFive       = 27;  // 6|5
  SixSix        = 28;  // 6|6
}


// Card 骨牌
message Card {
  CardNo CardNo         = 1; // 骨牌編號
  int32 CardLeftNumber  = 2; // 頭 左 的數字
  int32 CardRightNumber = 3; // 尾 右 的數字
}

// PlaceCardPosition 擺放骨牌位置
enum PlaceCardPosition {
  UnknownPlaceCardPosition = 0;
  Left                     = 1;
  Right                     = 2;
}


// MessageType
enum MessageType {
  PingPong = 0;
  
  // [RPC]
  JoinRoom = 1;  // 加入房間
  ExitRoom = 2;  // 離開房間

  // [RPC]
  GetRoom    = 11;  // 取得房間資訊
  GetReady   = 12;  // 準備好
  // KickPlayer = 13;  // 

  // [RPC]
  PlayCard = 21; // 玩家出牌
  DrawCard = 22; // 玩家抽牌

  // [RPC]
  BroadcastRoom = 31; // 廣播訊息給房間所有玩家 

  // [PUSH]
  RoomInfoEvent    = 1001; // 房間訊息事件
  RoomClosedEvent  = 1002; // 房間關閉事件

   // [PUSH]
  JoinRoomEvent = 1011;  // 加入房間事件  
  ExitRoomEvent = 1012;  // 離開房間事件

  // [PUSH]
  PlayCardEvent  = 1021; // 玩家出牌事件
  DrawCardEvent  = 1022; // 玩家抽牌事件
  BlockCardEvent = 1023; // 玩家沒牌事件

  // [PUSH]
  BroadcastRoomEvent = 1031;  // 房間廣播事件
}


// InitializeRoomOptions 用來放在什麼 RoomFilter 的魔法咒語
message InitializeRoomOptions {
  int64 roomLevel        = 1;   // 房間等級
  int64 requiredVIPLevel = 2;   // 最低 VIP 等級要求
  GameMode gameMode      = 3;   // 遊戲模式
  int64 requiredToken    = 4;   // 進房需要的代幣數量
  int64 playerCount      = 5;   // 預計進房人數
  int64 ante             = 6;   // 底注
  int64 unit             = 7;   // 台分
  int64 roundNumber      = 8;   // 回合數
  int64 playerActionTime = 9;   // 玩家動作時間 秒
  bool isProbation       = 10;  // 是否為試玩(休閒房)
  bool robotEnable       = 11;  // 是否開放機器人陪打
  int64 robotMaxNumber   = 12;  // 機器人最多幾個
}


// [RPC] JoinRoom 加入房間
message JoinRoomRequest {
  string roomID = 1;  // 房間編號
  int64 token   = 2;  // 代幣
}
message JoinRoomResponse {
  string roomID = 1;  // 房間編號
}
message JoinRoomEventMessage {
  string roomID           = 1;   // 房間編號
  string roundID          = 2;   // 回合編號
  int64 userID            = 3;   // 玩家用戶編號
  string avatarURL        = 4;   // 頭像 URL
  string name             = 5;   // 名稱
  uint64 vipLevel         = 6;   // VIP 等級
  bool isFake             = 7;   // 是否是機器人
  int64 baseID            = 8;   // 0 代表站著，座位編號 1~4
  int64 balance           = 9;   // 餘額
  bool isOnline           = 10;  // 線上
  string latitude         = 11;  // 經度
  string longitude        = 12;  // 緯度
}


// [RPC] ExitRoom 離開房間
message ExitRoomRequest {
  string roomID = 1;  // 房間編號
}
message ExitRoomResponse {
  string roomID = 1;  // 房間編號
}
message ExitRoomEventMessage {
  string roomID           = 1;   // 房間編號
  string roundID          = 2;   // 回合編號
  int64 userID            = 3;   // 玩家用戶編號
  string avatarURL        = 4;   // 頭像 URL
  string name             = 5;   // 名稱
  uint64 vipLevel         = 6;   // VIP 等級
  bool isFake             = 7;   // 是否是機器人
  int64 baseID            = 8;   // 0 代表站著，座位編號 1~4
  int64 balance           = 9;   // 餘額
  bool isOnline           = 10;  // 線上
}


// [RPC] GetRoom 取得房間資訊
message GetRoomRequest {
  string roomID = 1;  // 房間編號
}
message GetRoomResponse {
  string roomID                          = 1;   // 房間編號
  repeated GetRoomResponsePlayer players = 2;   // 玩家
  repeated GetRoomResponsePlayer bases   = 3;   // 座位 index 0~3
  GameMode gameMode                      = 4;   // 遊戲模式
  string roundID                         = 5;   // 回合編號
  RoundStage roundStage                  = 6;   // 回合狀態
  repeated Card shownCards               = 7;   // 牌面
  repeated Card boneyardCards            = 8;   // 骨牌堆 固定長度 可能含有空值元素
  int32 currentActionBaseID              = 9;   // 當前動作位編號 1~4
  int64 currentActionStartedAt           = 10;  // 毫秒 等待當前動作開始時間
  int64 currentActionEndedAt             = 11;  // 毫秒 等待當前動作結束時間
  Card firstShownCard                    = 12;  // 牌面第一張牌
  int64 roomLevel                        = 13;  // 房間等級
  int64 unit                             = 14;  // 台分
  bool isProbation                       = 15;  // 是否為試玩(休閒房)
}
message GetRoomResponsePlayer {
  int64 userID                  = 1;   // 玩家用戶編號
  string avatarURL              = 2;   // 頭像 URL
  string name                   = 3;   // 名稱
  uint64 vipLevel               = 4;   // VIP 等級
  bool isFake                   = 5;   // 是否是機器人
  int64 baseID                  = 6;   // 座位編號 1~3
  int64 balance                 = 7;   // 餘額
  bool isOnline                 = 8;   // 線上
  bool isWinner                 = 9;   // 結算階段時此局是否獲勝
  string latitude               = 10;  // 經度
  string longitude              = 11;  // 緯度
  repeated CardNo handCardNos   = 12;  // 個人手牌編號
  repeated int32 blockedNumbers = 13;  // 阻牌點數
  int64 totalGainPoint          = 14;  // 總得分 有正負
  int64 winOdds                 = 15;  // Block 模式 Normal End 倍率
  int64 blockTimes              = 16;  // 阻擋次數
  int64 blockedTimes            = 17;  // 遭擋次數
  int64 totalGainAmount         = 18;  // 總得錢 有正負
  int64 shownTotalGainAmount    = 19;  // 顯示用的總得錢 有正負 (只有正的會跟 totalGainAmount 有差)
  int64 shownBalance            = 20;  // 顯示用的餘額 
}


// [RPC] GetReady 準備好
message GetReadyRequest {
  string roomID = 1;  // 房間編號
}
message GetReadyResponse {
  string roomID = 1;  // 房間編號
}


// [RPC] BroadcastRoom
message BroadcastRoomRequest {
  string roomID  = 1;  // 房間編號
  string roundID = 2;  // 回合編號
  bytes data     = 3;  // 資料
}
message BroadcastRoomResponse {}
message BroadcastRoomEventMessage {
  string roomID  = 1;  // 房間編號
  string roundID = 2;  // 回合編號
  bytes data     = 3;  // 資料
}


// [RPC] PlayCard 玩家出牌
message PlayCardRequest {
  string roomID                       = 1;  // 房間編號
  CardNo cardNo                       = 2;  // 骨牌編號
  PlaceCardPosition placeCardPosition = 3;  // 骨牌擺放位置
}
message PlayCardResponse {
  string roomID            = 1;  // 房間編號
  Card card                = 2;  // 出的牌
  repeated Card shownCards = 3;  // 牌面
}
// [PUSH] PlayCardEvent 玩家出牌事件
message PlayCardEventMessage {
  string roomID                       = 1;  // 房間編號
  int64 userID                        = 2;  // 玩家用戶編號
  Card card                           = 3;  // 出的牌
  PlaceCardPosition placeCardPosition = 4;  // 骨牌擺放位置
  repeated Card shownCards            = 5;  // 牌面
}


// [RPC] DrawCard 玩家抽牌
message DrawCardRequest {
  string roomID = 1;  // 房間編號
  int64 index   = 2;  // 第幾張牌 (從 1 開始)
}
message DrawCardResponse {
  string roomID = 1;  // 房間編號
  Card card     = 2;
}
// [PUSH] DrawCardEvent 玩家抽牌事件
message DrawCardEventMessage {
  string roomID = 1;  // 房間編號
  int64 userID  = 2;  // 玩家用戶編號
  int64 index   = 3;  // 第幾張牌 (從 1 開始)
}


// [PUSH] RoomInfoEvent 推送房間資訊
message RoomInfoEventMessage {
  string roomID                               = 1;  // 房間編號
  repeated RoomInfoEventMessagePlayer players = 2;  // 玩家
  repeated RoomInfoEventMessagePlayer bases   = 3;  // 座位 index 0~3
  GameMode gameMode                           = 4;  // 遊戲模式
  string roundID                              = 5;  // 回合編號
  RoundStage roundStage                       = 6;  // 回合狀態
  repeated Card shownCards                    = 7;  // 牌面
  repeated Card boneyardCards                 = 8;  // 骨牌堆 固定長度 可能含有空值元素
  int32 currentActionBaseID                   = 9;  // 當前動作位編號 1~4
  int64 currentActionStartedAt                = 10;  // 毫秒 等待當前動作開始時間
  int64 currentActionEndedAt                  = 11;  // 毫秒 等待當前動作結束時間
  Card firstShownCard                         = 12;  // 牌面第一張牌
  int64 roomLevel                             = 13;  // 房間等級
  int64 unit                                  = 14;  // 台分
  bool isProbation                            = 15;  // 是否為試玩(休閒房)
}
message RoomInfoEventMessagePlayer {
  int64 userID                  = 1;   // 玩家用戶編號
  string avatarURL              = 2;   // 頭像 URL
  string name                   = 3;   // 名稱
  uint64 vipLevel               = 4;   // VIP 等級
  bool isFake                   = 5;   // 是否是機器人
  int64 baseID                  = 6;   // 座位編號 1~4
  int64 balance                 = 7;   // 餘額
  bool isOnline                 = 8;   // 線上
  bool isWinner                 = 9;   // 結算階段時此局是否獲勝
  string latitude               = 10;  // 經度
  string longitude              = 11;  // 緯度
  repeated CardNo handCardNos   = 12;  // 個人手牌編號
  repeated int32 blockedNumbers = 13;  // 阻牌點數
  int64 totalGainPoint          = 14;  // 總得分 有正負
  int64 winOdds                 = 15;  // Block 模式 Normal End 倍率
  int64 blockTimes              = 16;  // 阻擋次數
  int64 blockedTimes            = 17;  // 遭擋次數
  int64 totalGainAmount         = 18;  // 總得錢 有正負
  int64 shownTotalGainAmount    = 19;  // 顯示用的總得錢 有正負 (只有正的會跟 totalGainAmount 有差)
  int64 shownBalance            = 20;  // 顯示用的餘額 
}


// [PUSH] RoomClosedEvent 房間關閉消息
message RoomClosedEventMessage {
  string roomID  = 1;  // 房間編號
  string roundID = 2;  // 回合編號
}


// [PUSH] BlockCardEvent 玩家沒牌事件
message BlockCardEventMessage {
  string roomID          = 1;  // 房間編號
  int64 userID           = 2;  // 玩家用戶編號
  int64 blockedByUserID  = 3;  // 被哪個玩家用戶阻擋
  int64 amount           = 4;  // 阻擋讓分給多少錢
}


// [Tape]
message BetOrderTape {
  string roomID                       = 1;  // 房間編號
  string roundID                      = 2;  // 回合編號
  int32 roomLevel                     = 3;  // 房間等級
  int64 unit                          = 4;  // 台分
  bool isProbation                    = 5;  // 是否為試玩(休閒房)
  Card firstShownCard                 = 6;  // 牌面第一張牌
  repeated Card shownCards            = 7;  // 牌面
  repeated BetOrderTapePlayer players = 8;  // 玩家
  int64 startFromRoomBaseID           = 9;  // 開始房間座位編號
}
message BetOrderTapePlayer {
  int64 userID                  = 1;   // 玩家用戶編號
  string avatarURL              = 2;   // 頭像 URL
  string name                   = 3;   // 名稱
  uint64 vipLevel               = 4;   // VIP 等級
  bool isFake                   = 5;   // 是否是機器人
  int64 baseID                  = 6;   // 座位編號 1~4
  int64 balance                 = 7;   // 餘額
  bool isOnline                 = 8;   // 線上
  bool isWinner                 = 9;   // 結算階段時此局是否獲勝
  string latitude               = 10;  // 經度
  string longitude              = 11;  // 緯度
  repeated CardNo handCardNos   = 12;  // 個人手牌編號
  repeated int32 blockedNumbers = 13;  // 阻牌點數
  int64 totalGainPoint          = 14;  // 總得分 有正負
  int64 winOdds                 = 15;  // Block 模式 Normal End 倍率
  int64 blockTimes              = 16;  // 阻擋次數
  int64 blockedTimes            = 17;  // 遭擋次數
  int64 totalGainAmount         = 18;  // 總得錢 有正負
  int64 commissionAmount        = 19;  // 抽水錢
}