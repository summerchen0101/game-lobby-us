syntax = "proto3";
package dragontiger;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/dragontiger";

// MessageType
enum MessageType {
  PingPong = 0;
  // [RPC] 加入房間
  // * req: JoinRoomRequest
  // * resp: JoinRoomResponse
  JoinRoom = 1;
  // [RPC] 離開房間
  LeaveRoom = 2;
  // [RPC] 取得房間資訊
  // * resp: GetRoomResponse
  GetRoom = 11;
  // [RPC] 取得玩家列表
  // * resp: GetRoomPlayerListResponse
  GetRoomPlayerList = 12;
  // [RPC] 下注
  // * req: BetRequest
  Bet = 13;
  // [RPC] 自動下注
  // * req: AutoBetRequest
  AutoBet = 14;
  // [RPC] 停止自動下注
  StopAutoBet = 15;


  JoinRoomEvent         = 1011;  // (廣播)加入房間事件。 data: JoinRoomEventData
  LeaveRoomEvent        = 1012;  // (廣播)離開房間事件。 data: LeaveRoomEventData
  RoomPlayerBetEvent    = 1013;  // (廣播)玩家下注事件。 data: RoomPlayerBetEventData
  StagePrepareEvent     = 1014;  // (廣播)準備階段事件。 data: StagePrepareEventData
  StageDealEvent        = 1015;  // (廣播)發牌階段事件。 data: StageDealEventData
  StageBetEvent         = 1016;  // (廣播)下注階段事件。 data: StageBetEventData
  StageSettlementEvent  = 1017;  // (廣播)結算階段事件。 data: StageSettlementEventData
  PlayerSettlementEvent = 1018;  // (玩家)結算訊息。 data: PlayerSettlementEventData
  JackPotEvent          = 1019;  // (玩家)百人JP事件。 data: JackPotEventData
}

// 下注區
enum BetArea {
  BET_AREA_UNKNOWN = 0;
  DRAGON           = 1; // 龍
  TIGER            = 2; // 虎
  TIE              = 3; // 和
}

enum RoundStage {
  ROUND_STAGE_UNKNOWN = 0;
  PREPARE             = 1; // 準備階段
  DEAL                = 2; // 發牌階段
  BET                 = 3; // 下注階段
  SETTLEMENT          = 4; // 結算階段
}

message JoinRoomRequest {
  string roomID      = 1;
  uint64 tokenAmount = 2; // 預扣金額
}

message JoinRoomResponse {
  DetailRoomPlayer me = 1;
}

message GetRoomResponse {
  Room room = 1;
}

message Room {
  string roomID                              = 1; // 房號
  string roundID                             = 2; // 局號
  int32 round                                = 3; // 當前回合數
  RoundStage roundStage                      = 4; // 回合階段
  int64 StageStartAtMs                       = 5; // 階段開始時間
  int64 StageEndAtMs                         = 6; // 階段結束時間
  int32 playerNumber                         = 7; // 玩家總人數
  repeated BetAreaAmount betAreaTotalAmounts = 8; // 各押注區所有玩家下注金額
  repeated RoundRecord roundRecords          = 9; // 路單資訊(每60局紀錄由舊到新排序)
}

message RoundStageInfo {
  RoundStage roundStage = 1;
  int64 StartAtMs       = 2;
  int64 EndAtMs         = 3;
}

message BasicRoomPlayer {
  uint64 userID             = 1;
  string avatarURL          = 2;  // 頭像 URL
  string nickname           = 3;  // 暱稱
  uint64 vipLevel           = 4;  // VIP 等級
  uint64 level              = 5;  // level
}

message DetailRoomPlayer {
  uint64 userID             = 1;
  string avatarURL          = 2;  // 頭像 URL
  string nickname           = 3;  // 暱稱
  uint64 vipLevel           = 4;  // VIP 等級
  uint64 level              = 5;  // level
  int64 balance             = 6;  // 餘額
  RoomPlayerBetInfo betInfo = 10; // 下注資訊
}

// 自動下注資訊
message AutoBetInfo {
  AutoBetAreaType autoBetAreaType  = 1; // 自動下注位置模式 ex: 固定、輪換
  AutoBetType autoBetType          = 2; // 自動下注模式
  uint32 remainAutoBetRoundCount   = 3; // 剩餘自動下注局數
}

message RoomPlayerBetInfo {
  repeated BetAreaAmount betAreaTotalAmounts = 1; // 各押注區自己的下注金額
  AutoBetInfo autoBetInfo                    = 2; // 自動下注資訊
}

message BetAreaAmount {
  BetArea betArea  = 1; // 押注區
  uint64 betAmount = 2; // 注額
}

message GetRoomPlayerListResponse {
  repeated BasicRoomPlayer players = 1;
}

message RoundRecord {
  int32 round        = 1;
  BetArea gameResult = 2; // 遊戲結果
}

message BetRequest {
  BetArea betArea  = 1;
  uint64 betAmount = 2;
}

// 自動下注位置模式
enum AutoBetAreaType {
  AUTO_BET_AREA_TYPE_UNKNOWN = 0;
  FIXED                      = 1; // 固定 (每次都下注在同一個位置)
  ROTATION                   = 2; // 輪換 (依照固定規律更換下注位置)
}

// 自動下注模式
enum AutoBetType {
  AUTO_BET_TYPE_UNKNOWN = 0;
  REPEATED              = 1; // 重複下注
  EARN_ITS_COST         = 2; // 回本下注
}

// AutoBetReq 自動下注請求
message AutoBetRequest {
  AutoBetAreaType autoBetAreaType  = 1; // 自動下注位置模式 ex: 固定、輪換
  repeated BetArea betAreas        = 2; // 自動下注位置模式為固定時，可多選押注區
  uint32 autoBetRoundCount         = 3; // 自動下注局數
  AutoBetType autoBetType          = 4; // 自動下注模式
  uint64 startingBetAmount         = 5; // 起始下注金額
}

// -----------------------------------------------------
// Event
// -----------------------------------------------------

message JoinRoomEventData {
  string roomID              = 1; // 房號
  string roundID             = 2; // 局號
  BasicRoomPlayer roomPlayer = 3; // 玩家
}

enum LeaveRoomReason {
    LEAVE_ROOM_REASON_UNKNOWN     = 0;
    LEAVE_ROOM_USER_LEAVE         = 1; // 玩家主動離開 or 斷線
    LEAVE_ROOM_BALANCE_NOT_ENOUGH = 2; // 餘額不足
    LEAVE_ROOM_IDLE               = 3; // 玩家閒置
}

message LeaveRoomEventData {
  string roomID              = 1; // 房號
  string roundID             = 2; // 局號
  BasicRoomPlayer roomPlayer = 3; // 玩家
  LeaveRoomReason reason     = 4; // 離開類型
}

message RoomPlayerBetEventData {
  string roomID                    = 1; // 房號
  string roundID                   = 2; // 局號
  uint64 userID                    = 3; // 用戶ID
  BetArea betArea                  = 4; // 押注區
  uint64 betAmount                 = 5; // 押注額
  uint64 playerBetAreaTotalAmount  = 6; // 該玩家押注區總額
  uint64 betAreaTotalAmount        = 7; // 所有玩家押注區總額
}

message StagePrepareEventData {
  string roomID        = 1; // 房號
  string roundID       = 2; // 局號
  int32 round          = 3; // 回合
  int64 stageStartAtMs = 4; // 階段開始時間
  int64 stageEndAtMs   = 5; // 階段結束時間
}

message StageDealEventData {
  string roomID        = 1; // 房號
  string roundID       = 2; // 局號
  int64 stageStartAtMs = 3; // 階段開始時間
  int64 stageEndAtMs   = 4; // 階段結束時間
}

message StageBetEventData {
  string roomID        = 1; // 房號
  string roundID       = 2; // 局號
  int64 stageStartAtMs = 3; // 階段開始時間
  int64 stageEndAtMs   = 4; // 階段結束時間
}

message StageSettlementEventData {
  string roomID           = 1; // 房號
  string roundID          = 2; // 局號
  int64 stageStartAtMs    = 3; // 階段開始時間
  int64 stageEndAtMs      = 4; // 階段結束時間
  Card dragon             = 5; // 龍的牌面
  Card tiger              = 6; // 虎的牌面
  BetArea gameResult      = 7; // 遊戲結果
  int64 winAreaGainAmount = 8; // 獲勝押注區的總贏分(乘上賠率，未扣 betAmount)
}

enum CardSuit {
    CARD_SUIT_UNKNOWN = 0;
    CARD_SUIT_SPADE   = 1;
    CARD_SUIT_HEART   = 2;
    CARD_SUIT_DIAMOND = 3;
    CARD_SUIT_CLUB    = 4;
}

enum CardPoint {
    CARD_POINT_UNKNOWN = 0;
    CARD_POINT_A  = 1;
    CARD_POINT_2  = 2;
    CARD_POINT_3  = 3;
    CARD_POINT_4  = 4;
    CARD_POINT_5  = 5;
    CARD_POINT_6  = 6;
    CARD_POINT_7  = 7;
    CARD_POINT_8  = 8;
    CARD_POINT_9  = 9;
    CARD_POINT_10 = 10;
    CARD_POINT_J  = 11;
    CARD_POINT_Q  = 12;
    CARD_POINT_K  = 13;
}

message Card {
  int32 cardNo        = 1;
  CardSuit  cardSuit  = 2; // 花色
  CardPoint cardPoint = 3; // 點數
}

message PlayerSettlementEventData {
  string roomID    = 1; // 房號
  string roundID   = 2; // 局號
  int64 gainAmount = 3; // 贏分(未扣 betAmount)
  int64 balance    = 4; // 餘額
}

message JackPotEventData {
  string roomID    = 1; // 房號
  string roundID   = 2; // 局號
  uint64 userID    = 3; // 玩家ID
  uint64 amount    = 4; // jp金額
  int64 balance    = 5; // 餘額
}

// -----------------------------------------------------
// Tape
// -----------------------------------------------------

message BetOrderTape {
  BetArea gameResult                      = 1; // 結果
  repeated BetOrderTapeBetArea betAreInfo = 2; // 各押注區所有玩家的下注金額
  BetOrderTapePlayer myBetInfo            = 3; // 自己各押注區的下注金額
  string dragonMultiple                   = 4; // 龍賠率
  string tigerMultiple                    = 5; // 虎賠率
  string tieMultiple                      = 6; // 和賠率
  Card dragon                             = 7; // 龍的牌面
  Card tiger                              = 8; // 虎的牌面
  uint64 dealerID                         = 9; // 莊家ID
}

message BetOrderTapeBetArea {
  BetArea betArea     = 1; // 押注區
  uint64 betAmount    = 2; // 押注額
  int64 winLoseAmount = 3; // 總賠付
}

message BetOrderTapePlayer {
  uint64 userID                       = 1;  // 玩家ID
  string nickname                     = 2;  // 暱稱
  uint64 vipLevel                     = 3;  // VIP 等級
  uint64 level                        = 4;  // level
  repeated BetAreaInfo betAreaAmounts = 5;  // 各區押注

  message BetAreaInfo {
    BetArea betArea     = 1; // 押注區
    uint64 betAmount    = 2; // 押注額
    int64 winLoseAmount = 3; // 總賠付
  }
}