/*
Fish Request Proto  version: v1.1
場景:由客戶端向服務器主動發起請求
-----------------------------------------------------------------------
fish_request.proto          定義 gateway/gateway.proto request type emun
fish_request_data.proto     定義了請求類型的 Data結構
fish_response_data.proto    定義了請求響應的 Data結構
-----------------------------------------------------------------------
*/

syntax = "proto3";
package fish;

option go_package       = 'gitlab.ffglobaltech.com/us888/pluto/protos/fishing;fishpb';
option csharp_namespace = "FishingProto";

import "proto/fishing/fish_common.proto";

//同步房間資訊 成功回傳 200 & GetRoomInfoResponseData
message GetRoomInfoRequestData {
    string roomID = 1;
}

//同步魚池訊息 成功回傳 200 & SyncPoolInfoResponseData
message SyncPoolInfoRequestData {
    string roomID = 1;
}

//玩家狀態變更 成功回傳:0
message ChangeStatusRequestData {
    PlayMode mode    = 1;
    int64 degree     = 2;  //砲管角度 逆時方向表示
    uint64 betRankID = 3;  //注額設定
}

// 開火請求: 成功回傳 0
message FireRequestData {
    PlayMode mode = 1;  //開火類型 普通 瞄準 自動

    WeaponType type = 2;  // 武器類型

    Posistion posistion = 3;  // 特殊武器開火 指定位置使用
    int64 degree        = 4;  // 角度 * 100 取整數

    string fishUID   = 5;  //魚的uuid 瞄準與自動攻擊使用
    string weaponUID = 6;  //發射特殊武器時 需要帶上
}

message SitRequest {
    uint64 baseID = 1;  //座位編號
}

message ServerMsgAckRequestData {
    string ackID = 1;
}

//保留房間請求 成功回傳 0
message KeepRoomRequestData {
    string roomID = 1;
}