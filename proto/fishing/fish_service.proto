/*
Fish GRPC version: v1.1

internal access only
*/

syntax = "proto3";
package fish;
option go_package       = 'gitlab.ffglobaltech.com/us888/pluto/protos/fishing;fishpb';
option csharp_namespace = "FishingProto";

import "proto/fishing/fish_common.proto";

import "proto/fishing/fish_response_data.proto";

service FishingService {
    rpc GetRoomInfo(GetRoomInfoRequest)
        returns (Room);

    rpc GetPoolInfo(GetPoolInfoRequest)
        returns (SyncPoolInfoResponseData);
}

message GetRoomInfoRequest {
    string roomID = 1;
}

message GetPoolInfoRequest {
    string roomID = 1;
}