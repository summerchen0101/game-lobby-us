syntax = "proto3";
package fishking;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/fishking";

// RequestType 用於 gateway.Request.Type
enum RequestType {
    PingPong = 0;
    JoinRoom = 1;

    // [RPC] Deliver 傳遞
    Deliver = 11;

    // [RPC] Machine
    GetMachine = 21;  // 取得機台資訊

    // [RPC] MachinePlayer
    // 使用時會產生對應的 FrameMessageFrameEvent
    MachinePlayerEnter     = 101;  // 機台玩家進入
    MachinePlayerExit      = 102;  // 機台玩家離開
    MachinePlayerFire      = 103;  // 機台玩家發射子彈/使用武器
    MachinePlayerCatch     = 104;  // 機台玩家射到目標 (抽獎)
    MachinePlayerCatchMany = 105;  // 機台玩家一發射到多個目標 (特殊武器抽獎)
    MachinePlayerUpdate    = 106;  // 機台玩家更新自身資訊

    // [Push] Frame
    Frame = 1001;
}

// FrameEventType 幀事件類型
enum FrameEventType {
    UNKNOWN_FRAME_EVENT_TYPE = 0;

    // Delivered
    Delivered = 11;

    // MachinePlayer
    MachinePlayerEntered = 101;  // 機台玩家進入
    MachinePlayerExited  = 102;  // 機台玩家離開
    MachinePlayerFired   = 103;  // 機台玩家發射子彈/使用武器
    MachinePlayerCatched = 104;  // 機台玩家射到目標 (抽獎)
    MachinePlayerUpdated = 106;  // 機台玩家更新自身資訊

    // Scene
    SceneUpdated = 601;  // 場景更新

    // Target
    TargetCreated = 701;  // 目標建立
}

// BulletKind 子彈類型
enum BulletKind {
    UNKNOWN_BULLET_KIND = 0;

    Normal               = 1;   // 普通
    BlasterCannon        = 2;   // 波動砲
    SpreadCannon         = 3;   // 分身砲
    Missile              = 11;  // 瘋狂導彈
    NavalMine            = 12;  // 星爆水雷
    ElectricJellyfish    = 13;  // 放電水母
    FlameCore            = 14;  // 火魔方
    FrozenCore           = 15;  // 冰魔方
    LaserCannon          = 16;  // 激光砲
    SmashHammer          = 17;  // 雷神錘
    MechanicalShark      = 19;  // 機械鯊魚嘴炮
    Trident              = 21;  // 海王神器
    DrillCrab            = 51;  // 鑽頭蟹
    BombCrab             = 52;  // 炸彈蟹
    LaserCrab            = 53;  // 雷射蟹
    SmashHammerCrab      = 54;  // 雷錘蟹
    BlackHole            = 55;  // 黑洞攻擊
    LightningChain       = 56;  // 閃電連鎖
    ThunderTyrannosaur   = 57;  // 雷霸龍攻擊
    FlamingPhenix        = 58;  // 火鳳凰攻擊
    KingCrab             = 59;  // 霸王蟹覺醒
    KingOctopus          = 60;  // 深海八爪覺醒
    BlackBehemoth        = 61;  // 暗夜巨獸覺醒
    PrehistoricCrocodile = 62;  // 史前巨鱷覺醒
    Mermaid              = 63;  // 美人魚覺醒
    BullDemonKing        = 64;  // 牛魔王
    RedBoy               = 65;  // 紅孩兒
}

// TargetLevel 目標等級
enum TargetLevel {
    UNKNOWN_TARGET_LEVEL = 0;

    S       = 100;  // 小
    M       = 200;  // 中
    L       = 300;  // 大
    Special = 400;  // 特殊
    Boss    = 500;  // 王
}

// [RPC] Deliver 傳遞
message DeliverRequest {
    string machineID         = 1;  // 機台 ID
    bytes data               = 2;
    map<string, string> meta = 101;
}
message DeliverResponse {}

// [RPC] GetMachine 取得機台資訊
message GetMachineRequest {
    string machineID = 1;  // 機台 ID
}
message GetMachineResponse {
    string machineID                                           = 1;  // 機台 ID
    map<int64, GetMachineResponseSeat> seats                   = 2;  // 機台座位 seatID => GetMachineResponseSeat
    string sceneID                                             = 3;  // 場景編號
    map<string, GetMachineResponseTargetSetting> targetSetting = 4;  // 目標設定值列表 targetKind => GetMachineResponseTargetSetting
    map<string, GetMachineResponseTarget> targets              = 5;  // 機台目前的目標們 targetID => GetMachineResponseTarget
}
message GetMachineResponseSeat {
    int64 seatID                 = 1;  // 機台座位編號
    int64 machinePlayerUserID    = 2;  // 機台玩家用戶 ID
    string machinePlayerNickname = 3;  // 機台玩家用戶暱稱
    int64 machinePlayerBetAmount = 4;  // 機台玩家押注金額
    int64 balance                = 5;  // 機台玩家餘額
    string avatarURL             = 6;  // 機台玩家頭像 URL
    int64 vipLevel               = 7;  // 機台玩家 VIP Level
}
message GetMachineResponseTargetSetting {
    string targetKind = 1;  // 目標類型 001 之類的
    string name       = 2;  // 目標名稱
    int64 minOdds     = 3;  // 最小倍率
    int64 maxOdds     = 4;  // 最大倍率
}
message GetMachineResponseTarget {
    string targetID                     = 1;  // 目標 ID
    string targetKind                   = 2;  // 目標類型
    TargetLevel targetLevel             = 3;  // 目標等級
    string pathID                       = 4;  // 路徑 ID
    int64 enteredAtTimestampMillisecond = 5;  // 進入時間戳 毫秒
    int64 exitedAtTimestampMillisecond  = 6;  // 離開時間戳 毫秒
    bool isDead                         = 7;  // 是否死亡
    int64 displayOdds                   = 8;  // 顯示倍率
}

// [RPC] MachinePlayerEnter 機台玩家進入
message MachinePlayerEnterRequest {
    string machineID         = 1;  // 機台 ID
    int64 seatID             = 2;
    int64 betAmount          = 3;
    map<string, string> meta = 101;
}
message MachinePlayerEnterResponse {
    int64 serverTimestampMillisecond = 1;  // 機台當下時間戳 毫秒
}
// [FrameEventData] MachinePlayerEnteredFrameEventData 機台玩家進入
message MachinePlayerEnteredFrameEventData {
    int64 seatID                 = 1;  // 座位編號
    int64 machinePlayerUserID    = 2;  // 機台玩家用戶 ID
    string machinePlayerNickname = 3;  // 機台玩家用戶暱稱
    int64 machinePlayerBalance   = 4;  // 機台玩家餘額
    int64 machinePlayerBetAmount = 5;  // 機台玩家押注金額
    string avatarURL             = 6;  // 機台玩家頭像 URL
    int64 vipLevel               = 7;  // 機台玩家 VIP Level
}

// [RPC] MachinePlayerExit 機台玩家離開
message MachinePlayerExitRequest {
    string machineID         = 1;  // 機台 ID
    map<string, string> meta = 101;
}
message MachinePlayerExitResponse {}
// [FrameEventData] MachinePlayerExitedFrameEventData 機台玩家離開
message MachinePlayerExitedFrameEventData {
    int64 seatID                 = 1;  // 座位編號
    int64 machinePlayerUserID    = 2;  // 機台玩家用戶 ID
    string machinePlayerNickname = 3;  // 機台玩家用戶暱稱
    bool isKicked                = 4;  // 是否被踢
}

// [RPC] MachinePlayerFire 機台玩家發射子彈/使用武器
message MachinePlayerFireRequest {
    string machineID         = 1;  // 機台 ID
    BulletKind bulletKind    = 2;  // 子彈類型
    double angle             = 3;  // 從座位發射的角度
    int64 betAmount          = 4;  // 下注金額
    string targetID          = 5;  // 目標 ID
    string bulletID          = 6;  // 子彈 ID
    map<string, string> meta = 101;
}
message MachinePlayerFireResponse {
    string bulletID = 1;  // 子彈 ID
}
// [FrameEventData] MachinePlayerFiredFrameEventData 機台玩家發射子彈/使用武器
message MachinePlayerFiredFrameEventData {
    int64 seatID              = 1;  // 座位編號
    int64 machinePlayerUserID = 2;  // 機台玩家用戶 ID
    string bulletID           = 3;  // 子彈 ID
    BulletKind bulletKind     = 4;  // 子彈類型
    double angle              = 5;  // 從座位發射的角度
    string targetID           = 6;  // 目標 ID
    int64 betAmount           = 7;  // 下注金額
}

// [RPC] MachinePlayerCatch 機台玩家射到目標 (抽獎)
message MachinePlayerCatchRequest {
    string machineID         = 1;  // 機台 ID
    string bulletID          = 2;  // 子彈 ID (非唯一值)
    BulletKind bulletKind    = 3;  // 子彈類型
    int64 betAmount          = 4;  // 下注金額
    string targetID          = 5;  // 目標 ID
    int64 costAmount         = 6;  // 消費金額 用於特殊花費子彈
    map<string, string> meta = 101;
}
message MachinePlayerCatchResponse {
    string bulletID      = 1;  // 子彈 ID (非唯一值)
    int64 gainAmount     = 2;  // 獲獎金額
    int64 betAmount      = 3;  // 下注金額
    string targetID      = 4;  // 目標 ID
    string targetKind    = 5;  // 目標類型
    int64 nextCatchTimes = 6;  // 接下來攻擊幾次
    int64 costAmount     = 7;  // 消費金額 用於特殊花費子彈
}
// [FrameEventData] MachinePlayerCatchedFrameEventData 機台玩家射到目標 (抽獎)
message MachinePlayerCatchedFrameEventData {
    int64 seatID                          = 1;   // 座位編號
    int64 machinePlayerUserID             = 2;   // 機台玩家用戶 ID
    string bulletID                       = 3;   // 子彈 ID (非唯一值)
    string targetID                       = 4;   // 目標 ID
    string targetKind                     = 5;   // 目標類型
    int64 gainAmount                      = 6;   // 獲獎金額
    bool isTargetDead                     = 7;   // 目標是否死亡
    string specialBulletID                = 8;   // 特殊子彈 ID (當打死特殊子彈的特殊目標值會產生此值)
    int64 odds                            = 9;   // 獲獎倍率
    int64 nextCatchTimes                  = 10;  // 接下來攻擊幾次/額外倍率
    int64 displayOdds                     = 11;  // 顯示倍率
    int64 deadDisplayOdds                 = 12;  // 死亡顯示倍率
    map<int64, int64> specialOddsTimesMap = 13;  // 特殊倍率表演次數
    int64 betAmount                       = 15;  // 下注金額
    int64 costAmount                      = 17;  // 消費金額 用於特殊花費子彈
}

// [RPC] MachinePlayerCatchMany 機台玩家一發射到多個目標 (一次抽多獎)
message MachinePlayerCatchManyRequest {
    string machineID          = 1;  // 機台 ID
    string bulletID           = 2;  // 子彈 ID (非唯一值)
    BulletKind bulletKind     = 3;  // 子彈類型
    int64 betAmount           = 4;  // 下注金額
    repeated string targetIDs = 5;  // 目標 ID
    map<string, string> meta  = 101;
}
message MachinePlayerCatchManyResponse {
    BulletKind bulletKind = 1;  // 子彈類型
}
message MachinePlayerCatchManyResponseTarget {
    string bulletID   = 1;  // 子彈 ID (非唯一值)
    string targetID   = 2;  // 目標 ID
    string targetKind = 3;  // 目標類型
    int64 gainAmount  = 4;  // 獲獎金額
    int64 betAmount   = 5;  // 下注金額
}
// message MachinePlayerCatchedManyFrameEventData {}

// [RPC] MachinePlayerUpdate 機台玩家更新自身資訊
message MachinePlayerUpdateRequest {
    string machineID             = 1;  // 機台 ID
    int64 machinePlayerBetAmount = 2;  // 下注金額
    map<string, string> meta     = 101;
}
message MachinePlayerUpdateResponse {}
// [FrameEventData] MachinePlayerUpdatedFrameEventData 機台玩家更新自身資訊
message MachinePlayerUpdatedFrameEventData {
    int64 seatID                 = 1;  // 座位編號
    int64 machinePlayerUserID    = 2;  // 機台玩家用戶 ID
    string machinePlayerNickname = 3;  // 機台玩家用戶暱稱
    int64 machinePlayerBalance   = 4;  // 機台玩家餘額
    int64 machinePlayerBetAmount = 5;  // 機台玩家基本注額
    string avatarURL             = 6;  // 機台玩家頭像 URL
    int64 vipLevel               = 7;  // 機台玩家 VIP Level
}

// [FrameEventData] SceneUpdatedFrameEventData 場景更新
message SceneUpdatedFrameEventData {
    string sceneID = 1;  // 場景編號
}

// [FrameEventData] TargetCreatedFrameEventData 目標建立
message TargetCreatedFrameEventData {
    string targetID                     = 1;  // 目標 ID
    string targetKind                   = 2;  // 目標類型
    TargetLevel targetLevel             = 3;  // 目標等級
    string pathID                       = 4;  // 路徑 ID
    int64 enteredAtTimestampMillisecond = 5;  // 進入時間戳 毫秒
    int64 exitedAtTimestampMillisecond  = 6;  // 離開時間戳 毫秒
    int64 displayOdds                   = 7;  // 顯示倍率
}

// [Push] Frame
message FrameMessage {
    string machineID                            = 1;
    repeated FrameMessageFrameEvent frameEvents = 2;
    int64 timestampMilliSecond                  = 3;
}
message FrameMessageFrameEvent {
    string id                     = 1;
    FrameEventType frameEventType = 2;
    map<string, string> meta      = 3;

    // Used by FrameEventType:
    // Delivered
    bytes data = 4;

    MachinePlayerEnteredFrameEventData machinePlayerEnteredFrameEventData = 11;
    MachinePlayerExitedFrameEventData machinePlayerExitedFrameEventData   = 12;
    MachinePlayerFiredFrameEventData machinePlayerFiredFrameEventData     = 13;
    MachinePlayerCatchedFrameEventData machinePlayerCatchedFrameEventData = 14;
    MachinePlayerUpdatedFrameEventData machinePlayerUpdatedFrameEventData = 15;
    SceneUpdatedFrameEventData sceneUpdatedFrameEventData                 = 16;
    TargetCreatedFrameEventData targetCreatedFrameEventData               = 17;
}

// [Tape] BetOrderTape 用來將多筆子彈的抽獎結果序列化後儲存
message BetOrderTape {
    int32 machineLevel                  = 1;  // 機台等級
    repeated BetOrderTapeBullet bullets = 2;  // 子彈
}
message BetOrderTapeBullet {
    BulletKind bulletKind   = 1;   // 子彈類型
    string targetKind       = 2;   // 目標類型
    string targetName       = 3;   // 目標名稱
    TargetLevel targetLevel = 4;   // 目標等級
    int64 betAmount         = 5;   // 下注金額
    int64 gainAmount        = 6;   // 這個子彈總共獲獎金額
    int64 odds              = 7;   // 獲獎倍率
    bool isTargetDead       = 8;   // 目標是否死亡
    string bulletID         = 9;   // 子彈 ID (Debug)
    string requestID        = 10;  // 請求 ID (Debug)
}