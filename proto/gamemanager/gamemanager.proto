syntax = "proto3";
package gamemanager;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/gamemanager";

import "gitlab.ffglobaltech.com/us888/ciri/commonpb/pagination/pagination.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";

service GameManagerService {
    rpc UpdateGame(UpdateGameRequest) returns (google.protobuf.Empty);
    rpc ListGame(ListGameRequest) returns (ListGameResponse);
    rpc GetBetLevel(GetBetLevelRequest) returns (GetBetLevelResponse);
    rpc UpdateCurrentGameConfiguration(UpdateCurrentGameConfigurationRequest) returns (google.protobuf.Empty);
    rpc DeleteGameConfiguration(DeleteGameConfigurationRequest) returns (google.protobuf.Empty);
    rpc UpsertSlotRTP(UpsertSlotRTPRequest) returns (google.protobuf.Empty);
    rpc ListSlotRTPs(ListSlotRTPsRequest) returns (ListSlotRTPsResponse);
    rpc GetGameConfiguration(GetGameConfigurationRequest) returns (GetGameConfigurationResponse);
    rpc CreateGameConfiguration(stream CreateGameConfigurationRequest) returns (CreateGameConfigurationResponse);
    rpc ListGameConfigurations(google.protobuf.Empty) returns (ListGameConfigurationsResponse);

    rpc UpdateBetLevel(UpdateBetLevelRequest) returns (google.protobuf.Empty);
    rpc ListSlotExtraInfos(google.protobuf.Empty) returns (ListSlotExtraInfosResponse);
    rpc GetSlotExtraInfo(GetSlotExtraInfosRequest) returns (GetSlotExtraInfoResponse);
    rpc CreateSlotExtraInfo(CreateSlotExtraInfosRequest) returns (google.protobuf.Empty);
    rpc UpdateSlotExtraInfo(UpdateSlotExtraInfosRequest) returns (google.protobuf.Empty);
    rpc ListScratchOffGame(ListGameScratchOffRequest) returns (ListGameScratchOffResponse);
    rpc GetScratchOffGame(GetGameScratchOffRequest) returns (GetGameScratchOffResponse);
    rpc UpdateGameRtpSetting(UpdateGameRtpSettingRequest) returns (google.protobuf.Empty);
}

message ListGameConfigurationsResponse {
    repeated GameConfiguration configs = 1;
}

message ListSlotExtraInfosResponse {
    repeated SlotExtraInfo infos = 1;
}

message GetSlotExtraInfosRequest {
    uint64 gameID = 1;
}

message GetSlotExtraInfoResponse {
    SlotExtraInfo info = 1;
}

message CreateSlotExtraInfosRequest {
    SlotExtraInfo info = 1;
}

message UpdateSlotExtraInfosRequest {
    uint64 gameID      = 1;
    SlotExtraInfo info = 2;
}

message SlotExtraInfo {
    uint64 gameID     = 1;
    uint64 compensate = 2;  // RTP 補償
    uint64 tolerance  = 3;  // RTP 彈性
}

message CreateGameConfigurationRequest {
    uint64 gameID    = 1;
    string note      = 2;
    bytes file       = 3;
    uint64 creatorID = 4;
}

message CreateGameConfigurationResponse {
    GameConfiguration config = 1;
}

message GetGameConfigurationRequest {
    string gameConfigurationID = 1;
    uint64 gameID              = 2;
    bool isCurrent             = 3;
}

message UpdateGameRequest {
    uint64 gameID           = 1;
    UpdateGameParams params = 2;
    uint64 updaterID        = 3;
}

message UpdateCurrentGameConfigurationRequest {
    uint64 gameID              = 1;
    string gameConfigurationID = 2;
    uint64 updaterID           = 3;
}

message DeleteGameConfigurationRequest {
    string gameConfigurationID = 1;
    uint64 updaterID           = 2;
}

message UpsertSlotRTPRequest {
    uint64 gameID         = 1;
    repeated SlotRTP rtps = 2;
    uint64 upsertID       = 3;
}

message ListSlotRTPsRequest {
    uint64 gameID  = 1;
    uint32 page    = 2;
    uint32 perPage = 3;
}

message ListSlotRTPsResponse {
    repeated SlotRTP rtps            = 1;
    pagination.Pagination pagination = 2;
}

message ListGameRequest {
    uint32 page                               = 1;
    uint32 perPage                            = 2;
    GameSortingField sorting                  = 3;
    string keyword                            = 4;
    int32 category                            = 5;
    int32 status                              = 6;
    repeated GameLabel labelIn                = 7;
    repeated uint64 gameIDs                   = 8;
    google.protobuf.Int64Value unlockLevelGte = 9;   // 限制解鎖的等級大於等於
    google.protobuf.Int64Value unlockLevelLte = 10;  // 限制解鎖的等級小於等於
}

message GetBetLevelRequest {
    uint64 gameID = 1;
}

message GetBetLevelResponse {
    BetLevels betLevel = 1;
}

message ListGameResponse {
    repeated Game games              = 1;
    pagination.Pagination pagination = 2;
}

message GetGameConfigurationResponse {
    GameConfiguration config = 1;
}

enum GameStatus {
    UNKNOWN_GAME_STATUS = 0;
    ENABLE              = 1;  // 啟用
    DISABLE             = 2;  // 停用
    MAINTAINING         = 3;  // 維護中
    COMING              = 4;  // 即將推出
}

enum GameCategory {
    UNKNOWN_CATEGORY = 0;
    SLOT             = 1;  // 拉霸機
    TABLE            = 2;  // 桌子
    OTHER            = 3;  // 其他
    SCRATCHOFF       = 4;  // 刮刮樂
}

enum GameLabel {
    UNKNOWN_LABEL     = 0;
    HOT               = 1;  // 熱門
    LATEST            = 2;  // 最新
    UNDER_MAINTENANCE = 3;  // 維護
    COMING_SOON       = 4;  // 即將開放
    GENERAL           = 5;  // 一般
}

enum GameSortingField {
    UNKNOWN_SORTING_FIELD = 0;
    ID                    = 1;
    DISPLAY_NAME          = 2;
    CATEGORY              = 3;
    LABEL                 = 4;
    JACKPOT_GROUP         = 5;
    SERIAL                = 6;
}

message Game {
    uint64 ID             = 1;  // game unique identity number
    string displayName    = 2;  // 遊戲名稱
    GameStatus status     = 3;  // 遊戲狀態 1.啟用 2.停用 3.維護中 4.快出來了～
    GameCategory category = 4;  // 遊戲類別 1.老虎機 2.FISH 3之後 Table Game
    GameLabel label       = 5;  // 遊戲排序依據 1.熱度 2.新舊度
    // uint32 jackpotGroup    = 6;   // 屬於哪一個jackpot
    // uint64 serial          = 7;   // for client sorting game list
    int64 updateTimeMS = 8;   // latest update time (ms)
    uint64 updater     = 9;   // latest who update game info
    string iconURL     = 10;  // the icon url
    // uint64 roomAmount      = 11;  // this game room amount limit min amount is 1
    // uint64 roomPopulation  = 12;  // people in game room upper limit
    // uint32 defaultStrategy = 13;  // the game default unknown
    uint64 roomMinNums = 16;  //房間最小數量

    int32 sort = 14;  //排序
    enum JoinRoomPolicy {
        UNKNOWN  = 0;
        OCCUPIED = 1;  // 搶座位
        RESERVE  = 2;  // 湊桌
    }
    JoinRoomPolicy joinRoomPolicy       = 15;
    int64 maintainTime                  = 17;  // 最近一次維護時間
    string maintainReason               = 18;  // 最近一次維護原因
    string path                         = 19;  // for unity
    yesno.YesNo gameLockByToken         = 20;
    yesno.YesNo isBlockchain            = 21;  // 是否為區塊鏈
    int64 hotSort                       = 22;  // 熱門的排序
    int64 slotSort                      = 23;  // 老虎機的排序
    int64 cardSort                      = 24;  // 棋牌的排序
    GameLogoPictureSize logoPictureSize = 25;  // 遊戲圖大小
    int64 otherSort                     = 26;  // 其他的排序
    int64 videoSort                     = 27;  // 視訊的排序
    int64 fishSort                      = 28;  // 漁機的排序
    int64 arcadeSort                    = 29;  // 街機的排序
    int64 lotterySort                   = 30;  // 彩票的排序
    int64 battleSort                    = 31;  // 對戰的排序
    int64 classicSort                   = 32;  // 經典的排序
    int64 rtpMin                        = 33;
    int64 rtpMax                        = 34;
    int64 unlockLevel                   = 35;  // 限制解鎖的等級(給前端使用)
    int64 unlockVipLevel                = 36;  // 限制解鎖的Vip等級(給前端使用)
    int64 rtpMinGC                      = 37;
    int64 rtpMaxGC                      = 38;
}

enum GameLogoPictureSize {
    UNKNOWN_GAME_LOGO_PICTURE_SIZE = 0;
    BIG                            = 1;  // 大
    MEDIUM                         = 2;  // 中
    SMALL                          = 3;  // 小
}
message GameConfiguration {
    string ID          = 1;   // this game configuration unique identity number
    uint64 gameID      = 2;   // for relation to game
    uint32 serial      = 3;   // game configuration serial number
    int64 createTimeMS = 4;   // configuration create at when
    uint64 creator     = 5;   // this configuration create by who
    int64 updateTimeMS = 6;   // latest operator time
    uint64 updater     = 7;   // latest operator admin
    int64 deleteTimeMS = 8;   // for soft delete
    string storagePath = 9;   // csv storage at where
    bool isCurrent     = 10;  // for query current game configuration
    string note        = 11;  // configuration remarks
    bytes jsonData     = 12;
}

message SlotRTP {
    uint64 ID              = 1;  // slot RTP unique identity number
    uint64 gameID          = 2;  // belong which game
    float probability      = 3;  // this RTP probability
    string strategy        = 4;  // this RTP use which strategy
    uint64 upperLimit      = 5;  // RTP upper limit
    uint64 lowerLimit      = 6;  // RTP lower limit
    string defaultStrategy = 7;
}

message UpdateGameParams {
    GameStatus status     = 1;
    GameCategory category = 2;
    GameLabel label       = 3;
    uint64 roomMinNums    = 4;  //房間最小數量
    // uint64 roomPopulation  = 5;
    //  uint32 jackpotGroup    = 6;
    // uint64 serial          = 7;
    string iconURL = 8;
    // uint32 defaultStrategy = 9;
    int32 sort                          = 10;  //排序
    int64 maintainTime                  = 11;  // 最近一次維護時間
    string maintainReason               = 12;  // 最近一次維護原因
    int64 hotSort                       = 13;
    int64 slotSort                      = 14;
    int64 cardSort                      = 15;
    int64 otherSort                     = 16;
    GameLogoPictureSize logoPictureSize = 17;
    int64 videoSort                     = 18;  // 視訊的排序
    int64 fishSort                      = 19;  // 漁機的排序
    int64 arcadeSort                    = 20;  // 街機的排序
    int64 lotterySort                   = 21;  // 彩票的排序
    int64 battleSort                    = 22;  // 對戰的排序
    int64 classicSort                   = 23;  // 經典的排序
    int64 rtpMin                        = 24;  // rtp 下限
    int64 rtpMax                        = 25;  // rtp 上限
    int64 unlockLevel                   = 26;  // 限制解鎖的等級(給前端使用)
    int64 unlockVipLevel                = 27;  // 限制解鎖的Vip等級(給前端使用)
    string name                         = 28;
}

message BetLevels {
    GameCategory category = 1;
    uint64 gameID         = 2;
    bytes betLevelData    = 3;  //裡面就是放樓下 BetLevel
}

message BetLevel {
    repeated BetLevelData data = 1;
}

message BetLevelData {
    bytes data = 1;
}

message SlotBetLevel {
    uint32 level      = 1;
    uint64 slotDefBet = 2;
    uint64 slotBet1   = 3;
    uint64 slotBet2   = 4;
    uint64 slotBet3   = 5;
    uint64 slotBet4   = 6;
    uint64 slotBet5   = 7;
    uint64 slotBet6   = 8;
    uint64 slotBet7   = 9;
    uint64 slotBet8   = 10;
    uint64 slotBet9   = 11;
    uint64 slotBet10  = 12;
    uint64 slotBet11  = 13;
    uint64 slotBet12  = 14;
    uint64 slotBet13  = 15;
    uint64 slotBet14  = 16;
    uint64 slotBet15  = 17;
}

message FishBetLevel {
    uint64 id                = 1;
    int64 disable            = 2;
    int64 roomLV             = 3;
    int64 vipLVRequire       = 4;
    repeated uint64 betRanks = 5;
    // int64 roomRTP            = 6;
}

message AbyssalFishBetLevel {
    uint32 level            = 1;  // 等級 1:試玩廳 2:新手廳 3:一般廳 4:貴賓廳 5:頭家廳
    uint64 requiredVIPLevel = 2;  // 最低 VIP 等級要求
    uint64 maxBetAmount     = 3;  // 最低注額
    uint64 minBetAmount     = 4;  // 最高注額
}

message FishKingBetLevel {
    uint32 level            = 1;  // 等級 1:試玩廳 2:新手廳 3:一般廳 4:貴賓廳 5:頭家廳
    uint64 requiredVIPLevel = 2;  // 最低 VIP 等級要求
    uint64 maxBetAmount     = 3;  // 最低注額
    uint64 minBetAmount     = 4;  // 最高注額
}

message BlackjackBetLevel {
    uint32 level    = 1;  // 等級
    uint64 vipLevel = 7;  // 最低VIP
    uint64 betMin   = 2;  // 最低注額
    uint64 betMax   = 3;  // 最高注額
    uint64 bet1     = 4;  // 籌碼1注額
    uint64 bet2     = 5;  // 籌碼2注額
    uint64 bet3     = 6;  // 籌碼3注額
}

message NiuNiuBetLevel {
    uint32 level        = 1;  // 等級
    uint64 vipLevel     = 2;  // 最低VIP
    uint64 betAmount    = 3;  // 最低注額
    yesno.YesNo isJoker = 4;
}

message HundredNiuNiuBetLevel {
    uint32 level                            = 1;  // 等級
    uint64 vipLevel                         = 2;  // 最低VIP
    uint64 lowBetAmount                     = 8;
    uint64 dealerLowerExchangeAmount        = 9;
    uint64 dealerPrivateLowerExchangeAmount = 13;
    uint64 maxBetAmount                     = 10;
    uint64 maxBetInOneDoor                  = 11;
    uint64 changeDealerLowerAmount          = 12;
    uint64 bet1                             = 3;  // 籌碼1注額
    uint64 bet2                             = 4;  // 籌碼2注額
    uint64 bet3                             = 5;  // 籌碼3注額
    uint64 bet4                             = 6;  // 籌碼4注額
    uint64 bet5                             = 7;  // 籌碼5注額
}

message HundredPushingDotBetLevel {
    uint32 level                            = 1;   // 等級
    uint64 vipLevel                         = 2;   // 最低VIP
    uint64 lowBetAmount                     = 3;   // 最低預扣額
    uint64 bet1                             = 4;   // 籌碼1注額
    uint64 bet2                             = 5;   // 籌碼2注額
    uint64 bet3                             = 6;   // 籌碼3注額
    uint64 bet4                             = 7;   // 籌碼4注額
    uint64 bet5                             = 8;   // 籌碼5注額
    uint64 dealerLowerExchangeAmount        = 9;   // 莊家預扣保證金標準
    uint64 dealerPrivateLowerExchangeAmount = 13;  // 私房開房門檻
    uint64 maxBetAmount                     = 10;  // 所有押注區加總的上限金額
    uint64 maxBetInOneDoor                  = 11;  // 單門押注區加總上限金額
    uint64 changeDealerLowerAmount          = 12;  // 莊家保證金標準
}

message HundredShootingGantryBetLevel {
    uint32 level                            = 1;   // 等級
    uint64 vipLevel                         = 2;   // 最低VIP
    uint64 lowBetAmount                     = 3;   // 最低預扣額
    uint64 bet1                             = 4;   // 籌碼1注額
    uint64 bet2                             = 5;   // 籌碼2注額
    uint64 bet3                             = 6;   // 籌碼3注額
    uint64 bet4                             = 7;   // 籌碼4注額
    uint64 bet5                             = 8;   // 籌碼5注額
    uint64 dealerLowerExchangeAmount        = 9;   // 排莊保證金標準
    uint64 dealerPrivateLowerExchangeAmount = 11;  // 私房開房門檻
    uint64 changeDealerLowerAmount          = 10;  // 莊家預扣保證金標準
}

message HundredLuckyRouletteBetLevel {
    uint32 level        = 1;  // 等級
    uint64 vipLevel     = 2;  // 最低VIP
    uint64 lowBetAmount = 3;  // 最低預扣額
    uint64 bet1         = 4;  // 籌碼1注額
    uint64 bet2         = 5;  // 籌碼2注額
    uint64 bet3         = 6;  // 籌碼3注額
    uint64 bet4         = 7;  // 籌碼4注額
    uint64 bet5         = 8;  // 籌碼5注額
}

message HundredPaigowBetLevel {
    uint32 level                            = 1;  // 等級
    uint64 vipLevel                         = 2;  // 最低VIP
    uint64 bet1                             = 3;  // 籌碼1注額
    uint64 bet2                             = 4;  // 籌碼2注額
    uint64 bet3                             = 5;  // 籌碼3注額
    uint64 bet4                             = 6;  // 籌碼4注額
    uint64 bet5                             = 7;  // 籌碼5注額
    uint64 lowBetAmount                     = 8;
    uint64 dealerLowerExchangeAmount        = 9;
    uint64 maxBetAmount                     = 10;
    uint64 maxBetInOneDoor                  = 11;
    uint64 changeDealerLowerAmount          = 12;
    uint64 dealerPrivateLowerExchangeAmount = 13;
}

message MahjongBetLevel {
    uint32 level        = 1;  // 等級
    uint64 vipLevel     = 2;  // 最低VIP
    uint64 betBaseScore = 3;  // 底
    uint64 betScore     = 4;  // 台
}

message HoldemBetLevel {
    int64 roomLevel           = 1;   // 房間等級 1, 2, 3
    int64 requiredVIPLevel    = 2;   // 最低 VIP 等級要求
    int64 minToken            = 3;   // 進房需要最少的代幣數量
    int64 maxToken            = 4;   // 進房需要最多的代幣數量
    int64 smallBlindToken     = 5;   // 小盲代幣
    int64 bigBlindToken       = 6;   // 大盲代幣
    int64 expectedPlayerCount = 7;   // 預計進房人數
    int64 guaranteeAmount     = 8;   // 押金
    int64 actionTime          = 9;   // 玩家動作時間 秒
    bool robotEnable          = 10;  // 是否開放機器人陪打
    int64 robotMaxNumber      = 11;  // 機器人最多幾個
}

// 多米諾QiuQiu
message DominoQiuQiuBetLevel {
    int64 roomLevel                = 1;   // 房間等級 1(積分), 2, 3, 4
    int64 minVIPLevel              = 2;   // 最低 VIP 等級要求
    int64 minToken                 = 3;   // 進房需要最少的代幣數量
    int64 maxToken                 = 4;   // 進房需要最多的代幣數量 (-1表示無上限)
    int64 blindToken               = 5;   // 底注、盲注
    bool checkEnterRoomBalance     = 6;   // 是否檢查進房的總資產
    int64 minEnterRoomBalance      = 7;   // 進房最低總資產
    int64 maxEnterRoomBalance      = 8;   // 進房最高總資產 (-1表示無上限)
    int32 minRoomPlayerNumber      = 9;   // 每桌最小遊戲人數
    int32 maxRoomPlayerNumber      = 10;  // 每桌最大遊戲人數
    int64 playerActionTimeSec      = 11;  // 玩家操作時間秒數
    bool isStayRoom                = 12;  // 是否同桌。 true: 同桌，false: 換桌
    int32 stayRoomContinueCount    = 13;  // 同桌局數，isStayRoom 是 true 時，才有作用。
    int64 gameStartCountdownSec    = 14;  // 遊戲開始前的倒數秒數
    int64 afterGameEndCountdownSec = 15;  // 遊戲結束後的倒數秒數
    int64 gameTaxRate              = 16;  // 遊戲稅率
    int64 openCardCountdownSec     = 17;  // 開牌倒數秒數
}

// DragonTigerBetLevel 龍虎鬥
message DragonTigerBetLevel {
    int64 roomLevel                           = 1;   // 房間等級 1(積分), 2, 3, 4
    int64 minVIPLevel                         = 2;   // 最低 VIP 等級要求
    int64 minToken                            = 3;   // 進房最低預扣
    int64 maxToken                            = 4;   // 進房最高預扣 (-1表示無上限)
    int64 stagePrepareTimeSec                 = 5;   // 準備階段時間秒數
    int64 stageDealTimeSec                    = 6;   // 發牌階段時間秒數
    int64 stageBetTimeSec                     = 7;   // 下注階段時間秒數
    int64 stageSettlementTimeSec              = 8;   // 結算階段時間秒數
    repeated uint64 chips                     = 9;   // 籌碼 [2, 5, 10, 20, 50]
    uint64 perPlayerBetAreaAmount             = 10;  // 單區押分上限，計算玩家個人對每一區押注區的押分，每一區押注區獨立計算
    uint64 totalBetAreaAmount                 = 11;  // 總押分上限，計算該牌桌所有玩家的押分，當該牌桌已達到總押分上限後，無法再接受任何押注
    uint32 maxRoomPlayerNumber                = 12;  // 房間最大遊玩人數
    uint32 maxIdleRoundNumber                 = 13;  // 最多閒置回數
    int64 minEnterRoomBalance                 = 14;  // 最小進房門檻(錢包，含保險金)
    int64 maxEnterRoomBalance                 = 15;  // 最大進房門檻(錢包，含保險金，-1表示無上限)
    string dragonTigerMultiple                = 16;  // 龍或虎贏，閒家贏牌倍率。 ex: 2.02
    string tieMultiple                        = 17;  // 和局，閒家贏牌倍率。 ex: 9
    bool autoBetEnable                        = 18;  // 開啟自動下注
    repeated uint32 autoBetRounds             = 19;  // 下注局數 [10, 25, 50, 100, 500, 3000]
    repeated uint64 repeatStartAutoBetAmounts = 20;  // 重複下注的起始下注金幣 [1000, 5000, 10000, 50000, 100000, 500000, 1000000]
    repeated uint64 earnStartAutoBetAmounts   = 21;  // 回本下注的起始下注金幣 [1000, 2000, 3000, 4000, 5000, 10000, 20000]
}

message DominoBetLevel {
    int64 roomLevel        = 1;   // 房間等級 1, 2, 3, 4
    int64 requiredVIPLevel = 2;   // 最低 VIP 等級要求
    int64 gameMode         = 3;   // 遊戲模式
    int64 requiredToken    = 4;   // 進房需要的代幣數量
    int64 playerCount      = 5;   // 預計進房人數
    int64 ante             = 6;   // 底注
    int64 unit             = 7;   // 台分
    int64 roundNumber      = 8;   // 回合數
    int64 playerActionTime = 9;   // 玩家動作時間 秒
    bool robotEnable       = 10;  // 是否開放機器人陪打
    int64 robotMaxNumber   = 11;  // 機器人最多幾個
}

message VIPLevelConfig {
    uint64 level = 1;  // VIP等級
    uint64 point = 2;  // 升級VIP所需點數
}

message EXPLevelConfig {
    uint64 level = 1;  // 等級
    uint64 exp   = 2;  // 升級所需經驗值
}

message UpdateBetLevelRequest {
    BetLevels betLevel = 1;
}

message ScratchOffGame {
    int64 id           = 1;
    string name        = 2;  // 名稱
    int64 amount       = 3;  // 金額
    int64 area         = 4;  // 區域
    yesno.YesNo status = 5;  // 狀態
}
message ListGameScratchOffRequest {
    uint32 page    = 1;
    uint32 perPage = 2;
    int32 status   = 3;
}
message ListGameScratchOffResponse {
    repeated ScratchOffGame data     = 1;
    pagination.Pagination pagination = 2;
}
message GetGameScratchOffRequest {
    int64 gameID = 1;
}
message GetGameScratchOffResponse {
    ScratchOffGame data = 1;
}
message UpdateGameRtpSettingRequest {
    int64 rtpMin            = 1;  // rtp 下限
    int64 rtpMax            = 2;  // rtp 上限
    repeated uint64 gameIDs = 3;
}
message SamgongBetLevel {
    uint32 level    = 1;  // 等級
    uint64 vipLevel = 2;  // 最低VIP
    uint64 bet1     = 3;  // 籌碼1注額
    uint64 bet2     = 4;  // 籌碼2注額
    uint64 bet3     = 5;  // 籌碼3注額
    uint64 bet4     = 6;  // 籌碼4注額
    uint64 bet5     = 7;  // 籌碼5注額
}

// DragonTigerBetLevel 龍虎鬥
message CrazyLotteryBetLevel {
    int64 roomLevel                     = 1;  // 房間等級: 1
    repeated int64 prizeMultiples       = 2;  // 獎項倍數，排序從一獎、二獎...，以此類推 [100, 20, 5, 2]
    repeated int64 superNumberMultiples = 3;  // 超級獎號倍數，排序從第一顆、第二顆...，以此類推 [2, 3, 4, 5, 10]
}

// LuckyLotteryBetLevel 幸運樂透
message LuckyLotteryBetLevel {
    int64 roomLevel                         = 1;   // 房間等級: 1
    map<uint32, string> bingoCountMultipleA = 2;   // A 中獎賠率：key: 中獎顆數， value: 賠率
    map<uint32, string> bingoCountMultipleB = 3;   // B 中獎賠率：key: 中獎顆數， value: 賠率
    map<uint32, string> bingoCountMultipleC = 4;   // C 中獎賠率：key: 中獎顆數， value: 賠率
    map<uint32, string> bingoCountMultipleD = 5;   // D 中獎賠率：key: 中獎顆數， value: 賠率
    map<uint32, string> bingoCountMultipleE = 6;   // E 中獎賠率：key: 中獎顆數， value: 賠率
    uint64 minBetAmount                     = 7;   // 最低押分
    uint64 maxBetAmount                     = 8;   // 最高押分
    uint64 defaultBetAmount                 = 9;   // 預設一進房的押分
    uint64 maxGainAmount                    = 10;  // 最高贏分
}

message ColorDiceBetLevel {
