    uint32 MaxIdleRoundNumber                         = 4;  // 最多閒置回數
    int64 stagePrepareTimeSec                         = 5;  // 準備階段時間秒數
    int64 stageDealTimeSec                            = 6;  // 發牌階段時間秒數
    int64 stageBetTimeSec                             = 7;  // 下注階段時間秒數
    map<uint64, int64> vipLevelPerBoatMaxBetAmountMap = 8;  // vip 等級對應單個賽艇最大注額
    map<uint64, int64> vipLevelTotalMaxBetAmountMap   = 9;  // vip 等級對應的最大總注額
}