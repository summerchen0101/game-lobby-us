    map<uint32, string> CountMultipleRed    = 2;  // 紅色顆數賠率：key: 出現顆數， value: 賠率
    map<uint32, string> CountMultipleYellow = 3;  // 黃色顆數賠率：key: 出現顆數， value: 賠率
    map<uint32, string> CountMultipleGreen  = 4;  // 綠色顆數賠率：key: 出現顆數， value: 賠率
}

// HundredColorDiceBetLevel 百人繽紛骰
message HundredColorDiceBetLevel {
    int64 roomLevel                            = 1;   // 房間等級 1
    int64 minVIPLevel                          = 2;   // 最低 VIP 等級要求
    int64 minToken                             = 3;   // 進房最低預扣
    int64 maxToken                             = 4;   // 進房最高預扣 (-1表示無上限)
    int64 minEnterRoomBalance                  = 5;   // 最小進房門檻(玩家身上金幣總額，含保險金)
    int64 maxEnterRoomBalance                  = 6;   // 最大進房門檻(玩家身上金幣總額，含保險金，-1表示無上限)
    int64 stagePrepareTimeSec                  = 7;   // 準備階段時間秒數
    int64 stageBetTimeSec                      = 8;   // 下注階段時間秒數
    int64 stageOpenResultTimeSec               = 9;   // 開獎階段時間秒數
    int64 stageSettlementTimeSec               = 10;  // 結算階段時間秒數
    repeated uint64 chips                      = 11;  // 籌碼 [100, 1000, 10000, 100000, 1000000]
    int64 perBetDiceMaxAmount                  = 12;  // 單區押分上限，計算玩家個人對每一區押注區的押分，每一區押注區獨立計算 (-1表示無上限)
    int64 allBetDiceMaxAmount                  = 13;  // 總押分上限，計算該牌桌所有玩家的押分，當該牌桌已達到總押分上限後，無法再接受任何押注 (-1表示無上限)
    uint32 maxRoomPlayerNumber                 = 14;  // 房間最大遊玩人數
    uint32 maxIdleRoundNumber                  = 15;  // 最多閒置回數
    map<uint32, string> diceColorCountMultiple = 16;  // 出現相同顏色的骰子賠率。 key: 數量, value: 賠率
    bool autoBetEnable                         = 17;  // 開啟自動下注
    repeated uint32 autoBetRounds              = 18;  // 下注局數 [10, 25, 50, 100, 500, 3000]
    repeated uint64 repeatStartAutoBetAmounts  = 19;  // 重複下注的起始下注金幣 [1000, 5000, 10000, 50000, 100000, 500000, 1000000]
    repeated uint64 earnStartAutoBetAmounts    = 20;  // 回本下注的起始下注金幣 [1000, 2000, 3000, 4000, 5000, 10000, 20000]
    uint32 animationCount                      = 21;  // 前端開獎動畫數量 ex: 200
    string serviceChargeRate                   = 22;  // 遊戲服務費比例 ex: 0.05(手續費5%)
    uint64 winJpMinBetAmount                   = 23;  // 獲取JACKPOT大獎，於指定顏色押注超過x金幣 ex: 100000

    // +++++++++++
    // 後端使用
    // +++++++++++
    string jpServiceChargeRate = 31;  // 抽水的錢進水庫的比例，抽取本局總服務費的 0.3% 進入水庫 ex: 0.03(手續費3%)
    uint64 jpLineBaseAmount    = 32;  // 水池基值 (計算放水線用)
    uint64 jpLineThreshold     = 33;  // 閥值 (計算放水線用)
}

// 柏青彈珠
message PachinMarbleBetLevel {
    int64 roomLevel                             = 1;  // 房間等級 1
    uint64 minEnterRoomVIPLevel                 = 2;  // 最小進房 VIP 等級要求
    map<uint64, uint64> vipLevelMaxBetAmountMap = 3;  // vip等級最高押住限額，如 vip 0 只能下注最低面額
    repeated uint64 chips                       = 4;  // 籌碼 [30, 50, 100, 300, 500, 1000, 3000, 5000]
}

message RowingBetLevel {
