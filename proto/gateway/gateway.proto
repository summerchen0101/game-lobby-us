syntax = "proto3";
package gateway;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/gateway";

import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";
import "google/protobuf/empty.proto";
import "proto/playerinfo/model.proto";

service GatewayService {
    rpc Gateway(Request) returns (Response);
    rpc Schedule(ScheduleReq) returns (google.protobuf.Empty);
    rpc RegisterConnect(RegisterReq) returns (google.protobuf.Empty);
    rpc HealthyConnect(RegisterReq) returns (google.protobuf.Empty);
    rpc DeleteConnect(DeleteReq) returns (google.protobuf.Empty);
    rpc RegisterUser(RegistryUserReq) returns (RegistryUserResp);
    rpc ListPlayerBot(ListPlayerBotReq) returns (ListBotResponse);
    rpc SendSystemMsg(SendSystemMsgReq) returns (google.protobuf.Empty);
    // NotifyDisconnection 通知玩家斷線
    rpc NotifyDisconnection(NotifyDisconnectionReq) returns (google.protobuf.Empty);
}

// request的 基礎通用結構
message RequestBasic {
    uint64 userID    = 1;
    int64 timestamp  = 2; // 請求發起的 utc時間搓
    string clientVer = 3; // 客戶端版本
    string requestID = 4; // 客戶端產生的 request id ,可用於追蹤
    uint64 gameID    = 5;
    string roomID    = 6;
    string host      = 7;
    string token = 8; // lazy register userID to connection
}

message ResponseBasic {
    string requestID = 1;
    int64 timestamp  = 2;
    string serverVer = 3;
}

message Request {
    RequestBasic basic = 1;
    int64 type         = 2;
    bytes data         = 3; // 各種 RequestData
}

message Response {
    ResponseBasic basic = 1;
    int64 type          = 2; // 0: pingpong
    string code         = 3; // 204 代表 請求成功無data回傳 , 200 代表 成功且有資料, 其餘則以error Code呈現
    string errMessage   = 4; //
    bytes data          = 5; // 回傳的資料
    uint64 gameID       = 6; // 後端所使用
}

message ServerPush {
    repeated string userID    = 1;
    yesno.YesNo NeedBroadcast = 3;
    bytes resp                = 2;
}

message ScheduleReq {
    ScheduleType type = 1;
}

// connect Use
message RegisterReq {
    string topic = 1;
}

// connect Use
message DeleteReq {
    string topic = 1;
}

// connect Use
message RegistryUserReq {
    string userID   = 1;
    string topic    = 2;
    bool needDelete = 3;
}

message RegistryUserResp {
    string guildID = 1;
}

message ListPlayerBotReq {
    int64 botCount = 1; // 需要的機器人數量
    int64 level    = 2; // 機器人等級 1~4
}

message ListBotResponse {
    repeated playerinfo.PlayerInfo playerInfos = 1;
}

message SendSystemMsgReq {
    yesno.YesNo useSystemTopic     = 1; // 是否使用專屬通道
    int64 reqType                  = 2; // 前端收到的ＴＹＰＥ
    int64 apiType                  = 3; // 前端收到的訊息type
    uint64 senderID                = 4;
    string nickname                = 5;
    uint64 vipLevel                = 6;
    uint64 level                   = 7;
    string imageUrl                = 8;
    bytes data                     = 9;
    map<string, Header> headerMeta = 10;
}

message Header {
    repeated string content = 1;
}

message UserKickBeforeReason {
    enum Reason {
        Default              = 0;
        DuplicateConn        = 1; // 重複登入app
        GameIsClose          = 2; // 遊戲關閉
        AccountStatusDeleted = 3; // 帳號已被刪除
    }
    Reason reason = 1;
}

message NotifyDisconnectionReq {
    uint64 UserID = 1;
}

