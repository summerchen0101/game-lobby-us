syntax = "proto3";
package guild;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/guild";

import "google/protobuf/empty.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/pagination/pagination.proto";
import "proto/playerinfo/model.proto";

service GuildService {
    rpc CreateGuild(CreateGuildRequest) returns (CreateGuildResponse);                             // 創立公會
    rpc GetGuild(GetGuildRequest) returns (GetGuildResponse);                                      // 單筆取得公會(包含成員清單, 離線玩家清單)
    rpc ListGuild(ListGuildRequest) returns (ListGuildResponse);                                   // 公會清單
    rpc ApplyGuild(ApplyGuildRequest) returns (ApplyGuildResponse);                                // 申請公會
    rpc ListMemberScore(ListMemberScoreRequest) returns (ListMemberScoreResponse);                 // 個人積分清單
    rpc UpdateGuild(UpdateGuildRequest) returns (google.protobuf.Empty);                           // 更新公會資訊
    rpc ExtendGuildTerm(ExtendGuildTermRequest) returns (google.protobuf.Empty);                   // 延長俱樂部期限
    rpc ChangeMemberPosition(ChangeMemberPositionRequest) returns (google.protobuf.Empty);         // 更換玩家職位
    rpc Leave(LeaveGuildRequest) returns (google.protobuf.Empty);                                  // 請離公會
    rpc ChangeMemberReferrer(ChangeMemberReferrerRequest) returns (google.protobuf.Empty);         // 調配會員
    rpc InviteMember(InviteMemberRequest) returns (InviteMemberResponse);                          // 邀請會員
    rpc ListConfirmMember(ListConfirmMemberRequest) returns (ListConfirmMemberResponse);           // 審批會員清單
    rpc ConfirmAddMember(ConfirmAddMemberRequest) returns (ConfirmAddMemberResponse);              // 審批會員
    rpc ListReferrer(ListReferrerRequest) returns (ListReferrerResponse);                          // 調配會員上級清單
    rpc ListRecommended(ListRecommendedRequest) returns (ListRecommendedResponse);                 // 下級清單
    rpc ListMember(ListMemberRequest) returns (ListMemberResponse);                                // 取得會員列表
    rpc GetMember(GetMemberRequest) returns (GetMemberResponse);                                   // 取得會員
    rpc UpdateGuildScore(UpdateGuildScoreRequest) returns (google.protobuf.Empty);                 // 更新公會會員資料
    rpc ListUserGuildHistory(ListUserGuildHistoryRequest) returns (ListUserGuildHistoryResponse);  // 取得會員進出公會記錄歷程
    rpc MergeGuild(MergeGuildRequest) returns (google.protobuf.Empty);                             // 合併公會
    rpc DeleteGuild(DeleteGuildRequest) returns (google.protobuf.Empty);                           // 刪除公會
    rpc ChangeDirectorGuild(ChangeDirectorRequest) returns (google.protobuf.Empty);                // 更換會長
    rpc CreateGuildImageUrl(CreateGuildImageUrlRequest) returns (google.protobuf.Empty);           // 上傳公會圖片
    rpc ApplyLeave(ApplyLeaveRequest) returns (google.protobuf.Empty);                             // 申請退出俱樂部
    rpc ListApplyLeave(ListApplyLeaveRequest) returns (ListApplyLeaveResponse);                    // 申請退出俱樂部清單
    rpc ConfirmLeaveMember(ConfirmLeaveMemberRequest) returns (google.protobuf.Empty);             // 審批退出申請會員
    rpc GetApplyLeave(GetApplyLeaveRequest) returns (GetApplyLeaveResponse);                       // 申請退出俱樂部單筆
    rpc UpdateTotalScoreRand(google.protobuf.Empty) returns (google.protobuf.Empty);               // 更新官方帳號總積分
    rpc AddGuildToDeepLink(AddGuildToDeepLinkRequest) returns (AddGuildToDeepLinkResponse);        // 透過 deeplink 的方式加入工會
    rpc MappingQrCodeLink(MappingQrCodeLinkRequest) returns (MappingQrCodeLinkResponse);           // mapping qr code link to user
    rpc GetQrCodeLink(GetQrCodeLinkRequest) returns (GetQrCodeLinkResponse);                       // 取得 qr code 連結
    rpc ListOwnReferrer(ListOwnReferrerRequest) returns (ListOwnReferrerResponse);                 // 查看自己上級清單

    rpc CreateAlliance(CreateAllianceReq) returns (google.protobuf.Empty);
    rpc GetAlliance(GetAllianceReq) returns (GetAllianceResp);
    rpc CheckAlliance(CheckAllianceReq) returns (CheckAllianceResp);

    rpc ListAlliances(ListAlliancesReq) returns (ListAlliancesResp);
    rpc UpdateAlliance(UpdateAllianceReq) returns (google.protobuf.Empty);
    rpc AddGuildToAlliance(AddGuildToAllianceReq) returns (google.protobuf.Empty);
    rpc UpdateUserToManager(UpdateUserToManagerRequest) returns (google.protobuf.Empty);
}

enum Position {
    POSITION_UNKNOWN       = 0;
    POSITION_DIRECTOR      = 1;   // 總會長
    POSITION_DIRECTOR2     = 2;   // 會長 (鑽石頭家)
    POSITION_VICE_DIRECTOR = 3;   // 副會長  (黑金頭家)
    POSITION_GOLDEN        = 4;   // 黃金玩家
    POSITION_MANAGER       = 5;   // 組長  (紅玉頭家)
    POSITION_SILVER        = 6;   // 銀頭家
    POSITION_MANAGER2      = 7;   // 二級組長 (紫頭家)
    POSITION_BLUE          = 8;   // 藍頭家
    POSITION_MANAGER3      = 9;   // 三級組長 (橘頭家)
    POSITION_YELLOW        = 10;  // 黃頭家
    POSITION_MANAGER4      = 11;  // 四級組長 (粉頭家)
    POSITION_GREEN         = 12;  // 青頭家
    POSITION_MANAGER5      = 13;  // 五級組長 (棕頭家)
    POSITION_WHITE         = 14;  // 白頭家
    POSITION_MEMBER        = 15;  // 會員
}
enum Level {
    LEVEL_UNKNOWN  = 0;
    LEVEL_GENERAL  = 1;  // 一般
    LEVEL_OFFICIAL = 2;  // 官方
    LEVEL_RELATION = 3;  // 關聯
}

enum LeaveReason {
    LEAVE_REASON_UNKNOWN        = 0;
    LEAVE_REASON_ACTIVITY       = 1;  // 活躍度低
    LEAVE_REASON_NOT_GOOD       = 2;  // 風氣不佳
    LEAVE_REASON_OTHER          = 3;  // 其他
    LEAVE_REASON_WEEK_NOT_LOGIN = 4;  // 連續七日為上線
    LEAVE_REASON_SPEAK          = 5;  // 不雅發言
    LEAVE_REASON_FIGHT          = 6;  // 引戰
    LEAVE_REASON_ABUSE          = 7;  // 辱罵
    LEAVE_REASON_BACKEND        = 8;  // 後台移除
    LEAVE_REASON_DISBANDED      = 9;  // 解散
}
enum GuildCreateLevel {
    GUILD_CREATE_LEVEL_UNKNOWN = 0;
    GUILD_CREATE_LEVEL         = 1;  // 原本的
    GUILD_CREATE_LEVEL_FREE    = 2;  // 免費的
}
message CreateGuildRequest {
    string guildID                    = 1;   // ID
    string name                       = 2;   // 名稱
    string profile                    = 3;   // 介紹
    uint64 userID                     = 4;   // 創辦人 ID
    yesno.YesNo isDefault             = 5;   // 是否預設公會(不用付展延費自動展延)
    Level level                       = 6;   // 公會層級
    yesno.YesNo isAutoPush            = 7;   // 是否自動推波
    string pushContent                = 8;   // 推波內容
    string announcement               = 9;   // 廣吿
    repeated string relationGuildID   = 10;  // 關聯俱樂部ID
    string lineLinkUrl                = 11;  // line 連結
    GuildCreateLevel guildCreateLevel = 13;  // 俱樂部建立模式
}
message CreateGuildResponse {
    Guild guild = 1;
}
message GetGuildRequest {
    string guildID                = 1;  // 公會 ID
    uint64 userID                 = 2;
    yesno.YesNo onlyOfflineMember = 3;  //成員清單是否只需要離線員工
    string guildName              = 4;  // 公會名稱
}

message GetGuildResponse {
    Guild guild = 1;
}

message ListGuildRequest {
    string guildID           = 1;
    string name              = 2;
    uint32 page              = 3;
    uint32 perPage           = 4;
    repeated string guildIDs = 5;
    yesno.YesNo isAutoPush   = 6;  // 是否自動推波
    yesno.YesNo needAll      = 7;  // 是否要全部資料包括刪除的
}

message ListGuildResponse {
    repeated Guild guilds      = 1;
    pagination.Pagination page = 2;
}

message ApplyGuildRequest {
    string guildID              = 1;  // 公會 ID
    uint64 userID               = 2;
    uint64 referrerID           = 3;  // 推薦人ID
    yesno.YesNo isBindCellPhone = 4;
}
message ApplyGuildResponse {
    yesno.YesNo isGetReferrerAward = 1;
    uint64 referrerID              = 2;
}
message ListMemberScoreRequest {
    uint64 userID = 1;
}
message ListMemberScoreResponse {
    uint64 userID     = 1;
    string name       = 2;  // 名稱
    Position position = 3;  // 職位
    int64 totalScore  = 4;  // 總積分
    //    repeated MemberScore memberScore = 5;  // 個人積分清單
}

message UpdateGuildRequest {
    string guildID                  = 1;
    string name                     = 2;   // 名稱
    string profile                  = 3;   // 介紹
    string announcement             = 4;   // 公告
    yesno.YesNo autoPush            = 5;   // 自動推播
    string pushContent              = 6;   // 推播內容
    uint64 userID                   = 7;   // 操作者
    yesno.YesNo isBackend           = 8;   // 是否是後台
    Level level                     = 9;   // 公會層級
    yesno.YesNo isDefault           = 10;  // 是否自動展延
    repeated string relationGuildID = 11;  // 關聯俱樂部ID
    string lineLinkUrl              = 12;
    yesno.YesNo lineLinkUrlUpdate   = 13;  // 是否自動展延
}

message AddToGuildRequest {
    string roomID     = 1;
    uint64 userID     = 2;
    uint64 OperatorID = 3;
}

message InviteToGuildRequest {
    string roomID          = 1;
    repeated uint64 userID = 2;
    uint64 OperatorID      = 3;
}
message InviteToGuildResponse {
    string roomID   = 1;
    string roomName = 2;
}

message InviteMemberRequest {
    string guildID    = 1;
    uint64 userID     = 2;
    uint64 referrerID = 3;  // 推薦人ID
}
message InviteMemberResponse {
    string guildID = 1;
    string name    = 2;
}
message ConfirmAddMemberRequest {
    string guildID    = 1;
    uint64 userID     = 2;
    yesno.YesNo apply = 3;
}
message ConfirmAddMemberResponse {
    yesno.YesNo isGetReferrerAward = 1;
    uint64 referrerID              = 2;
}
message UpdateGuildPositionRequest {
    uint64 OperatorID = 3;
    string roomID     = 1;
    uint64 userID     = 2;
    Position position = 4;
}

message LeaveGuildRequest {
    string guildID          = 1;
    uint64 userID           = 2;
    repeated uint64 userIDs = 3;
    uint64 operatorID       = 4;  // 操作者
    LeaveReason leaveReason = 5;  // 請離俱樂部原因
}

message Guild {
    string guildID                    = 1;  // 公會ID
    string name                       = 2;  // 公會名稱
    int64 guildScore                  = 3;  // 公會積分
    string profile                    = 4;  // 公會介紹
    repeated member members           = 5;
    uint64 directorID                 = 6;   // 會長 ID
    string announcement               = 7;   // 公告
    yesno.YesNo autoPush              = 8;   // 自動推播
    int64 extendTime                  = 9;   // 到期時間
    string pushContent                = 11;  // 推播內容
    repeated uint64 pendingMember     = 12;  // 待申請的玩家
    int64 createdTime                 = 13;  // 創立時間
    yesno.YesNo isDefault             = 14;  // 是否預設公會(不用付展延費自動展延)
    yesno.YesNo isDelete              = 15;  // 是否被刪除
    string imageUrl                   = 16;  // 徽章
    Level level                       = 17;  // 公會層級
    int64 memberCount                 = 18;  // 工會總人數
    repeated string relationGuildID   = 19;  // 關聯俱樂部ID
    int64 yesterdayTotal              = 20;  // 昨日總積分
    int64 yesterdaySalesTotal         = 21;  // 昨日業績
    int64 guildSalesScore             = 24;  // 公會業績
    string lineLinkUrl                = 25;  // Line 連結
    GuildCreateLevel guildCreateLevel = 26;  // 俱樂部建立模式
}

message member {
    uint64 userID             = 1;
    uint64 referrerID         = 2;   // 推薦人 ID
    int64 totalScore          = 3;   // 總積分
    int64 score               = 4;   // 個人積分
    int64 guildDividends      = 5;   // 俱樂部分紅
    Position position         = 6;   // 職位
    yesno.YesNo isRecommended = 7;   // 是否有下級
    Position referrerPosition = 8;   // 推薦人職位
    string guildID            = 9;   // 公會 ID
    int64 recommendedCount    = 10;  // 下級人數
    yesno.YesNo isManager     = 11;  // 是否為管理員
    int64 lineReferralCode    = 12;  // line 推薦碼
}

message ExtendGuildTermRequest {
    string guildID = 1;
    uint64 userID  = 2;
}

message ChangeMemberPositionRequest {
    string guildID    = 1;
    uint64 userID     = 2;  // userID
    Position position = 3;  // 職位
    uint64 operatorID = 4;  // 操作者
}

message ChangeMemberReferrerRequest {
    string guildID    = 1;
    uint64 referrerID = 2;  // 上級 ID
    uint64 userID     = 3;  // 使用者 ID
}

message ListConfirmMemberRequest {
    string guildID    = 1;
    uint64 operatorID = 2;  // 操作者
}
message ListConfirmMemberResponse {
    repeated member members = 1;
}

message ListReferrerRequest {
    string guildID    = 1;
    uint64 operatorID = 2;  // 操作者
    uint64 userID     = 3;  // userID
}

message ListReferrerResponse {
    repeated member members = 1;
}
message ListRecommendedRequest {
    string guildID = 1;
    uint64 userID  = 2;
}

message ListRecommendedResponse {
    repeated member members = 1;
}

message ListMemberRequest {
    string GuildID              = 1;
    uint64 UserID               = 2;
    uint64 ReferrerID           = 3;
    repeated uint64 UserIDs     = 4;
    repeated string GuildIDs    = 5;
    repeated uint64 ReferrerIDs = 6;
    uint32 page                 = 7;
    uint32 perPage              = 8;
}

message ListMemberResponse {
    repeated member members          = 1;
    pagination.Pagination pagination = 2;
}

message GetMemberRequest {
    uint64 userID = 2;
}

message GetMemberResponse {
    member members = 1;
}

message UpdateGuildScoreRequest {
    string guildID                     = 1;
    repeated GuildScore data           = 2;
    yesno.YesNo isUpdateYesterdayScore = 3;  // 是否更新昨日積分
    uint64 yesterdayScore              = 4;
    uint64 yesterdaySalesScore         = 5;  // 昨日業績
}

message GuildScore {
    uint64 userID    = 1;
    int64 score      = 2;  // 積分
    int64 salesScore = 3;  // 業績
}

message ListUserGuildHistoryRequest {
    uint64 userID           = 1;
    int64 startTime         = 2;
    int64 endTime           = 3;
    repeated uint64 userIDs = 4;
    string guildID          = 5;
    uint32 page             = 6;
    uint32 perPage          = 7;
}

message ListUserGuildHistoryResponse {
    repeated UserGuildHistory data   = 1;
    pagination.Pagination pagination = 2;
}

message UserGuildHistory {
    string guildID          = 1;
    uint64 userID           = 2;
    int64 createdTime       = 3;
    int64 quitTime          = 4;
    Position position       = 5;
    string guildName        = 6;
    LeaveReason leaveReason = 7;
}
message MergeGuildRequest {
    string guildID    = 1;
    string newGuildID = 2;  // 新的公會 ID
}

message DeleteGuildRequest {
    string guildID = 1;
}
message ChangeDirectorRequest {
    string guildID = 1;
    uint64 userID  = 2;
}
message CreateGuildImageUrlRequest {
    string guildID = 1;
    bytes file     = 2;
}

message ApplyLeaveRequest {
    string guildID          = 1;
    uint64 userID           = 2;
    LeaveReason leaveReason = 3;  // 離開原因
}

message ListApplyLeaveRequest {
    string guildID    = 1;
    uint32 page       = 2;
    uint32 perPage    = 3;
    uint64 operatorID = 4;
}
message ListApplyLeaveResponse {
    repeated UserApplyLeave data = 1;
}
message UserApplyLeave {
    int64 joinDate          = 1;  // 加入日期
    int64 applyDate         = 2;  // 加入日期
    LeaveReason leaveReason = 3;  // 退出原因
    int64 recommendCount    = 4;  // 下級人數
    Position position       = 5;  // 職位
    uint64 userID           = 6;  // 玩家ID
}
message ConfirmLeaveMemberRequest {
    string guildID    = 1;
    uint64 userID     = 2;
    yesno.YesNo apply = 3;
}
message GetApplyLeaveRequest {
    string guildID    = 1;
    uint64 operatorID = 4;
}
message GetApplyLeaveResponse {
    UserApplyLeave data = 1;
}

message AddGuildToDeepLinkRequest {
    string authenticationCode        = 1;  // 認證碼
    uint64 userID                    = 2;  // 加入的人
    playerinfo.PlayerKind playerKind = 3;
    string cellPhone                 = 4;
}
message AddGuildToDeepLinkResponse {
    uint64 referrerID              = 1;  // 上級 ID
    yesno.YesNo isGetReferrerAward = 2;  // 是否可以拿推薦獎勵
    string guildID                 = 3;
    string guildName               = 4;
}
message MappingQrCodeLinkRequest {
    uint64 userID = 1;
}
message MappingQrCodeLinkResponse {
    string qrCodeLink = 1;  // qrCode 連結
}
message GetQrCodeLinkRequest {
    uint64 userID = 1;
}
message GetQrCodeLinkResponse {
    string qrCodeLink = 1;  // qrCode 連結
}
message ListOwnReferrerRequest {
    string guildID = 1;
    uint64 userID  = 2;
}
message ListOwnReferrerResponse {
    repeated member members = 1;
}

message Alliance {
    string allianceID        = 1;  // 聯盟ID
    repeated string guildIDs = 2;  // 公會群
    string name              = 3;  // 聯盟名稱
    uint64 directorID        = 4;  // 盟長
    uint64 createdTime       = 5;
}

message CreateAllianceReq {
    string allianceID = 1;
    string name       = 2;
    uint64 directorID = 3;  // 盟長
}

message GetAllianceReq {
    string allianceID = 1;
}

message GetAllianceResp {
    Alliance alliance = 1;
}

message CheckAllianceReq {
    uint64 fromUserID = 1;
    uint64 toUserID   = 2;
}

message CheckAllianceResp {
    bool sameAlliance = 1;
}

message ListAlliancesReq {
    string guildID              = 1;
    repeated string allianceIDs = 2;
}

message ListAlliancesResp {
    repeated Alliance alliance = 1;
}

message UpdateAllianceReq {
    string allianceID = 1;
    string name       = 2;
}

message AddGuildToAllianceReq {
    string allianceID = 1;
    string guildID    = 2;
}
message UpdateUserToManagerRequest {
    uint64 userID         = 1;
    yesno.YesNo isManager = 2;  // 是否為管理員
    string guildID        = 3;
}
