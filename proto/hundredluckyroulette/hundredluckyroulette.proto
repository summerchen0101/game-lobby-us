syntax = "proto3";
package hundredluckyroulette;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/hundredluckyroulette";

import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";

enum LuckyRouletteType {
    PING_PONG = 0;

    // [RPC]
    JOIN_ROOM        = 1;  // 返回 DeskResp（加入牌桌）
    USER_KICK_BEFORE = 2;
    SERVER_UPDATE    = 3;

    LEAVE           = 11;  // 204              (離開牌桌)
    GET_DESK        = 12;  // 返回 DeskResp     (取得牌桌資訊）
    BET             = 13;  // 返回 BetResp 廣播  (下注）
    AUTO_BET        = 14;  // 推送 PlayerInfo   (自動下注）
    STOP_AUTO_BET   = 15;  // 204              (停止自動下注)
    GET_PLAYER_LIST = 16;  // 返回 PlayerInfo   (取得玩家列表)

    // [Push]
    START_BET_PUSH   = 21;  // 推送 DeskInfo     (開始下注)
    OPEN_PRIZE_PUSH  = 22;  // 推送 DeskInfo     (開獎)
    COUNT_COIN_PUSH  = 23;  // 推送 CountCoin    (計算賠率結束)
    PLAYER_KICK_PUSH = 24;  // 204               (將玩家踢出牌桌）
    PLAYER_PUSH      = 25;  // 推送 PlayerInfo   （計算賠率時）
    ROOM_CLOSE       = 26;  // 204               (牌桌關閉)
    JACK_POT_PUSH    = 27;
}

message JackPotPush {
    PlayerInfo players = 1;
    uint64 Amount      = 2;
}

// 下注區
enum AreaType {
    UNKNOWN_BET_AREA_TYPE = 0;
    GREEN                 = 1;
    BLUE                  = 2;
    PURPLE                = 3;
    YELLOW                = 4;
    RED                   = 5;
}

// 牌桌狀態
enum TableStatus {
    UNKNOWN_TABLE_STATUS = 0;
    IDLE_TIME            = 1;
    BET_TIME             = 2;
    OPEN_PRIZE_TIME      = 3;
    COUNT_COIN           = 4;
}

// 自動下注位置
enum AutoBetAreaType {
    UNKNOWN_AUTO_BET_TYPE = 0;
    FIXED                 = 1;
    POLLING               = 2;
}

// 自動下注模式
enum AutoType {
    UNKNOWN_AUTO_TYPE = 0;
    REPEATED          = 1;
    EARN_ITS_COST     = 2;
}

// 自動下注局數
enum ContinueCount {
    UNKNOWN_CONTINUE_COUNT = 0;
    Continue_ONE           = 1;  // 50
    Continue_TWO           = 2;  // 200
    Continue_THREE         = 3;  // 1000
    Continue_FOUR          = 4;  // 3000
}

// 自動下注的起始下注金幣（重複下注）
enum RepeatedAutoBetAmount {
    UNKNOWN_REPEATED_AUTO_BET_AMOUNT = 0;
    REPEATED_AUTO_BET_AMOUNT_ONE     = 1;  // 1000
    REPEATED_AUTO_BET_AMOUNT_TWO     = 2;  // 5000
    REPEATED_AUTO_BET_AMOUNT_THREE   = 3;  // 20000
    REPEATED_AUTO_BET_AMOUNT_FOUR    = 4;  // 50000
    REPEATED_AUTO_BET_AMOUNT_FIVE    = 5;  // 200000
    REPEATED_AUTO_BET_AMOUNT_SIX     = 6;  // 500000
    REPEATED_AUTO_BET_AMOUNT_SEVEN   = 7;  // 1000000
}

// 自動下注的起始下注金幣（回本下注）
enum EarnItsCostAutoBetAmount {
    UNKNOWN_EARN_ITS_COST_BET_AMOUNT = 0;
    EARN_ITS_COST_BET_AMOUNT_ONE     = 1;  // 1000
    EARN_ITS_COST_BET_AMOUNT_TWO     = 2;  // 5000
    EARN_ITS_COST_BET_AMOUNT_THREE   = 3;  // 10000
    EARN_ITS_COST_BET_AMOUNT_FOUR    = 4;  // 20000
}

message BetReq {
    AreaType betAreaType = 1;
    uint64 betAmount     = 2;
}

message BetResp {
    repeated Bet bet = 1;
}
message Bet {
    AreaType betAreaType = 1;
    uint64 betAmount     = 2;
    uint64 totalAmount   = 3;
    uint64 userID        = 4;
}

message AutoBetReq {
    AutoBetAreaType autoBetAreaType                   = 1;
    AutoType autoType                                 = 2;
    ContinueCount continueCount                       = 3;
    RepeatedAutoBetAmount repeatedAutoBetAmount       = 4;
    EarnItsCostAutoBetAmount earnItsCostAutoBetAmount = 5;
    repeated AreaType betAreaType                     = 6;
}

message GetPlayerListResp {
    repeated PlayerInfo players = 1;
}
message GetDeskResp {
    DeskInfo deskInfo     = 1;
    PlayerInfo playerInfo = 2;
}

message DeskInfo {
    string roundID                          = 1;   // 局號
    TableStatus status                      = 2;   // 牌桌狀態
    int64 time                              = 3;   // 倒數秒數
    int64 roomLevel                         = 4;   // 房間的等級
    int64 roomType                          = 5;   // 房間類型
    uint64 greenAmount                      = 6;   // “綠” 押注區的總金額
    uint64 blueAmount                       = 7;   // “藍” 押注區的總金額
    uint64 purpleAmount                     = 8;   // “紫” 押注區的總金額
    uint64 yellowAmount                     = 9;   // “黃” 押注區的總金額
    uint64 redAmount                        = 10;  // “紅” 押注區的總金額
    repeated BetAreaLimit betAreaLimit      = 11;  // 各注區限額
    repeated WinLose winLoseLastTenRound    = 12;  // 過去十場的輸贏紀錄
    GameResult systemResult                 = 14;  // 系統結果
    map<int64, uint64> repeatedBetAmount    = 15;  // 自動重複下注的起始金幣，詳 `RepeatedAutoBetAmount`
    map<int64, uint64> earnItsCostBetAmount = 16;  // 自動回本下注的起始金幣，詳 `EarnItsCostAutoBetAmount`
    map<uint64, WinLoseAmounts> winLose     = 17;  // 不同押注區的輸贏
    int64 systemWinLose                     = 19;  // 系統輸贏
    GameResult startPoint                   = 20;  // 起始位置
    RouletteColors rouletteColors           = 21;  // 輪盤顏色資訊
}

message RouletteColors {
    repeated AreaType outer  = 1;
    repeated AreaType center = 2;
    repeated AreaType inner  = 3;
}

message GameResult {
    Position outer  = 1;
    Position center = 2;
    Position inner  = 3;
    uint64 odds     = 4;
}
message Position {
    AreaType color = 1;
    int32 position = 2;
}

message BetAreaLimit {
    AreaType area           = 1;  // 注區
    uint64 userLimitAmount  = 2;  // 個人押分限額
    uint64 totalLimitAmount = 3;  // 總押分限額
}

message WinLose {
    yesno.YesNo greenAmount  = 1;
    yesno.YesNo blueAmount   = 2;
    yesno.YesNo purpleAmount = 3;
    yesno.YesNo yellowAmount = 4;
    yesno.YesNo redAmount    = 5;
    uint64 odds              = 6;
}

message CountCoin {
    WinLose winLose                    = 1;
    map<uint64, WinLoseAmounts> amount = 2;  // 玩家在各個下注區的下注紀錄
    uint64 systemBalance               = 3;  // 系統餘額
    int64 totalWinLose                 = 4;  // 總輸贏
    uint64 selfBalance                 = 5;  // 玩家餘額
}

message WinLoseAmounts {
    repeated WinLoseAmount amount = 1;
}

message WinLoseAmount {
    int64 amount         = 1;
    AreaType betAreaType = 2;
    uint64 betAmount     = 3;
    int64 water          = 4;
}

message PlayerInfo {
    uint64 userID                   = 1;
    string nickname                 = 2;
    string imageURL                 = 3;
    uint64 vipLevel                 = 4;
    uint64 level                    = 5;
    uint64 balance                  = 6;
    uint64 roundCount               = 7;
    uint64 betGreenAmount           = 8;   // “綠” 注區總下注額
    uint64 betBlueAmount            = 9;   // “藍” 注區總下注額
    uint64 betPurpleAmount          = 10;  // “紫” 注區總下注額
    uint64 betYellowAmount          = 11;  // “黃” 注區總下注額
    uint64 betRedAmount             = 12;  // “紅” 注區總下注額
    AutoBetAreaType autoBetAreaType = 13;  // 自動下注區
    AutoType autoType               = 14;  // 自動下注模式
    int64 continueCount             = 15;  // 自動下注剩餘的局數
    uint64 autoBetAmount            = 16;  // 自動下注數量
    uint64 nowBetCount              = 17;
    repeated AreaType betAreaType   = 18;
    yesno.YesNo isAutoBet           = 19;  // 是否為自動下注
    int64 totalWinLose              = 20;  // 總輸贏
}
