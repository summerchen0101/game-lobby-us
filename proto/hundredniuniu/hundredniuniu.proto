syntax = "proto3";
package hundredniuniu;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/hundredniuniu";

import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";

enum NiuType {
    PING_PONG        = 0;
    JOIN_ROOM        = 1;
    USER_KICK_BEFORE = 2;
    SERVER_UPDATE    = 3;

    LEAVE         = 11;  //204
    GET_DESK      = 12;  //返回DeskResp
    BET           = 13;  //返回BetResp  廣播
    AUTO_BET      = 14;  //推PlayerInfo
    STOP_AUTO_BET = 17;  //204

    JACK_DEALER_QUEUE   = 15;  //返回DeskInfo  廣播
    CANCEL_DEALER_QUEUE = 18;  //返回DeskInfo  廣播
    GET_PLAYER_LIST     = 16;  //GetPlayerListResp

    CHANGE_DEALER_PUSH      = 20;  //推DeskInfo   只有下莊才會推
    DEAL_FINISH_PUSH        = 21;  //推DeskInfo
    START_BET_PUSH          = 22;  //推DeskInfo
    BET_RANK_PUSH           = 23;  //推DeskInfo
    OPEN_CARD_PUSH          = 26;
    COUNT_COIN_PUSH         = 24;  //推CountCoin
    PLAYER_KICK_PUSH        = 25;  //only you 204
    PLAYER_PUSH             = 27;  //only you 推PlayerInfo
    JACK_POT_PUSH           = 29;
    WAITING_FOR_DEALER_PUSH = 28;
    ROOM_CLOSE              = 30;
}

message JackPotPush {
    PlayerInfo players = 1;
    uint64 Amount      = 2;
}

enum BetType {
    UNKNOWN_BET_TYPE = 0;
    BIG              = 1;
    HEAD             = 2;
    HOME             = 3;
}

enum TableStatus {
    UNKNOWN_TABLE_STATUS = 0;
    IDLE_TIME            = 1;
    CHANGE_DEALER        = 2;
    DEAL_TIME            = 5;
    BET_TIME             = 3;
    OPEN_CARD_TIME       = 6;
    COUNT_COIN           = 4;
    DEALER_NOT_JOIN      = 7;
}

enum CardType {
    UNKNOWN_CARD_TYPE = 0;
    FIVE_SMALL_NIU    = 19;
    STRAIGHT_FLUSH    = 18;
    FOUR_OF_A_KING    = 17;
    FULL_HOUSE        = 16;
    FLUSH             = 15;
    FIVE_FLOWER_NIU   = 14;
    FOUR_FLOWER_NIU   = 13;
    STRAIGHT          = 12;
    NIU_NIU           = 11;
    NIU_NINE          = 10;
    NIU_EIGHT         = 9;
    NIU_SEVEN         = 8;
    NIU_SIX           = 7;
    NIU_FIVE          = 6;
    NIU_FOUR          = 5;
    NIU_THREE         = 4;
    NIU_TWO           = 3;
    NIU_ONE           = 2;
    NO_NIU            = 1;
}

enum AutoBetType {
    UNKNOWN_AUTO_BET_TYPE = 0;
    FIXED                 = 1;
    POLLING               = 2;
}

enum RepeatedAutoBetAmount {
    UNKNOWN_REPEATED_AUTO_BET_AMOUNT = 0;
    REPEATED_AUTO_BET_AMOUNT_ONE     = 1;
    REPEATED_AUTO_BET_AMOUNT_TWO     = 2;
    REPEATED_AUTO_BET_AMOUNT_THREE   = 3;
    REPEATED_AUTO_BET_AMOUNT_FOUR    = 4;
    REPEATED_AUTO_BET_AMOUNT_FIVE    = 5;
    REPEATED_AUTO_BET_AMOUNT_SIX     = 6;
    REPEATED_AUTO_BET_AMOUNT_SEVEN   = 7;
    REPEATED_AUTO_BET_AMOUNT_EIGHT   = 8;
}

enum EarnItsCostAutoBetAmount {
    UNKNOWN_EARN_ITS_COST_BET_AMOUNT = 0;
    EARN_ITS_COST_BET_AMOUNT_ONE     = 1;
    EARN_ITS_COST_BET_AMOUNT_TWO     = 2;
    EARN_ITS_COST_BET_AMOUNT_THREE   = 3;
    EARN_ITS_COST_BET_AMOUNT_FOUR    = 4;
    EARN_ITS_COST_BET_AMOUNT_FIVE    = 5;
    EARN_ITS_COST_BET_AMOUNT_SIX     = 6;
    EARN_ITS_COST_BET_AMOUNT_SEVEN   = 7;
    EARN_ITS_COST_BET_AMOUNT_EIGHT   = 8;
}

enum AutoType {
    UNKNOWN_AUTO_TYPE = 0;
    REPEATED          = 1;
    EARN_ITS_COST     = 2;
}

enum ContinueCount {
    UNKNOWN_CONTINUE_COUNT = 0;
    CONTINUE_ONE           = 1;
    CONTINUE_TWO           = 2;
    CONTINUE_THREE         = 3;
    CONTINUE_FOUR          = 4;
    CONTINUE_FIVE          = 5;
    CONTINUE_SIX           = 6;
}

enum JackDealerCount {
    UNKNOWN_JACK_DEALER_COUNT = 0;
    JACK_ONE                  = 1;
    JACK_TWO                  = 2;
    JACK_THREE                = 3;
    JACK_FOUR                 = 4;
    JACK_FIVE                 = 5;
    JACK_SIX                  = 6;
}

message BetReq {
    BetType betType  = 1;
    uint64 betAmount = 2;
}

message BetResp {
    repeated Bet bet = 1;
}

message Bet {
    BetType betType    = 1;
    uint64 betAmount   = 2;
    uint64 totalAmount = 3;
    uint64 userID      = 4;
}

message AutoBetReq {
    AutoBetType autoBetType                           = 1;
    AutoType autoType                                 = 2;
    ContinueCount continueCount                       = 3;
    RepeatedAutoBetAmount repeatedAutoBetAmount       = 4;
    EarnItsCostAutoBetAmount earnItsCostAutoBetAmount = 5;
    repeated BetType betType                          = 6;
}

message GetPlayerListResp {
    repeated PlayerInfo players = 1;
}
message GetDeskResp {
    DeskInfo deskInfo     = 1;
    PlayerInfo playerInfo = 2;
}

message JackDealerQueueReq {
    JackDealerCount jackDealerCount = 1;
    uint64 amount                   = 2;
}

message DeskInfo {
    string roundID                                    = 1;
    PlayerInfo dealer                                 = 2;
    TableStatus status                                = 3;
    int64 time                                        = 4;
    int64 roomLevel                                   = 5;
    repeated PlayerInfo betRank                       = 6;
    repeated PlayerInfo dealerWaitingQueue            = 7;
    yesno.YesNo isSystem                              = 19;
    uint64 bigAmount                                  = 8;
    uint64 headAmount                                 = 9;
    uint64 homeAmount                                 = 10;
    repeated WinLose winLoseLastTenRound              = 11;
    repeated MotherCardHistory motherCardLastTenRound = 21;
    CardInfo dealerCard                               = 12;
    CardInfo bigCard                                  = 13;
    CardInfo headCard                                 = 14;
    CardInfo homeCard                                 = 15;
    uint64 startPoint                                 = 26;
    repeated MotherCard motherCard                    = 16;
    map<int64, uint64> repeatedBetAmount              = 17;
    map<int64, uint64> earnItsCostBetAmount           = 18;
    uint64 dealerJackLessAmount                       = 20;
    map<uint64, WinLoseAmounts> winLose               = 23;
    uint64 maxBetAmount                               = 22;
    int64 dealerWinLose                               = 24;
    int64 dealerWater                                 = 25;
}

message MotherCard {
    repeated Card card = 1;
}

message MotherCardHistory {
    repeated Card motherCard = 1;
    uint64 startPoint        = 3;
    string roundID           = 2;
}

message WinLose {
    yesno.YesNo bigAmount  = 1;
    yesno.YesNo headAmount = 2;
    yesno.YesNo homeAmount = 3;
}

message CountCoin {
    WinLose winLose                    = 1;
    map<uint64, WinLoseAmounts> amount = 2;
    uint64 dealerBalance               = 3;
    int64 totalWinLose                 = 6;
    repeated uint64 rankBalance        = 4;
    uint64 selfBalance                 = 5;
}

message WinLoseAmounts {
    repeated WinLoseAmount amount = 1;
}

message WinLoseAmount {
    int64 amount     = 1;
    BetType betType  = 2;
    uint64 betAmount = 3;
    int64 water      = 4;
}

message DealerAmount {
    int64 amount = 1;
    uint64 water = 2;
}

message PlayerInfo {
    uint64 userID            = 1;
    string nickname          = 2;
    string imageURL          = 3;
    uint64 vipLevel          = 4;
    uint64 level             = 5;
    uint64 balance           = 6;
    uint64 betBigAmount      = 8;
    uint64 betHeadAmount     = 9;
    uint64 betHomeAmount     = 10;
    uint64 roundCount        = 7;
    AutoBetType autoBetType  = 11;
    AutoType AutoType        = 12;
    int64 continueCount      = 13;
    uint64 NowBetCount       = 15;
    uint64 AutoBetAmount     = 14;
    uint64 DealerCount       = 16;
    repeated BetType betType = 17;
    yesno.YesNo isAutoBet    = 18;
    int64 totalWinLose       = 19;
}

message CardInfo {
    repeated Card cards     = 1;
    CardType cardType       = 2;
    repeated int64 niuSlice = 4;
    uint64 cardMultiple     = 3;
}

message Card {
    int64 card        = 1;
    string originCode = 2;
    string hashCode   = 3;
}

message Action {
    uint64 userID    = 1;
    string requestID = 2;
    NiuType action   = 3;
}

// RoomCondition 湊房條件
message RoomCondition {
    uint64 roundCount          = 1;
    uint64 roomLevel           = 2;
    yesno.YesNo needAutoDealer = 3;
}
