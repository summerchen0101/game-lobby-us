syntax = "proto3";
package hundredpaigow;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/hundredpaigow";

import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";

enum PaigowType {
    PING_PONG        = 0;
    JOIN_ROOM        = 1;
    USER_KICK_BEFORE = 2;
    SERVER_UPDATE    = 3;

    LEAVE         = 11;  //204
    GET_DESK      = 12;  //返回DeskResp
    BET           = 13;  //返回BetResp  廣播
    AUTO_BET      = 14;  //推PlayerInfo
    STOP_AUTO_BET = 17;  //204

    JACK_DEALER_QUEUE   = 15;  //返回DeskInfo  廣播
    CANCEL_DEALER_QUEUE = 18;  //返回DeskInfo  廣播
    GET_PLAYER_LIST     = 16;  //GetPlayerListResp

    CHANGE_DEALER_PUSH      = 20;  //推DeskInfo   只有下莊才會推
    DEAL_FINISH_PUSH        = 21;  //推DeskInfo
    START_BET_PUSH          = 22;  //推DeskInfo
    BET_RANK_PUSH           = 23;  //推DeskInfo
    OPEN_CARD_PUSH          = 26;  //推DeskInfo
    COUNT_COIN_PUSH         = 24;  //推CountCoin
    PLAYER_KICK_PUSH        = 25;  //only you 204
    PLAYER_PUSH             = 27;  //only you 推PlayerInfo
    WAITING_FOR_DEALER_PUSH = 28;
    ROOM_CLOSE              = 30;

    // SPECIAL_CARD_PUSH
    // 牌為特殊卡牌時推送(如：雙天至尊)，data 會帶 SpecialCardInfo
    SPECIAL_CARD_PUSH       = 31;

    // 百人活動 Jackpot
    JACK_POT_PUSH           = 32;
}

// 下注區
enum BetArea {
    BET_AREA_UNKNOWN = 0;
    BIG              = 1;
    HEAD             = 2;
    HOME             = 3;
}

enum TableStatus {
    TABLE_STATUS_UNKNOWN = 0;
    IDLE_TIME            = 1;
    CHANGE_DEALER        = 2;
    DEAL_TIME            = 5;
    BET_TIME             = 3;
    OPEN_CARD_TIME       = 6;
    COUNT_COIN           = 4;
    DEALER_NOT_JOIN      = 7;
}

// 單張卡牌類型
enum CardType {
    CARD_TYPE_UNKNOWN = 0;
    R6_W6 = 1;   // 天牌 (紅6點，白6點)
    R2 = 2;      // 地牌 (紅2點)
    R8 = 3;      // 人牌 (紅8點)
    R1_W3 = 4;   // 衙/和 (紅1點，白4點)
    W10 = 5;     // 梅花/板十 (白10點)
    W6 = 6;      // 長三/板六 (白6點)
    W4 = 7;      // 板凳/板四 (白4點)
    W11 = 8;     // 斧頭/草十一 (白11點)
    R4W6 = 9;    // 紅頭十/草十 (紅4點，白6點)
    R1W6 = 10;   // 高腳七/草七 (紅1點，白6點)
    R1W5 = 11;   // 伶冧六/草六 (紅1點，白5點)
    R4W5 = 12;   // 武九/無名九 (紅4點，白5點)
    W9 = 13;     // 武九/無名九 (白9點)
    W3W5 = 14;   // 武八/無名八 (白3+5點)
    W2W6 = 15;   // 武八/無名八 (白2+6點)
    R4W3 = 16;   // 武七/無名七 (紅4點，白3點)
    W7 = 17;     // 武七/無名七 (白7點)
    R5 = 18;     // 武五/無名五 (紅5點)
    W5 = 19;     // 武五/無名五 (白5點)
    R4W2 = 20;   // 大頭六 (紅4點，白2點)
    R1W2 = 21;   // 三雞 (紅1點，白2點)
}

// 組合卡牌類型
enum CardPairType {
    CARD_PAIR_UNKNOWN = 0;
    EMPEROR = 1;              // 皇帝 (三雞+大頭六)
    SKY = 2;                  // 天對 (天＋天)
    GROUND = 3;               // 地對 (地＋地)
    PEOPLE = 4;               // 人對 (人＋人)
    YA = 5;                   // 衙對 (衙＋衙)
    BOARD_TEN = 6;            // 板十對 (板十＋板十)
    BOARD_SIX = 7;            // 板六對 (板六＋板六)
    BOARD_FOUR = 8;           // 板四對 (板四＋板四)
    GRASS_ELEVEN = 9;         // 草十一對 (草十一＋草十一)
    GRASS_TEN = 10;           // 草十對 (草十＋草十)
    GRASS_SEVEN = 11;         // 草七對 (草七＋草七)
    GRASS_SIX = 12;           // 草六對 (草六＋草六)
    ANONYMOUS_NINE = 13;      // 無名九對 (無名九＋無名九)
    ANONYMOUS_EIGHT = 14;     // 無名八對 (無名八＋無名八)
    ANONYMOUS_SEVEN = 15;     // 無名七對 (無名七＋無名七)
    ANONYMOUS_FIVE = 16;      // 無名五對 (無名五＋無名五)
    SKY_ANONYMOUS_NINE = 17;  // 天九皇 (天＋無名九)
    SKY_ANY_EIGHT = 18;       // 天冠 (天＋人 or 天＋無名八)
    GROUND_ANY_EIGHT = 19;    // 地冠 (地＋人 or 地＋無名八)
    SKY_ANY_SEVEN = 20;       // 天九 (地＋草七 or 地＋無名七)
    GROUND_ANY_SEVEN = 21;    // 地九 (地＋草七 or 地＋無名七)
    PEOPLE_GRASS_ELEVEN = 22; // 人九 (人＋草十一)
    YA_ANONYMOUS_FIVE = 23;   // 衙九 (衙＋無名五)
    BOARD_NINE = 24;          // 板九 (板十＋無名九 or 板六＋三雞 or 板四＋無名五)
}

// 自動下注位置模式
enum AutoBetAreaType {
    AUTO_BET_AREA_UNKNOWN = 0;
    FIXED                 = 1; // 固定 (每次都下注在同一個位置)
    POLLING               = 2; // 輪換 (依照固定規律更換下注位置)
}

// 自動下注模式
enum AutoBetType {
    AUTO_TYPE_UNKNOWN = 0;
    REPEATED      = 1; // 重複下注
    EARN_ITS_COST = 2; // 加碼下注
}

message BetReq {
    BetArea betArea  = 1; // 下注區
    uint64 betAmount = 2; // 下注額
}

message BetResp {
    repeated Bet bet = 1;
}

message Bet {
    uint64  userID            = 1; // 用戶ID
    BetArea betArea           = 2; // 下注區
    uint64 betAmount          = 3; // 下注額
    uint64 areaTotalBetAmount = 4; // 押注區總下注額
}

// AutoBetReq 自動下注請求
message AutoBetReq {
    AutoBetAreaType autoBetAreaType  = 1; // 自動下注位置模式 ex: 固定、輪換
    repeated BetArea betAreas        = 2; // 自動下注位置模式為固定時，可多選押注區
    uint32 autoBetRoundCount         = 3; // 自動下注局數
    AutoBetType autoBetType          = 4; // 自動下注模式
    uint64 startingBetAmount         = 5; // 起始下注金額
}

message GetPlayerListResp {
    repeated PlayerInfo players = 1;
}

message GetDeskResp {
    DeskInfo deskInfo     = 1;
    PlayerInfo playerInfo = 2;
}

message JackDealerQueueReq {
    uint32 dealerCount     = 1; // 上莊局數
    bool isAutoDealerQueue = 2; // 下莊後自動排莊
}

message DeskInfo {
    string roundID                                    = 1;  // 局號
    PlayerInfo dealer                                 = 2;  // 莊家
    TableStatus status                                = 3;  // 牌桌狀態
    int64 betTime                                     = 4;  // 下注時間
    int64 roomLevel                                   = 5;
    repeated PlayerInfo betRank                       = 6;  // 押注排名
    repeated PlayerInfo dealerWaitingQueue            = 7;  // 牌莊等候列表
    yesno.YesNo isSystem                              = 8;
    uint64 bigAmount                                  = 9;  // 下注押住區(出)總金額
    uint64 headAmount                                 = 10; // 下注押住區(川)總金額
    uint64 homeAmount                                 = 11; // 下注押住區(尾)總金額
    repeated WinLose winLoseLastTenRound              = 12; // 近 10 局押注區輸贏紀錄
    repeated MotherCardHistory motherCardLastTenRound = 13;
    CardInfo dealerCard                               = 14; // 莊家牌面
    CardInfo bigCard                                  = 15; // 押住區(出)牌面
    CardInfo headCard                                 = 16; // 押住區(川)牌面
    CardInfo homeCard                                 = 17; // 押住區(尾)牌面
    uint64 startPoint                                 = 18; // 發牌起始位置
    repeated MotherCard motherCard                    = 19; // 母牌
    repeated uint64 repeatedBetAmountList             = 20; // 起始下注(重複)金幣列表
    repeated uint64 earnItsCostBetAmountList          = 21; // 起始下注(回本)金幣列表
    uint64 dealerJackLessAmount                       = 22; // 莊家最少預扣保證金
    map<uint64, WinLoseAmounts> userWinLosesMap       = 23;
    uint64 maxBetAmount                               = 24;
    int64 dealerWinLose                               = 25;
    int64 dealerWater                                 = 26;
}

message MotherCard {
    repeated Card card = 1;
}

message MotherCardHistory {
    repeated Card motherCard = 1;
    uint64 startPoint        = 2;
    string roundID           = 3;
}

message WinLose {
    GameResult bigAmount  = 1;
    GameResult headAmount = 2;
    GameResult homeAmount = 3;
}

message CountCoin {
    WinLose winLose                             = 1;
    map<uint64, WinLoseAmounts> userWinLosesMap = 2;
    uint64 dealerBalance                        = 3;
    int64 totalWinLose                          = 4;
    repeated uint64 rankBalance                 = 5;
    uint64 selfBalance                          = 6;
}

message WinLoseAmounts {
    repeated WinLoseAmount amount = 1;
}

message WinLoseAmount {
    int64 amount     = 1;
    BetArea betArea  = 2;
    uint64 betAmount = 3;
    int64 water      = 4;
}

message DealerAmount {
    int64 amount = 1;
    uint64 water = 2;
}

message PlayerInfo {
    uint64 userID                   = 1;
    string nickname                 = 2;
    string imageURL                 = 3;
    uint64 vipLevel                 = 4;
    uint64 level                    = 5;
    uint64 balance                  = 6;
    uint64 betBigAmount             = 7;  // 下注押住區(出)總金額
    uint64 betHeadAmount            = 8;  // 下注押住區(川)總金額
    uint64 betHomeAmount            = 9;  // 下注押住區(尾)總金額
    uint64 remainDealerRoundCount   = 10; // 剩餘上莊局數
    yesno.YesNo isAutoBet           = 11; // 是否為自動下注
    AutoBetAreaType autoBetAreaType = 12; // 自動下注位置模式
    AutoBetType autoBetType         = 13; // 自動下注模式
    repeated BetArea betAreas       = 14; // 押注區
    int64 remainAutoBetRoundCount   = 15; // 剩餘自動下注局數
    uint64 autoBetAmount            = 16; // 自動下注金額
    int64 totalWinLose              = 17; // 得分
}

message CardInfo {
    PairCard bigPairCard       = 1; // 大牌
    PairCard smallPairCard     = 2; // 小牌
    repeated Card cards        = 3; // 全部牌(未排序)
}

message PairCard {
    repeated Card cards   = 1;
    CardPairType cardType = 2; // 對牌
    uint32 cardPoint      = 3; // 點數
    GameResult winLose    = 4; // 跟莊家牌比的輸贏 (莊家時 value 為 Unknown)
}

message Card {
    CardType card     = 1;
    string originCode = 2;
    string hashCode   = 3;
}

// RoomCondition 湊房條件
message RoomCondition {
    uint64 roundCount          = 1;
    uint64 roomLevel           = 2;
    yesno.YesNo needAutoDealer = 3;
}

enum GameResult {
    WIN_LOSE_RESULT_UNKNOWN = 0;
    WIN  = 1; // 贏
    LOSE = 2; // 輸
    TIE  = 3; // 和局
}

enum SpecialCard {
    SPECIAL_CARD_UNKNOWN = 0;
    EMPEROR_SKY = 1; // 雙天至尊
}

message SpecialCardInfo {
    BetArea betArea = 1;         // 下注區
    SpecialCard specialCard = 2; // 特殊卡牌
    bool isDealer = 3;           // 莊家得到特殊牌
}

message JackPotPush {
    PlayerInfo players = 1;
    uint64 Amount      = 2;
}
