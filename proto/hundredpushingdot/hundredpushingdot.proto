syntax = "proto3";
package hundredpushingdot;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/hundredpushingdot";

import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";

enum PushingDotType {
    PING_PONG = 0;

    // [RPC]
    JOIN_ROOM        = 1;  // 返回 DeskResp（加入牌桌）
    USER_KICK_BEFORE = 2;
    SERVER_UPDATE    = 3;

    LEAVE         = 11;  // 204              (離開牌桌)
    GET_DESK      = 12;  // 返回 DeskResp     (取得牌桌資訊）
    BET           = 13;  // 返回 BetResp 廣播  (下注）
    AUTO_BET      = 14;  // 推送 PlayerInfo   (自動下注）
    STOP_AUTO_BET = 15;  // 204              (停止自動下注)

    JACK_DEALER_QUEUE   = 16;  // 返回 DeskInfo 廣播 (排莊）
    CANCEL_DEALER_QUEUE = 17;  // 返回 DeskInfo 廣播 (取消排莊)
    GET_PLAYER_LIST     = 18;  // 返回 PlayerInfo   (取得玩家列表)

    // [Push]
    CHANGE_DEALER_PUSH      = 20;  // 推送 DeskInfo     (只有下莊才會推)
    DEAL_FINISH_PUSH        = 21;  // 推送 DeskInfo     (由骰子結果獲取發牌順序)
    START_BET_PUSH          = 22;  // 推送 DeskInfo     (開始下注)
    BET_RANK_PUSH           = 23;  // 推送 DeskInfo     (更新押注排名)
    OPEN_CARD_PUSH          = 26;  // 推送 DeskInfo     (開牌)
    COUNT_COIN_PUSH         = 24;  // 推送 CountCoin    (計算賠率結束)
    PLAYER_KICK_PUSH        = 25;  // 204               (將玩家踢出牌桌）
    PLAYER_PUSH             = 27;  // 推送 PlayerInfo   （計算賠率時）
    WAITING_FOR_DEALER_PUSH = 28;  // 204               (私房等待玩家上莊)
    JACK_POT_PUSH           = 29;
    ROOM_CLOSE              = 30;  // 204               (牌桌關閉)
}

message JackPotPush {
    PlayerInfo players = 1;
    uint64 Amount      = 2;
}

// 下注區
enum BetAreaType {
    UNKNOWN_BET_AREA_TYPE = 0;
    BIG                   = 1;
    HEAD                  = 2;
    HOME                  = 3;
}

// 開牌區
enum OpenCardAreaType {
    UNKNOWN_AREA_TYPE = 0;
    DealerArea        = 1;
    BIGArea           = 2;
    HEADArea          = 3;
    HOMEArea          = 4;
}

// 牌桌狀態
enum TableStatus {
    UNKNOWN_TABLE_STATUS = 0;
    IDLE_TIME            = 1;
    CHANGE_DEALER        = 2;
    DEAL_TIME            = 3;
    BET_TIME             = 5;
    OPEN_CARD_TIME       = 6;
    COUNT_COIN           = 7;
    DEALER_NOT_JOIN      = 8;
}

// 麻將牌類型
enum TileType {
    UNKNOWN_TILE_TYPE = 0;
    DOTS_1            = 1;  // 1筒
    DOTS_2            = 2;  // 2筒
    DOTS_3            = 3;  // 3筒
    DOTS_4            = 4;  // 4筒
    DOTS_5            = 5;  // 5筒
    DOTS_6            = 6;  // 6筒
    DOTS_7            = 7;  // 7筒
    DOTS_8            = 8;  // 8筒
    DOTS_9            = 9;  // 9筒

    DRAGONS_WHITE = 37;  // 白板
}

// 牌型
enum CardType {
    UNKNOWN_CARD_TYPE = 0;
    WHITE_PAIR        = 30;  // 白皮對
    NINE_PAIR         = 29;  // 9對
    EIGHT_PAIR        = 28;  // 8對
    SEVEN_PAIR        = 27;  // 7對
    SIX_PAIR          = 26;  // 6對
    FIVE_PAIR         = 25;  // 5對
    FOUR_PAIR         = 24;  // 4對
    THREE_PAIR        = 23;  // 3對
    TWO_PAIR          = 22;  // 2對
    ONE_PAIR          = 21;  // 1對
    TWO_EIGHT         = 20;  // 二八槓
    NINE_HALF         = 19;  // 9點半
    NINE              = 18;  // 9點
    EIGHT_HALF        = 17;  // 8點半
    EIGHT             = 16;  // 8點
    SEVEN_HALF        = 15;  // 7點半
    SEVEN             = 14;  // 7點
    SIX_HALF          = 13;  // 6點半
    SIX               = 12;  // 6點
    FIVE_HALF         = 11;  // 5點半
    FIVE              = 10;  // 5點
    FOUR_HALF         = 9;   // 4點半
    FOUR              = 8;   // 4點
    THREE_HALF        = 7;   // 3點半
    THREE             = 6;   // 3點
    TWO_HALF          = 5;   // 2點半
    TWO               = 4;   // 2點
    ONE_HALF          = 3;   // 1點半
    ONE               = 2;   // 1點
    ZERO              = 1;   // 鱉十
}

// 自動下注位置
enum AutoBetAreaType {
    UNKNOWN_AUTO_BET_TYPE = 0;
    FIXED                 = 1;
    POLLING               = 2;
}

// 自動下注模式
enum AutoType {
    UNKNOWN_AUTO_TYPE = 0;
    REPEATED          = 1;
    EARN_ITS_COST     = 2;
}

// 自動下注局數
enum ContinueCount {
    UNKNOWN_CONTINUE_COUNT = 0;
    Continue_ONE           = 1;  // 10
    Continue_TWO           = 2;  // 25
    Continue_THREE         = 3;  // 50
    Continue_FOUR          = 4;  // 100
    Continue_FIVE          = 5;  // 500
    Continue_SIX           = 6;  // 3000
}

// 自動下注的起始下注金幣（重複下注）
enum RepeatedAutoBetAmount {
    UNKNOWN_REPEATED_AUTO_BET_AMOUNT = 0;
    REPEATED_AUTO_BET_AMOUNT_ONE     = 1;  // 1000
    REPEATED_AUTO_BET_AMOUNT_TWO     = 2;  // 5000
    REPEATED_AUTO_BET_AMOUNT_THREE   = 3;  // 10000
    REPEATED_AUTO_BET_AMOUNT_FOUR    = 4;  // 50000
    REPEATED_AUTO_BET_AMOUNT_FIVE    = 5;  // 100000
    REPEATED_AUTO_BET_AMOUNT_SIX     = 6;  // 200000
    REPEATED_AUTO_BET_AMOUNT_SEVEN   = 7;  // 300000
}

// 自動下注的起始下注金幣（回本下注）
enum EarnItsCostAutoBetAmount {
    UNKNOWN_EARN_ITS_COST_BET_AMOUNT = 0;
    EARN_ITS_COST_BET_AMOUNT_ONE     = 1;  // 1000
    EARN_ITS_COST_BET_AMOUNT_TWO     = 2;  // 2000
    EARN_ITS_COST_BET_AMOUNT_THREE   = 3;  // 3000
    EARN_ITS_COST_BET_AMOUNT_FOUR    = 4;  // 4000
    EARN_ITS_COST_BET_AMOUNT_FIVE    = 5;  // 5000
    EARN_ITS_COST_BET_AMOUNT_SIX     = 6;  // 10000
    EARN_ITS_COST_BET_AMOUNT_SEVEN   = 7;  // 20000
}

// 上莊局數
enum JackDealerCount {
    UNKNOWN_JACK_DEALER_COUNT = 0;
    JACK_ONE                  = 1;
    JACK_TWO                  = 2;
    JACK_THREE                = 3;
    JACK_FOUR                 = 4;
    JACK_FIVE                 = 5;
    JACK_SIX                  = 6;
}
/*
一般桌/尊榮桌上莊局數：
1: 5,
2: 10,
3: 15,
4: 20,
5: 25,

密碼房上桌局數：
1: 10,
2: 20,
3: 30,
4: 40,
5: 50,
*/

message BetReq {
    BetAreaType betAreaType = 1;
    uint64 betAmount        = 2;
}

message BetResp {
    repeated Bet bet = 1;
}
message Bet {
    BetAreaType betAreaType = 1;
    uint64 betAmount        = 2;
    uint64 totalAmount      = 3;
    uint64 userID           = 4;
}

message AutoBetReq {
    AutoBetAreaType autoBetAreaType                   = 1;
    AutoType autoType                                 = 2;
    ContinueCount continueCount                       = 3;
    RepeatedAutoBetAmount repeatedAutoBetAmount       = 4;
    EarnItsCostAutoBetAmount earnItsCostAutoBetAmount = 5;
    repeated BetAreaType betAreaType                  = 6;
}

message GetPlayerListResp {
    repeated PlayerInfo players = 1;
}
message GetDeskResp {
    DeskInfo deskInfo     = 1;
    PlayerInfo playerInfo = 2;
}

message JackDealerQueueReq {
    JackDealerCount jackDealerCount = 1;
    uint64 amount                   = 2;
}

message DeskInfo {
    string roundID                                    = 1;   // 局號
    PlayerInfo dealer                                 = 2;   // 莊家資訊
    TableStatus status                                = 3;   // 牌桌狀態
    int64 time                                        = 4;   // 倒數秒數
    int64 roomLevel                                   = 5;   // 房間的等級
    int64 roomType                                    = 27;  // 房間類型
    repeated PlayerInfo betRank                       = 6;   // 押注排名
    repeated PlayerInfo dealerWaitingQueue            = 7;   // 排莊列表
    uint64 bigAmount                                  = 8;   // “大” 押注區的總金額
    uint64 headAmount                                 = 9;   // “頭” 押注區的總金額
    uint64 homeAmount                                 = 10;  // “家” 押注區的總金額
    repeated WinLose winLoseLastTenRound              = 11;  // 過去十場的輸贏紀錄
    repeated MotherCardHistory motherCardLastTenRound = 21;  // 過去十場的開牌紀錄
    CardInfo dealerCard                               = 12;  // 莊家的牌
    CardInfo bigCard                                  = 13;  // “大” 押注區的牌
    CardInfo headCard                                 = 14;  // “頭” 押注區的牌
    CardInfo homeCard                                 = 15;  // “家” 押注區的牌
    repeated MotherCard motherCard                    = 16;  // 當局的牌
    map<int64, uint64> repeatedBetAmount              = 17;  // 自動重複下注的起始金幣，詳 `RepeatedAutoBetAmount`
    map<int64, uint64> earnItsCostBetAmount           = 18;  // 自動回本下注的起始金幣，詳 `EarnItsCostAutoBetAmount`
    yesno.YesNo isSystem                              = 19;  // 莊家是否為機器人
    uint64 dealerJackLessAmount                       = 20;  // 排莊保證金標準
    map<uint64, WinLoseAmounts> winLose               = 23;  // 不同押注區的輸贏
    uint64 maxBetAmount                               = 30;  // 總押分上限
    uint64 maxSingleAreaBetAmount                     = 22;  // 單個押注區的押分上限
    int64 dealerWinLose                               = 24;  // 莊家輸贏
    int64 dealerWater                                 = 25;  // 莊家抽水
    map<int32, uint32> remainingCards                 = 28;  // 麻將牌剩餘的數量
    uint64 startPoint                                 = 29;  // 發牌順序
}

message MotherCard {
    repeated Card card = 1;
}

message MotherCardHistory {
    repeated Card motherCard = 1;
    string roundID           = 2;
    uint64 startPoint        = 3;
    int32 roundCount         = 4;
}

// 比賽結果
enum GameResult {
    UNKNOWN_DEALER_RESULT = 0;
    PLAYER_WIN            = 1;
    PLAYER_LOSE           = 2;
    PLAYER_TIE            = 3;
}

message WinLose {
    GameResult bigAmount  = 1;
    GameResult headAmount = 2;
    GameResult homeAmount = 3;
}

message CountCoin {
    WinLose winLose                    = 1;
    map<uint64, WinLoseAmounts> amount = 2;  // Player 在各個下注區的下注紀錄
    uint64 dealerBalance               = 3;
    int64 totalWinLose                 = 6;
    repeated uint64 rankBalance        = 4;
    uint64 selfBalance                 = 5;
}

message WinLoseAmounts {
    repeated WinLoseAmount amount = 1;
}

message WinLoseAmount {
    int64 amount            = 1;
    BetAreaType betAreaType = 2;
    uint64 betAmount        = 3;
    int64 water             = 4;
}

message DealerAmount {
    int64 amount = 1;
    uint64 water = 2;
}

message PlayerInfo {
    uint64 userID                    = 1;
    string nickname                  = 2;
    string imageURL                  = 3;
    uint64 vipLevel                  = 4;
    uint64 level                     = 5;
    uint64 balance                   = 6;
    uint64 roundCount                = 7;
    uint64 betBigAmount              = 8;
    uint64 betHeadAmount             = 9;
    uint64 betHomeAmount             = 10;
    AutoBetAreaType autoBetAreaType  = 11;
    AutoType autoType                = 12;
    int64 continueCount              = 13;  // 自動下注剩餘的局數
    uint64 nowBetCount               = 14;
    uint64 autoBetAmount             = 15;
    uint64 dealerCount               = 16;  // 上莊局數
    repeated BetAreaType betAreaType = 17;
    yesno.YesNo isAutoBet            = 18;  // 是否為自動下注
    int64 totalWinLose               = 19;
}

message CardInfo {
    repeated Card cards            = 1;
    CardType cardType              = 2;
    repeated int64 pushingDotSlice = 4;
    uint64 cardMultiple            = 3;
}

message Card {
    int64 card                        = 1;
    string originCode                 = 2;
    string hashCode                   = 3;
    OpenCardAreaType openCardAreaType = 4;  // 開牌區
    string roundID                    = 5;  // 局號
}

message Action {
    uint64 userID         = 1;
    string requestID      = 2;
    PushingDotType action = 3;
}

// RoomCondition 湊房條件
message RoomCondition {
    uint64 roundCount          = 1;
    uint64 roomLevel           = 2;
    yesno.YesNo needAutoDealer = 3;
}
