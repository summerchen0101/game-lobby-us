syntax = "proto3";
package hundredshootinggantry;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/hundredshootinggantry";

import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";

enum ShootingGantryType {
    PING_PONG = 0;

    // [RPC]
    JOIN_ROOM = 1;  // 返回 DeskResp（加入牌桌）

    LEAVE               = 11;  // 204              (離開牌桌)
    GET_DESK            = 12;  // 返回 DeskResp     (取得牌桌資訊）
    BET                 = 13;  // 返回 BetResp 廣播  (下注）
    AUTO_BET            = 14;  // 返回 PlayerInfo   (自動下注）
    STOP_AUTO_BET       = 15;  // 204              (停止自動下注)
    JACK_DEALER_QUEUE   = 16;  // 返回 DeskInfo 廣播 (排莊）
    CANCEL_DEALER_QUEUE = 17;  // 返回 DeskInfo 廣播 (取消排莊)
    GET_PLAYER_LIST     = 18;  // 返回 PlayerInfo   (取得玩家列表)

    // [Push]
    CHANGE_DEALER_PUSH      = 20;  // 推送 DeskInfo     (只有下莊才會推)
    DEAL_FINISH_PUSH        = 21;  // 推送 DeskInfo     (獲得柱的兩張牌)
    START_BET_PUSH          = 22;  // 推送 DeskInfo     (開始下注)
    BET_RANK_PUSH           = 23;  // 推送 DeskInfo     (更新押注排名)
    OPEN_CARD_PUSH          = 24;  // 推送 DeskInfo     (開中間牌)
    COUNT_COIN_PUSH         = 25;  // 推送 CountCoin    (計算賠率結束)
    PLAYER_KICK_PUSH        = 26;  // 204               (將玩家踢出牌桌）
    PLAYER_PUSH             = 27;  // 推送 PlayerInfo   （計算賠率時）
    WAITING_FOR_DEALER_PUSH = 28;  // 204               (私房等待玩家上莊)
    JACK_POT_PUSH           = 30;
    ROOM_CLOSE              = 29;  // 204               (牌桌關閉)
}

message JackPotPush {
    PlayerInfo players = 1;
    uint64 Amount      = 2;
}

enum BetType {
    UNKNOWN_BET_TYPE = 0;
    SKITTLE          = 1;  // 撞柱
    SCORE            = 2;  // 龍門
    MISHIT           = 3;  // 射偏
}

enum TableStatus {
    UNKNOWN_TABLE_STATUS = 0;
    IDLE_TIME            = 1;
    CHANGE_DEALER        = 2;
    DEAL_TIME            = 5;
    BET_TIME             = 3;
    OPEN_CARD_TIME       = 6;
    COUNT_COIN           = 4;
    DEALER_NOT_JOIN      = 7;
}

enum CardResult {
    UNKNOWN_CARD_TYPE = 0;
    IS_SKITTLE_WIN    = 1;  // 撞柱贏
    IS_SCORE_WIN      = 2;  // 龍門贏
    IS_MISHIT_WIN     = 3;  // 射偏贏
}

// 自動下注位置
enum AutoBetAreaType {
    UNKNOWN_AUTO_BET_TYPE = 0;
    FIXED                 = 1;
    POLLING               = 2;
}

// 自動下注的起始下注金幣（重複下注）
enum RepeatedAutoBetAmount {
    UNKNOWN_REPEATED_AUTO_BET_AMOUNT = 0;
    REPEATED_AUTO_BET_AMOUNT_ONE     = 1;  // 1000
    REPEATED_AUTO_BET_AMOUNT_TWO     = 2;  // 5000
    REPEATED_AUTO_BET_AMOUNT_THREE   = 3;  // 10000
    REPEATED_AUTO_BET_AMOUNT_FOUR    = 4;  // 50000
    REPEATED_AUTO_BET_AMOUNT_FIVE    = 5;  // 100000
    REPEATED_AUTO_BET_AMOUNT_SIX     = 6;  // 200000
    REPEATED_AUTO_BET_AMOUNT_SEVEN   = 7;  // 300000
}

// 自動下注的起始下注金幣（回本下注）
enum EarnItsCostAutoBetAmount {
    UNKNOWN_EARN_ITS_COST_BET_AMOUNT = 0;
    EARN_ITS_COST_BET_AMOUNT_ONE     = 1;  // 1000
    EARN_ITS_COST_BET_AMOUNT_TWO     = 2;  // 2000
    EARN_ITS_COST_BET_AMOUNT_THREE   = 3;  // 3000
    EARN_ITS_COST_BET_AMOUNT_FOUR    = 4;  // 4000
    EARN_ITS_COST_BET_AMOUNT_FIVE    = 5;  // 5000
    EARN_ITS_COST_BET_AMOUNT_SIX     = 6;  // 10000
    EARN_ITS_COST_BET_AMOUNT_SEVEN   = 7;  // 20000
}

// 自動下注模式
enum AutoType {
    UNKNOWN_AUTO_TYPE = 0;
    REPEATED          = 1;
    EARN_ITS_COST     = 2;
}

// 自動下注局數
enum ContinueCount {
    UNKNOWN_CONTINUE_COUNT = 0;
    Continue_ONE           = 1;  // 10
    Continue_TWO           = 2;  // 25
    Continue_THREE         = 3;  // 50
    Continue_FOUR          = 4;  // 100
    Continue_FIVE          = 5;  // 500
    Continue_SIX           = 6;  // 3000
}

// 上莊局數
enum JackDealerCount {
    UNKNOWN_JACK_DEALER_COUNT = 0;
    JACK_ONE                  = 1;
    JACK_TWO                  = 2;
    JACK_THREE                = 3;
    JACK_FOUR                 = 4;
    JACK_FIVE                 = 5;
    JACK_SIX                  = 6;
}
/*
一般桌/尊榮桌上莊局數：
1: 5,
2: 10,
3: 15,
4: 20,
5: 25,

密碼房上桌局數：
1: 10,
2: 20,
3: 30,
4: 40,
5: 50,
*/

message BetReq {
    BetType betType  = 1;
    uint64 betAmount = 2;
}

message BetResp {
    repeated Bet bet = 1;
}
message Bet {
    BetType betType    = 1;
    uint64 betAmount   = 2;
    uint64 totalAmount = 3;
    uint64 userID      = 4;
}

message AutoBetReq {
    AutoBetAreaType autoBetAreaType                   = 1;
    AutoType autoType                                 = 2;
    ContinueCount continueCount                       = 3;
    RepeatedAutoBetAmount repeatedAutoBetAmount       = 4;
    EarnItsCostAutoBetAmount earnItsCostAutoBetAmount = 5;
    repeated BetType betType                          = 6;
}

message GetPlayerListResp {
    repeated PlayerInfo players = 1;
}
message GetDeskResp {
    DeskInfo deskInfo     = 1;
    PlayerInfo playerInfo = 2;
}

message JackDealerQueueReq {
    JackDealerCount jackDealerCount = 1;
    uint64 amount                   = 2;
}

message DeskInfo {
    string roundID                                    = 1;   // 局號
    PlayerInfo dealer                                 = 2;   // 莊家資訊
    TableStatus status                                = 3;   // 牌桌狀態
    int64 time                                        = 4;   // 倒數秒數
    int64 roomLevel                                   = 5;   // 房間的等級
    int64 roomType                                    = 6;   // 房間類型
    repeated PlayerInfo betRank                       = 7;   // 押注排名
    repeated PlayerInfo dealerWaitingQueue            = 8;   // 排莊列表
    uint64 skittleAmount                              = 9;   // “撞柱” 押注區的總金額
    uint64 scoreAmount                                = 10;  // “龍門” 押注區的總金額
    uint64 mishitAmount                               = 11;  // “射偏” 押注區的總金額
    repeated WinLose winLoseLastTenRound              = 12;  // 過去十場的輸贏紀錄
    repeated MotherCardHistory motherCardLastTenRound = 13;  // 過去十場的開牌紀錄
    CardInfo dealerCard                               = 14;  // 莊家的牌
    repeated MotherCard motherCard                    = 15;  // 當局&未來六副牌
    map<int64, uint64> repeatedBetAmount              = 16;  // 自動重複下注的起始金幣，詳 `RepeatedAutoBetAmount`
    map<int64, uint64> earnItsCostBetAmount           = 17;  // 自動回本下注的起始金幣，詳 `EarnItsCostAutoBetAmount`
    yesno.YesNo isSystem                              = 18;  // 莊家是否為機器人
    uint64 dealerJackLessAmount                       = 19;  // 排莊保證金標準
    map<uint64, WinLoseAmounts> winLose               = 20;  // 不同押注區的輸贏
    int64 dealerWinLose                               = 21;  // 莊家輸贏
    int64 dealerWater                                 = 22;  // 莊家水錢
    BetType invalidBetArea                            = 23;  // 禁止下注的注區
    uint64 skittleMaxBetAmount                        = 24;  // 撞柱總押分上限
    uint64 scoreMaxBetAmount                          = 26;  // 龍門總押分上限
    uint64 mishitMaxBetAmount                         = 28;  // 射偏總押分上限
    double skittleOdds                                = 30;  // 撞柱倍率
    double scoreOdds                                  = 31;  // 龍門倍率
    double mishitOdds                                 = 32;  // 射偏倍率
    float skittleWinPercentage                        = 33;  // 撞柱開獎比例
    float scoreWinPercentage                          = 34;  // 龍門開獎比例
    float mishitWinPercentage                         = 35;  // 射偏開獎比例
}

message MotherCard {
    repeated Card card = 1;
}

message MotherCardHistory {
    repeated Card motherCard = 1;
    string roundID           = 2;
}

message WinLose {
    yesno.YesNo skittleAmount = 1;
    yesno.YesNo scoreAmount   = 2;
    yesno.YesNo mishitAmount  = 3;
}

message CountCoin {
    WinLose winLose                    = 1;
    map<uint64, WinLoseAmounts> amount = 2;
    uint64 dealerBalance               = 3;
    int64 totalWinLose                 = 6;
    repeated uint64 rankBalance        = 4;
    uint64 selfBalance                 = 5;
}

message WinLoseAmounts {
    repeated WinLoseAmount amount = 1;
}

message WinLoseAmount {
    int64 amount     = 1;
    BetType betType  = 2;
    uint64 betAmount = 3;
    int64 water      = 4;
}

message DealerAmount {
    int64 amount = 1;
    uint64 water = 2;
}

message PlayerInfo {
    uint64 userID                   = 1;
    string nickname                 = 2;
    string imageURL                 = 3;
    uint64 vipLevel                 = 4;
    uint64 level                    = 5;
    uint64 balance                  = 6;
    uint64 betSkittleAmount         = 7;
    uint64 betScoreAmount           = 8;
    uint64 betMishitAmount          = 9;
    AutoBetAreaType autoBetAreaType = 10;
    AutoType AutoType               = 11;
    int64 continueCount             = 12;
    uint64 NowBetCount              = 13;
    uint64 AutoBetAmount            = 14;
    uint64 DealerCount              = 15;
    repeated BetType betType        = 16;
    yesno.YesNo isAutoBet           = 17;
    int64 totalWinLose              = 18;
}

message CardInfo {
    repeated Card cards   = 1;  // 卡牌資訊
    CardResult cardResult = 2;  // 中獎注區
    double odds           = 3;  // 賠率
    int32 gap             = 4;  // 兩柱差
}

message Card {
    int64 card        = 1;
    string originCode = 2;  // 卡牌原始代碼
    string hashCode   = 3;  // 卡牌加密代碼
}

// RoomCondition 湊房條件
message RoomCondition {
    uint64 roundCount          = 1;
    uint64 roomLevel           = 2;
    yesno.YesNo needAutoDealer = 3;
}