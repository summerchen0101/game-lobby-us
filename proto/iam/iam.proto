syntax = "proto3";
package iam;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/iam";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";
import "proto/playerinfo/model.proto";
import "google/protobuf/empty.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/pagination/pagination.proto";

service IAMService {
    rpc Authorize(AuthorizeReq) returns (AuthorizeResp);
    rpc ListProfiles(ListProfilesReq) returns (ListProfilesResp);
    rpc ListIDByDeviceIDs(ListIDByDeviceIDsReq) returns (ListIDByDeviceIDsResp);
    rpc GetProfiles(GetProfilesReq) returns (Profile);
    rpc UpdateProfile(UpdateProfileReq) returns (google.protobuf.Empty);
    rpc SignUpProfile(SignUpProfileReq) returns (SignUpProfileResp);

    rpc ListBlocklist(ListBlocklistReq) returns (ListBlocklistResp);
    rpc CreateBlocklist(CreateBlocklistReq) returns (google.protobuf.Empty);
    rpc DeleteBlocklist(DeleteBlocklistReq) returns (google.protobuf.Empty);

    rpc TokenPurge(TokenPurgeReq) returns (google.protobuf.Empty);  // 清理掉目標所有的 token, refresh

    rpc ThirdpartyAccountBinding(ThirdpartyAccountBindingRequest) returns (google.protobuf.Empty);
    rpc ThirdpartyAccountUnBinding(ThirdpartyAccountUnBindingRequest) returns (google.protobuf.Empty);
    rpc RevokeFaceBookToken(RevokeFBTokenRequest) returns (google.protobuf.Empty);

    rpc ListUserIdentityRelation(ListUserIdentityRelationRequest) returns (ListUserIdentityRelationResponse);

    rpc ListUerLoginHistory(ListUerLoginHistoryRequest) returns (ListUerLoginHistoryResponse);

    rpc ListUsrRegistrationNum(ListUsrRegistrationNumRequest) returns (ListUsrRegistrationNumResp);

    rpc ListCellPhoneRegistrationNum(ListCellPhoneRegistrationNumRequest) returns (ListCellPhoneRegistrationNumResponse);
    rpc CheckCellPhoneRegistrationLimitExceeded(CheckCellPhoneRegistrationLimitExceededReq) returns (CheckCellPhoneRegistrationLimitExceededResp);
    rpc UpsertCellPhoneRegistrationNum(UpsertCellPhoneRegistrationNumReq) returns (google.protobuf.Empty);

    rpc SystemMaintenance(SystemMaintenanceRequest) returns (google.protobuf.Empty);  // 更改iam 維護狀態 若為是 清除所有token refresh token , 並且禁止頒發token
    rpc SystemMaintenanceInfo(google.protobuf.Empty) returns (SystemMaintenanceInfoResp);
    rpc ListApplicationVersonControl(google.protobuf.Empty) returns (ListApplicationVersonControlResp);
    rpc SetApplicationVersonControl(SetApplicationVersonControlRequest) returns (google.protobuf.Empty);

    rpc GetSystemMaintenanceAccountWhiteList(GetSystemMaintenanceAccountWhiteListRequest) returns (GetSystemMaintenanceAccountWhiteListResp);
    rpc SetSystemMaintenanceAccountWhiteList(SetSystemMaintenanceAccountWhiteListRequest) returns (google.protobuf.Empty);

    // ListDeviceWhitelist 設備白名單列表
    rpc ListDeviceWhitelist(ListDeviceWhitelistReq) returns (ListDeviceWhitelistResp);
    // CreateDeviceWhitelist 新增設備白名單用戶
    rpc CreateDeviceWhitelistUser(CreateDeviceWhitelistUserReq) returns (google.protobuf.Empty);
    // DeleteDeviceWhitelist 刪除設備白名單用戶
    rpc DeleteDeviceWhitelistUser(DeleteDeviceWhitelistUserReq) returns (google.protobuf.Empty);

    rpc CheckUserBack(google.protobuf.Empty) returns (google.protobuf.Empty);
    rpc ListUserBack(ListUserBackRequest) returns (ListUserBackResp);
    rpc UpdateUserBack(UpdateUserBackRequest) returns (google.protobuf.Empty);
    rpc ListOnlineUserIDs(ListOnlineUserIDsReq) returns (ListOnlineUserIDsResp);
}

message ListIDByDeviceIDsReq {
    repeated uint64 userIDs = 1;
}

message ListIDByDeviceIDsResp {
    map<uint64, IDs> deviceMap = 1;
    repeated uint64 userIDs    = 2;
}

message IDs {
    repeated uint64 userIDs = 1;
}

enum UserIdentityRelationType {
    RelationType_UNKNOW    = 0;
    RelationType_DeviceID  = 1;
    RelationType_CellPhone = 2;
    RelationType_Email     = 3;
    RelationType_IP        = 4;
    RelationType_City      = 5;
    RelationType_Region    = 6;
    RelationType_Country   = 7;
}

enum RegisterType {
    Unknow     = 0;
    Mega       = 1;
    Guest      = 2;
    Thirdparty = 3;
}

message ListProfilesReq {
    int64 lastLoginAtMsGte       = 1;
    int64 lastLoginAtMsLte       = 2;
    int64 Limit                  = 3;  // if 0 -> default: 30 , <0 = no limit
    SuspendStatus suspend_status = 4;
    string ip                    = 5;
    string deviceID              = 6;
    int64 signUpStartedAt        = 13;
    int64 signUpEndedAt          = 14;
    int64 suspendStartedAt       = 17;
    int64 suspendEndedAt         = 18;

    repeated string ips       = 7;
    repeated string deviceIDs = 8;
    repeated uint64 userIDs   = 9;
    uint64 id                 = 16;
    uint32 page               = 10;
    uint32 perPage            = 11;
    string cellphone          = 12;  //
    enum Sort {
        NoSet           = 0;
        SignUpTimeAsc   = 1;
        SignUpTimeDesc  = 2;
        SuspendTimeAsc  = 3;
        SuspendTimeDesc = 4;
        LoginAtDesc     = 5;
    }
    Sort sort                              = 15;
    repeated SuspendStatus suspendStatuses = 19;

    yesno.YesNo isInternalPlayer = 20;  // 讀取後台建置玩家
}

message ListProfilesResp {
    repeated Profile profiles        = 1;
    pagination.Pagination pagination = 2;
}

message AuthorizeReq {
    string AccessToken = 1;
}

message AuthorizeResp {
    Claims Claims = 1;
}

message GetProfilesReq {
    uint64 userID    = 1;
    string cellphone = 2;
}

message UpdateProfileReq {
    uint64 userID                = 1;
    SuspendStatus suspend_status = 2;
    string suspend_reason        = 3;
    string email                 = 4;
    string new_password          = 6;
    string cellphone             = 7;
    string country_code          = 8;
    int64 cellPhoneValidatedAtMs = 9;  // 手機通過驗證時間
    RegisterType registerType    = 11;

    yesno.YesNo removePhone = 10;  // yes -> set cell_phone null
}

message SignUpProfileReq {
    string deviceID              = 1;
    string phoneNum              = 2;
    string countryCode           = 3;
    string password              = 4;
    int64 cellPhoneValidatedAtMs = 5;

    message AppMeta {
        string apk        = 1;  // app apk name -> 用來區分 渠道
        string device     = 2;  // 機型
        string version    = 3;  // 版本
        string region     = 4;  // 地區
        string resolution = 5;  // 品質
        string ip         = 6;  // ip
        string city       = 7;
        float latitude    = 8;  // 緯度
        float longitude   = 9;  // 經度
        string country    = 10;
    }
    AppMeta appMeta             = 6;
    yesno.YesNo skipCheckDevice = 7;
    string referrerCode         = 8; // 推薦人邀請碼
}
message SignUpProfileResp {
    uint64 userID = 1;
}

message DeleteProfileReq {
    uint64 userID = 1;
}

enum ValidateStatus {
    VALIDATE_STATUS_UNKNOWN = 0;
    INVALIDATE              = 1;
    VALIDATED               = 2;
}

enum SuspendStatus {
    SUSPEND_STATUS_UNKNOWN = 0;
    UNSUSPEND              = 1;
    SUSPENDED              = 2;  // 帳號凍結 直白告知
    SUSPENDED_CASE2        = 3;  // 帳號凍結 微婉告知
    SUSPENDED_DELETE       = 99;
}

enum Role {
    ROLE_UNKNOWN       = 0;
    ROLE_SUPER_ADMIN   = 1;
    ROLE_GENERAL_ADMIN = 2;
}

enum Platform {
    PLATFORM_UNKNOWN = 0;
    PLATFORM_WEB     = 1;
    PLATFORM_NATIVE  = 2;
}

enum OAuthProvider {
    UNKNOWN_OAUTH_PROVIDER = 0;
    PROVIDER_MEGA          = 1;  // 自家平台
    PROVIDER_GOOGLE        = 2;
    PROVIDER_FB            = 3;
    PROVIDER_LINE          = 4;
    PROVIDER_APPLE         = 5;
}

// Claims is user identity
message Claims {
    uint64 ID               = 1;
    string email            = 2;
    ValidateStatus validate = 3;
    SuspendStatus suspend   = 4;
    repeated Role roles     = 5;
    Platform platform       = 6;

    message AppMeta {
        string apk        = 1;  // app apk name -> 用來區分 渠道
        string device     = 2;  // 機型
        string version    = 3;  // 版本
        string region     = 4;  // 地區
        string resolution = 5;  // 品質
        string ip         = 6;  // ip
        string city       = 7;
        float latitude    = 8;  // 緯度
        float longitude   = 9;  // 經度
        string country    = 10;
    }
    AppMeta meta = 7;  // app metadata

    playerinfo.PlayerInfo playerInfo = 8;

    int64 identifyAtMs           = 9;  // 身份確認時間ms
    map<int32, string> usernames = 10;
    string deviceID              = 11;
    int64 signupTimeMs           = 12;  // 註冊時間
}

// Profile is user's complete model
message Profile {
    uint64 ID                                 = 1;
    string nickname                           = 2;  // to facebook login user use
    string avatar                             = 3;  // to facebook login user use
    string email                              = 4;
    string country                            = 5;
    string cellPhone                          = 6;  // 格式 國碼-電話 ex: 886-912345678
    string password                           = 7;
    int64 signupTimeMS                        = 8;
    ValidateStatus validate                   = 9;
    int64 validateTimeMS                      = 10;
    SuspendStatus suspend                     = 11;
    string deviceID                           = 12;
    repeated Role roles                       = 13;
    int64 lastLoginAtMs                       = 15;  // 最後登入時間 ms
    string lastLoginIP                        = 16;
    repeated ProfileUsername profile_username = 17;
    string suspend_reason                     = 18;  // 暫時封鎖原因
    string country_code                       = 19;
    int64 suspendAtMs                         = 20;  // 封鎖時間
    string apnToken                           = 21;
    int64 cellPhoneValidatedAtMs              = 22;  // 手機通過驗證時間

    RegisterType registerType = 23;

    string GeoCountry = 24;  // ip地理資訊
    string GeoRegion  = 25;  // ip地理資訊
    string GeoCity    = 26;  // ip地理資訊
}

message ProfileUsername {
    uint64 profile_id = 1;
    int32 type        = 2;
    string username   = 3;
}

// Token mean create accessToken and refreshToken and expireTime
message Token {
    string accessToken  = 1;
    string refreshToken = 2;
    int64 expiresIn     = 3;
}

// Facebook Claims
message FacebookClaims {
    string accessToken = 1;
    string userID      = 2;
}

message ListBlocklistReq {
    uint32 page            = 1;
    uint32 perPage         = 2;
    repeated string target = 3;  // 機碼  或 IP
    BlockListType type     = 4;
    uint64 id              = 5;
    int64 suspendStartedAt = 6;
    int64 suspendEndedAt   = 7;
    enum Sort {
        NoSet           = 0;
        SuspendTimeAsc  = 1;
        SuspendTimeDesc = 2;
    }
    Sort sort = 8;
}

message ListBlocklistResp {
    pagination.Pagination pagination = 1;
    repeated BlockList data          = 2;
}

enum BlockListType {
    UNKNOW    = 0;
    IP        = 1;
    DeviceID  = 2;
    CellPhone = 3;
}

message BlockList {
    uint64 id          = 1;
    string target      = 2;
    BlockListType type = 3;
    string reason      = 4;
    int64 createdAtMs  = 5;
    uint64 creatorID   = 6;
}

message CreateBlocklistReq {
    string target      = 1;
    BlockListType type = 2;
    string reason      = 3;
    int64 createdAtMs  = 4;
    uint64 creatorID   = 5;
}

message DeleteBlocklistReq {
    uint64 id = 1;
}

message TokenPurgeReq {
    uint64 userID = 1;
}

message ThirdpartyAccountBindingRequest {
    uint64 userID              = 1;
    iam.OAuthProvider privoder = 2;
    string accessToken         = 3;
    yesno.YesNo changeBinding  = 4;
}

message ThirdpartyAccountUnBindingRequest {
    uint64 userID               = 1;
    iam.OAuthProvider privoder  = 2;
    string accessToken          = 3;
    TokenFromType tokenFromType = 4;
}

message RevokeFBTokenRequest {
    uint64 userID                 = 1;
    string accessToken            = 2;  // 舊的 FB Token
    string oldUsername            = 3;  // 舊的 FB Username
    iam.OAuthProvider newPrivoder = 4;  // 新綁定的社群代號
}

message ListUserIdentityRelationRequest {
    uint32 page                           = 1;
    uint32 perPage                        = 2;
    uint64 userID                         = 3;
    UserIdentityRelationType resourceType = 4;
    string value                          = 5;
    uint64 userIDNotEqual                 = 6;
    repeated string values                = 7;
    repeated uint64 userIDs               = 8;
    enum Sort {
        NoSet            = 0;
        CreatedAtMsAsc   = 1;
        CreatedAtMsDesc  = 2;
        UpdatedAtMSAsc   = 3;
        UpdatedAtMSDesc  = 4;
        ResourceTypeAsc  = 5;
        ResourceTypeDesc = 6;
    }
    Sort sort            = 9;
    int64 CreatedAtMsGte = 10;
    int64 CreatedAtMsLte = 11;
    int64 UpdatedAtMsGte = 12;
    int64 UpdatedAtMsLte = 13;
}

message ListUserIdentityRelationResponse {
    pagination.Pagination pagination   = 1;
    repeated UserIdentityRelation data = 2;
}

message UserIdentityRelation {
    uint64 userID                         = 1;
    UserIdentityRelationType resourceType = 2;
    string resourceName                   = 3;
    string value                          = 4;
    string identityID                     = 5;
    int64 createdAtMs                     = 6;
    int64 updatedAtMs                     = 7;
}

message ListUerLoginHistoryRequest {
    uint32 page    = 1;
    uint32 perPage = 2;
    uint64 userID  = 3;
}

message ListUerLoginHistoryResponse {
    pagination.Pagination pagination     = 1;
    repeated UserOnlineHistory histories = 2;
}

message UserOnlineHistory {
    uint64 userID      = 1;
    int64 onlineAtMs   = 2;
    string identity    = 3;
    int64 offlineAtMs  = 4;
    string deviceID    = 5;
    string deviceModel = 6;
    string ip          = 7;
}

message SystemMaintenanceRequest {
    yesno.YesNo inMaintenance = 1;
}

message SystemMaintenanceInfoResp {
    yesno.YesNo inMaintenance    = 1;
    int64 inMaintenanceTimestamp = 2;
}

message ListApplicationVersonControlResp {
    repeated ApplicationVersonControl apkControlData = 1;
}

message ApplicationVersonControl {
    string apkName       = 1;
    float minimumVersion = 2;
    string downloadURL   = 3;
    yesno.YesNo enable   = 4;
}

message SetApplicationVersonControlRequest {
    repeated ApplicationVersonControl apkControlData = 1;
}

message GetSystemMaintenanceAccountWhiteListRequest {
    uint32 page    = 1;
    uint32 perPage = 2;
}

message GetSystemMaintenanceAccountWhiteListResp {
    pagination.Pagination pagination                    = 1;
    repeated SystemMaintenanceAccountWhiteList accounts = 2;
}

message SystemMaintenanceAccountWhiteList {
    uint64 userID      = 1;
    yesno.YesNo enable = 2;  //
    string remark      = 3;
    int64 updatedAtMS  = 4;
    uint64 updaterID   = 5;
}

message SetSystemMaintenanceAccountWhiteListRequest {
    uint64 userID      = 1;
    yesno.YesNo enable = 2;  //
    string remark      = 3;
    int64 updatedAtMS  = 4;
    uint64 updaterID   = 5;
}

message ListUsrRegistrationNumRequest {
    int64 todayDate = 1;
}

message ListUsrRegistrationNumResp {
    int64 day   = 1;
    int64 week  = 2;
    int64 month = 3;
}

message ListCellPhoneRegistrationNumRequest {}
message ListCellPhoneRegistrationNumResponse {
    repeated CellPhoneRegistrationNum records = 1;
}
message CellPhoneRegistrationNum {
    string cellPhone = 1;  // 手機
    int64 count      = 2;  // 註冊次數
}

message CheckCellPhoneRegistrationLimitExceededReq {
    string cellPhone = 1;  // 手機
}
message CheckCellPhoneRegistrationLimitExceededResp {
    CellPhoneRegistrationNum record = 1;
}

message UpsertCellPhoneRegistrationNumReq {
    CellPhoneRegistrationNum record = 1;
}

message ListDeviceWhitelistReq {
    uint32 page             = 1;
    uint32 perPage          = 2;
    repeated uint64 userIDs = 3;
}

message ListDeviceWhitelistResp {
    pagination.Pagination pagination  = 1;
    repeated DeviceWhitelistUser list = 2;
}

// 白名單用戶
message DeviceWhitelistUser {
    uint64 userID     = 1;  // 用戶ID
    int64 createdAtMs = 2;  // 創建時間
    string note       = 3;  // 備註
}

message CreateDeviceWhitelistUserReq {
    uint64 userID = 1;  // 用戶ID
    string note   = 2;  // 備註
}

message DeleteDeviceWhitelistUserReq {
    uint64 userID = 1;
}

enum TokenFromType {
    TOKEN_FROM_TYPE_UNKNOWN = 0;
    TOKEN_FROM_TYPE_WEB     = 1;
    TOKEN_FROM_TYPE_APP     = 2;
}

message ListUserBackRequest {
    uint64 userID           = 1;
    repeated uint64 userIDs = 2;
    int64 LastLoginAtGte    = 3;
    int64 LastLoginAtLt     = 4;
    bool IsLogin            = 5;  // 登入獎勵
    bool IsLuckyPackage     = 6;  // 幸運禮包
    uint32 Page             = 7;
    uint32 PerPage          = 8;
}

message UserBack {
    uint64 userID       = 1;
    int64 LastLoginAt   = 2;
    int64 CreatedTime   = 3;  //創立時間
    bool IsLogin        = 4;  // 登入獎勵
    bool IsLuckyPackage = 5;  // 幸運禮包
}
message ListUserBackResp {
    repeated UserBack data           = 1;
    pagination.Pagination pagination = 2;
}
message UpdateUserBackRequest {
    UpdateUserBackFilter filter = 1;
    yesno.YesNo IsLogin         = 2;  // 登入獎勵
    yesno.YesNo IsLuckyPackage  = 3;  // 幸運禮包
}

message UpdateUserBackFilter {
    uint64 userID     = 1;
    int64 LastLoginAt = 2;
}message ListOnlineUserIDsReq {
    int64 startTimeMs = 1;
    int64 endTimeMs   = 2;
}

message ListOnlineUserIDsResp {
    repeated uint64 userIDs = 1;
}
