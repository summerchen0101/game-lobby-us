syntax = "proto3";
package kaixilo;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/kaixilo";

import "google/protobuf/empty.proto";
import "proto/wallet/wallet.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";

service KaixiloService {
    //新增玩家帳號的時候一起新增賭場
    rpc Create(CreateKaixiloReq) returns (google.protobuf.Empty);
    //    //取得賭場搜尋的列表,這邊要跟iam以及playerInfo聚合需要取得前一天有登入的玩家再跟playerInfo要有vip lv排序的playerInfo id,傳入playerID陣列,依照vip等級排序
    //取得賭場裡的設備資訊
    rpc GetKaixilo(GetKaixiloReq) returns (GetKaixiloResp);

    rpc UpdateKaixiloThing(UpdateKaixiloThingReq) returns (google.protobuf.Empty);

    //    rpc ListModelIDs(ListModelIDsReq) returns (ListModelIDsResp);

    //升級設備
    rpc LevelUp(LevelUpReq) returns (google.protobuf.Empty);
    //升級設備
    rpc CheckLevelUp(CheckLevelUpReq) returns (CheckLevelUpResp);

    //    rpc ThingComplete(ThingCompleteReq) returns (google.protobuf.Empty);

    //取得設備資料
    rpc GetThing(GetThingReq) returns (GetThingResp);
    rpc ListParasites(ListParasitesReq) returns (ListParasitesResp);
    rpc CreatParasite(CreatParasiteReq) returns (google.protobuf.Empty);
    rpc CountIncome(CountIncomeReq) returns (wallet.Receipt);
}

message CountIncomeReq {
    uint64 userID   = 1;
    uint64 vipLevel = 2;
}

message ListParasitesReq {
    uint64 parasiteID = 2;
    uint64 userID     = 3;
}

message ListParasitesResp {
    repeated uint64 parasiteIDs = 2;
    uint64 userID               = 3;
}

message UpdateKaixiloThingReq {
    uint64 userID  = 1;
    uint64 thingID = 2;
    uint64 typeID  = 3;
}

//message ListModelIDsReq {
//    uint64 modelType = 1;
//}
//message ListModelIDsResp {
//    repeated uint64 modelIDs = 1;
//}

message CreatParasiteReq {
    uint64 userID     = 1;
    uint64 parasiteID = 2;
}

message CreateKaixiloReq {
    uint64 userID = 1;
}

//message ListKaixiloReq {
//    uint64 userID            = 1;  //要踢除自己的id
//    repeated uint64 playerID = 2;  //從playInfo來的user id
//}
//
//message ListKaixiloResp {
//    repeated Kaixilo Kaixilos  = 1;
//    pagination.Pagination page = 2;
//}

message Kaixilo {
    uint64 ID     = 1;
    uint64 userId = 2;
}

message GetKaixiloReq {
    uint64 userID = 1;
}

message GetKaixiloResp {
    uint64 ID              = 1;
    uint64 userID          = 2;
    int64 earn             = 3;
    int64 earnMax          = 4;
    uint64 lastPayDay      = 5;
    repeated Thing things  = 6;
    yesno.YesNo canReceive = 7;
    uint64 min             = 8;
}

message GetThingReq {
    uint64 thingID = 1;
}

message GetThingResp {
    Thing thing = 1;
}

message LevelUpReq {
    uint64 userID   = 1;
    uint64 thingID  = 2;
    uint64 level    = 3;
    uint64 deviceID = 4;
}
message LevelUpResp {
    Thing thing = 1;
}
message CheckLevelUpReq {
    uint64 userID  = 1;
    uint64 thingID = 2;
}
message CheckLevelUpResp {
    Thing thing   = 1;
    uint64 amount = 2;
}
//
//message ThingCompleteReq {
//    uint64 userID    = 3;
//    uint64 thingID   = 1;
//}

message Thing {
    uint64 ID             = 1;
    uint64 userID         = 2;
    uint64 level          = 3;
    uint64 deviceID       = 4;
    uint64 modelType      = 5;
    uint64 itemID         = 6;
    uint64 chip           = 7;
    uint64 goldIncomeHour = 8;
    uint64 typeID         = 9;
    uint64 area           = 10;
}

