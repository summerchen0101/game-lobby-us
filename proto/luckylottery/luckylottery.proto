syntax = "proto3";
package luckylottery;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/luckylottery";

enum MessageType {
    PING_PONG  = 0;
    // [RPC] 加入房間
    // * req: JoinRoomRequest
    // * resp: JoinRoomResponse
    JOIN_ROOM  = 1;  // 進入房間
    // [RPC] 離開房間
    LEAVE_ROOM = 2;
    // [RPC] 取得房間資訊
    // * resp: GetRoomResponse
    GET_ROOM = 10;
    // [RPC] 下注
    // * req: BetRequest
    // * resp: BetResponse
    BET = 11;
    // [RPC] 注單重新選號
    // * req: RefreshBetNumberRequest
    // * resp: RefreshBetNumberResponse
    REFRESH_BET_NUMBER = 12;


    PlayerLeaveEvent    = 1000;  // (單播)玩家踢出房間事件。 data: PlayerLeaveEventData
}

// 兌獎組合
enum BetGroup {
    BET_GROUP_UNKNOWN = 0;
    BET_GROUP_A       = 1;
    BET_GROUP_B       = 2;
    BET_GROUP_C       = 3;
    BET_GROUP_D       = 4;
    BET_GROUP_E       = 5;
}

enum LeaveReason {
    LEAVE_REASON_UNKNOWN      = 0;
    LEAVE_REASON_DISCONNECTED = 1; // 玩家斷線
    LEAVE_REASON_IDLE         = 2; // 玩家閒置
    LEAVE_REASON_LEAVE        = 3; // 玩家主動離開
}

message JoinRoomRequest {
    string roomID = 1;
}

message JoinRoomResponse {
    Player me = 1;  // 玩家詳情
}

message BetRequest {
    uint64 betAmount = 1;  // 押注額
}

message Bet {
    BetGroup betGroup       = 1;
    repeated uint32 numbers = 2;  // 押注號碼
}

message BetResponse {
    uint64 gainAmount               = 1;  // 收入
    int64 balance                   = 2;  // 玩家餘額
    repeated uint32 bingoNumbers    = 3;  // 當前開獎號碼
}

message RefreshBetNumberRequest {
    uint64 betAmount = 1;  // 押注額
}

message RefreshBetNumberResponse {
    repeated Bet bets = 1;  // 押注
}

message Room {
    string roomID                   = 1;  // 房號
    string roundID                  = 2;  // 當前局號
    repeated Bet bets               = 3;  // 押注
}

message GetRoomResponse {
    Room room  = 1;
}

message Player {
    uint64 userID            = 1;
    string nickname          = 2;
    string imageURL          = 3;
    uint64 vipLevel          = 4;
    uint64 level             = 5;
    int64 balance            = 6;  // 餘額
    int64 betAmount          = 7;  // 押注額
}

message BetResult {
    BetGroup betGroup            = 1;  // 兌獎組合
    repeated uint32 betNumbers   = 2;  // 押注號碼
    string multiple              = 3;  // 賠率
    uint64 gainAmount            = 4;  // 收入
}

message BetTape {
    string roomID                = 1;  // 房號
    string roundID               = 2;  // 局號
    uint64 betAmount             = 3;  // 下注額
    repeated BetResult bets      = 4;  // 押注紀錄
    repeated uint32 bingoNumbers = 5;  // 開獎號碼
    uint64 totalGainAmount       = 6;  // 總收入
}

message PlayerLeaveEventData {
    string roomID        = 1; // 房號
    string roundID       = 2; // 局號
    LeaveReason reason   = 3; // 離開原因
}