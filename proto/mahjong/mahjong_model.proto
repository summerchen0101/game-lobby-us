syntax = "proto3";
package mahjong;
option go_package       = "gitlab.ffglobaltech.com/us888/pluto/protos/mahjong";
option csharp_namespace = "MahjongProto";

import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";
import "proto/mahjong/mahjong_room.proto";

message SurrenderVoteReq {
    yesno.YesNo surrender = 1;
}

message SurrenderVoteResp {
    yesno.YesNo surrender = 1;  //此局剩餘時間,加總剩餘時間
    uint64 baseID         = 2;  //使用的玩家座位
}

message PlayNextRoundReq {
    yesno.YesNo keepPlay = 1;
}

message PlayNextRoundResp {
    yesno.YesNo keepPlay = 1;  //此局剩餘時間,加總剩餘時間
    uint64 baseID        = 2;  //使用的玩家座位
}

message AddActionTimeReq {
    AddActionTime addActionType = 1;
}

message PlayerUseAddAction {
    uint64 remainingTime = 1;  //此局剩餘時間,加總剩餘時間
    uint64 baseID        = 2;  //使用的玩家座位
}

message PlayerRemainingTimePush {
    uint64 playerRemainingTime = 1;  //玩家剩餘時間
    uint64 baseID              = 2;  //剩餘玩家座位
}

message PlayerActionResp {
    uint64 userID          = 1;
    Action action          = 2;
    TileType tiles         = 3;  //吃碰槓的那一張
    repeated TileType pair = 4;  //吃碰槓的組合配對
    uint64 baseID          = 5;
    PlayerInfo playerInfo  = 6;
}

message BigCount {
    repeated PlayerCount playerCount = 1;
    uint64 playerAmountNotEnough     = 2;
}

message PlayerCount {
    uint64 userID   = 1;
    string nickname = 2;
    int64 amount    = 3;
}

message SmallCount {
    repeated PlayerTile playerTile   = 1;
    Scores scores                    = 2;  //最終分數
    map<uint64, PlayerAmount> amount = 3;
    mahjong.TileType loseTile        = 4;
    Board board                      = 5;
}

message PlayerTile {
    Tiles tiles    = 1;
    Tiles kongTile = 2;
}

message Scores {
    repeated Score scores = 1;
    int64 total_score     = 2;
}
message PlayerAmount {
    int64 amount   = 1;
    uint64 water   = 2;
    uint64 balance = 3;
}

message Tiles {
    repeated TileType tiles = 1;
}

// Dice 骰子
message Dice {
    int32 diceOne   = 1;
    int32 diceTwo   = 2;
    int32 diceThree = 3;
}

message OutTile {
    repeated mahjong.TileType outTile = 1;
    yesno.YesNo isKong                = 2;
    map<int64, Listen> listenTile     = 3;  //他不給enum所以我直接強轉int64
    yesno.YesNo canDeclareReadyHand   = 4;
    int64 tileLen                     = 5;
    PlayerInfo playerInfo             = 6;
    yesno.YesNo isFirstRound          = 7;
}

message PlayerActionPush {
    repeated Action action = 1;
    // map<int64, Listen> listenTile      = 2;  //他不給enum所以我直接強轉int64
    yesno.YesNo isJustCross            = 3;
    yesno.YesNo isDeclareReadyHand     = 4;
    yesno.YesNo isKong                 = 7;
    repeated mahjong.TileType selfTile = 5;
    mahjong.TileType tile              = 6;
    PlayerInfo playerInfo              = 2;
    int64 tileLen                      = 8;
    yesno.YesNo isFirstRound           = 9;
}

message Listen {
    repeated ListenTile listenTile = 1;
}

message ListenTile {
    mahjong.TileType listenTile = 1;
    uint64 tai                  = 2;
}

// Board 牌桌
message Board {
    repeated PlayerInfo players      = 1;   // 玩家資訊 按照東南西北提供
    Wind dealerBaseID                = 2;   //目前莊家位置  風味
    Wind windID                      = 3;   //風圈,估計只有東風圈
    uint64 tileCount                 = 4;   //剩餘牌數
    Tiles tilesWall                  = 5;   //打出來的
    mahjong.TileType outTile         = 10;  //此玩家回合丟出的牌
    Wind nowWind                     = 15;  //此round的風
    Wind windSeat                    = 19;  //此round的風位
    Dice dice                        = 9;   //骰子
    TableStatus status               = 6;   //目前牌桌狀態
    int64 time                       = 7;   //當前倒數
    Scores scores                    = 8;   //最終分數
    mahjong.RoomCondition condition  = 11;  //房間資訊（底台等等
    map<uint64, PlayerAmount> amount = 12;  //玩家輸贏資訊
    map<uint64, int64> bigAmount     = 16;  //大結算資訊
    int64 winnerBaseID               = 13;  //贏家座位
    string roundID                   = 14;  //局號
    Tiles lastTile                   = 17;  //牌強剩餘的牌
    repeated bytes Actions           = 18;  //回放用的玩家動作
    //    Tiles tileWallStart                = 19;
    map<uint64, yesno.YesNo> surrender = 20;  //玩家投降投票
    map<uint64, yesno.YesNo> nextRound = 21;  //玩家繼續遊戲投票
    uint64 roomType                    = 22;
    repeated HashTiles hashTile        = 23;  //區塊牌強
    uint64 creator                     = 24;  //創房者
    uint64 pickBaseID                  = 25;  //目前丟牌者
}

message HashTiles {
    repeated mahjong.Tile hashTile = 1;
}

// Player 玩家
message PlayerInfo {
    // 基本資訊
    uint64 userID   = 1;
    string nickname = 2;
    string imageURL = 3;
    uint64 vipLevel = 4;
    uint64 level    = 5;
    int64 balance   = 6;
    uint64 baseID   = 7;

    // 玩家內部資訊
    mahjong.TileType inTile       = 18;  //玩家摸進的牌
    Tiles outTile                 = 19;  //玩家丟出的牌
    Tiles handTile                = 8;   // 手牌
    uint64 handTileLen            = 27;  // 手牌長度
    Tiles openTile                = 9;   //經過吃碰明槓的牌  有序
    Tiles tileBeforeFlower        = 26;  //播放用
    repeated Action roundAction   = 10;  //小胖沒用
    map<int64, Listen> listenTile = 17;  //玩家丟哪張貼哪張
    Listen listenTiles            = 21;  //玩家目前聽牌
    Tiles concealedKongCountTile  = 12;  // 暗槓

    uint64 concealedKongCount = 11;  // 暗槓數
    Tiles exposedKongTiles    = 20;  // 暗槓
    Tiles flowersTile         = 13;  // 花牌

    yesno.YesNo isDeclareReadyHand = 14;  // 是否宣告聽牌
    int32 dealerCount              = 15;  // 連裝束
    yesno.YesNo isJustCross        = 16;  //過水
    uint64 surrender               = 25;  //剩餘投降次數

    Tiles replayTile              = 22;  //回放專用
    Tiles replayFlowerTile        = 23;  //回放專用
    uint64 addActionRemainingTime = 24;  //玩家剩餘時間推波
}

// Score 台數
message Score {
    ScoreType score_type = 1;
    int32 point          = 2;
}

enum Action {
    UNKNOWN_Action         = 0;
    CHOW_ACTION            = 1;
    PONG_ACTION            = 2;
    CONCEALED_KONG_ACTION  = 3;
    EXPOSED_KONG_ACTION    = 4;
    PLUS_KONG_ACTION       = 5;
    HU_ACTION              = 6;
    READY_HAND_ACTION      = 7;
    CANCEL                 = 8;
    ADD_ACTION_TIME_ACTION = 9;
}

enum AddActionTime {
    UNKNOWN_ACTION_TIME = 0;
    PICK_TIME           = 1;
    PLAY_TIME           = 2;
}

// Wind 風圈｜風位
enum Wind {
    UNKNOWN_WIND = 0;
    EAST_WIND    = 1;  // 東風
    SOUTH_WIND   = 2;  // 南風（東右方）
    WEST_WIND    = 3;  // 西風（東對家）
    NORTH_WIND   = 4;  // 北風（東左方）
}

// TileType 麻將牌類型
enum TileType {
    UNKNOWN_TILE_TYPE = 0;
    DOTS_1            = 1;   // 1筒
    DOTS_2            = 2;   // 2筒
    DOTS_3            = 3;   // 3筒
    DOTS_4            = 4;   // 4筒
    DOTS_5            = 5;   // 5筒
    DOTS_6            = 6;   // 6筒
    DOTS_7            = 7;   // 7筒
    DOTS_8            = 8;   // 8筒
    DOTS_9            = 9;   // 9筒
    BAMBOOS_1         = 11;  // 1條 10
    BAMBOOS_2         = 12;  // 2條 11
    BAMBOOS_3         = 13;  // 3條 12
    BAMBOOS_4         = 14;  // 4條 13
    BAMBOOS_5         = 15;  // 5條 14
    BAMBOOS_6         = 16;  // 6條 15
    BAMBOOS_7         = 17;  // 7條 16
    BAMBOOS_8         = 18;  // 8條 17
    BAMBOOS_9         = 19;  // 9條 18
    CHARACTERS_1      = 21;  // 1萬 19
    CHARACTERS_2      = 22;  // 2萬 20
    CHARACTERS_3      = 23;  // 3萬 21
    CHARACTERS_4      = 24;  // 4萬 22
    CHARACTERS_5      = 25;  // 5萬 23
    CHARACTERS_6      = 26;  // 6萬 24
    CHARACTERS_7      = 27;  // 7萬 25
    CHARACTERS_8      = 28;  // 8萬 26
    CHARACTERS_9      = 29;  // 9萬 27
    WINDS_EAST        = 31;  // 東風 28
    WINDS_SOUTH       = 32;  // 南風 29
    WINDS_WEST        = 33;  // 西風 30
    WINDS_NORTH       = 34;  // 北風 31
    DRAGONS_RED       = 35;  // 紅中 32
    DRAGONS_GREEN     = 36;  // 青發 33
    DRAGONS_WHITE     = 37;  // 白板 34
    FLOWERS_EAST      = 41;  // 梅 35
    FLOWERS_SOUTH     = 42;  // 蘭 36
    FLOWERS_WEST      = 43;  // 竹 37
    FLOWERS_NORTH     = 44;  // 菊 38
    SEASONS_EAST      = 45;  // 春 39
    SEASONS_SOUTH     = 46;  // 夏 40
    SEASONS_WEST      = 47;  // 秋 41
    SEASONS_NORTH     = 48;  // 冬 42
}

message Tile {
    TileType tile     = 1;
    string originCode = 2;
    string hashCode   = 3;
}

// ScoreType 台數類型
enum ScoreType {
    UNKNOWN_SCORE_TYPE   = 0;
    DEALER               = 1;   // 莊家	  	| 1	|	當莊的玩家，不論胡牌還是放炮都多1台
    CONTINUE_DEALER      = 2;   // 連莊	  	| 2N|	莊家胡牌及可連莊，被胡也是！連莊沒有上限！
    DIM                  = 3;   // 自摸	  	| 1	|	自己摸到自己胡牌的牌（Do it myself）
    CLEAR                = 4;   // 門清	  	| 1	|	不吃、不碰、不槓，全部16張的都在自已牌內。
    FLOWER               = 5;   // 花牌	  	| 1	|	"以開門計算，東(春、梅-1花)、南(夏、蘭-2花)、西(秋、菊-3花)、北(冬、竹-4花)。 (順時間算) 如：東家拿到春又拿到梅，就可累計成二台。"
    SINGLE               = 6;   // 獨聽	  	| 1	|	只聽一張牌。(含中洞、偏張)
    ROBBING_KONG_WIN     = 7;   // 搶槓	   	| 1	|	當別家喊槓，正巧補槓的牌，為自已所要胡的牌，就可搶槓胡牌。(明槓
    DRAGON_PONG_KONG     = 8;   // 三元台		| 1	|	中發白任一刻子或是槓子
    ROUND_WIND           = 9;   // 圈風台		| 1	|	目前是東風圈，拿到東風刻子，可再加一台
    GROUNDED_WIND        = 10;  // 門風台		| 1	|	依自已的坐風，比方坐北，拿到北風的刻子，可再加一台
    KONG_WIN             = 11;  // 槓上開花	| 1 |	摸到花牌或槓牌後，經補牌，而胡牌者，再多加一台
    LAST_ROUND_DIM       = 12;  // 海底撈月	| 1 |	摸到牌局最後一張，恰巧為所要的胡牌棋子，再多加一台
    LAST_TILE_WIN        = 13;  // 海底撈魚	| 1 |	摸到海底最後一張，丟出去放槍被胡，再多加一台
    LAST_ONE_DIM         = 14;  // 半求人		| 1 |	牌全都是吃｜碰｜明槓，手中只剩下一張牌，並由自己摸出胡牌
    DECLARE_READY_HAND   = 15;  // 宣告聽牌	| 1 |	宣告聽牌後，不可換牌，胡多1台，但是不能看牌
    FLOWER4_CASE1        = 16;  // 春夏秋冬	| 2 |	胡牌時，牌前有四張花牌 (春、夏、秋、冬)
    FLOWER4_CASE2        = 17;  // 梅蘭竹菊	| 2 |	胡牌時，牌前有四張花牌  (梅、蘭、竹、菊)
    NORMAL_WIN           = 18;  // 平胡		  | 2 |	牌中由五組對子 + 一組對子，且無字、無花，聽雙洞才能算平胡
    LAST_ONE_WIN         = 19;  // 全求人		| 2 |	牌全都是吃｜碰｜明槓，手中只剩下一張牌，並由任一家放砲，才可算為全求人，自摸者不算
    THREE_PONG_KONG      = 20;  // 三暗刻		| 2 |	牌中有三組刻子(暗槓)，沒碰出去，全在自已的牌內
    CLEAR_DIM            = 21;  // 門清自摸	| 3 |	門清又自摸，不計自摸台和門清台
    PONG_PONG_WIN        = 22;  // 碰碰胡		| 4 |	牌中全都是對子所組成，沒有任何的順子，可自已摸進來，也可是碰（槓）來的。
    MIX_WIND             = 23;  // 混一色		| 4 |	牌中只有字牌(東南西北中發白) + 一種花色(萬、筒、條則一)
    LITTLE_DRAGON_PONG   = 24;  // 小三元		| 4 |	牌中有，中、發、白所組合的刻子，但其中一組為對子
    START_FLOWER_WIN     = 25;  // 配牌花胡	| 4 |	起手配牌本家獲得7張或8張花牌，摸第一張牌就得到八仙過海或者七搶一
    FOUR_PONG_KONG       = 26;  // 四暗刻		| 5 |	牌中有四組刻子(暗槓)，沒碰出去，全在自已的牌內
    GROUND_READY_HAND    = 27;  // 地聽		  | 8 |	其他三家，在第一輪，抓完牌就胡牌
    FIVE_PONG_KONG       = 28;  // 五暗刻		| 8 |	牌中有五組刻子(暗槓)，沒碰出去，全在自已的牌內
    ALL_SAME             = 29;  // 清一色		| 8 |	牌中由一種花色所組合
    ONLY_WIND_AND_DRAGON = 30;  // 字一色		| 8 |	牌中由「東南西北中發白」字牌所組成。
    BIG_DRAGON_PONG      = 31;  // 大三元		| 8 |	牌中有，中、發、白所組合的刻子。 (無論是碰到的，還是自已摸進來皆可算)
    LITTLE_NEWS          = 32;  // 小四喜		| 8 |	牌中一樣由東、南、西、北所組成，但其中一組只有對子
    SEVEN_ROBS_ONE       = 33;  // 七搶一		| 8 |	拿齊7張花牌，當其中一家，拿到另一張花牌時，即可胡那一家
    EIGHT_PAIR           = 34;  // 八對半		| 8 |	將7個將與1個坎組成，必須門清
    FLOWER_KING          = 35;  // 八仙過海	| 8 |	拿齊8張花牌(春、夏、秋、冬、梅、蘭、竹、菊)即可胡牌。
    FOUR_KONG            = 36;  // 四槓子		| 8	|	一人有4個槓，明暗皆可，算自摸8台，不計自摸台
    BIG_NEWS             = 37;  // 大四喜		| 16|	牌中有東、南、西、北4組刻子。
    HEAVEN_READY_HAND    = 38;  // 天聽		  | 16|	莊家在牌局第1輪，抓完牌後，立即就胡牌。 (莊家限定)
    NO_SCORE             = 39;  // 屁胡      | 0 | 屁胡
    HEAVEN_HU            = 40;  // 天胡		  | 8 |	其他三家，在第一輪，抓完牌就胡牌
    GROUND_HU            = 41;  // 地胡		  | 8 |	其他三家，在第一輪，抓完牌就胡牌
}

enum TableStatus {
    UNKNOWN_TABLE_STATUS = 0;
    IDLE_TIME            = 1;
    DEAL_TIME            = 2;
    EAST_PLAY_TIME       = 3;
    SOUTH_PLAY_TIME      = 4;
    WEST_PLAY_TIME       = 5;
    NORTH_PLAY_TIME      = 6;
    EAST_PICK_TIME       = 7;
    SOUTH_PICK_TIME      = 8;
    WEST_PICK_TIME       = 9;
    NORTH_PICK_TIME      = 10;
    BOARD_PLAY_TIME      = 11;
    EAST_OPEN_PICK_TIME  = 12;
    SOUTH_OPEN_PICK_TIME = 13;
    WEST_OPEN_PICK_TIME  = 14;
    NORTH_OPEN_PICK_TIME = 15;
    COUNT_TIME           = 16;
    NEXT_ROUND_TIME      = 17;
    SURRENDER_TIME       = 18;
    GAME_END             = 19;
    WAITING_PLAYERS      = 20;
}

enum BetType {
    UNKNOWN_BET_TYPE = 0;
    COUNT            = 1;
}

message PlayerAction {
    uint64 userID          = 1;
    string requestID       = 2;
    Action action          = 3;
    TileType tiles         = 4;  //吃碰槓的那一張
    repeated TileType pair = 6;  //吃碰槓的組合配對
    int64 baseID           = 5;
}

message PlayerPick {
    uint64 userID                  = 1;
    TileType tiles                 = 2;
    yesno.YesNo isDeclareReadyHand = 4;  // 是否宣告聽牌
    string requestID               = 3;
    yesno.YesNo isAdd              = 5;
}