syntax = "proto3";
package mahjong;
option go_package       = "gitlab.ffglobaltech.com/us888/pluto/protos/mahjong";
option csharp_namespace = "MahjongProto";

// GameMode 遊戲模式
enum GameMode {
    UNKNOWN_GAME_MODE   = 0;
    CLASSIC             = 1;  // 經典賽
    EXCHANGE_THREE_TILE = 2;  // 換三張
    LACK_ONE_TILE_TYPE  = 3;  // 缺一門
    ONE_VS_ONE          = 4;  // 一對一
    CHAMPIONSHIP        = 5;  // 錦標賽
    BLOOD_LIKE_RIVER    = 6;  // 血流成河
}

// CircleType 圈數類型
enum CircleType {
    UNKNOWN_CIRCLE_TYPE = 0;
    ONE_IN_FOUR         = 1;  // 1/4 圈
    ONE                 = 2;  // 1 圈
    JONG                = 3;  // 1 將
}

// RoomCondition 湊房條件
message RoomCondition {
    GameMode mode     = 1;  // 遊戲模式
    int64 base_score  = 2;  // 底
    int64 score       = 3;  // 台
    CircleType circle = 4;  // 圈數
    int32 seconds     = 5;  // 秒數
}
