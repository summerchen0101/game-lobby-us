syntax = "proto3";
package mary;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/mary";

import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/pagination/pagination.proto";

enum MaryType {
    PING_PONG        = 0;
    JOIN_ROOM        = 1;  // 進入房間
    USER_KICK_BEFORE = 2;
    SERVER_UPDATE    = 3;

    LEAVE            = 11;  // 離開
    BET              = 12;  // 下注
    BIG_SMALL_BET    = 13;  // 比大小下注
    LOCK_ROOM        = 14;  // 保留房間
    GET_ROOM_DETAIL  = 15;  // 房間資訊
    LIST_ROOM_DETAIL = 16;  // 概率表清單
    UNLOCK_ROOM      = 17;  // 解鎖房間
    USER_LOCK_ROOM   = 18;  // 保留房間

    ROOM_CLOSE = 26;
}

enum Symbol {
    UNKNOWN_BET_SYMBOL = 0;
    SA                 = 1;
    SB                 = 2;
    SC                 = 3;
    SD                 = 4;
    SE                 = 5;
    SF                 = 6;
    SG                 = 7;
    SH                 = 8;
    SI                 = 9;
    A                  = 10;
    K                  = 11;
    Q                  = 12;
    J                  = 13;
    T                  = 14;
    N                  = 15;
    E                  = 16;
    SS1                = 17;
    SS2                = 18;
}

message JoinRoomResponse {
    PlayerInfo playerInfo = 1;  // 玩家
}

// 下注 req
message BetReq {
    repeated Bet bet = 1;
    uint64 userID    = 2;
    int64 betAmount  = 3;  // 單住下注金額
}

message Bet {
    Symbol symbol  = 1;  // 下注圖標
    int64 betCount = 2;
}

// 下注 resp
message BetResp {
    repeated int64 symbolRate     = 1;
    int64 code                    = 2;  // 0: 正常 1:送燈 2:火車 3:大滿貫
    repeated BetRespDetail detail = 3;
    int64 balance                 = 4;  // 玩家餘額
    int64 winCoin                 = 5;  // 贏分
}

message BetRespDetail {
    Symbol symbol = 1;
    int64 index   = 2;
}

message BigSmallBetReq {
    yesno.YesNo isBig = 1;
}
message BigSmallBetResp {
    yesno.YesNo isWin = 1;
    int64 balance     = 2;  // 玩家餘額
    int64 winCoin     = 3;  // 贏分
}

message PlayerInfo {
    uint64 userID   = 1;
    string nickname = 2;
    string imageURL = 3;
    uint64 vipLevel = 4;
    uint64 level    = 5;
    int64 balance   = 6;  // 餘額
    int64 roomIndex = 7;
}
// 鎖房間 request
message LockRoomRequest {
    string roomID = 1;
    uint64 userID = 2;
}
// 解鎖房間 request
message UnLockRoomRequest {
    string roomID = 1;
    uint64 userID = 2;
}
// user 鎖房間 request
message UserLockRoomInfoRequest {
    uint64 userID  = 1;
    int64 roomType = 2;
}

// 取得房間明細資訊
message GetRoomDetailRequest {
    string roomID = 1;
}

message GetRoomDetailResponse {
    RoomDetail detail = 1;
}

message RoomDetail {
    RoomDetailInfo today              = 1;
    RoomDetailInfo week               = 2;
    RoomDetailInfo month              = 3;
    RoomDetailInfo until              = 4;
    int64 noInterOnceMoreCount        = 5;
    int64 lastTimeOnceMoreCount       = 6;
    int64 lastSecondTimeOnceMoreCount = 7;  // 前兩轉未進 onceMore 次數
    int64 lastThirdTimeOnceMoreeCount = 8;  // 前三轉未進 onceMore 次數
}
message RoomDetailInfo {
    float rtp           = 1;
    int64 onceMoreCount = 2;
}

message ListRoomDetailRequest {
    uint32 page                           = 1;
    uint32 perPage                        = 2;
    RoomDetailConditionType conditionType = 3;
    int64 roomType                        = 4;
}
message ListRoomDetailResponse {
    repeated RoomDetailData roomDetailData = 1;
    pagination.Pagination page             = 2;
}

message RoomDetailData {
    string roomID                       = 1;  // 房間 ID
    int64 id                            = 2;  // 台號
    int64 noInterOnceMoreCount          = 3;  // 未開 onceMore 次數
    int64 avgOnceMoreCount              = 4;  // 平均 onceMore 次數
    float rtp                           = 5;  // rtp
    int64 monthSuperMegaWinCount        = 6;  // 30 內 SuperMegaWin 次數
    int64 monthMegaWinCount             = 7;  // 30 內 MegaWin 次數
    RoomDetailStateType roomDetailState = 8;  // 狀態
}

enum RoomDetailConditionType {
    UNKNOWN_ROOM_DETAIL_CONDITION_TYPE = 0;
    ALL                                = 1;  // 全機台
    EMPTY                              = 2;  // 空機台
}
enum RoomDetailStateType {
    UNKNOWN_ROOM_DETAIL_STATE_TYPE = 0;
    GENERAL                        = 1;  // 正常(空房)
    IN_PLAY                        = 2;  // 正有人在玩(已滿)
    LOCK                           = 3;  // 鎖房間(保留)
}

message marySettle {
    int64 code                      = 1;
    BetResp betResp                 = 2;
    BetReq betReq                   = 3;
    BigSmallBetReq bigSmallBetReq   = 4;
    BigSmallBetResp bigSmallBetResp = 5;
}

message userOrder {
    string gameOrderID              = 1;
    repeated userOrderDetail detail = 2;
}

message userOrderDetail {
    marySettle marySettle   = 1;
    int64 bigSmallBetAmount = 2;
}
message UserLockRoomInfo {
    uint64 gameID  = 1;
    int64 id       = 2;
    string roomID  = 3;
    int64 lockTime = 4;
    int64 userID   = 5;
    int64 roomType = 6;
}
