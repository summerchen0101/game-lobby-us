syntax = "proto3";
package megaman;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/megaman";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";
import "proto/activity/activity.proto";
import "proto/judan/judan.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/pagination/pagination.proto";
import "proto/megaman/lobby.proto";
import "google/protobuf/wrappers.proto";

message ReceivedLotteryTicketsPush {
    uint64 userID                   = 1;
    int64 amount                    = 2;
    judan.GameCategory gameCategory = 3;
    string imageURL                 = 4;
    string nickname                 = 5;
    uint64 vipLevel                 = 6;
    uint64 level                    = 7;
    activity.TicketType ticketType  = 8;
}

// 取得活動列表
message ListActivitiesRequest {
}
message ListActivitiesResponse {
    repeated ActivityData activities = 1;
}

// 取得活動詳情
message GetActivityRequest {
    uint64 activityID = 1;  // 活動 ID
}
message GetActivityResponse {
    ActivityData activity = 1;
}
message ActivityData {
    uint64 activityID                                            = 1;  // 活動 ID
    activity.ActivityCategory activityType                       = 2;  // 活動類型
    string activityName                                          = 3;  // 活動名稱
    int64 sort                                                   = 4;  // 顯示排序
    int64 displayStartTime                                       = 5;  // 顯示活動開始時間
    int64 displayEndTime                                         = 6;  // 顯示活動結束時間
    repeated DailyMissionCreditReward dailyMissionCreditRewards  = 7;  // 每日任務活動的積分獎勵
    map<int64, UserDailyMissionsByDate> UserDailyMissionsByDates = 8;  // 根據日期區分的每日任務
    int64 achievedCreditAmount                                   = 9;  // 已累積積分
}
message DailyMissionCreditReward {
    int64 requiredCreditAmount = 1;
    int64 itemID               = 2;
    int64 itemAmount           = 3;
    bool isCollected           = 4;  // 已領取
}
message UserDailyMissionsByDate {
    int64 date                                  = 1;
    repeated UserDailyMission userDailyMissions = 2;
}
message UserDailyMission {
    uint64 activityID         = 1;   // 活動 ID
    uint64 dailyMissionID     = 2;   // 每日任務 ID
    int64 date                = 3;   // 日期 unix timestamp millisecond
    int32 dailyMissionType    = 4;   // 活動任務類型
    repeated int64 gameIDs    = 5;   // 遊戲 ID
    int64 minVIPLevel         = 6;   // 最少 VIP 等級
    int64 actionTimes         = 7;   // 動作次數
    int64 minBetAmount        = 8;   // 單次最少下注金額
    int64 minGainAmount       = 9;   // 單次最少贏取金額
    int64 totalBetAmount      = 10;  // 累積下注金額
    int64 totalGainAmount     = 11;  // 累積贏取金額
    int64 creditAmount        = 12;  // 積分
    int64 itemID              = 13;  // 物品 ID
    int64 itemAmount          = 14;  // 物品數量
    int64 achievedActionTimes = 15;  // 已達成次數
    int64 achievedBetAmount   = 16;  // 已達成下注金額
    int64 achievedGainAmount  = 17;  // 已達成贏取金額
    bool isCollected          = 18;  // 已領取
    int64 sort                = 19;  //
}


// 取得活動對應位置＆釋出類型的圖片資訊
message GetActivityImageRequest {
    uint64 activityID                    = 1;  // 活動 ID
    activity.AppType appType             = 2;  // 釋出類型 1:APK 2:Apple 3:Google
    activity.ImagePosition imagePosition = 3;  // 圖片位置
}
message GetActivityImageResponse {
    uint64 activityImageID               = 1;  // 活動圖片 ID
    uint64 activityID                    = 2;  // 活動 ID
    activity.ActivityCategory category   = 3;  // 活動類型 1:樂透
    activity.AppType appType             = 4;  // 釋出類型 1:APK 2:Apple 3:Google
    activity.ImagePosition imagePosition = 5;  // 圖片位置
    activity.Image image                 = 6;  // 圖片資訊
    activity.Action action               = 7;  // 圖片動作
}

// 取得樂透開獎列表 (已開獎)
message ListLotteryDrawRequest {
    uint64 activityID = 1;  // 活動 ID
    uint32 limit      = 2;  // 筆數上限
}
message ListLotteryDrawResponse {
    repeated LotteryDraw lotteryDraws = 1;
}
message LotteryDraw {
    uint64 lotteryDrawID               = 1;  // 開獎 ID
    uint64 activityID                  = 2;  // 活動 ID
    int64 drawName                     = 3;  // 期別
    int64 drawTime                     = 4;  // 開獎日期
    repeated int32 drawNumbers         = 5;  // 開獎號碼
    repeated PrizeContent prizeContent = 6;  // 獎項細節
    uint64 totalPrizeNumber            = 7;  // 中獎總張數
}
message PrizeContent {
    activity.PrizeRanking ranking = 1;  // 中獎獎項
    repeated AwardUser awardUsers = 2;  // 中獎名單 （只有頭獎會有資料）
    uint64 awardUserNumber        = 3;  // 中獎人數
    uint64 awardItemID            = 4;  // 獎項
    uint32 awardCount             = 5;  // 獎項數量
}
message AwardUser {
    uint64 UserID   = 1;  // 玩家 ID
    string nickname = 2;  // 暱稱
}

// 取得彩券列表 (當前未開獎的彩券及上一次有開獎的彩券)
message ListLotteryTicketRequest {
    uint64 userID       = 1;  // 使用者 ID
    int64 page          = 3;  // 頁數
    int64 perPage       = 4;  // 幾筆
    yesno.YesNo current = 5;  // 當期
}
message ListLotteryTicketResponse {
    LotteryTicketDrawData lotteryTicketDrawInfomation = 2;
}
message LotteryTicketDrawData {
    int64 drawName                                    = 1;  // 期別
    int64 drawTime                                    = 2;  // 開獎日期
    yesno.YesNo status                                = 3;  // 開獎狀態
    repeated int32 drawNumbers                        = 4;  // 開獎號碼
    repeated LotteryTicket lotteryTickets             = 5;  // 彩券列表
    yesno.YesNo current                               = 6;  // 是否為當期
    int64 total                                       = 7;  // 總筆數
    repeated activity.TicketTypeCount ticketTypeCount = 8;  // 各類別彩券數量
}
message LotteryTicket {
    uint64 lotteryTicketID             = 1;  // 彩券 ID
    uint64 activityID                  = 2;  // 活動 ID
    uint64 lotteryDrawID               = 3;  // 樂透開獎 ID
    uint64 userID                      = 4;  // 使用者 ID
    activity.TicketType ticketType     = 5;  // 彩券類型
    repeated uint32 ticketNumber       = 6;  // 彩券號碼
    yesno.YesNo isWin                  = 7;  // 是否中獎
    activity.PrizeRanking prizeRanking = 8;  // 中獎排名
    int64 createdTime                  = 9;  // 創建時間
    yesno.YesNo isDraw                 = 10; // 是否對獎過
}

// 取得任務列表
message ListMissionRequest {
    uint64 activityID  = 1;  // 活動 ID
    yesno.YesNo enable = 2;  // 任務開關
}
message ListMissionResponse {
    repeated Mission missions = 1;
}
message Mission {
    uint64 missionID                                = 1;  // 任務 ID
    uint64 activityID                               = 2;  // 活動 ID
    repeated uint64 gameIDs                         = 3;  // 遊戲 ID
    uint32 gameCategory                             = 4;  // 遊戲類型
    activity.MissionType missionType                = 5;  // 任務類型
    repeated activity.MissionSetting missionSetting = 6;  // 任務配置
    int64 sort                                      = 7;  // 遊戲排序
}

// 取得玩家任務進度
message GetUserMissionProgressRequest {
    uint64 missionID = 1;  // 任務 ID
    uint64 userID    = 2;  // 使用者 ID
}
message GetUserMissionProgressResponse {
    MissionProgress missionProgress = 1;
}
message MissionProgress {
    uint64 gainAmountID = 1;  // 總贏分 ID
    uint64 missionID    = 2;  // 任務 ID
    uint64 userID       = 3;  // 使用者 ID
    int64 gainAmount    = 4;  // 贏分
}

// 取的玩家活動通知紅點
message GetUserActivityNotificationRedRequest {
    uint64 userID = 1;  // 使用者 ID
}
message GetUserActivityNotificationRedResponse {
    uint64 userID                  = 1;  // 使用者 ID
    yesno.YesNo isShow             = 2;  // 是否顯示活動紅點
    yesno.YesNo isShowDailyMission = 3;  // 是否顯示每日任務活動紅點
}

// 更新玩家最新讀取過的彩票資訊
message UpsertUserLatestReadTicketRequest {
    uint64 userID                = 1;  // 使用者 ID
    uint64 latestLotteryTicketID = 2;  // 最新讀取過的彩券 ID
}

// 取得幸運轉盤獎品 Req
message ReceiveLuckyProductRequest {
    uint64 userID  = 1;
    uint64 luckyID = 2;
}

// 取得幸運轉盤獎品 Resp
message ReceiveLuckyProductResponse {
    repeated LuckyProduct product    = 1;
    LuckyProduct receiveLuckyProduct = 2;
}

message LuckyProduct {
    int64 itemID = 1;
    int64 amount = 2;
}

// 取得玩家幸運轉盤次數 Req
message GetLuckyTimeRequest {
    uint64 userID  = 1;
    uint64 luckyID = 2;
}

// 取得玩家幸運轉盤次數 Resp
message GetLuckyTimeResponse {
    int64 remainTimes  = 1;  // 剩餘次數
    int64 receiveTimes = 2;  // 可領獎時間
}

message ListLuckyRankingRequest {
    uint64 luckyID = 1;
    int64 page     = 2;
    int64 perPage  = 3;
}
message ListLuckyRankingResponse {
    repeated LuckyRanking luckyRanking = 1;
    pagination.Pagination page         = 2;
}
message LuckyRanking {
    int64 rank       = 1;  // 排名
    uint64 userID    = 2;  // userID
    uint64 vipLevel  = 3;  // vip 等級
    string avatar    = 4;  // 頭像
    string nickName  = 5;  // 玩家名稱
    int64 times      = 6;  // 已抽次數
    int64 totalTimes = 7;  // 總次數
    int64 amount     = 8;  // 總獎金數
}
message ReceiveLuckyMessageResponse {
    int64 itemID = 1;
    int64 amount = 2;
}


// ActivityCollectReward ...
message ActivityCollectRewardReq {
    uint64 activityID           = 1;  // 活動 ID
    uint64 dailyMissionID       = 2;  // 每日任務 ID
    int64 requiredCreditAmount  = 3;  // 需要累積積分
}

message ActivityCollectRewardResp {
}

message GetReferralInfoResp {
    ReferralInfo referralInfo                  = 1; // 推廣資訊
    google.protobuf.StringValue myReferrerCode = 2; // 我的推薦碼
    int64 registerReferredCnt                  = 3; // 註冊推薦人數
    int64 qualifiedReferredCnt                 = 4; // 符合條件推薦人數
}

message ReferralInfo {
    repeated ReferralReward rewards = 1; // 獎勵明細
    string DepositThreshold         = 2; // 儲值門檻
    string CurrencyCode             = 3; // Currency Code ISO 4217 (ex:USD)
}

message ReferralReward {
    megaman.WalletType walletType = 1; // 錢包類型
    int64 amount                  = 2; // 金額
}

message ClaimReferralRewardResp {
    repeated ReferralReward rewards = 1; // 該次領取成功的獎勵明細
}