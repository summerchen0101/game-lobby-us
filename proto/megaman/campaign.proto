syntax = "proto3";
package megaman;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/megaman";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/pagination/pagination.proto";
import "proto/campaign/campaign.proto";
// import "proto/drop/drop.proto";

import "proto/megaman/store.proto";

message Campaign {
    string id                  = 1;
    campaign.CampaignType type = 2;
    campaign.Image image       = 3;
    int64 startedAtMs          = 4;
    int64 endedAtMs            = 5;
    yesno.YesNo hasAction      = 6;  //是否有 跳轉行為 有則在點擊時 觸發 CAMPAIGN_CLICK 獲取
    int64 sort                 = 7;  //排序
    string name                = 8;  //名稱
}

//--- Request / Response ---//

// List_INBOX enum
message ListInBoxRequest {
    uint32 page    = 1;
    uint32 perPage = 2;
}

message ListInBoxResponse {
    repeated Campaign campaign = 1;
    pagination.Pagination page = 2;
}

// LIST_HOMEPAGE_CAMPAIGN enum
message ListHomePageCampaignRequest {
    uint32 page    = 1;
    uint32 perPage = 2;
}

message ListHomePageCampaignResponse {
    repeated Campaign campaign   = 1;
    pagination.Pagination page   = 2;
    int64 dailyRewardRecivedAtMs = 3;  // 0代表還未領取 每日獎勵領取時間
}

// CAMPAIGN_CLICK enum
message CampaignClickRequest {
    string id = 1;
}

message CampaignClickResponse {
    string id              = 1;
    campaign.Action action = 2;
}

message ReceiveDailyInboxRewardResp {
    repeated megaman.StoreItemInfo items = 1;
}