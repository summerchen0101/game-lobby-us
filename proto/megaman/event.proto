syntax = "proto3";
package megaman;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/megaman";

import "proto/campaign/event.proto";

message AcceptingRewardReq {
    string reward_key = 1;  // 領取用的獎項key
    uint64 user_id    = 2;
}

message ListEventsReq {
    campaign.EventCategory category = 1;
}

message ListEventsResp {
    repeated Event events = 1;
}

message Event {
    campaign.EventCategory category = 1;
    bytes event                     = 2;
    uint64 id                       = 3;
}

message VoucherEvent {
    string name                  = 1;  // 活動名稱
    int64 start_time             = 2;  // 開始時間
    int64 end_time               = 3;  // 結束時間
    repeated VoucherInfo infos   = 4;  // 獎券資訊
    string event_link            = 5;  // 活動詳細說明連結
    repeated string banner_links = 6;  // 圖片連結
}

message VoucherInfo {
    uint64 item_id          = 1;
    int64 current_score     = 2;  // 當前累積值
    int64 threshold_score   = 3;  // 門檻值
    int64 total_count       = 4;  // 目前獲得幾張
    repeated string serials = 5;  // 獲得序號
}

message ReturnPlayerEvent {
    string name                     = 1;  // 活動名稱
    int64 start_time                = 2;  // 開始時間
    int64 end_time                  = 3;  // 結束時間
    repeated ReturnPlayerInfo infos = 4;  // 回饋資訊
    uint64 accumulated_money        = 5;  // 累計儲值金額
    string event_link               = 6;  // 活動詳細說明連結
    repeated string banner_links    = 7;  // 圖片連結
}

message ReturnPlayerInfo {
    uint64 threshold_money          = 1;  // 累計儲值金額門檻
    repeated ReturnPlayerItem items = 2;
    campaign.RewardStatus status    = 3;
    string reward_key               = 4;  // 領取用的獎項 key
}

message ReturnPlayerItem {
    uint64 item_id = 1;
    uint64 amount  = 2;
}
