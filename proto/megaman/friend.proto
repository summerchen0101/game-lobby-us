syntax = "proto3";
package megaman;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/megaman";

import "gitlab.ffglobaltech.com/us888/ciri/commonpb/pagination/pagination.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";
import "proto/playerinfo/model.proto";
import "proto/relation/relation.proto";

message ListFriendsRequest {
    uint32 page                        = 1;
    uint32 perPage                     = 2;
    relation.FriendStatus friendStatus = 3;
}

message ListFriendsResponse {
    repeated Friend friend     = 1;
    pagination.Pagination page = 2;
}

message Friend {
    playerinfo.PlayerInfo playerInfo = 1;
    yesno.YesNo isOnline             = 2;
    string roomID                    = 3;
}

message CreateFriendsRequest {
    uint64 friendID = 1;
}

message ConfirmFriendsRequest {
    uint64 friendID = 1;
}

message CancelFriendsRequest {
    uint64 friendID = 1;
}

message ListBlackFriendsRequest {
    uint32 page    = 1;
    uint32 perPage = 2;
}

message ListBlackFriendsResponse {
    repeated Friend friend     = 1;
    pagination.Pagination page = 2;
}

message AddBlackRequest {
    uint64 blockID = 1;
}

message CancelBlackRequest {
    uint64 blockID = 1;
}

message ListFirendRecommendsResp {
    repeated playerinfo.PlayerInfo specialPlayers = 1;  //
    repeated playerinfo.PlayerInfo normalPlayers  = 2;  // 一般玩家
}

message GetInviteFriendRequest {
    uint64 userID   = 1;
    string nickName = 2;
}
message GetInviteFriendResponse {
    uint64 vipLevel          = 1;
    uint64 avatarID          = 2;
    playerinfo.Gender gender = 3;
    string name              = 4;
    yesno.YesNo isOnline     = 5;
    uint64 id                = 6;
}