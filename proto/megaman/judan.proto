syntax = "proto3";
package megaman;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/megaman";

import "gitlab.ffglobaltech.com/us888/ciri/commonpb/pagination/pagination.proto";
import "proto/roomcontroller/model.proto";

message ListReplayReq {
    uint64 gameID  = 3;
    uint32 page    = 1;  //頁數
    uint32 perPage = 2;  //每頁幾筆
}

message ListReplayResp {
    repeated Replay replay           = 1;
    pagination.Pagination pagination = 2;  //分頁資訊
}

message Replay {
    uint64 orderID                   = 1;  // 注單ID
    string gameOrderUID              = 2;  // 遊戲方注單UID  //spin id , bullet id , round id ...etc
    roomcontroller.RoomType roomType = 10;
    uint64 userID                    = 3;
    string roomID                    = 4;
    uint64 betAmount                 = 5;
    uint64 gainAmount                = 6;
    uint64 commissionAmount          = 7;
    bytes tape                       = 8;  // 盤面
    int64 createAtMs                 = 9;
}
message GetReplayReq {
    uint64 orderID      = 1;
    uint64 gameID       = 2;
    string gameOrderUID = 3;
}

message GetReplayResp {
    bytes tape = 1;  // 盤面
}
