syntax = "proto3";
package megaman;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/megaman";

import "proto/msg/msg.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/pagination/pagination.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";
import "proto/redenvelope/redenvelope.proto";

message SendMsg {
    string roomID               = 1;
    uint64 sender               = 2;
    msg.RoomType roomType       = 3;
    msg.MessageType messageType = 4;
    repeated uint64 tags        = 5;
    string message              = 6;
    bytes data                  = 7;
}

message SendMsgResp {
    yesno.YesNo isBan = 2;
    uint64 stopAtMs   = 1;
}

message BanPlayerMsgPush {
    yesno.YesNo isBan = 2;
    uint64 stopAtMs   = 1;
}

message MsgResp {
    msg.Message msg = 1;
    string roomID   = 2;
}

message GetRoomMessageReq {
    string roomID       = 1;
    uint32 page         = 2;
    uint32 perPage      = 3;
    uint64 lastReadTime = 4;
}

message GetRoomMessageResp {
    repeated msg.Message msgList = 1;
    pagination.Pagination page   = 2;
}

message GroupRoomMessageReq {
    uint64 lastReadTime = 1;
}

message GroupRoomMessageResp {
    repeated msg.RoomMessageCount roomMessageCount = 1;
    repeated redenvelope.RedEnvelope redEnvelopes  = 2;
}

// message GetUnreadResp {
//     msg.UnreadMsgList unreadMsgList = 1;
// }

message SeverPushMessage {
    uint64 userID = 1;
    enum SeverPushMessageType {
        PushMessageTypeUnknow            = 0;
        PushMessageTypePopUpMsg          = 1;  //彈跳視窗
        PushMessageType_SYS_NOTIFICATION = 2;  //系統信息
    }
    SeverPushMessageType type = 5;
    string title              = 2;
    string msg                = 3;
    int64 timestamp           = 4;
    bytes data                = 6;
}
