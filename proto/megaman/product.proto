syntax = "proto3";
package megaman;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/megaman";

import "proto/virtualgood/virtualgood.proto";

message ListProductsRequest { 
}
message ListProductsResponse {
  repeated ListProductsResponseProduct products = 1;
}
message ListProductsResponseProduct {
  uint64 productID                                    = 1;
  string originalPrice                                = 4;
  string price                                        = 5;
  repeated uint64 paymentTypes                        = 2;
  repeated virtualgood.ProductContent productContents = 3;
}

message BuyProductRequest {
  uint64 productID   = 1;
  uint64 paymentType = 2;
}
message BuyProductResponse {
  string orderID    = 1;
  string paymentURL = 2;
}