syntax = "proto3";
package megaman;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/megaman";

import "proto/ranking/ranking.proto";
import "proto/ranking/competition.proto";
import "proto/playerinfo/model.proto";
import "proto/megaman/lobby.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/pagination/pagination.proto";

message AddRankingRequest {
    ranking.Ranking ranking = 1;
}

message GetDisplayMenusResponse {
    repeated ranking.RankingType menus = 1;
}

message ListRankingRequest {
    ranking.RankingType ranking_type = 1;
}

message ListRankingResponse {
    repeated ranking.Ranking ranking  = 1; // 只顯示前100筆
    ranking.Ranking self_best_ranking = 2;
}
message ListCompetitionRequest {
    ranking.EnableType enableType = 1; // 狀態
}

message ListCompetitionResponse {
    repeated ranking.Competition competition = 1;
    ranking.EnableType enableType            = 2; // 狀態
}

message ListCompetitionRankingRequest {
    uint64 competitionID = 1; // 比賽 ID
}

message ListCompetitionRankingResponse {
    repeated CompetitionRanking competitionRanking = 1;
}
message CompetitionRanking {
    uint64 userID      = 1; // 使用者 ID
    string avatarID    = 2; // 頭像 ID
    string name        = 3; // 名稱
    uint64 vipLevel    = 4; // vip等級
    uint64 gameID      = 5; // 遊戲ID
    float winRate      = 6; // 贏分資訊倍率
    bytes playback     = 7; // 回放  !!! 1300 版本後將不使用
    bytes initData     = 8; // slot init data !!! 1300 版本後將不使用
    int64 rank         = 10; // 排名
    int64 winData      = 11; // 贏分資訊
    uint64 gameOrderID = 12; // 注單ID
    bool isShowReplay  = 13; // 是否顯示重播按鈕
}

message GetCompetitionRankingReplayRequest {
    uint64 gameOrderID = 1; // 注單ID
}

message GetCompetitionRankingReplayResponse {
    bytes playback = 1; // 回放
    bytes initData = 2; // slot init data
}

message ListJackPotPlayerReq {
    int64 page    = 1;
    int64 PerPage = 2;
}

message ListJackPotPlayerResp {
    pagination.Pagination page          = 1;
    repeated JackPotPlayer jackPotBingo = 2;
}

message JackPotPlayer {
    int64 award                      = 1;
    playerinfo.PlayerInfo playerInfo = 2;
    int64 createdTime                = 3;
    int64 money                      = 4;
    int64 betAmount                  = 8;
    uint64 gameID                    = 5;
    ranking.JackPotType JackPotType  = 6;
    ranking.BigWinLevel level        = 7;
}

message ListJackPotResp {
    repeated JackPotInfo info = 1;
}

message JackPotInfo {
    ranking.JackPotType JackPotType = 1;
    float amount                    = 2; // 現在金額倍率
    int64 award                     = 3; // 獎項
    WalletType walletType           = 4; // 錢包類型
}

message ListPlayerBingoReq {
    int64 page    = 1;
    int64 PerPage = 2;
}

message ListPlayerBingoResp {
    pagination.Pagination page          = 1;
    repeated JackPotPlayer jackPotBingo = 2;
}

message ListRichDaddiesReq {
    string duration = 1; // 30days, 180days
}

message ListRichDaddiesResp {
    repeated ListRichDaddiesRespRichDaddy richDaddies    = 1;
    repeated ListRichDaddiesRespRichDaddy oldRichDaddies = 2;
    repeated ListRichDaddiesRespLike lastLikes           = 3;
}

message ListRichDaddiesRespRichDaddy {
    uint64 userID    = 1;
    string nickname  = 2;
    string avatarURL = 3; // 頭像 URL
    uint64 vipLevel  = 4;
    uint64 level     = 5;
    uint64 amount    = 6; // 金幣
    uint64 createdAt = 7; // 時間戳毫秒
    string id        = 8; // ID
    bool isOnline    = 9; // 線上?
    uint64 likeTimes = 11; // 讚數
}

message ListRichDaddiesRespLike {
    string id        = 1;
    uint64 createdAt = 2;
}