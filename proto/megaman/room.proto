syntax = "proto3";
package megaman;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/megaman";

import "gitlab.ffglobaltech.com/us888/ciri/commonpb/pagination/pagination.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";
import "proto/roomcontroller/model.proto";
import "proto/playerinfo/model.proto";

message GetNowPlayingReq {
}

message GetNowPlayingResp {
    repeated roomcontroller.Room room = 1;
}

message GetNowPlayingCountReq {
    uint64 gameID = 1;
}

message GetNowPlayingCountResp {
    uint64 count = 1;
}

message JoinGameRoomRequest {  // response 去看每一個game
    string roomID        = 1;
    repeated int32 tiles = 2;
    uint64 tokenAmount   = 3;
}

message ListRoomsRequest {
    uint64 gameID                               = 1;
    roomcontroller.RoomLevel roomLevel          = 2;
    uint32 page                                 = 3;
    uint32 perPage                              = 4;
    repeated roomcontroller.RoomType roomTypeIn = 5;
}

message ListRoomsResponse {
    repeated roomcontroller.Room rooms = 1;
    pagination.Pagination page         = 2;
}

message JoinRoomRequest {
    string roomID = 1;
    uint64 userID = 2;
    uint64 gameID = 3;
    uint64 baseID = 4;
    bytes data    = 5;
}
message RoomAuthRequest {
    string roomID = 1;
    uint64 userID = 2;
}

message CreatePrivateRoomRequest {
    uint64 gameID                      = 1;
    roomcontroller.RoomLevel roomLevel = 2;
    uint64 userID                      = 3;
    bytes data                         = 4;
}

// 將玩家加入房間請求
message CreatePrivateRoomResponse {
    roomcontroller.Room room = 1;
}

message CreatePassRoomReq {
    uint64 gameID                      = 1;
    roomcontroller.RoomLevel roomLevel = 2;
    bytes data                         = 4;
}

// 將玩家加入房間請求
message CreatePassRoomResp {
    roomcontroller.Room room = 1;
}

message JoinPassRoomReq {
    string pass   = 1;
    uint64 gameID = 2;
}

message JoinPassRoomResp {
    roomcontroller.Room room = 1;
}

message ListPassRoomRequest {
    uint64 gameID = 1;
}

message ListPassRoomResp {
    repeated roomcontroller.Room rooms = 1;
}

message JoinRandomRoomRequest {
    uint64 gameID                      = 1;
    roomcontroller.RoomLevel roomLevel = 2;
    uint64 userID                      = 3;
}

message JoinRandomRoomResponse {
    roomcontroller.Room room = 1;
    int64 baseID             = 2;
}

message LockRoomRequest {
    string roomID = 1;
    uint64 userID = 2;
    uint64 gameID = 3;
}

// 回傳２０４
message InviteRoomRequest {
    string roomID           = 1;
    repeated uint64 userIDs = 2;
    uint64 baseID           = 3;
    uint64 gameID           = 4;
    bytes roomParams        = 5;  // 房間設定參數 依照不同類型遊戲參數需求 帶上
}

// 這一個是指你要邀的那個人收到的喔～
message InviteRoomResponse {
    roomcontroller.Room room      = 1;
    playerinfo.PlayerInfo inviter = 2;
    uint64 baseID                 = 3;
    bytes roomParams              = 4;  // 房間設定參數 從發送方送來 依照不同類型遊戲需求 解析
}

// api會回２０４代表ok
message PlayTogetherRequest {
    uint64 gameID                      = 1;
    bytes roomFilter                   = 2;
    string host                        = 3;
    roomcontroller.RoomLevel roomLevel = 4;
}

// 假設有湊成功回主動serverPush到相對的使用者
message PlayTogetherResponse {
    roomcontroller.Room room = 1;
    yesno.YesNo onlyYou      = 2;
}

// api會回２０４代表ok
message PlayTogetherTimeoutRequest {
    uint64 gameID                      = 1;
    bytes roomFilter                   = 2;
    string host                        = 3;
    roomcontroller.RoomLevel roomLevel = 4;
}

// 假設有湊成功回主動serverPush到相對的 使用者
message PlayTogetherTimeoutResponse {
    roomcontroller.Room room = 1;
}

// api會回２０４代表ok
message PlayTogetherCancelRequest {
    uint64 gameID    = 1;
    bytes roomFilter = 2;
}