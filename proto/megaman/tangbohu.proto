syntax = "proto3";
package megaman;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/megaman";
import "proto/playerinfo/model.proto";

message ListJackPotBingoRequest {
    int64 page    = 1;
    int64 PerPage = 2;
}
message ListJackPotBingoResponse {
    int64 page                         = 1;
    int64 PerPage                      = 2;
    repeated JackPotBingo jackPotBingo = 3;
}

message JackPotBingo {
    int64 award                      = 1;
    playerinfo.PlayerInfo playerInfo = 2;
    int64 createdTime                = 3;
    int64 money                      = 4;
    uint64 gameID                    = 5;
}