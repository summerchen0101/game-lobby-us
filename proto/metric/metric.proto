syntax = "proto3";
package metric;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/metric";

import "google/protobuf/empty.proto";
import "proto/wallet/wallet.proto";

service MetricService {

  // ListDepositSurvival 每日充值留存列表
  rpc ListDepositSurvival(ListDepositSurvivalReq) returns (ListDepositSurvivalResp);

  // AggDepositSurvival 彙整每日儲值留存
  rpc AggDepositSurvival(AggDepositSurvivalReq) returns (google.protobuf.Empty);

  // AggCoinStatistic 彙整每日金幣統計
  rpc AggDailyCoinStatistic(AggDailyCoinStatisticReq) returns (google.protobuf.Empty);

  // GetDailyCoinStatistic 每日金幣統計
  rpc ListDailyCoinStatistic(ListDailyCoinStatisticReq) returns (ListDailyCoinStatisticResp);
}

// 留存類型
enum SurvivalType {
  SURVIVAL_TYPE_UNKNOWN = 0;
  SURVIVAL_TYPE_LOGIN = 1;   // 留存率的存活根據是否登錄
  SURVIVAL_TYPE_DEPOSIT = 2; // 留存率的存活根據是否儲值
}

message ListDepositSurvivalReq {
  int64 dateAtMs = 1; // 留存日0點(毫秒)
}

message ListDepositSurvivalResp {
  repeated DepositSurvival list = 1;
}

message DepositSurvival {
  string mediaSource          = 1;                 // 媒體來源
  int64 depositStartAtMs      = 2;                 // 儲值時間開始
  int64 depositEndAtMs        = 3;                 // 儲值時間結束
  uint32 firstDepositQuantity = 4;                 // 首次儲值數量
  repeated LoginSurvivalDay loginSurvivalDays = 5; // 每日登入留存
}

message LoginSurvivalDay {
  int64 StartAtMs = 1; // 登入時間開始
  int64 EndAtMs   = 2; // 登入時間結束
  uint32 Quantity = 3; // 登入數量
}

message AggDepositSurvivalReq {
  int64 dateAtMs = 1; // 彙整日期，請帶入至少一天前的日期，因為不彙整還未結束的日期
}

message AggDailyCoinStatisticReq {
  int64 dateAtMs = 1; // 彙整日期，請帶入至少一天前的日期，因為不彙整還未結束的日期
}

message ListDailyCoinStatisticReq {
  int64 dateStartAtMs = 1; // 請填起始查詢日0點(毫秒)
  int64 dateEndAtMs   = 2; // 請填結束查詢日0點(毫秒)
}

message ListDailyCoinStatisticResp {
  repeated DailyCoinStatistic dailyCoinStatistics = 1;
}

message DailyCoinStatistic {
  int64 startAtMs                           = 1; // 統計時間開始
  int64 endAtMs                             = 2; // 統計時間結束
  repeated TradeCoinInfo increaseTradeCoins = 3; // 金幣來源
  repeated TradeCoinInfo decreaseTradeCoins = 4; // 金幣消耗
  WalletAmountSummary activeWalletSummary   = 5; // 統計時間為止前的存活帳號金幣
  WalletAmountSummary suspendWalletSummary  = 6; // 統計時間為止前的帳號停用狀態金幣
}

message TradeCoinInfo {
  wallet.TradeEvent TradeEvent = 1;
  uint64 CoinAmount            = 2;
}

message WalletAmountSummary {
  uint64 CoinAmount  = 1;
  uint64 TokenAmount = 2;
  uint64 SaveAmount  = 3;
}