syntax = "proto3";
package metrics;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/metrics";

import "google/protobuf/empty.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/pagination/pagination.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/sorting/sorting.proto";

import "proto/judan/judan.proto";

service MetricsService {
    /*
        建立事件
    */
    rpc CreateEvent(CreateEventReq) returns (google.protobuf.Empty);
    rpc CreateRegisterEvent(CreateRegisterEventReq) returns (google.protobuf.Empty);
    rpc CreateLoginEvent(CreateLoginEventReq) returns (google.protobuf.Empty);
    rpc CreateLogoutEvent(CreateLogoutEventReq) returns (google.protobuf.Empty);
    rpc CreatePayoutEvent(CreatePayoutEventReq) returns (google.protobuf.Empty);
    rpc CreateLevelUpEvent(CreateLevelUpEventReq) returns (google.protobuf.Empty);
    rpc CreateBettingEvents(CreateBettingEventsReq) returns (google.protobuf.Empty);

    rpc CreateWalletFlowEvents(CreateWalletFlowEventsReq) returns (google.protobuf.Empty);

    /*
        聚合數據排程
    */
    rpc AggregateMetrics(AggregateMetricsReq) returns (google.protobuf.Empty);

    /*
        遊戲總覽
    */
    rpc GameOverview(GameOverviewReq) returns (GameOverviewResp);  // 四象限圖
    // rpc GameHistogram(GameHistogramReq) returns (GameHistogramResp);              // 單一長條圖
    // rpc GameLinearDiagram(GameLinearDiagramReq) returns (GameLinearDiagramResp);  // 單一線圖

    /*
        帳號
    */
    rpc DailyActivatedUsersRetention(DailyActivatedUsersRetentionReq) returns (DailyActivatedUsersRetentionResp);     // 日活躍用戶
    rpc InstallsRetention(InstallsRetentionReq) returns (InstallsRetentionResp);                                      // 下載數量
    rpc InstallAndLaunchAppsRetention(InstallAndLaunchAppsRetentionReq) returns (InstallAndLaunchAppsRetentionResp);  // 下載後有開啟遊戲數量
    rpc NewUsersRetention(NewUsersRetentionReq) returns (NewUsersRetentionResp);                                      // 新增用戶
    rpc MAU(MAUReq) returns (MAUResp);                                                                                // 月活躍用戶
    rpc OnlineUsers(OnlineUsersReq) returns (OnlineUsersResp);                                                        // 同時在線用戶
    rpc AllUsersRetention(AllUsersRetentionReq) returns (AllUsersRetentionResp);                                      // 累計用戶數留存
    rpc NatureFlowsRetention(NatureFlowsRetentionReq) returns (NatureFlowsRetentionResp);                             // 自然流量
    rpc RecommendFlowsRetention(RecommendFlowsRetentionReq) returns (RecommendFlowsRetentionResp);                    // 人拉人玩家

    /*
        轉化率
    */
    rpc RetentionRate(RetentionRateReq) returns (RetentionRateResp);     // 留存率
    rpc ChurnRate(ChurnRateReq) returns (ChurnRateResp);                 // 流失率
    rpc StickinessRate(StickinessRateReq) returns (StickinessRateResp);  // 黏著度

    /*
        玩家查詢
    */
    rpc ListMetricUsers(ListMetricUsersReq) returns (ListMetricUsersResp);

    rpc ListUserBettingHourlyAggregations(ListUserBettingHourlyAggregationsReq) returns (ListUserBettingHourlyAggregationsResp);
    rpc ListUserBettingDailyAggregations(ListUserBettingDailyAggregationsReq) returns (ListUserBettingDailyAggregationsResp);

    /*
        付費
    */
    rpc PayoutSummary(PayoutSummaryReq) returns (PayoutSummaryResp);        // 總付費總表
    rpc PayoutUser(PayoutUserReq) returns (PayoutUserResp);                 // 付費用戶
    rpc PayoutCnt(PayoutCntReq) returns (PayoutCntResp);                    // 付費次數
    rpc PayoutRate(PayoutRateReq) returns (PayoutRateResp);                 // 付費率
    rpc ARPU(ARPUReq) returns (ARPUResp);                                   // 全用戶平均收入
    rpc ARPPU(ARPPUReq) returns (ARPPUResp);                                // 付費戶平均收入
    rpc ARPDAU(ARPDAUReq) returns (ARPDAUResp);                             // 日活躍戶平均收入
    rpc ARPMAU(ARPMAUReq) returns (ARPMAUResp);                             // 月活躍戶平均收入
    rpc VipLevelUserCnt(VipLevelUserCntReq) returns (VipLevelUserCntResp);  // vip各等級人數

    /*
        用戶分析
    */
    rpc UserBehaviorMetric(UserBehaviorMetricReq) returns (UserBehaviorMetricResp);

    /*
        其他分析
    */
    rpc DeviceMetric(DeviceMetricReq) returns (DeviceMetricResp);

    /*
        事件分析
    */
    rpc MetricEventRetention(MetricEventRetentionReq) returns (MetricEventRetentionResp);
}

enum MetricName {
    UNKNOWN_METRIC_NAME           = 0;
    REGISTER_METRIC               = 1;   // 註冊
    LOGIN_METRIC                  = 2;   // 登入
    LOGOUT_METRIC                 = 3;   // 登出
    INSTALL_METRIC                = 4;   // 安裝
    INSTALL_AND_LAUNCH_APP_METRIC = 5;   // 安裝後開啟APP
    LAUNCH_APP_AND_LOGIN_METRIC   = 6;   // 開啟遊戲後有登入用戶
    BETTING_METRIC                = 7;   // 下注
    SEND_RED_ENVELOPE_METRIC      = 8;   // 搶過紅包
    SNATCH_RED_ENVELOPE_METRIC    = 9;   // 發過紅包
    RED_ENVELOPE_MISSION_METRIC   = 10;  // 參與過任務紅包
    LAUNCH_APP_METRIC             = 11;  // 啟動
    CRASH_APP_METRIC              = 12;  // 崩潰
    PAYOUT_FULL_METRIC            = 13;  // 額度已滿
    STORE_OPEN_METRIC             = 14;  // 開啟商城

    LEVEL_PLAYER_METRIC = 15;  // 玩家等級
    VIP_LEVEL_METRIC    = 16;  // vip等級

    PAYOUT_ROLE_METRIC               = 17;  // 買角色
    PAYOUT_SKIN_METRIC               = 18;  // 買時裝
    PAYOUT_TENDRAWS_METRIC           = 19;  // 買十連抽
    PAYOUT_STORE_METRIC              = 20;  // 買禮包
    NOVICE_TEACHING_METRIC           = 21;  // 新手教學
    NOT_ALLOWED_INFO_BY_APPLE_METRIC = 22;  // APPLE不允許給資料
}

