message CreateEventReq {
    MetricName metricName = 1;
    uint64 userID         = 2;
    int64 createdAtMs     = 3;
}

message CreateRegisterEventReq {
    uint64 userID           = 1;
    int64 createdAtMs       = 2;
    yesno.YesNo isNature    = 3;  // 自然留量
    yesno.YesNo isRecommend = 4;  // 推薦(人拉人)
    string apk              = 5;  // 渠道
    string advertising      = 6;  // 廣告渠道
}

message CreateLoginEventReq {
    uint64 userID     = 1;
    int64 createdAtMs = 2;
    string apk        = 3;  // 渠道
    string device     = 4;  // 設備
    string version    = 5;  // 版本
    string region     = 6;  // 地區
    string resolution = 7;  // 畫質
}

message CreateLogoutEventReq {
    uint64 userID     = 1;
    int64 createdAtMs = 2;
}

message CreatePayoutEventReq {
    MetricName metricName = 1;  // payout.role / payout.skin / payout.tendraws / payout.gift
    uint64 userID         = 2;
    int64 createdAtMs     = 3;
    PayoutType payoutType = 4;  // 支付方式
    uint64 amount         = 5;  // 支出
    uint64 itemID         = 6;  // 品項ID(如果有的話再帶,比如說禮包)
}

message CreateLevelUpEventReq {
    MetricName metricName = 1;
    uint64 userID         = 2;
    int64 createdAtMs     = 3;
    uint64 level          = 4;
    uint64 vipLevel       = 5;
}

message CreateBettingEventReq {
    uint64 userID                        = 1;
    int64 createdAtMs                    = 2;
    uint64 betAmount                     = 3;   // 下注
    uint64 gainAmount                    = 4;   // 贏得
    uint64 commissionAmount              = 5;   // 水錢
    uint64 refundAmount                  = 8;   // 退款 官方錢包 -> 玩家錢包
    uint64 commissionOriginAmount        = 10;  // 水錢金額
    uint64 gameID                        = 9;
    judan.GameCategory gameCategory      = 6;  // 遊戲類型
    judan.OrderRTPCountType rtpCountType = 7;  // rtp統計類型
    uint64 userRTP                       = 11;
}

message CreateBettingEventsReq {
    repeated CreateBettingEventReq req = 1;
}

