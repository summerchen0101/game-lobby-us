syntax = "proto3";
package msg;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/msg";

import "gitlab.ffglobaltech.com/us888/ciri/commonpb/pagination/pagination.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";
import "google/protobuf/empty.proto";

service MessageService {
    rpc CreateMessage(CreateMessageReq) returns (CreateMessageResp);
    rpc CreateAtFirstMessage(CreateMessageReq) returns (CreateMessageResp);

    //    rpc AddMessage(AddMessageReq) returns (AddMessageResp);
    rpc GetRoomMessage(GetRoomMessageReq) returns (GetRoomMessageResp);
    rpc GroupRoomMessage(GroupRoomMessageReq) returns (GroupRoomMessageResp);
    // 取得頻道訊息列表
    rpc ListMessages(ListMessagesReq) returns (ListMessagesResp);

    rpc CreateBlockList(CreateBlockListReq) returns (google.protobuf.Empty);
    rpc UpdateBlockList(UpdateBlockListReq) returns (BlockList);
    rpc ListBlockLists(ListBlockListReq) returns (ListBlockListResp);
    rpc DeleteBlockList(DeleteBlockListReq) returns (BlockList);
    rpc BlockListExpire(google.protobuf.Empty) returns (google.protobuf.Empty);

    rpc CheckStrangeWhiteList(CheckStrangeWhiteListReq) returns (google.protobuf.Empty);
    rpc ListStrangeWhitelist(ListStrangeWhitelistReq) returns (ListStrangeWhitelistResp);
    rpc CreateStrangeWhitelist(CreateStrangeWhitelistReq) returns (google.protobuf.Empty);
    rpc DeleteStrangeWhitelist(DeleteStrangeWhitelistReq) returns (google.protobuf.Empty);
}

message CheckStrangeWhiteListReq {
    uint64 fromUserID = 1;
    uint64 toUserID   = 2;
}

message CreateBlockListReq {
    uint64 userID              = 1;
    repeated RoomType roomType = 3;
    uint64 blockTime           = 2;
    uint64 creatorID           = 4;
    string creatorNickname     = 5;
    string reason              = 6;
}

message UpdateBlockListReq {
    uint64 userID              = 1;
    repeated RoomType roomType = 3;
    uint64 blockTime           = 2;
    uint64 updaterID           = 4;
    string updaterNickname     = 5;
    string reason              = 6;
}

message DeleteBlockListReq {
    uint64 userID          = 1;
    uint64 updaterID       = 2;
    string updaterNickname = 3;
}

message ListBlockListReq {
    uint64 userID            = 1;
    yesno.YesNo isEnable     = 2;
    uint64 blockStartingAtMs = 3;
    uint64 blockStopAtMs     = 4;
    string nickname          = 5;
    uint32 page              = 6;
    uint32 perPage           = 7;
}

message ListBlockListResp {
    repeated BlockList blockLists = 1;
    pagination.Pagination page    = 2;
}

message BlockList {
    uint64 userID              = 1;
    string nickname            = 13;
    repeated RoomType roomType = 2;
    yesno.YesNo isEnable       = 3;
    uint64 createdAtMs         = 4;
    uint64 blockStartingAtMs   = 5;
    uint64 blockStopAtMs       = 6;
    uint64 updatedAtMs         = 7;
    uint64 creatorID           = 8;
    string creatorNickname     = 9;
    uint64 updaterID           = 10;
    string updaterNickname     = 11;
    string reason              = 12;
}

message CreateMessageReq {
    string roomID           = 1;
    string roomName         = 2;
    RoomType roomType       = 3;
    uint64 sender           = 4;
    string nickname         = 5;
    uint64 level            = 13;
    uint64 vipLevel         = 6;
    string imageUrl         = 7;
    MessageType messageType = 8;
    int64 apiType           = 12;
    repeated uint64 tags    = 9;
    string message          = 10;
    bytes data              = 11;
    int64 activityLevel     = 14;
}

message CreateMessageResp {
    Message msg = 1;
}

