message Message {
    string roomID            = 1;
    string roomName          = 11;
    RoomType roomType        = 2;
    string messageID         = 3;
    uint64 sender            = 4;
    string nickname          = 5;
    uint64 vipLevel          = 12;
    string imageUrl          = 13;
    uint64 level             = 15;
    repeated string guildIDs = 16;
    MessageType messageType  = 6;
    repeated uint64 tags     = 7;
    string message           = 8;
    uint64 createdAtMs       = 9;
    int64 apiType            = 14;
    bytes data               = 10;
    int64 activityLevel      = 17;
}

//enum TagType {
//    UNKNOWN_TAG_TYPE = 0;
//    ALL              = 1;
//    PERSON           = 2;
//}

enum RoomType {
    UNKNOWN_ROOM_TYPE = 0;
    SYSTEM            = 1;  // 系統
    FRIEND            = 2;  // 好友
    SOCIAL            = 3;  // 群組
    GUILD             = 4;  // 俱樂部
    GLOBAL            = 5;  // 世界頻道
    GLOBAL_FRIEND     = 6;
    STRANGER          = 7;  // 陌生人
    ALLIANCE          = 8;  // 聯盟
    AD                = 9;  // 世界頻道1
}

enum MessageType {
    UNKNOWN_MESSAGE_TYPE = 0;
    TEXT                 = 1;
    IMAGE                = 2;
    VOICE                = 3;
    VIDEO                = 4;
    RED_ENVELOPE         = 5;
    GIFT                 = 6;
    SYSTEM_MSG           = 7;
    EMOJI                = 8;
}

message ListStrangeWhitelistReq {
    uint32 page             = 1;
    uint32 perPage          = 2;
    repeated uint64 userIDs = 3;
}

message ListStrangeWhitelistResp {
    pagination.Pagination pagination   = 1;
    repeated StrangeWhitelistUser list = 2;
}

message StrangeWhitelistUser {
    uint64 userID     = 1;  // 用戶ID
    int64 createdAtMs = 2;  // 創建時間
    string note       = 3;  // 備註
}

message CreateStrangeWhitelistReq {
    uint64 userID = 1;  // 用戶ID
    string note   = 2;  // 備註
}

message DeleteStrangeWhitelistReq {
    uint64 userID = 1;
}

message ListMessagesReq {
    repeated RoomType roomTypes       = 1;  // 訊息頻道
    repeated MessageType messageTypes = 2;  // 訊息類型
    repeated uint64 senderIDs         = 3;  // 發送者ID
    int64 startAtMs                   = 4;  // 開始時間
    int64 endAtMs                     = 5;  // 結束時間
    string roomName                   = 6;  // 頻道名稱
    int64 page                        = 11;
    int64 perPage                     = 12;
}

message ListMessagesResp {
    pagination.Pagination page = 1;
    repeated Message messages  = 2;
}