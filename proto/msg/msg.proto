message GetRoomMessageReq {
    string roomID       = 1;
    uint64 lastReadTime = 4;
    uint32 page         = 2;
    uint32 perPage      = 3;
    repeated string IDs = 5;
    string userID       = 6;
}

message GetRoomMessageResp {
    repeated Message messages  = 1;
    pagination.Pagination page = 2;
}

