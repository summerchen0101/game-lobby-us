message ListRecommendRoomReq {
    RoomType roomType = 1;
}

message ListRecommendRoomResp {
    repeated string roomIDs = 1;
}

message GroupRoomMessageReq {
    repeated string roomID = 1;
    uint64 lastReadTime    = 2;
    uint64 userID          = 3;
}

message GroupRoomMessageResp {
    repeated RoomMessageCount roomMessageCount = 1;
    repeated string roomID                     = 2;
}

message RoomMessageCount {
    string roomID          = 1;
    uint64 count           = 2;
    string roomName        = 3;
    RoomType roomType      = 4;
    uint64 lastCreatedAtMs = 5;
    Message lastMessage    = 6;
}
