syntax = "proto3";
package niuniu;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/niuniu";

import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";

enum NiuType {
    PING_PONG        = 0;
    JOIN_ROOM        = 1;
    USER_KICK_BEFORE = 2;
    SERVER_UPDATE    = 3;

    // MARGIN    = 11;  //返回PlayerInfo  廣播
    LEAVE     = 12;  //返回PlayerInfo  廣播
    GET_DESK  = 13;  //返回DeskInfo    to player２０３
    JACK_DEAL = 14;  //返回PlayerInfo  廣播
    BET       = 15;  //返回PlayerInfo  廣播
    SQUINT    = 25;  //返回PlayerInfo  廣播
    //AGAIN     = 16;  // nil           廣播

    ROOM_CLOSE = 17;

    DEAL_FINISH_PUSH        = 18;  //推DeskInfo
    START_JACK_DEALER_PUSH  = 19;  // nil
    JACK_DEALER_FINISH_PUSH = 20;  //推PlayerInfo
    BET_FINISH_PUSH         = 21;  //推DeskInfo
    SQUINT_START_PUSH       = 24;  //推DeskInfo
    SQUINT_FINISH_PUSH      = 22;  //推DeskInfo
    COUNT_COIN_PUSH         = 23;  //推DeskInfo
                                   // PLAY_AGAIN_PUSH         = 24;  // nil

    //  MARGIN_PUSH = 26;  //推PlayerInfo 玩家可能沒錢了,要重新加保險金
}

// RoomCondition 湊房條件
message RoomCondition {
    uint64 amount     = 1;
    yesno.YesNo joker = 2;
}

enum BetType {
    UNKNOWN_BET_TYPE = 0;
    COUNT            = 1;
}
enum OpenType {
    UNKNOWN_OPEN_TYPE = 0;
    SQUINT_TYPE       = 1;
    OPEN_TYPE         = 2;
}

enum DealerMultiple {
    UNKNOWN_DEALER_MULTIPLE = 0;
    NONE                    = 99;
    DEALER_ONE              = 1;
    DEALER_TWO              = 2;
}

enum PlayerMultiple {
    UNKNOWN_PLAYER_MULTIPLE = 0;
    PLAYER_ONE              = 1;
    PLAYER_TWO              = 2;
    PLAYER_THREE            = 3;
    PLAYER_FOUR             = 4;
}

enum SitBase {
    UNKNOWN_SIT_BASE = 0;
    FIRST            = 1;
    SECOND           = 2;
    THIRD            = 3;
    FOUR             = 4;
    FIVE             = 5;
    SIX              = 6;
}

enum TableStatus {
    UNKNOWN_TABLE_STATUS = 0;
    IDLE_TIME            = 1;
    JACK_DEALER_TIME     = 2;
    BET_TIME             = 3;
    SQUINT_TIME          = 4;
    COUNT_TIME           = 5;
}

enum CardType {
    UNKNOWN_CARD_TYPE = 0;
    FIVE_SMALL_NIU    = 1;
    STRAIGHT_FLUSH    = 2;
    FOUR_OF_A_KING    = 3;
    FULL_HOUSE        = 4;
    FLUSH             = 5;
    FIVE_FLOWER_NIU   = 6;
    FOUR_FLOWER_NIU   = 7;
    STRAIGHT          = 8;
    NIU_NIU           = 9;
    NIU_NINE          = 10;
    NIU_EIGHT         = 11;
    NIU_SEVEN         = 12;
    NIU_SIX           = 13;
    NIU_FIVE          = 14;
    NIU_FOUR          = 15;
    NIU_THREE         = 16;
    NIU_TWO           = 17;
    NIU_ONE           = 18;
    NO_NIU            = 19;
    FIVE_OF_A_KING    = 20;
}

message DealerBetRequest {
    uint64 multiple = 1;
}

message BetRequest {
    uint64 multiple = 1;
}

//message LeaveRequest {
//    SitBase baseID = 1;
//}

//message MarginRequest {
//    SitBase baseID = 1;
//    uint64 amount  = 2;
//}

message UserSitInfo {
    SitBase baseID = 1;
    uint64 userID  = 2;
}

message SitInfo {
    SitBase baseID    = 1;
    PlayerInfo player = 2;
}

message DeskInfo {
    string roundID                  = 7;
    repeated PlayerInfo players     = 1;
    int64 dealerBaseID              = 2;
    TableStatus status              = 3;
    int64 time                      = 4;
    map<int64, DealerAmount> amount = 5;
    int64 roomLevel                 = 6;
}

message DealerAmount {
    int64 amount = 1;
    uint64 water = 2;
}
message PlayerInfo {
    uint64 userID                                = 1;
    string nickname                              = 2;
    string imageURL                              = 3;
    uint64 vipLevel                              = 4;
    uint64 level                                 = 5;
    CardInfo cards                               = 6;
    int64 cardMultiple                           = 13;
    PlayerMultiple multiple                      = 7;
    DealerMultiple dealerMultiple                = 12;
    repeated DealerMultiple playerDealerMultiple = 11;
    repeated PlayerMultiple playerMultiple       = 10;
    int64 balance                                = 8;
    SitBase baseID                               = 9;
}

message CardInfo {
    repeated int64 cards    = 1;
    CardType cardType       = 2;
    int64 lastCard          = 3;
    repeated int64 niuSlice = 4;
}

message Action {
    uint64 userID    = 1;
    string requestID = 2;
    NiuType action   = 3;
}
