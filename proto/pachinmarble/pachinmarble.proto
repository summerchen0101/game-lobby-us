syntax = "proto3";
package pachinmarble;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/pachinmarble";

import "proto/playerinfo/model.proto";

// MessageType
enum MessageType {
  PingPong = 0;
  // [RPC] 加入房間
  // * req: JoinRoomRequest
  // * resp: JoinRoomResponse
  JoinRoom = 1;
  // [RPC] 離開房間
  LeaveRoom = 2;
  // [RPC] 彈珠發射
  // * req: MarbleShootRequest
  // * resp: MarbleShootResponse
  MarbleShoot = 3;
  // [RPC] 彈珠發射未進洞
  // * req: MarbleShootEndRequest
  // * resp: MarbleShootEndResponse
  MarbleShootEnd = 4;
  // [RPC] 彈珠發射進洞且轉動輪盤
  // * req: MarbleSpinRouletteRequest
  // * resp: MarbleSpinRouletteResponse
  MarbleSpinRoulette = 5;

  // [EVENT]
  LeaveRoomEvent = 1001;  // (單播)離開房間事件。 data: LeaveRoomEventData
}

enum SpinNumber {
  ZERO   = 0;
  ONE    = 1;
  TWO    = 2;
  THREE  = 3;
  FOUR   = 4;
  FIVE   = 5;
  SIX    = 6;
  SEVEN  = 7;
  EIGHT  = 8;
  NINE   = 9;
  GOLDEN = 99;
}

enum LeaveRoomReason {
  LEAVE_ROOM_REASON_UNKNOWN = 0;
  LEAVE_ROOM_IDLE           = 1; // 玩家閒置
  LEAVE_ROOM_DISCONNECTED   = 2; // 玩家斷線
}

message JoinRoomRequest {
  string roomID          = 1;
  uint64 marbleBetAmount = 2; // 每發彈珠的注額
}

message JoinRoomResponse {
  RoomPlayer me  = 1;
}

message RoomPlayer {
  uint64 userID            = 1;
  string avatarURL         = 2;  // 頭像 URL
  string nickname          = 3;  // 暱稱
  uint64 vipLevel          = 4;  // VIP 等級
  uint64 level             = 5;  // level
  int64 balance            = 6;  // 餘額
  uint64 goldenMarbleCount = 7;  // 剩餘黃金彈珠數量
  uint64 betAmount         = 8;  // 注額
}

message MarbleShootRequest {
  uint64 shotID       = 1; // 前端用來區分彈珠發射位置 (後端用不到)
  bool isGoldenMarble = 2; // 是否為黃金彈珠
}

message MarbleShootResponse {
  string marbleUID = 1; // 彈珠唯一識別碼
  uint64 balance   = 2; // 玩家餘額
  uint64 shotID   = 3; // 前端用來區分彈珠發射位置 (後端用不到)
}

message MarbleShootEndRequest {
  string marbleUID = 1; // 彈珠唯一識別碼
}

message MarbleShootEndResponse {
}

message MarbleSpinRouletteRequest {
  string marbleUID = 1; // 彈珠唯一識別碼
}

message MarbleSpinRouletteResponse {
  repeated SpinNumber spinNumbers = 1;  // 轉輪數字，最右方為第1輪，最左方為最後一輪 ex: [99,7,7], [99, 7, 7], [99, 7, 7, 7] , [7, 7, 7, 7], [0]
  uint64 multiple                 = 2;  // 倍率
  uint64 gainGoldenMarbleCount    = 3;  // 獲得金色彈珠數量
  uint64 remainGoldenMarbleCount  = 4;  // 剩餘黃金彈珠數量
  uint64 gainAmount               = 5;  // 得分
  uint64 balance                  = 6;  // 玩家餘額
}

// +++++++++++++++
// EVENT
// +++++++++++++++

message LeaveRoomEventData {
  string roomID               = 1;
  uint64 userID               = 2;
  LeaveRoomReason leaveReason = 3;
}

// ++++++++++++++
// Tape
// ++++++++++++++

message BetOrderTape {
  uint64 betAmount                        = 1; // 注額
  uint64 gainAmount                       = 2; // 總贏分
  repeated SpinRouletteDetail spinDetails = 3; // 旋轉輪盤明細
}

message SpinRouletteDetail {
  string marbleUID                 = 1;  // 彈珠唯一識別碼
  bool isGoldenMarble              = 2;  // 是否為黃金彈珠
  repeated SpinNumber spinNumbers  = 3;  // 轉輪數字，最右方為第1輪，最左方為最後一輪 ex: [99,7,7], [99, 7, 7], [99, 7, 7, 7] , [7, 7, 7, 7], [0]
  uint64 betAmount                 = 4;  // 押分
  uint64 multiple                  = 5;  // 賠率
  uint64 gainGoldenMarbleCount     = 6;  // 獲得黃金彈珠數量
  uint64 gainAmount                = 7;  // 贏分 (押分*賠率)

  playerinfo.PlayerRTPGear playerGear = 11; // 玩家當下 rtp
  int64 shootAtMs                     = 12; // 彈珠發射時間
  int64 shootEndAtMs                  = 13; // 彈珠結束時間
  int64 spinRouletteAt                = 14; // 轉動輪盤時間
}