syntax = "proto3";
package payment;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/payment";

import "google/protobuf/wrappers.proto";

import "gitlab.ffglobaltech.com/us888/ciri/commonpb/pagination/pagination.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";
import "google/protobuf/empty.proto";
import "proto/virtualgood/virtualgood.proto";

service PaymentService {
    // CreateOrder create  order by different gateway
    rpc CreateOrder(CreateOrderReq) returns (RequestInfo);
    // ThirdPartyCallback to receive thirdPart callback
    rpc ThirdPartyCallback(ThirdPartyCallbackReq) returns (Receipt);

    rpc OrderCallback(OrderCallbackReq) returns (OrderCallbackResp);

    rpc VerifyOrder(VerifyOrderReq) returns (Receipt);
    rpc DualRefundOrder(DualRefundReq) returns (ReviseReceipt);
    rpc ReviseOrder(ReviseOrderReq) returns (ReviseReceipt);
    rpc ChangTxStatus(ChangeTxStatusReq) returns (google.protobuf.Empty);
    rpc UpdateECPPaymentInfo(PaymentInfo) returns (google.protobuf.Empty);

    // List to return orders by given Option
    rpc List(ListOrderOption) returns (ListOrderResp);
    rpc ListForSW(ListForSWOption) returns (ListForSWResp);

    rpc OrderNowStatusStatistics(ListOrderOption) returns (OrderNowStatusStatisticsResp);

    rpc GetAndCheckFortune(GetAndCheckFortuneReq) returns (GetAndCheckFortuneResp);
    rpc CreateMegaPackage(CreateMegaPackageReq) returns (google.protobuf.Empty);
    rpc ListMegaPackage(ListMegaPackageReq) returns (ListMegaPackageResp);
    rpc SetOrderExpire(google.protobuf.Empty) returns (google.protobuf.Empty);

    rpc CountPaymentTotal(CountPaymentTotalReq) returns (CountPaymentTotalResp);
    rpc SumUserPaymentPriceAmount(SumUserPaymentPriceAmountReq) returns (SumUserPaymentPriceAmountResp);

    // For Alpha
    rpc SetOrderToSuccess(SetOrderToSuccessReq) returns (google.protobuf.Empty);

    rpc GetWithdrawSettings(GetWithdrawSettingsReq) returns (GetWithdrawSettingsResp);
    rpc ListWithdrawPayeeAccounts(ListWithdrawPayeeAccountsReq) returns (ListWithdrawPayeeAccountsResp);
    rpc CreateWithdrawPayeeAccount(CreateWithdrawPayeeAccountReq) returns (CreateWithdrawPayeeAccountResp);
    rpc UpdateWithdrawPayeeAccount(UpdateWithdrawPayeeAccountReq) returns (UpdateWithdrawPayeeAccountResp);
    rpc ListWithdrawOrders(ListWithdrawOrdersReq) returns (ListWithdrawOrdersResp);
    rpc CountWithdrawOrders(CountWithdrawOrdersReq) returns (CountWithdrawOrdersResp);
    rpc CreateWithdrawOrder(CreateWithdrawOrderReq) returns (CreateWithdrawOrderResp);
    rpc ReadWithdrawOrders(ReadWithdrawOrdersReq) returns (ReadWithdrawOrdersResp);
    rpc DeleteWithdrawOrder(DeleteWithdrawOrderReq) returns (DeleteWithdrawOrderResp);
    rpc ReviewWithdrawOrder(ReviewWithdrawOrderReq) returns (ReviewWithdrawOrderResp);
    rpc SyncWithdrawOrders(SyncWithdrawOrdersReq) returns (SyncWithdrawOrdersResp);

    // ListBankBook 玩家存摺列表(提現+儲值)
    rpc ListBankBook(ListBankBookReq) returns (ListBankBookResp);

    rpc ListAFDepositRecords(ListAFDepositRecordsReq) returns (ListAFDepositRecordsResp);
    rpc SentDepositRecords(SentDepositRecordsReq) returns (SentDepositRecordsResp);

    rpc ListWithdrawBanks(ListWithdrawBanksReq) returns (ListWithdrawBanksResp);
}

message SetOrderToSuccessReq {
    uint64 orderID = 1;
}

message CreateOrderReq {
    uint64 userID                             = 1;
    uint64 userLevel                          = 8;
    CommonProduct commonProduct               = 2;
    uint64 paymentType                        = 3;
    virtualgood.PaymentGateway paymentGateway = 4;
    Platform platform                         = 5;
    string nickname                           = 6;
    Invoice invoice                           = 7;
    string deviceID                           = 9; // 設備編號
    string bankCodeRec                        = 10;

    string email     = 21;
    string phone     = 22; // 格式 886-912345678 或 1-2125551234
    string firstName = 23;
    string lastName  = 24;
    string birthday  = 25; // yyyy-MM-dd
    string country   = 26;
    string city      = 27;
    string state     = 28;
    string zip       = 29;
    string address   = 30;
    string language  = 31; // en-US
    string ip        = 32;
}

message ThirdPartyCallbackReq {
    virtualgood.PaymentGateway paymentGateway = 1;
    string data                               = 2;
    uint64 orderID                            = 3;
    uint64 userID                             = 4;
    PaymentStatus status                      = 5;
}

message VerifyOrderReq {
    virtualgood.PaymentGateway paymentGateway = 1;
    bytes data                                = 2;
    uint64 orderID                            = 3;
    uint64 userID                             = 4;
    PaymentStatus status                      = 5;
    string productID                          = 6;
    Platform platform                         = 7;
    string nickname                           = 8;
}

message OrderCallbackReq {
    uint64 userID                             = 1;
    virtualgood.PaymentGateway paymentGateway = 2;
    string orderID                            = 3;
    PaymentStatus status                      = 4;
    string productID                          = 5;
    Platform platform                         = 6;
    string nickname                           = 7;
    bytes data                                = 8;
    string sign                               = 9;
}
message OrderCallbackResp {
    uint64 orderID                            = 1; // payment order id
    uint64 userID                             = 2;
    uint64 productID                          = 3;
    uint64 itemID                             = 4;
    PaymentStatus paymentStatus               = 5;
    string withdrawOrderUID                   = 6;
    string withdrawOrderAmount                = 7;
    string withdrawOrderFee                   = 8;
    string appVersion                         = 9;
    virtualgood.PaymentGateway paymentGateway = 10;
    int32 paymentType                         = 11;
}

message ReviseOrderReq {
    uint64 orderID                = 1;
    uint64 userID                 = 2;
    string ThirdPartyID           = 8;
    Platform platform             = 3;
    string nickname               = 4;
    ReviseStatus reviseStatus     = 5;
    string note                   = 6;
    repeated string noteImageURLs = 7;
}

message ECPBankInfo {
    string bankCode   = 1;
    string vAccount   = 2;
    uint64 expireDate = 3;
}

message ChangeTxStatusReq {
    uint64 orderID = 1;
}

message PaymentInfo {
    string merchantID      = 1;
    string platformID      = 2;
    uint64 merchantTradeNo = 3;
    string storeID         = 4;
    int64 rtnCode          = 5;
    string rtnMsg          = 6;
    string tradeNo         = 7;
    int64 tradeAmt         = 8;
    string paymentType     = 9;
    string tradeDate       = 10;
    string bankCode        = 11;
    string vAccount        = 12;
    string expireDate      = 13;
    string checkMacValue   = 14;
}

message PaymentVerify {
    string merchantID          = 1;
    string platformID          = 2;
    uint64 merchantTradeNo     = 3;
    string storeID             = 4;
    int64 rtnCode              = 5;
    bytes rtnMsg               = 6;
    string tradeNo             = 7;
    int64 tradeAmt             = 8;
    string paymentType         = 9;
    string tradeDate           = 10;
    int64 simulatePaid         = 11;
    string checkMacValue       = 12;
    string paymentDate         = 13;
    int64 paymentTypeChargeFee = 14;
}

message DualRefundReq {
    string payload                            = 1;
    virtualgood.PaymentGateway paymentGateway = 2;
}

message ReviseReceipts {
    repeated ReviseReceipt reviseReceipt = 1;
}

message ReviseReceipt {
    uint64 userID                             = 1;
    uint64 orderID                            = 2;
    uint64 recordID                           = 7;
    ReviseStatus reviseStatus                 = 3;
    int64 tradedAtMs                          = 4;
    uint64 itemID                             = 5; // provide by bank
    string productID                          = 6; // provide by bank
    virtualgood.PaymentGateway paymentGateway = 8;
    int64 paymentType                         = 10;
    yesno.YesNo isFinish                      = 9;
    string appVersion                         = 11;
}

// ListOrderOption for Entity.ListOrderData option
message ListOrderOption {
    PaymentStatus paymentStatus                          = 1;
    repeated PaymentStatus paymentStatusIn               = 2;
    virtualgood.PaymentGateway paymentGateway            = 3;
    repeated virtualgood.PaymentGateway paymentGatewayIn = 4;
    int64 createdAtMsStart                               = 5;
    int64 createdAtMsEnd                                 = 6;
    uint32 page                                          = 7;
    uint32 perPage                                       = 8;
    uint64 userID                                        = 9;
    repeated uint64 userIDs                              = 10;
    uint64 itemID                                        = 11;
    string sort                                          = 12;
    PaymentStatus nowStatus                              = 13;
    uint64 orderID                                       = 14;
    string thirdPartID                                   = 15;

    repeated uint64 orderIDs     = 16;
    repeated string appVersionIn = 17;
    string appVersionLike        = 18;
}

// ListOrderResp for Entity.ListOrder response
message ListOrderResp {
    repeated Order order       = 1;
    pagination.Pagination page = 2;
}

// ListOrderOption for Entity.ListOrderData option
message ListForSWOption {
    int64 createdAtMsStart   = 1;
    int64 createdAtMsEnd     = 2;
    string thirdPartyOrderID = 3;
}

// ListOrderResp for Entity.ListOrder response
message ListForSWResp {
    string body = 1;
}

// ListOrderResp for Entity.ListOrder response
message Invoice {
    string phone                        = 1;
    string notifyMail                   = 2;
    NotifyType notifyType               = 3;
    string loveCode                     = 4;
    ECPInvoiceType eCPInvoiceType       = 5;
    string carrierNum                   = 6;
    string citizenDigitalCertificateNum = 7;

    string email     = 11;
    string firstName = 12;
    string lastName  = 13;
    string birthday  = 14; // yyyy-MM-dd
    string country   = 15;
    string city      = 16;
    string state     = 17;
    string zip       = 18;
    string address   = 19;
    string language  = 20; // en
    string ip        = 21;
}

// PaymentGateway which gateway you pay
enum ECPInvoiceType {
    UNKNOWN_ECP_INVOICE_TYPE    = 0;
    DONATE_INVOICE              = 1; // 捐贈
    STORE_INVOICE               = 2; // 載具
    CITIZEN_DIGITAL_CERTIFICATE = 3; // 自然人憑證
    PHONE_CARRIER               = 4; // 載具碼載具
}

enum NotifyType {
    UNKNOWN_NOTIFY_TYPE = 0;
    PHONE               = 1;
    NOTIFY_MAIL         = 2;
    ALL                 = 3;
}

// PaymentGateway which gateway you pay
enum Platform {
    UNKNOWN_PLATFORM = 0;
    APP              = 1;
    SYSTEM           = 2;
    WEB              = 3;
    OPERATION        = 4;
}

// PaymentStatus order status for now
enum PaymentStatus {
    UNKNOWN_PAYMENT_STATUS = 0;
    INIT                   = 1;
    SUCCESS                = 2;
    FAIL                   = 3;
    RE_SUCCESS             = 4;
}

// RefundStatus  is user refund order
enum ReviseStatus {
    UNKNOWN_REVISE_STATUS = 0;
    REVISE_REFUND_STATUS  = 1;
    REVISE_PAID_STATUS    = 2;
}

// RefundStatus  is user refund order
enum RefundStatus {
    NORMAL_ORDER = 0;
    REFUND       = 1;
}

// RefundStatus  is user RevisePaidStatus order
enum RevisePaidStatus {
    NORMAL_ORDER_STATUS = 0;
    REVISE_PAID         = 1;
}

// OrderEvent  is for order to  express event
enum NowStatus {
    UNKNOWN_NOW_STATUS = 0;
    NOW_INIT           = 1;
    NOW_SUCCESS        = 2;
    NOW_FAIL           = 3;
    NOW_REFUND         = 4;
    NOW_REVISE_PAID    = 5;
}

// OrderEvent  is for order to  express event
enum OrderEvent {
    UNKNOWN_ORDER_EVENT = 0;
    ORDER_INIT          = 1;
    ORDER_PAID          = 2;
    ORDER_FAIL          = 3;
    ORDER_REFUND        = 4;
    ORDER_REVISE_PAID   = 5;
}

// OrderEvent  is for order to  express event
enum TxStatus {
    UNKNOWN_TX_STATUS = 0;
    FINISH            = 1;
    STILL_IN_TX       = 2;
}

// ProductCategory user buy coin or virtual goods
enum ProductCategory {
    UNKNOWN_PRODUCT_TYPE = 0;
    COIN_BAG             = 1;
    VIRTUAL_TREASURE     = 2;
}

message Order {
    uint64 ID                                 = 1;
    uint64 linkedID                           = 2; // orderID before update
    string thirdPartID                        = 3; // google or  apple orderID...
    ProductCategory productCategory           = 4; //  COIN_BAG    or  VIRTUAL_TREASURE ...
    string productID                          = 5; // provide by bank
    uint64 itemID                             = 18;
    string gatewayToken                       = 6; // use token to get order from third part endpoint
    string priceAmountMicros                  = 7; // order price(using micro-units(means price*1,000,000
    string priceCurrencyCode                  = 8; // Currency Code ISO 4217 currency code
    PaymentStatus paymentStatus               = 9;
    RefundStatus refundStatus                 = 10;
    RevisePaidStatus revisePaidStatus         = 19;
    TxStatus txStatus                         = 20;
    NowStatus nowStatus                       = 21;
    virtualgood.PaymentGateway paymentGateway = 11; // google or apple ...
    uint64 userID                             = 12; // user who wants pay
    string note                               = 13; // note why revise order
    repeated string noteImageURLs             = 14; // proof of payment
    string callBackURL                        = 15; // tell payment gateway the page user finish or cancel order payment to go
    int64 createdAtMs                         = 16;
    int64 expiredAtMs                         = 17;
    string appVersion                         = 22; // 版本
}

// CommonProduct is for warp coinBag or other product usage
message CommonProduct {
    string productID                = 1;
    ProductCategory productCategory = 2;
    string productName              = 3;
    string priceAmountMicros        = 4;
    string priceCurrencyCode        = 5;
    uint64 itemID                   = 6;
}

message Receipt {
    uint64 userID                             = 8;
    uint64 orderID                            = 1;
    string thirdPartyOrderID                  = 2;
    PaymentStatus paymentStatus               = 3;
    int64 tradedAtMs                          = 7;
    uint64 itemID                             = 4; // provide by bank
    string productID                          = 5; // provide by bank
    bytes data                                = 6;
    yesno.YesNo forTest                       = 9;
    int64 fee                                 = 10;
    virtualgood.PaymentGateway paymentGateway = 11;
    int64 paymentType                         = 12;
    string promoCode                          = 13;
}

message RequestInfo {
    string requestURL    = 1; // where is next step requestURL should go
    string token         = 2; // its requestBody
    bytes data           = 4;
    uint64 orderID       = 3;
    string paymentURL    = 5;
    string paymentQRCode = 6;
    int64 expiredAtMs    = 7;
    int64 createdAtMs    = 8;
}

message SWCallback {
    string returnCode   = 1; // where is next step requestURL should go
    string returnMsg    = 2; // its requestBody
    string facServiceID = 3;
    string facTradeSeq  = 4;
}

message SWVerify {
    string returnCode  = 1;
    string returnMsg   = 2;
    string payResult   = 3;
    string facTradeSeq = 4;
    string paymentType = 5;
    string amount      = 6;
    string currency    = 7;
    string cardTradeNo = 8;
    string cardType    = 9;
    string promoCode   = 10;
    string hash        = 11;
}

message OrderNowStatusStatisticsResp {
    map<int32, string> statusAmountMap = 1;
    map<int32, int64> statusCountMap   = 2;
}

message GetAndCheckFortuneReq {
    uint64 userID     = 1;
    uint64 vipLevel   = 2;
    uint64 coinAmount = 3;
}

message GetAndCheckFortuneResp {
    yesno.YesNo fortuneMoney = 1;
    uint64 productID         = 2;
}

message CreateMegaPackageReq {
    uint64 userID            = 1;
    repeated uint64 products = 2;
}

message ListMegaPackageReq {
    uint64 userID = 1;
}

message ListMegaPackageResp {
    repeated uint64 products = 1;
    uint64 expireTimeSec     = 2;
}

message CountPaymentTotalReq {
    uint64 userID = 1;
    PaymentStatus status =2;
}

message CountPaymentTotalResp {
    uint64 Total = 2;
}

// ################
// #              #
// #  提現單的世界  #
// #              #
// ################

// AccountKind 帳戶種類
enum AccountKind {
    UnknownAccountKind = 0; // 未知
    Bank               = 1; // 印尼 Bank -> VirtualAccount
    VirtualAccount     = 2;
    EWallet            = 3;
}

// WithdrawOrderPaymentStatus 提現單支付狀態
enum WithdrawOrderPaymentStatus {
    UnknownWithdrawOrderPaymentStatus = 0; // 未知
    Reviewing                         = 1; // 審核中
    Passed                            = 2; // 審核通過
    Rejected                          = 3; // 審核未通過
    Proccessing                       = 4; // 交易處理中
    Success                           = 5; // 交易完成
    Failed                            = 6; // 交易失敗
    ExpirationRejected                = 7; // 審核過期未通過
}

// GetWithdrawSettings 取得提現基本設定值
message GetWithdrawSettingsReq {
    int64 userID = 1; // 用戶 ID
}
message GetWithdrawSettingsResp {
    string feeRate                                                             = 1; // 手續費費率 0.02 之類的
    string minAmount                                                           = 2; // 提現最小金額
    string maxAmount                                                           = 3; // 提現最大金額
    repeated GetWithdrawSettingsRespWithdrawLevelSetting withdrawLevelSettings = 4;
    int64 depositSatisfiedAtMillisecond                                        = 5; // 儲值轉正時間 毫秒
    string newTotalDepositAmount                                                = 6; // 開始新手期後累積儲值金幣
    string newRequiredDepositAmount                                             = 7; // 開始新手期後需要累積儲值金幣
    int64 expiredDays                                                          = 8; // 預計新手期天數
    string totalDepositAmount                                                   = 9; // 累積儲值金幣
    string requiredDepositAmount                                                = 10; // 進入新手期需要多少累積儲值金幣
    string depositAmount                                                        = 11; // 押金
}
message GetWithdrawSettingsRespWithdrawLevelSetting {
    int64 withdrawLevel    = 1; // 提現等級
    int64 thresholdBalance = 2; // 升級餘額門檻
    int64 minBetAmount     = 3; // 押注區間 最低
    int64 maxBetAmount     = 4; // 押注區間 最高
    int64 requiredBalance  = 5; // 提現所需餘額
    bool isLock            = 6; // 鎖住提現功能
}

// ListWithdrawPayeeAccounts 取得提現收款帳戶
message ListWithdrawPayeeAccountsReq {
    repeated int64 userIDIn = 1;
    // ...
}
message ListWithdrawPayeeAccountsResp {
    int64 total                                                                      = 1; // 總筆數
    repeated ListWithdrawPayeeAccountsRespWithdrawPayeeAccount withdrawPayeeAccounts = 2; // 提現收款帳戶
}
message ListWithdrawPayeeAccountsRespWithdrawPayeeAccount {
    AccountKind accountKind        = 1; // 帳戶種類
    string payeeAccountType        = 2; // 收款帳戶類型
    string payeeAccountID          = 3; // 收款帳戶 ID
    string payeeAccountName        = 4; // 收款帳戶名字
    string payeeBankCode           = 5; // 收款帳戶銀行代碼
    string withdrawPayeeAccountUID = 6; // 提現收款帳戶 ID
}

// CreateWithdrawPayeeAccount 建立提現收款帳戶
message CreateWithdrawPayeeAccountReq {
    int64 userID            = 1; // 用戶 ID
    AccountKind accountKind = 2; // 帳戶種類
    string payeeAccountType = 3; // 收款帳戶類型
    string payeeAccountID   = 4; // 收款帳戶 ID
    string payeeAccountName = 5; // 收款帳戶名字
    string payeeBankCode    = 6; // 收款帳戶銀行代碼
}
message CreateWithdrawPayeeAccountResp {
    string withdrawPayeeAccountUID = 1;
}

// UpdateWithdrawPayeeAccount 建立提現收款帳戶
message UpdateWithdrawPayeeAccountReq {
    int64 userID                   = 1; // 用戶 ID
    string withdrawPayeeAccountUID = 2; // 提現收款帳戶 ID

    AccountKind accountKind = 3; // 帳戶種類
    string payeeAccountType = 4; // 收款帳戶類型
    string payeeAccountID   = 5; // 收款帳戶 ID
    string payeeAccountName = 6; // 收款帳戶名字
    string payeeBankCode    = 7; // 收款帳戶銀行代碼
}
message UpdateWithdrawPayeeAccountResp {
}

// ListWithdrawOrders 取得提現單
message ListWithdrawOrdersReq {
    repeated int64 userIDIn                                          = 1; // 用戶編號
    repeated WithdrawOrderPaymentStatus withdrawOrderPaymentStatusIn = 2; // 提現單支付狀態
    repeated string withdrawOrderUIDIn                               = 3; // 提現單編號
    int64 startedAtTimestampMillisecond                              = 11; // 開始時間戳 毫秒
    int64 endedAtTimestampMillisecond                                = 12; // 結束時間戳 毫秒
    int64 page                                                       = 13; // 第幾頁
    int64 perPage                                                    = 14; // 一頁幾筆
    string appVersion                                                = 15; // 玩家版本
    string sort                                                      = 16; // 排序
}
message ListWithdrawOrdersResp {
    int64 total                                                 = 1; // 總筆數
    repeated ListWithdrawOrdersRespWithdrawOrder withdrawOrders = 2; // 提現單
    WithdrawOrdersSummary summary                               = 3; // 當次查詢條件下，全部資料的匯總資訊
}
message ListWithdrawOrdersRespWithdrawOrder {
    string withdrawOrderUID                               = 1; // 提現單編號
    string amount                                         = 2; // 金額 單位分
    string fee                                            = 3; // 手續費 單位分
    WithdrawOrderPaymentStatus withdrawOrderPaymentStatus = 4; // 提現單支付狀態
    int64 createdAtTimestampMillisecond                   = 5; // 建立時間戳 毫秒
    string remark                                         = 6; // 註記
    AccountKind accountKind                               = 7; // 帳戶種類
    int64 userID                                          = 8; // 用戶編號
    int64 reviewerUserID                                  = 9; // 審核者用戶編號
    int64 reviewedAtTimestampMillisecond                  = 10; // 審核時間戳 毫秒
    int64 completedAtTimestampMillisecond                 = 11; // 完成時間戳 毫秒
    virtualgood.PaymentGateway paymentGateway             = 12; // 支付渠道
    string gatewayErrorCode                               = 13;
    string gatewayErrorMessage                            = 14;
    string payload                                        = 15;
    string appVersion                                     = 16; // 版本
    string downstreamOrderUID                             = 17;
    bool isRead                                           = 18; // 已讀
}
message WithdrawOrdersSummary {
    string totalAmount = 1;
    string totalFee    = 2;
}

message CountWithdrawOrdersReq {
    repeated int64 userIDIn                                          = 1; // 用戶編號
    repeated WithdrawOrderPaymentStatus withdrawOrderPaymentStatusIn = 2; // 提現單支付狀態
    repeated string withdrawOrderUIDIn                               = 3; // 提現單編號
    int64 startedAtTimestampMillisecond                              = 11; // 開始時間戳 毫秒
    int64 endedAtTimestampMillisecond                                = 12; // 結束時間戳 毫秒
}

message CountWithdrawOrdersResp {
    int64 total = 1; // 總筆數
}

// CreateWithdrawOrder 建立提現單
message CreateWithdrawOrderReq {
    int64 userID       = 1; // 用戶 ID
    string amount      = 2; // 金額
    int64 paymentType  = 3; // 提現方式

    string email     = 21;
    string phone     = 22; // 格式 886-912345678 或 1-2125551234
    string firstName = 23;
    string lastName  = 24;
    string birthday  = 25; // yyyy-MM-dd
    string country   = 26;
    string city      = 27;
    string state     = 28;
    string zip       = 29;
    string address   = 30;
    string language  = 31; // en-US
    string ip        = 32;

    string paypalEmail   = 101; // PayPal
    string cardNumber    = 102; // CreditCard
    string cardValidCode = 103; // CreditCard
    string appAccount    = 104; // CashAPP
    string accountNumber = 105; // ACH
    string routingNumber = 106; // ACH
}
message CreateWithdrawOrderResp {
    string withdrawOrderUID = 1; // 提現單編號
}

// ReadWithdrawOrders 已讀提現單
message ReadWithdrawOrdersReq {
    int64 userID                       = 1; // 用戶 ID
    repeated string withdrawOrderUIDIn = 2; // 提現單編號
}
message ReadWithdrawOrdersResp {}

// DeleteWithdrawOrder 刪除提現單
// [系統補償 ONLY]
message DeleteWithdrawOrderReq {
    string withdrawOrderUID = 1; // 提現單編號
}
message DeleteWithdrawOrderResp {
}

// ReviewWithdrawOrder 審核提現單
// [後台 ONLY]
message ReviewWithdrawOrderReq {
    string withdrawOrderUID = 1; // 提現單編號

    WithdrawOrderPaymentStatus withdrawOrderPaymentStatus = 2; // 提現單支付狀態
    string remark                                         = 3; // 註記
    int64 reviewerUserID                                  = 4; // 審核人員用戶編號

    string email     = 21;
    string phone     = 22; // 格式 886-912345678 或 1-2125551234
    string firstName = 23;
    string lastName  = 24;
    string birthday  = 25; // yyyy-MM-dd
    string country   = 26;
    string city      = 27;
    string state     = 28;
    string zip       = 29;
    string address   = 30;
    string language  = 31; // en-US
    string ip        = 32;
}
message ReviewWithdrawOrderResp {
}

// SyncWithdrawOrders 同步提現單
// [系統補償 ONLY]
message SyncWithdrawOrdersReq {}
message SyncWithdrawOrdersResp {
    repeated SyncWithdrawOrdersRespWithdrawOrder withdrawOrders = 1;
}
message SyncWithdrawOrdersRespWithdrawOrder {
    int64 userID               = 1;
    int64 paymentStatus        = 2;
    string withdrawOrderUID    = 3;
    string withdrawOrderAmount = 4;
    string withdrawOrderFee    = 5;
}

message ListBankBookReq {
    BankBookType bankBookType = 1; // 存摺類型 1:充值 2:提現
    repeated string orderUIDs = 2; // 訂單編號
    // repeated BankBookPaymentStatus bankBookPaymentStatusIn = 3;  // 支付狀態 1:成功 2:失敗
    int64 userID                        = 4;
    int64 startedAtTimestampMillisecond = 11; // 開始時間戳 毫秒
    int64 endedAtTimestampMillisecond   = 12; // 結束時間戳 毫秒
    uint32 page                         = 13; // 第幾頁
    uint32 perPage                      = 14; // 一頁幾筆
}

message ListBankBookResp {
    pagination.Pagination pagination = 1;
    repeated BankBook data           = 2;
}

message BankBook {
    string orderUID                             = 1; // 訂單編號
    int64 createdAtMs                           = 2; // 建立時間
    BankBookType bankBookType                   = 3; // 存摺類型 1:充值 2:提現
    BankBookPaymentStatus bankBookPaymentStatus = 4; // 支付狀態 1:成功 2:失敗
    int64 changeAmount                          = 5; // 變更金額
    google.protobuf.Int64Value fee              = 6; // 手續費
    int64 beforeBalance                         = 7; // 原始餘額
    int64 afterBalance                          = 8; // 變動後餘額
}

enum BankBookType {
    BANK_BOOK_TYPE_UNKNOWN  = 0;
    BANK_BOOK_TYPE_DEPOSIT  = 1;
    BANK_BOOK_TYPE_WITHDRAW = 2;
}

enum BankBookPaymentStatus {
    BANK_BOOK_PAYMENT_STATUS_UNKNOWN = 0;
    BANK_BOOK_PAYMENT_STATUS_SUCCESS = 1;
    BANK_BOOK_PAYMENT_STATUS_FAILED  = 2;
}

// 取得 AF 的充值紀錄
message ListAFDepositRecordsReq {
    repeated bool isSentIn       = 1;
    repeated int64 userIDIn      = 2;
    repeated string appVersionIn = 3;
}
message ListAFDepositRecordsResp {
    repeated ListAFDepositRecordsRespAFDepositRecord afDepositRecords = 1;
}
message ListAFDepositRecordsRespAFDepositRecord {
    string orderID   = 1;
    int64 amount     = 2;
    string productID = 3;
}

// 紀錄已發送給 AF 的充值紀錄
message SentDepositRecordsReq {
    repeated string orderIDs = 1;
}
message SentDepositRecordsResp {}

// ListWithdrawBanks 取得提現銀行列表
message ListWithdrawBanksReq {
    int64 userID                       = 1; // 用戶 ID
    repeated AccountKind accountKindIn = 2;  
}
message ListWithdrawBanksResp {
    repeated ListWithdrawBanksRespBank banks = 1;
}
message ListWithdrawBanksRespBank {
    string bankCode         = 1;
    string bankName         = 2;
    AccountKind accountKind = 3;
}

message SumUserPaymentPriceAmountReq {
    repeated uint64 userIDIn               = 1;
    repeated PaymentStatus paymentStatusIn = 2;
}

message SumUserPaymentPriceAmountResp {
    map<uint64, string> userPriceAmountMicros = 1;
}