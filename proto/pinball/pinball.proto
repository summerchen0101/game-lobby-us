syntax = "proto3";
package pinball;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/pinball";

import "gitlab.ffglobaltech.com/us888/ciri/commonpb/pagination/pagination.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";

enum PinballType {
    PING_PONG        = 0;
    JOIN_ROOM        = 1;  // 進入房間
    USER_KICK_BEFORE = 2;
    SERVER_UPDATE    = 3;

    LEAVE      = 11;  // 離開
    GET_DESK   = 12;  // 取得桌子資訊 返回 DeskInfo
    BET        = 13;  // 下注 返回BetResp
    GET_PLAYER = 14;  // 取得玩家資訊 返回 playerResp
    GET_ROUND  = 15;  // 取得此局資訊 返回 round

    PLAYER_SETTLE_PUSH = 21;  // 玩家結算 推
    ROUND_SETTLE_PUSH  = 22;  // 此局結算 推 DeskInfo
    STOP_BET_PUSH      = 23;  // 停止下注 開獎 推局號
    PLAYER_PUSH        = 24;  // 推PlayerInfo
    ROUND_START_PUSH   = 25;  // 此局開始 推 DeskInfo
    ROOM_CLOSE         = 26;
    LIST_ROUND         = 27;  // 局號列表
    BET_HISTORY        = 28;  // 戰績列表

    HISTORY_CHAMPION     = 29;  // 歷史紀錄奪冠次數
    HISTORY_BINGO_RESULT = 30;  // 歷史紀錄開獎結果
    HISTORY_HOT_COLD_MIX = 31;  // 歷史紀錄冷熱門組合

    PLAYER_ROUND_BET_RECORD = 32;  // 該玩家每局下注紀錄
}

enum BetType {
    UNKNOWN_BET_TYPE = 0;
    RANK             = 1;  // 名次
    BIG              = 2;  // 大
    SMALL            = 3;  // 小
    SINGULAR         = 4;  // 單
    EVEN             = 5;  // 雙
    FIRST_AND_SECOND = 6;  //冠亞
}
enum TableStatus {
    UNKNOWN_TABLE_STATUS = 0;
    SETTLE_STATUS        = 1;  // 結算中...
    BET_STATUS           = 2;  // 下注中...
    END                  = 3;  // 結束...
}

message JoinRoomResponse {
    PlayerInfo playerInfo = 1;  // 玩家
    DeskInfo deskInfo     = 2;
    repeated Round round  = 3;
}

// 下注 req
message BetReq {
    repeated Bet bet = 1;
    uint64 userID    = 2;
    string roundID   = 3;  // 局號
    int64 betAmount  = 4;  // 單顆球下注金額
    int64 rank       = 5;  // 排名
}

message Bet {
    BetType betType       = 1;  // 下注類型
    repeated int64 number = 2;  // 數字
}

// 下注 resp
message BetResp {
    int64 betTotalAmount = 1;  // 目前總下注金額
    int64 balance        = 2;  // 玩家餘額
}

//取得此局資訊 req
message GetRoundReq {
    string roundID = 1;  // 局號
}

//取得玩家資訊 req
message GetPlayerReq {
    uint64 userID = 1;
}

message DeskInfo {
    string roundID            = 1;  // 局號
    TableStatus status        = 2;  // 此局狀態
    int64 settleTime          = 3;  // 結算時間
    repeated int64 result     = 4;  // 此局結果
    int64 goldenPinballNumber = 6;  // 黃金球號碼
    int64 goldenPinballRate   = 7;  // 黃金球倍率
    int64 pinballShow         = 8;  // 前端演藝的數字
    int64 serverTime          = 9;  // server time
}

message PlayerInfo {
    uint64 userID        = 1;
    string nickname      = 2;
    string imageURL      = 3;
    uint64 vipLevel      = 4;
    uint64 level         = 5;
    int64 balance        = 6;  // 餘額
    int64 betTotalAmount = 8;  // 總下注金額
}

message Action {
    uint64 userID      = 1;
    string requestID   = 2;
    PinballType action = 3;
}

message Round {
    string roundID       = 1;  // 局號
    int64 settleTime     = 2;  // 結算時間
    yesno.YesNo isSettle = 3;  // 是否已結算
}
message Rounds {
    repeated Round rounds = 1;  // 局號
}

message ListRoundReq {
    int64 page    = 1;
    int64 perPage = 2;
}

message ListRoundResp {
    repeated Round round             = 1;
    pagination.Pagination pagination = 2;
}

message BetHistoryReq {
    uint64 userID = 1;
    int64 page    = 2;
    int64 perPage = 3;
}
message BetHistory {
    string roundID           = 1;  // 局號
    int64 createdTime        = 2;  // 下注時間
    repeated int64 bingoBall = 3;  // 中獎球
    int64 goldBall           = 4;  // 黃金球
    int64 goldBallRate       = 5;  // 黃金球倍率
    int64 winCoin            = 6;  // 中獎金額
    uint64 betAmount         = 7;  // 下注金額
    bytes tape               = 8;
}
message BetHistoryResp {
    repeated BetHistory bet          = 1;
    pagination.Pagination pagination = 2;
}

message StopBetPush {
    string roundID = 1;
}
message PlayerSettlePush {
    int64 balance  = 1;  //餘額
    int64 winCoin  = 2;
    string roundID = 3;
}
message PinballSettle {
    repeated int64 bingoBall            = 1;
    repeated PinballSettleDetail detail = 2;
    int64 goldBall                      = 3;  // 黃金球
    int64 goldBallRate                  = 4;  // 黃金球倍率
}

message PinballSettleDetail {
    BetType betType       = 1;  // 下注類型
    repeated int64 number = 2;  // 數字
    int64 betAmount       = 3;
    double rate           = 4;
    int64 winCoin         = 5;
    int64 rank            = 6;  // 排名
}
message PlayerRoundBetRecordRequest {
    string roundID = 1;
}
message PlayerRoundBetRecordResponse {
    repeated PlayerRoundBetRecord data = 1;
}

message PlayerRoundBetRecord {
    string key   = 1;  // roundID+"_"+betType+"_"+number
    int64 amount = 2;
}

message HistoryChampionResp {
    repeated HistoryChampion historyChampion = 1;
}
message HistoryChampion {
    int64 ball  = 1;
    int64 count = 2;
}

message HistoryBingoResp {
    repeated HistoryBingo historyBingo = 1;
}
message HistoryBingo {
    int64 rank          = 1;
    repeated int64 ball = 2;
    int64 goldBall      = 3;
    int64 goldBallRate  = 4;
}
message HotColdResp {
    repeated HotCold hot  = 1;
    repeated HotCold cold = 2;
}
message HotCold {
    int64 rank      = 1;
    string ball     = 2;
    int64 ballCount = 3;
}