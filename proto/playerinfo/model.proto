syntax = "proto3";
package playerinfo;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/playerinfo";

import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";
import "google/protobuf/wrappers.proto";
import "proto/virtualgood/virtualgood.proto";

enum Gender {
    UNKNOWN_GENDER  = 0;
    MALE            = 1;
    FEMALE          = 2;
    UNSELECT_GENDER = 3;
}

enum PlayerKind {
    UNKNOWN_PLAYER_KIND  = 0;
    GENERAL              = 1; // 一般
    STREAMER             = 2; // 直播主
    AGENT                = 3; // 大代理
    SPECIAL              = 4; // 特殊玩家
    OFFICIAL             = 5; // 官方玩家
    OLD_PEOPLE_COME_BACK = 6; // 回鍋玩家
    CONDITION_AGENT      = 7; // 出借代理
}

enum UsageStatus {
    UNKNOWN_USAGE_STATUS = 0;
    INUSE                = 1; // 當前使用
    ACTIVATED            = 2; // 激活
    INACTIVATED          = 3; // 未激活
}

enum WalletType {
    UNKNOWN_WALLET_TYPE = 0;
    GC                  = 1; // GC
    SC                  = 2; // SC
}

message PlayerInfo {
    uint64 userID         = 1; // reference which user also user id is unique identity number
    string nickname       = 2; // 玩家暱稱
    Gender gender         = 3; // 玩家性別 1.男性 2.女性 3.未選擇
    PlayerKind playerKind = 4; // 玩家類別 1.一般 2.直播主 3.大代理 4.特約玩家 5.官方玩家
    string comment        = 66; // 風控團隊備註

    string autobiography = 9; // 自我介紹
    uint64 avatarID      = 10; // 當前玩家頭像ID
    string avatarURL     = 11; // 當前玩家頭像URL 分隔符號@@  格式: avatarID@@avatarURL
    yesno.YesNo isFake   = 12; // 是否機器人
    uint32 pvpWinCnts    = 13; // 玩家PVP杯數 not used or not implements, remove it

    uint64 vipLevel                      = 5; // 玩家vip等級
    uint64 vipExp                        = 6; // 玩家總累計vip經驗
    uint64 vipCurrentLevelExp            = 14; // 當前等級vip累積點數(分子)
    uint64 vipCurrentLevelExpRequired    = 15; // 當前等級總vip點數(分母)
    uint64 vipBetExp                     = 43; // 玩家總累計vip bet經驗
    uint64 vipCurrentLevelBetExp         = 41; // 當前等級vip累積 bet 點數(分子)
    uint64 vipCurrentLevelBetExpRequired = 42; // 當前等級總vip bet點數(分母)
    uint64 vipTimeout                    = 17; // 當前等級到達該時間後失效（秒）

    uint64 level                   = 7; // 玩家等級
    uint64 exp                     = 8; // 玩家經驗值
    uint64 currentLevelExp         = 25; // 當前等級累積點數(分子)
    uint64 currentLevelExpRequired = 16; // 當前等級總經驗值(分母)

    uint32 megaLevel      = 18;
    uint32 megaGain       = 19;
    uint32 megaPoint      = 20;
    string versionName    = 21; // 渠道名稱
    string secondPassword = 22; // 第二組密碼
    uint64 skinID         = 23; // 目前玩家skinID
    yesno.YesNo isOnline  = 24; // 是否在線上 資料在 PlayerCatch上，由rockman聚合
    uint64 angleID        = 27; // 目前玩家天使 ID not used or not implements, remove it

    string cellPhone                          = 26; // 透過聚合 才會有值 手機號 格式 國碼-電話 ex: 886-912345678
    yesno.YesNo isCellPhone                   = 58; // not used or not implements, remove it ?
    int64 cellPhoneValidatedAtMs              = 52; // 手機通過驗證時間
    repeated TriPartyAccount triPartyAccounts = 51; // 第三方帳戶關聯 透過聚合才會有值 not used or not implements, remove it ?
    int64 lastLoginAtMs                       = 28; // 最後登入時間 ms
    yesno.YesNo isShowMoney                   = 29; // 是否顯示金額 not used or not implements, remove it ?

    float rtp                = 31; // 玩家rtp not used or not implements, remove it ?
    string realName          = 32; // 真實姓名
    string contactPhone      = 33; // 聯絡電話
    string socialID          = 34; // 身分證字號
    string birthDay          = 35; // 生日
    string zipCode           = 36; // 郵遞區號
    string address           = 37; // 地址
    uint64 roleID            = 38; // 角色 ID not used or not implements, remove it?
    string guildID           = 39; // 公會 ID not used or not implements, remove it?
    uint64 guildReferrerID   = 64; // 公會推薦人 ID not used or not implements, remove it?
    string guildReferrerName = 65; // 公會推薦人名稱 not used or not implements, remove it?
    int64 guildApplyTime    = 79; // 公會可申請時間

    int64 activity      = 40; // 活躍值
    string socialIDPic1 = 49; // 身分證正面圖址 not used or not implements, remove it?
    string socialIDPic2 = 50; // 身分證反面圖址 not used or not implements, remove it?

    PlayerRTPGear playerRTPGear = 44; // 玩家RTP檔位

    yesno.YesNo isActivityRelation = 47; // 活躍值結交10位好友
    int64 nickNameRemainingTimes   = 48; // 名稱修改次數

    NoviceTeaching noviceTeaching = 53; // 新手教學 not used or not implements, remove it?
    string guildName              = 54; // 公會 ID not used or not implements, remove it?

    uint64 redEvenlopSendAmount = 55;
    uint64 redEvenlopRecvAmount = 56;
    uint64 gain                 = 30; // 玩家累積贏錢
    uint64 bet                  = 57; // 玩家累積押注

    repeated PlayerRtpLockRecord rtpAmountLockRecord = 60; // 玩家鎖定紀錄
    int64 playerRTPGearLockUntilAmountStep           = 62; // 玩家鎖定金額(目前位置)
    int64 playerRTPGearLockUntilAmountEndTime        = 63; // 玩家鎖定金額結束時間
    int64 guildInviteLimit                           = 67; // 公會邀請人數上限
    yesno.YesNo isAdAccount                          = 68; // 是否為廣告號
    yesno.YesNo isCreateFreeGuild                    = 69; // 是否可以建立免費俱樂部

    google.protobuf.StringValue referrerCode                         = 72; // 個人推薦碼(好友、推廣)，不定長度，至少六碼，依系統人數會擴充長度，由abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890 字集組成
    google.protobuf.UInt64Value referalUserID                        = 73; // 推薦人userID
    google.protobuf.UInt64Value bindAtMs                             = 74; // 推薦人綁定時間
    google.protobuf.Int64Value updatePlayerPromotionTaskProgressAtMs = 75; // 推薦人推廣任務進度更新時間
    google.protobuf.StringValue mediaSource                          = 76; // MediaSource from AppsFlyer

    uint64 auctionBuyAmount  = 77;
    uint64 auctionSellAmount = 78;

    uint64 richDaddyLikeTimes = 81;

    PlayerRTPGear playerRTPGearGC               = 82; // 玩家RTP檔位 GC
    int64 playerRTPGearGCLockUntilAmountStep    = 83; // 玩家鎖定金額(目前位置) GC
    int64 playerRTPGearGCLockUntilAmountEndTime = 84; // 玩家鎖定金額結束時間 GC

    WalletType walletType = 85; // 錢包類型

    string firstName = 86;
    string lastName  = 87;
    string country   = 88;
    string city      = 89;
    string state     = 90;
    string zip       = 91;
    string language  = 92; // en
    string ip        = 93;

    uint64 depositAmountSC  = 94;
    uint64 withdrawAmountSC = 95;
    uint64 depositAmountGC  = 96;
}

enum PlayerRtpLockRecordOperator {
    UNKNOWN_PLAYER_RTP_AMOUNT_LOCK_RECORD = 0;
    PLAYER_RTP_LOCK_RECORD_LOCK_AMOUNT    = 1;
    PLAYER_RTP_LOCK_RECORD_UNLOCK         = 2;
    PLAYER_RTP_LOCK_RECORD_LOCK_TIME      = 3;
    PLAYER_RTP_LOCK_RECORD_MANDATORY      = 4; // 強制鎖定
}
message PlayerRtpLockRecord {
    uint64 userID                          =  1;
    int32 sort                             =  2;
    PlayerRTPGear playerRTPGear            =  3; // 玩家RTP檔位
    int64 playerRTPGearLockUntilAmount     =  4; // 玩家鎖定RTP金額(目標值)
    int64 playerRTPGearLockUntilAmountDiff =  5; // 玩家鎖定RTP金額(差額)
    string created                         =  6; // 新增的人
    int64 created_time                     =  7; // 新增的時間
    PlayerRtpLockRecordOperator operator   =  8;
    int64 playerRtpGearLockUntilTime       =  9; // 玩家鎖定RTP時間
    int64 betAmountMin                     = 10;
    int64 betAmountMax                     = 11;
    WalletType walletType                  = 12;
}
message TriPartyAccount {
    int32 type = 1; // enum iam.OAuthProvider
    string uid = 2;
}

enum PlayerRTPGear {
    PlayerRTPGear_NOSET = 0; // 沒有設置
    PlayerRTPGear_A     = 1;
    PlayerRTPGear_B     = 2;
    PlayerRTPGear_C     = 3;
    PlayerRTPGear_D     = 4;
    PlayerRTPGear_E     = 5;
    PlayerRTPGear_F     = 6;
    PlayerRTPGear_AA    = 7;
    PlayerRTPGear_AAA   = 8;
    PlayerRTPGear_FF    = 9;
    PlayerRTPGear_FFF   = 10;
    PlayerRTPGear_4A    = 11;
    PlayerRTPGear_5A    = 12;
    PlayerRTPGear_6A    = 13;
    PlayerRTPGear_7A    = 14;
    PlayerRTPGear_8A    = 15;
    PlayerRTPGear_9A    = 16;
    PlayerRTPGear_Q1    = 17;
    PlayerRTPGear_Q2    = 18;
    PlayerRTPGear_Q3    = 19;
    PlayerRTPGear_R1    = 20;
    PlayerRTPGear_R2    = 21;
    PlayerRTPGear_R3    = 22;
}

message PlayerGift {
    uint64 id                            = 1;
    uint64 senderID                      = 2;
    uint64 receiverID                    = 3;
    uint64 itemID                        = 4; // 商品ID
    int64 price                          = 5; // 商品價格
    int64 createdAt                      = 6; // 建立時間
    int64 amount                         = 7; // 數量
    virtualgood.VirtualGoodType goodType = 8;
}

message PlayerAvatar {
    uint64 userID      = 1;
    uint64 avatarID    = 2;
    string avatarURL   = 3;
    UsageStatus status = 4;
}

message PlayerRole {
    uint64 userID                 = 1;
    uint64 roleID                 = 2;
    UsageStatus status            = 3; // 使用狀態
    repeated PlayerRoleSkin skins = 4; // 角色皮膚列表
}

message PlayerRoleSkin {
    uint64 userID      = 1;
    uint64 roleID      = 2;
    uint64 skinID      = 3;
    UsageStatus status = 4;
}

message UpdatePlayerInfoParams {
    string nickname                           = 1; // 玩家暱稱
    Gender gender                             = 2; // gender
    google.protobuf.StringValue autobiography = 3; // player self introduction
    // uint32 pvpWinCnts                        = 4;
    yesno.YesNo isSpecial                       = 5; // 是否為特約玩家
    string versionName                          = 6; // 渠道
    int64 lastLoginAtMs                         = 7;
    string realName                             = 8; // 真實姓名
    string contactPhone                         = 9; // 聯絡電話
    string socialID                             = 10; // 身分證字號
    string birthDay                             = 11; // 生日 yyyy-MM-dd
    string zipCode                              = 12; // 郵遞區號
    string address                              = 13; // 地址
    int64 activity                              = 14; // 活躍值
    yesno.YesNo isActivityRelation              = 15;
    string socialIDPic1                         = 16; // 身分證正面圖
    string socialIDPic2                         = 17; // 身分證背面圖
    int64 guildInviteLimit                      = 18; // 公會邀請人數上限
    int64 updatePlayerPromotionTaskProgressAtMs = 20; // 推薦人推廣任務進度更新時間
    WalletType walletType                       = 21; // 錢包類型
    string firstName                            = 22;
    string lastName                             = 23;

    string country                              = 25;
    string city                                 = 26;
    string state                                = 27;
    string zip                                  = 28;
    string language                             = 30; // en
}

message UpdateFakePlayerInfoParams {
    google.protobuf.Int64Value vipLevel = 1; // 玩家vip等級
    uint64 level                        = 2; // 玩家等級
}

message UpdatePlayerLevelParams {
    uint64 vipLevel = 1; // 玩家vip等級
    uint64 vipExp   = 2; // 玩家vip經驗
    uint64 level    = 3; // 玩家等級
    uint64 exp      = 4; // 玩家經驗值
}

message UpdatePlayerCurrentSkinParams {
    UsageStatus status = 1;
}

message UpdatePlayerCurrentAvatarParams {
    uint64 avatarID  = 1;
    string avatarURL = 2;
}

message BetExchangeConfig {
    uint64 betExchangeEXP = 1; // 下注換經驗值
    uint64 betExchangeVIP = 2; // 下注額拿VIP點數1點
}

message EXPLevelConfig {
    uint64 level = 1; // 等級
    uint64 exp   = 2; // 升級所需經驗值
}

message VIPLevelConfig {
    uint64 level = 1; // VIP等級
    uint64 point = 2; // 升級VIP所需點數
}
message NoviceTeaching {
    int64 general      = 1; // 一般新手教學流程
    int64 isFishing    = 2; // 漁機新手教學
    int64 isMahjong    = 3; // 麻將新手教學
    int64 isBlackJack  = 4; // 21點新手教學
    int64 isNiuniu     = 5; // 牛牛新手教學
    int64 isScratchOff = 6; // 刮刮樂新手教學
    bytes spinData     = 7; // slot game 演出的盤面
    int64 winCoin      = 8; // slot game 贏的錢
    int64 initAmount   = 9; // 玩家初始金額
    uint64 userID      = 10;
    int64 isBackPack   = 11; // 背包新手教學
    int64 isRelation   = 12; // 好友新手教學
    int64 isMessage    = 13; // 聊天新手教學
    int64 isSpin       = 14; // 轉盤新手教學
    int64 isPromotion  = 15; // 人拉人教學
}

message PlayerLoginAwardRecord {
    string recordID                      = 1;
    uint64 userID                        = 2;
    uint64 productID                     = 3;
    uint64 itemID                        = 4;
    int64 receiveTime                    = 5;
    int64 amount                         = 6;
    virtualgood.VirtualGoodType goodType = 7;
}

// PromotionTask 推廣任務
message PromotionTask {
    uint64 id                               = 1;
    string promotionTaskType                = 2; // 推廣任務類型 ('DAILY','WEEKLY','MONTHLY')
    string promotionTaskStatus              = 3; // 推廣任務狀態 ('UNPUBLISHED','PUBLISHED','CLOSE_WAIT_RECEIVE_AWARD','END')
    string description                      = 4; // 推廣任務描述
    int64 periodStartAtMs                   = 5; // 推廣任務起始時間
    int64 periodEndAtMs                     = 6; // 推廣任務結束時間
    int64 waitReceiveAwardUntilMs           = 7; // 等待玩家領取獎勵時間，超過該時間獎勵將會自動派發
    int64 levelLimit                        = 8; // 領取任務的等級限制
    int64 numOfRepeatedlyReceiveTaskPerUser = 9; // 每人可重複領取該任務獎勵的次數(不同推薦人)
    int64 awardAmount                       = 10; // 獎勵數量(目前預設都為金幣)
    uint64 creatorID                        = 11; // 建立推廣任務的使用者
    uint64 updaterID                        = 12; // 更新推廣任務的使用者
    int64 createdAtMs                       = 13; // 建立時間
    int64 updatedAtMs                       = 14; // 更新時間
    int64 targetAmount                      = 15; // 任務目標額度
}

message PromotionTaskOptions {
    repeated uint64 idIn                       = 1;
    repeated string promotionTaskTypeIn        = 2;
    repeated string promotionTaskStatusIn      = 3;
    int64 periodStartAtMsGte                   = 6;
    int64 periodStartAtMsLte                   = 7;
    int64 periodEndAtMsGte                     = 8;
    int64 periodEndAtMsLte                     = 9;
    int64 waitReceiveAwardUntilMsGte           = 10;
    int64 waitReceiveAwardUntilMsLte           = 11;
    int64 levelLimitGte                        = 12;
    int64 levelLimitLte                        = 13;
    int64 numOfRepeatedlyReceiveTaskPerUserGte = 14;
    int64 numOfRepeatedlyReceiveTaskPerUserLte = 15;
    int64 awardAmountGte                       = 16;
    int64 awardAmountLte                       = 17;
    int64 targetAmountGte                      = 18;
    int64 targetAmountLte                      = 19;
}

// PlayerPromotionTask 玩家推廣任務
message PlayerPromotionTask {
    uint64 id                               = 1;
    uint64 userID                           = 2;
    uint64 promotionTaskID                  = 3;
    int64 numOfRepeatedlyReceiveTaskPerUser = 4; // 每人可重複領取該任務獎勵的次數(不同推薦人)
    yesno.YesNo isWaitReceiveAward          = 5; // 是否有待領取的獎勵
    int64 createdAtMs                       = 6;
    int64 updatedAtMs                       = 7;
    int64 receiveAwardCnt                   = 8; // 已領取獎勵次數

    PromotionTask promotionTask                                      = 50; // preload PromotionTask
    repeated PlayerPromotionTaskProgress playerPromotionTaskProgress = 51; // preload PlayerPromotionTaskProgress
}

message PlayerPromotionTaskOptions {
    repeated uint64 idIn                       = 1;
    repeated uint64 userIDIn                   = 2;
    repeated uint64 promotionTaskIDIn          = 3;
    int64 numOfRepeatedlyReceiveTaskPerUserGte = 4;
    int64 numOfRepeatedlyReceiveTaskPerUserLte = 5;
    yesno.YesNo isWaitReceiveAward             = 6;
    int64 createdAtMsGte                       = 7;
    int64 createdAtMsLte                       = 8;
    int64 receiveAwardCntGte                   = 9;
    int64 receiveAwardCntLte                   = 10;

    bool needPreloadPromotionTask             = 50;
    PromotionTaskOptions promotionTaskOptions = 51;

    bool needPreloadPlayerPromotionTaskProgress                           = 71;
    PlayerPromotionTaskProgressOptions playerPromotionTaskProgressOptions = 72;
}

// PlayerPromotionTaskProgress 玩家推廣任務進度
message PlayerPromotionTaskProgress {
    uint64 id                          = 1;
    uint64 userID                      = 2; // 玩家UserID
    uint64 playerPromotionTaskID       = 3;
    uint64 referalUserID               = 4; // 推薦人UserID
    string referalNickname             = 5; // 推薦人暱稱
    int64 currentTargetAmount          = 6; // 當前目標額度
    yesno.YesNo isTargetAmountAchieved = 7; // 是否達到目標額度
    yesno.YesNo isReceiveAward         = 8; // 是否已領取獎勵
    int64 createdAtMs                  = 9;
    int64 updatedAtMs                  = 10;
    yesno.YesNo isReachReceiveLimit    = 11;
}

message PlayerPromotionTaskProgressOptions {
    repeated uint64 idIn                    = 1;
    repeated uint64 userIDIn                = 2;
    repeated uint64 playerPromotionTaskIDIn = 3;
    repeated uint64 referalUserIDIn         = 4;
    int64 currentTargetAmountGte            = 5;
    int64 currentTargetAmountLte            = 6;
    yesno.YesNo isTargetAmountAchieved      = 7;
    yesno.YesNo isReceiveAward              = 8;
    yesno.YesNo isReachReceiveLimit         = 9;
}

// UpdatePlayerPromotionTaskProgressParams 更新玩家推廣任務進度的參數
message UpdatePlayerPromotionTaskProgressParams {
    google.protobuf.Int64Value currentTargetAmount = 1; // 當前目標額度
    yesno.YesNo isTargetAmountAchieved             = 2;
    yesno.YesNo isReceiveAward                     = 3;
    yesno.YesNo isReachReceiveLimit                = 4;
}

// OngoingPlayerPromotionTasksProgress 進行中的玩家推廣任務進度列表(未達標或待領取獎勵)
message OngoingPlayerPromotionTasksProgress {
    PlayerPromotionTaskProgress playerPromotionTaskProgress = 1;
    PlayerPromotionTask playerPromotionTask                 = 2;
}

message OngoingPlayerPromotionTasksProgressOptions {
    uint64 userID = 1;

    bool needPreloadPlayerPromotionTask = 50;
}

// CompletedPlayerPromotionTasksProgress 完成的玩家推廣任務進度列表(達標且已領取獎勵)
message CompletedPlayerPromotionTasksProgress {
    PlayerPromotionTaskProgress playerPromotionTaskProgress = 1;
    PlayerPromotionTask playerPromotionTask                 = 2;
}

message CompletedPlayerPromotionTasksProgressOptions {
    uint64 userID = 1;

    bool needPreloadPlayerPromotionTask = 50;
}

message ReferalUserToUpdatePlayerPromotionTaskProgress {
    uint64 referalUserID                   = 1;
    repeated uint64 playerPromotionTaskIDs = 2;
    int64 periodStartAtMs                  = 3;
    int64 periodEndAtMs                    = 4;
    string targetType                      = 5;
}

message ReferalUserToUpdatePlayerPromotionTaskProgressOptions {
    uint64 referalUserID = 1;
}