syntax = "proto3";
package playerinfo;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/playerinfo";

import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";

import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/pagination/pagination.proto";
import "proto/playerinfo/model.proto";
import "proto/virtualgood/virtualgood.proto";

/*
關於 topic
  stream: player
  玩家加經驗topic:
    player.addexp  接收 AddPlayerExpRequest proto

  玩家升級通知topic:
    player.viplevelup 推送 AddPlayerExpResponse proto
*/

service PlayerInfoService {
    rpc CreatePlayerInfo(CreatePlayerInfoRequest) returns (CreatePlayerInfoResponse);

    rpc GetPlayerInfo(GetPlayerInfoRequest) returns (GetPlayerInfoResponse);  // 取得玩家資訊

    rpc ListPlayerInfos(ListPlayerInfosRequest) returns (ListPlayerInfosResponse);  // 列出玩家資訊

    rpc ListPlayerInfoMap(ListPlayerInfoMapRequest) returns (ListPlayerInfoMapResponse);  // 列出玩家資訊

    rpc UpdatePlayerInfo(UpdatePlayerInfoRequest) returns (google.protobuf.Empty);

    rpc UpdateFakePlayerInfo(UpdateFakePlayerInfoRequest) returns (google.protobuf.Empty);

    rpc UpdatePlayerRTPGear(UpdatePlayerRTPGearRequest) returns (google.protobuf.Empty);

    rpc UpdatePlayerCurrentAvatar(UpdatePlayerCurrentAvatarRequest) returns (google.protobuf.Empty);

    // AddPlayerExp 增加 經驗值，參照 VIPData.xlsx
    rpc AddPlayerExp(AddPlayerExpRequest) returns (google.protobuf.Empty);
    // CheckPlayerVIPExp 排程檢查各玩家VIP倒數計時
    rpc CheckPlayerVIPExp(google.protobuf.Empty) returns (google.protobuf.Empty);
    // CheckPlayerVIPLevel 檢查玩家VIP等級授權動作
    rpc CheckPlayerVIPLevel(CheckPlayerVIPLevelRequest) returns (CheckPlayerVIPLevelResponse);

    rpc ListRecommendPlayers(ListRecommendPlayersRequest) returns (ListRecommendPlayersResponse);

    rpc UpdatePlayerLastLoginTime(UpdatePlayerLastLoginTimeRequest) returns (google.protobuf.Empty);

    rpc ListBot(ListBotRequest) returns (ListBotResponse);  // 列出玩家資訊

    rpc CheckSecondPassword(CheckSecondPasswordRequest) returns (google.protobuf.Empty);  // 驗證二次密碼

    rpc SetSecondPassword(SetSecondPasswordRequest) returns (google.protobuf.Empty);  // 設置二次密碼

    rpc CreatePlayerGift(CreatePlayerGiftRequest) returns (google.protobuf.Empty);                       // 新增玩家禮物
    rpc ListPlayerSenderGift(ListPlayerSenderGiftRequest) returns (ListPlayerSenderGiftResponse);        // 玩家送禮清單
    rpc ListPlayerReceiverGift(ListPlayerReceiverGiftRequest) returns (ListPlayerReceiverGiftResponse);  // 玩家收禮清單

    rpc UpdatePlayerActivityInfo(UpdatePlayerInfoRequest) returns (google.protobuf.Empty);
    rpc GetPlayerNoviceTeaching(GetPlayerNoviceTeachingRequest) returns (GetPlayerNoviceTeachingResponse);
    rpc UpdatePlayerNoviceTeaching(UpdatePlayerNoviceTeachingRequest) returns (google.protobuf.Empty);
    rpc ListOfflineBot(google.protobuf.Empty) returns (ListBotResponse);                    // 列出下限的機器人
    rpc UpdatePlayerToRTPGear(UpdatePlayerRTPGearRequest) returns (google.protobuf.Empty);  // 只更新玩家的檔位

    rpc IncPlayerRedEvenlopAmount(IncPlayerRedEvenlopAmountRequest) returns (google.protobuf.Empty);                 // 只更新玩家紅包 收發總額
    rpc IncPlayerAuctionAmount(IncPlayerAuctionAmountRequest) returns (google.protobuf.Empty);                       // 只更新玩家拍賣 買賣總額
    rpc IncPlayerAmount(IncPlayerAmountRequest) returns (google.protobuf.Empty);
    rpc ListRtpLockHistory(ListPlayerRtpLockRecordHistoryRequest) returns (ListPlayerRtpLockRecordHistoryResponse);  // 設定 rtp 鎖定金額歷程
    rpc ListPlayerInfosAppCounting(ListPlayerInfosAppCountingRequest) returns (ListPlayerInfosAppCountingResponse);  // 列出玩家資訊
    rpc RefundPlayerExp(RefundPlayerExpRequest) returns (google.protobuf.Empty);                                     // 退款回朔等級

    rpc SetPlayerInfoProfile(SetPlayerInfoProfileRequest) returns (google.protobuf.Empty);  // 更新 玩家資料 for rockman

    rpc GetAppsFlyerInfo(GetAppsFlyerInfoRequest) returns (GetAppsFlyerInfoResp);
    rpc ListAppsFlyerHistory(ListAppsFlyerHistoryRequest) returns (ListAppsFlyerHistoryResp);
    rpc SetAppsFlyerInfo(SetAppsFlyerInfoRequest) returns (SetAppsFlyerInfoResponse);

    rpc CreatePlayerLoginAwardRecord(CreatePlayerLoginAwardRecordRequest) returns (google.protobuf.Empty);
    rpc CountPlayerLoginAwardRecord(CountPlayerLoginAwardRecordRequest) returns (CountPlayerLoginAwardRecordResponse);
    rpc GetPlayerLoginAwardRecord(GetPlayerLoginAwardRecordRequest) returns (GetPlayerLoginAwardRecordResponse);
    rpc UpdatePlayerAppsFlyer(UpdatePlayerAppsFlyerRequest) returns (google.protobuf.Empty);
    rpc ListPlayerTagMap(ListPlayerTagMapRequest) returns (ListPlayerTagMapResponse);
    rpc GetPlayerTag(GetPlayerTagRequest) returns (GetPlayerTagResponse);
    rpc UpsertPlayerTag(UpsertPlayerTagRequest) returns (google.protobuf.Empty);
    rpc TelegramSendMessage(TelegramSendMessageRequest) returns (google.protobuf.Empty);

    // ListPromotionTasks 列出推廣任務(後台使用)
    rpc ListPromotionTasks(ListPromotionTasksReq) returns (ListPromotionTasksResp);
    // CreatePromotionTask 建立推廣任務(後台使用)
    rpc CreatePromotionTask(CreatePromotionTaskReq) returns (google.protobuf.Empty);
    // PublishedPromotionTask 發布推廣任務(後台使用)
    rpc PublishedPromotionTask(PublishedPromotionTaskReq) returns (google.protobuf.Empty);
    // DuplicatePromotionTask 複製推廣任務(後台使用)
    rpc DuplicatePromotionTask(DuplicatePromotionTaskReq) returns (google.protobuf.Empty);

    // MigrateReferrerCode 對沒有推薦碼的playerinfo做migration (推薦碼有可能沒辦法成功取得，為了不影響既有流程，讓scheduler定期嘗試補償)
    rpc MigrateReferrerCode(MigrateReferrerCodeReq) returns (MigrateReferrerCodeResp);
    // BindingReferalWithReferrerCode 以推薦碼綁定推薦人
    rpc BindingReferalWithReferrerCode(BindingReferalWithReferrerCodeReq) returns (BindingReferalWithReferrerCodeResp);
    // PlayerRecievePromotionTasks 玩家領取推廣任務
    rpc PlayerRecievePromotionTasks(PlayerRecievePromotionTasksReq) returns (PlayerRecievePromotionTasksResp);
    // ListPlayerPromotionTasks 取得玩家推廣任務列表
    rpc ListPlayerPromotionTasks(ListPlayerPromotionTasksReq) returns (ListPlayerPromotionTasksResp);
    // ListOngoingPlayerPromotionTasksProgress 取得進行中的玩家推廣任務進度列表(未達標或待領取獎勵)
    rpc ListOngoingPlayerPromotionTasksProgress(ListOngoingPlayerPromotionTasksProgressReq) returns (ListOngoingPlayerPromotionTasksProgressResp);
    // ListCompletedPlayerPromotionTasksProgress 取得完成的玩家推廣任務進度列表(達標且已領取獎勵)
    rpc ListCompletedPlayerPromotionTasksProgress(ListCompletedPlayerPromotionTasksProgressReq) returns (ListCompletedPlayerPromotionTasksProgressResp);
    // ReceivePromotionTaskAward 領取推廣任務獎勵
    rpc ReceivePromotionTaskAward(ReceivePromotionTaskAwardReq) returns (ReceivePromotionTaskAwardResp);
    // CloseExpiredPromotionTasks 關閉到期的推廣活動(未領取的獎勵由系統自動發放)
    rpc CloseExpiredPromotionTasks(CloseExpiredPromotionTasksReq) returns (CloseExpiredPromotionTasksResp);
    // UpdatePlayerPromotionTaskProgressWithThePairOfPlayerWithReferal 更新指定的玩家與推薦人配對的推廣任務進度
    rpc UpdatePlayerPromotionTaskProgressWithThePairOfPlayerWithReferal(UpdatePlayerPromotionTaskProgressWithThePairOfPlayerWithReferalReq) returns (UpdatePlayerPromotionTaskProgressWithThePairOfPlayerWithReferalResp);
    // ListReferalUserToUpdatePlayerPromotionTaskProgress 取得待更新玩家推廣任務進度的推薦人列表
    rpc ListReferalUserToUpdatePlayerPromotionTaskProgress(ListReferalUserToUpdatePlayerPromotionTaskProgressReq) returns (ListReferalUserToUpdatePlayerPromotionTaskProgressResp);

    // LikeRichDaddy 按讚某金主霸霸
    rpc LikeRichDaddy(LikeRichDaddyReq) returns (LikeRichDaddyResp);
}
message DeviceGain {
    uint64 gain = 30; // 玩家累積贏錢
    uint64 bet  = 57; // 玩家累積押注
}

// VIPLevelRule 參考VIPData.xlsx
enum VIPLevelRule {
    UNKNOWN_VIP_LEVEL_RULE = 0;
    RESERVED_TIME          = 1; // 房間保留時間(分鐘)
    CHAT_NAME              = 2; // 聊天室名稱色
    HEAD_FRAME             = 3; // 頭相框
    SLOT_VIP_BET           = 4; // 老虎機VIP注額
    RED_ENVELOPE           = 5; // 紅包功能
    HIGH_BET               = 6; // 各遊戲高注額
    PRIVATE_ROOM           = 7; // 私人房功能
    SAFE                   = 8; // 保險箱
    PRO_TABLE              = 9; // 機率表
    BUY_BONUS              = 10; // 買獎勵遊戲
    SERVICE                = 11; // 客服說明
    MANAGER                = 12; // 專屬經理
    TIME_LIMIT             = 13; // 期限
    SLOT_VIP_BET_CONTROL   = 14; // 老虎機VIP注額控制
}

message CheckPlayerVIPLevelRequest {
    uint64 userID = 1;
}

message CheckPlayerVIPLevelResponse {
    map<string, string> ruleMap = 1;
}

message CreatePlayerInfoRequest {
    uint64 userID                 = 1;
    string nickname               = 2;
    yesno.YesNo isFake            = 3; // 是否為機器人
    PlayerKind playerKind         = 4; // 玩家種類
    uint64 avatarID               = 5; // 頭像ID, 如果帶0表示用臉書的
    string avatarURL              = 6; // 頭像URL, 不管登入方式是臉書還是Megarich, 都將對應頭像URL帶給後端
    repeated PlayerAvatar avatars = 7; // 預設玩家頭像列表
    repeated PlayerRole roles     = 8; // 預設玩家角色列表
    repeated PlayerRoleSkin skins = 9; // 預設角色皮膚列表
    string versionName            = 10; // 渠道名稱
    uint64 vipLevel               = 11; // vip等級(給官方帳號玩家所設置)
    PlayerRTPGear playerRTPGear   = 12; // 玩家RTP檔位
    int64 activity                = 13; // 預設活躍值
    PlayerRTPGear playerRTPGearGC = 14; // 玩家RTP檔位
    uint64 refererUID             = 15; // 推薦人UID
}

message CreatePlayerInfoResponse {
    PlayerInfo playerInfo = 1;
}

message GetPlayerInfoRequest {
    uint64 userID       = 1;
    yesno.YesNo isFake  = 2; // 是否為機器人
    string versionName  = 3; // 渠道名稱
    string nickName     = 4; // 名稱
    bool notNeedPreload = 5; // 部分情況下不需要preload的資料
}

message GetPlayerInfoResponse {
    PlayerInfo playerInfo = 1;
}

message ListPlayerInfosRequest {
    repeated uint64 userIDs = 1;
    uint32 page             = 2;
    uint32 perPage          = 3;
    yesno.YesNo isSpecial   = 4;
    yesno.YesNo isFake      = 5; // 是否為機器人
    string versionName      = 6; // 渠道名稱
    int32 playerKind        = 7; // 玩家類別
    Gender gender           = 8; // 玩家性別
    string sort             = 9; // sort by
    uint64 userIDLike       = 10; // userID 模糊搜尋
    string nicknameLike     = 11; // nickname 模糊搜尋
    string contactPhoneLike = 12; // contactPhone 模糊搜尋

    yesno.YesNo isPayPlayer         = 13; // 是否為付費玩家
    yesno.YesNo needCountingAppType = 14; // 是否需要個app類型筆數 PlayerInfosCountingByAppType
    yesno.YesNo joinPlayerGrandData = 15;
    yesno.YesNo isVipExpPlayer      = 16; // 是否為儲值玩家

    uint32 vipLevelGte          = 17; // VIP Level 大於等於
    uint32 vipLevelLte          = 18; // VIP Level 小於等於
    string cellphone            = 19; // 聚合用的filter條件
    string lastloginIP          = 20; // 聚合用的filter條件
    bool notNeedPreload         = 21; // 部分情況下不需要preload的資料
    int64 lastLoginAtMsGte      = 22;
    int64 LastLoginAtMsLte      = 23;
    repeated int32 playerKindIn = 24; // 玩家類別

    int64 bindAtMsGte                                                         = 27;
    int64 bindAtMsLte                                                         = 28;
    string referrerCode                                                       = 29;
    uint64 referalUserID                                                      = 30;
    google.protobuf.BoolValue IsReferrerCodeNull                              = 31;
    google.protobuf.BoolValue IsReferalUserIDNull                             = 32;
    bool checkAutoUpdatePlayerPromotionTaskProgressWithStatusWaitReceiveAward = 33; // 檢查需要自動更新玩家推廣任務進度的人(推廣任務狀態為等待領取中的)
    int64 updatePlayerPromotionTaskProgressAtMsGte                            = 34;
    int64 updatePlayerPromotionTaskProgressAtMsLte                            = 35;
}

message ListPlayerInfosResponse {
    repeated PlayerInfo playerInfos                         = 1;
    pagination.Pagination pagination                        = 2;
    repeated PlayerInfosCountingByAppType countingByAppType = 3;
}

message PlayerInfosCountingByAppType {
    string appType = 1;
    int64 count    = 2;
}

message ListPlayerInfoMapRequest {
    repeated uint64 userIDs = 1;
    bool needAll            = 2;
}
message ListBotRequest {
    uint32 botCount    = 1; // 需要的機器人數量
    uint32 vipLevelGte = 2;
}
message ListBotResponse {
    repeated PlayerInfo playerInfos = 1;
}
message ListPlayerInfoMapResponse {
    map<uint64, PlayerInfo> playerInfoMap = 1;
}

message UpdatePlayerInfoRequest {
    uint64 userID                 = 1;
    UpdatePlayerInfoParams params = 2;
}

message UpdateFakePlayerInfoRequest {
    repeated FakePlayerInfo fakePlayerInfos = 1;
}
message FakePlayerInfo {
    uint64 userID                     = 1;
    UpdateFakePlayerInfoParams params = 2;
}

message UpdatePlayerCurrentAvatarRequest {
    uint64 userID                          = 1;
    UpdatePlayerCurrentAvatarParams params = 2;
}

enum AddExpType {
    UNKNOWN_ADD_VIP_EXP_TYPE = 0;
    FROM_PAYMENT             = 1; // 來自儲值
    FROM_BET                 = 2; // 來自注額
    FROM_DROP                = 3; // 來自抽獎
}

// AddPlayerExpRequest 增加 VIP 經驗值
message AddPlayerExpRequest {
    uint64 user_id = 1;

    AddExpType type = 2;
    message ExpSpec {
        uint64 amount = 1; // 儲值金額｜注額
    }

    ExpSpec vip_exp         = 3;
    ExpSpec exp             = 4;
    ExpSpec gain            = 5;
    uint64 gameID           = 6;
    int32 judanGameCategory = 7;
    uint64 timestampMs      = 8;

    repeated ExpBetInfo betInfo = 9;
}

message ExpBetInfo {
    enum Type {
        FirstBet = 0;
        AddEvent = 1;
    }
    uint64 betAmount  = 1; //
    uint64 gainAmount = 2;

    Type type                = 3;
    uint64 originalBetAmount = 4; // add event 應帶上
}

// AddPlayerExpResponse 增加 經驗值返回響應
message AddPlayerExpResponse {
    uint64 user_id          = 1;
    yesno.YesNo is_level_up = 2;
    uint64 orignal_level    = 3;
    uint64 current_level    = 4;

    yesno.YesNo is_vip_level_up = 5;
    uint64 orignal_vip_level    = 6;
    uint64 current_vip_level    = 7;
}

message ListRecommendPlayersRequest {
    repeated uint64 excludeUserIDs = 1;
    enum RecommendType {
        UPSTREAM = 0; // 推薦賭場經理
        FRIEND   = 1; // 推薦好友
    }
    RecommendType type = 2;
}

message ListRecommendPlayersResponse {
    repeated PlayerInfo specialPlayers = 1;
    repeated PlayerInfo normalPlayers  = 2;
}

message UpdatePlayerLastLoginTimeRequest {
    uint64 userID = 1;
}
message CheckSecondPasswordRequest {
    uint64 userID         = 1;
    string secondPassword = 2; // 二次密碼
}

message SetSecondPasswordRequest {
    uint64 userID         = 1;
    string secondPassword = 2; // 二次密碼
}

message CreatePlayerGiftRequest {
    uint64 senderID                      = 1; // 送方
    uint64 receiverID                    = 2; // 收方
    uint64 itemID                        = 3; // item ID
    int64 price                          = 4; // 價錢
    int64 amount                         = 5; // 數量
    virtualgood.VirtualGoodType goodType = 6;
}

message ListPlayerSenderGiftRequest {
    uint64 userID                                  = 1;
    int64 topCount                                 = 2; // 取回幾筆
    repeated virtualgood.VirtualGoodType goodTypes = 3;
}

message ListPlayerSenderGiftResponse {
    repeated PlayerGift gifts = 1;
}
message ListPlayerReceiverGiftRequest {
    uint64 userID                                  = 1;
    int64 topCount                                 = 2; // 取回幾筆
    repeated virtualgood.VirtualGoodType goodTypes = 3;
}
message ListPlayerReceiverGiftResponse {
    repeated PlayerGift gifts = 1;
}

message UpdatePlayerRTPGearRequest {
    uint64 userID                                    = 1;
    repeated PlayerRtpLockRecord playerRtpLockRecord = 2; // 玩家鎖定歷程
    PlayerRTPGear playerRTPGear                      = 3; // 玩家RTP檔位
    string created                                   = 4;
    int64 playerRTPGearLockUntilAmountStep           = 5; // 玩家鎖定金額目前位置
    int64 playerRTPGearLockUntilAmountEndTime        = 6; // 玩家鎖定金額結束時間
    PlayerRtpLockRecordOperator lockOperator         = 7; // 鎖定方式
    WalletType walletType                            = 8;
}
message GetPlayerNoviceTeachingRequest {
    uint64 userID   = 1;
    int64 initMoney = 2;
}

message GetPlayerNoviceTeachingResponse {
    NoviceTeaching noviceTeaching = 1;
}
message UpdatePlayerNoviceTeachingRequest {
    uint64 userID                 = 1;
    NoviceTeaching noviceTeaching = 2;
}

message IncPlayerRedEvenlopAmountRequest {
    uint64 userID = 1;
    int64 sendInc = 2;
    int64 revcInc = 3;
}

message IncPlayerAuctionAmountRequest {
    uint64 userID = 1;
    int64 buyInc  = 2;
    int64 sellInc = 3;
}

message IncPlayerAmountRequest {
    uint64 userID          = 1;
    int64 depositAmountSC  = 2;
    int64 withdrawAmountSC = 3;
    int64 depositAmountGC  = 4;
}

message ListPlayerRtpLockRecordHistoryRequest {
    uint64 userID = 1;
    WalletType walletType = 2;
}

message ListPlayerRtpLockRecordHistoryResponse {
    repeated PlayerRtpLockRecord playerRtpLockRecord = 1;
}

message ListPlayerInfosAppCountingRequest {
    repeated uint64 userIDs = 1;
    yesno.YesNo isSpecial   = 2;
    yesno.YesNo isFake      = 3; // 是否為機器人
    string versionName      = 4; // 渠道名稱
    int32 playerKind        = 5; // 玩家類別
    Gender gender           = 6; // 玩家性別
    string sort             = 7; // sort by
    uint64 userIDLike       = 8; // userID 模糊搜尋
    string nicknameLike     = 9; // nickname 模糊搜尋
    string contactPhoneLike = 10; // contactPhone 模糊搜尋

    yesno.YesNo isPayPlayer = 11; // 是否為付費玩家
}

message ListPlayerInfosAppCountingResponse {
    repeated PlayerInfosCountingByAppType countingByAppType = 1;
}

message RefundPlayerExpRequest {
    uint64 userID = 1;
    int64 amount  = 2;
}

message SetPlayerInfoProfileRequest {
    uint64 userID   = 1;
    string nickName = 2;
    string comment  = 11;

    yesno.YesNo isSetLevel = 3;
    uint64 level           = 4;

    yesno.YesNo isSetVipLevel = 5;
    uint64 vipLevel           = 6;
    uint64 vipTimeout         = 7;

    yesno.YesNo isSetActive          = 8;
    uint64 active                    = 9;
    yesno.YesNo isSetVipLevelTimeout = 10;

    PlayerKind playerKind = 12;
}

enum MediaSourceType {
    UNKNOWN_SOURCE_TYPE = 0;
    ORGANIC             = 1;
    FACEBOOK            = 2;
    GOOGLE              = 3;
    TIK_TOK             = 4;
    APPLE               = 5;
    Hand_CHANGE         = 6; // 手動調整
    SMS                 = 7;
    RESTRICTED          = 8; // 受限制的廣告來源
}

message GetAppsFlyerInfoRequest {
    uint64 userID = 1;
}

message GetAppsFlyerInfoResp {
    AppsFlyerHistory appsFlyerInfo = 1;
}

enum Sort {
    NoSet          = 0;
    SignUpTimeAsc  = 1;
    SignUpTimeDesc = 2;
}

message ListAppsFlyerHistoryRequest {
    uint32 page                = 1;
    uint32 perPage             = 2;
    uint64 userID              = 3;
    repeated uint64 userIDs    = 4;
    yesno.YesNo filterNoSource = 5;
    MediaSourceType Source     = 8;

    int64 startedAt = 6;
    int64 endedAt   = 7;
    Sort sort       = 9;
}

message ListAppsFlyerHistoryResp {
    repeated AppsFlyerHistory appsFlyerHistory = 1;
    pagination.Pagination pagination           = 2;
}

// https://support.appsflyer.com/hc/zh-cn/articles/208387843#data-fields-dictionary
message AppsFlyerHistory {
    string idfv                                = 1; // iOS 提供的應用開發者標識符
    string deviceCategory                      = 2; // 可能出現的值有：phone（電話）、tablet（平板）、other（其他）
    string afSub1                              = 3;
    uint64 customerUserID                      = 4; // 由廣告主設置的應用用戶非重 ID
    bool isLat                                 = 5; // Limit ad tracking（限制廣告跟蹤，簡稱 LAT）
    string contributor2AfPrt                   = 6;
    string bundleID                            = 7;
    string gpBroadcastReferrer                 = 8;
    string contributor2TouchTime               = 9;
    string contributor3TouchType               = 10;
    string eventSource                         = 11; // SDK 或 S2S
    string afCostValue                         = 12; // 成本貨幣的金額，最多精確到小數點後4位，
    string contributor1MatchType               = 13; // 即 match type 字段中可能出現的值。
    string appVersion                          = 14;
    string contributor3AfPrt                   = 15;
    string customData                          = 16; // 由廣告主在 SDK 中設置的數據或通過 S2S 設置的數據，通常用於與第三方對接、受眾共享等等。
    string contributor2TouchType               = 17;
    string gpInstallBegin                      = 18; // 激活起始時間時間數據來源：Google API
    string city                                = 19;
    string amazonAid                           = 20; // 亞馬遜設備上的用戶可重置廣告 ID。
    string deviceModel                         = 21; // 設備的商業型號名稱
    string gpReferrer                          = 22; // 安裝包的 referrer 鏈接 Android SDK V4.8.5 及以上版本可用
    string afCostModel                         = 23; // 通過歸因鏈接上報的成本模型，包括 CPC/CPI/CPM 等等。目前所有成本都以 CPI 計算，不考慮該字段的值。
    string afCID                               = 24;
    string attributedTouchTimeSelectedTimezone = 25;
    string selectedCurrency                    = 26;
    string appName                             = 27;
    string installTimeSelectedTimezone         = 28;
    string postalCode                          = 29; // 根據 SDK 上報的設備 IP 地址判斷
    bool wifi                                  = 30;
    string installTime                         = 31;
    string operator                            = 32; // 根據 SIM MCCMNC 識別的移動運營商名稱，對於注冊用戶可通過安卓的 getNetworkOperatorName() 獲取該名稱。
    string attributedTouchType                 = 33; // UA（用戶獲取）：可能出現的值包括 click（點擊）、impression（展示）、TV、pre-installed（預安裝）再營銷：可能出現的值包括 click 和 impression
    string afAttributionLookback               = 34; // 歸因回溯窗口期，在這個時間段內可將激活歸
    string campaignType                        = 35; // 用戶流量來源 (UA, 自然, 再營銷, 未知)
    string keywordMatchType                    = 36; // 僅 Google Adwords 提供該字段。
    string afAdsetID                           = 37; // 廣告組 ID
    string deviceDownloadTimeSelectedTimezone  = 38;
    string contributor2MediaSource             = 39;
    string conversionType                      = 40; // 轉化類型 (激活, 重新激活, 再互動, 未知)
    string contributor2MatchType               = 41;
    string apiVersion                          = 42;
    string attributedTouchTime                 = 43; // 用戶獲取：AF 記錄到的廣告互動時間。再營銷：AF 記錄到的廣告互動時間。
    string revenueInSelectedCurrency           = 44;
    bool isRetargeting                         = 45; // (用戶獲取：False, 再營銷：再營銷轉化與事件為 True)
    string countryCode                         = 46;
    string gpClickTime                         = 47; // 用戶點擊廣告後，在 Google Play 中看到相關應用頁面的時間。
    string contributor1AfPrt                   = 48;
    string matchType                           = 49; // 各種類型的歸因方法
    string appsflyerID                         = 50; // 用戶在其設備上安裝應用時由SKD生成的非重ID，用於在LTV維度對應用內事件進行歸因、獲取轉化數據並關聯應用內事件。
    string dma                                 = 51; // 指定市場區域（Designated Market Area）或地理區域
    string hTTPReferrer                        = 52; // 鏈接到AppsFlyer點擊URL的網頁地址標識符，用於查看請求來源。
    string afSub5                              = 53;
    string afPrt                               = 54;
    string eventRevenueCurrency                = 55; // 上報到SDK的事件收入貨幣代碼。
    string storeReinstall                      = 56; // Apple應用商店基於Apple用戶ID來判斷Apple Search Ads帶來的用戶是否記為重裝激活：新用戶：false, 現有用戶重裝激活：true
    string installAppStore                     = 57; // 用戶下載應用的安卓應用商店
    string mediaSource                         = 58; // 獲得歸因的媒體渠道或restricted（受限渠道）
    string deeplinkURL                         = 59; // 把用戶引導到具體應用內體驗的路徑，用於深度鏈接和延遲深度鏈接，體現在歸因鏈接的af_dp值中。
    string campaign                            = 60; // 廣告系列名稱
    string afKeywords                          = 61; // 用戶在搜索時使用的關鍵詞，由廣告平台上報。
    string region                              = 62; // 根據SDK上報的設備IP地址判斷
    string costInSelectedCurrency              = 63;
    string eventValue                          = 64; // 從SDK發出的詳細事件內容。
    string ip                                  = 65;
    string oaid                                = 66; // 一些安卓設備上的用戶可重置ID，通常作為GAID的替代。
    string eventTime                           = 67;
    string isReceiptValidated                  = 68; // 在SDK中配置的話則為true/false/null，否則為空
    string contributor1Campaign                = 69;
    string afSub4                              = 70;
    string imei                                = 71; // 不可重置的永久性設備ID
    string contributor3Campaign                = 72;
    string eventRevenueUsd                     = 73;
    string afSub2                              = 74;
    string originalURL                         = 75; // (用戶獲取：所使用的點擊/展示URL。如果使用的是品牌鏈接，那麽該字段通過品牌鏈接填充。再營銷：再營銷鏈接或深度鏈接數據，如果在SRN投放，則該字段為空。)
    string contributor2Campaign                = 76;
    string androidID                           = 77; // 不可重置的永久性設備ID
    string contributor3MediaSource             = 78;
    string afAdset                             = 79;
    string afAd                                = 80;
    string state                               = 81; // 根據SDK上報的設備IP地址判斷
    string networkAccountID                    = 82; // 渠道側的廣告主帳戶ID
    string deviceType                          = 83; // 在CTV場景中以CTV平台ID類型填充，如Roku的RIDA。
    string idfa                                = 84; // iOS設備上的可重置廣告ID
    string retargetingConversionType           = 85;
    string afChannel                           = 86;
    string afCostCurrency                      = 87; // 三位字母貨幣代碼（如USD、EUR等）。默認為USD。
    string contributor1MediaSource             = 88;
    string customDimension                     = 89; // 留作後用
    string keywordID                           = 90; // 由廣告平台返回，是af_keyword的ID。
    string deviceDownloadTime                  = 91;
    string contributor1TouchType               = 92;
    string afReengagementWindow                = 93;
    string afSiteid                            = 94; // 子渠道ID
    string language                            = 95;
    string appID                               = 96; // AppsFlyer後台的非重應用標識符
    string contributor1TouchTime               = 97;
    string eventRevenue                        = 98; // 以事件收入貨幣為單位的收入金額
    string afAdType                            = 99;
    string carrier                             = 100; // 通過getSimCarrierIdName()獲取的運營商名稱，由安卓系統提供。另請參見運營商映射
    string eventName                           = 101;
    string afSubSiteid                         = 102; // 下級子渠道ID
    string advertisingID                       = 103; // 用戶可重置的設備ID，又稱GAID。在CTV場景中該字段為CTV ID，如RIDA或VIDA。
    string osVersion                           = 104; // 設備的操作系統版本
    string platform                            = 105; // 設備系統
    string afSub3                              = 106;
    string contributor3MatchType               = 107;
    string selectedTimezone                    = 108;
    string afAdID                              = 109;
    string contributor3TouchTime               = 110;
    string userAgent                           = 111; // URL用戶代理
    bool isPrimaryAttribution                  = 112; // 用戶獲取：True, 再營銷：在再互動窗口期內，AF會將用戶同時歸因到最初的拉新渠道（即再互動之前的渠道）以及帶來再互動的渠道
    string sdkVersion                          = 113; // AppsFlyer SDK版本
    string eventTimeSelectedTimezone           = 114;
    yesno.YesNo isAd                           = 115;
}
