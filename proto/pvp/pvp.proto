syntax = "proto3";
package pvp;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/pvp";

enum PvpType {
    PING_PONG        = 0;
    JOIN_ROOM        = 1;  // 加入房間
    USER_KICK_BEFORE = 2;
    SERVER_UPDATE    = 3;
    Start            = 4;  // 開始遊戲
    SPIN             = 5;  // spin
    OTHER_SPIN       = 6;  // 對方 spin
    End              = 7;  // 結束遊戲
    SYNC_INFO        = 8;  // 同步對方資訊
}
message Player {
    uint64 playerID = 1;  // 玩家 ID
    uint64 skillID  = 2;  // 技能 ID
    uint64 roleID   = 3;  // 角色 ID
    string name     = 4;  // 玩家名稱
    int64 hp        = 5;  // 血量
}
message StartResponse {
    int64 startTime              = 1;  // 遊戲開始時間
    int64 endTime                = 2;  // 遊戲結束時間
    repeated RollTable rollTable = 3;  // 初始盤面
    Player player                = 4;  // 玩家
    Player otherPlayer           = 5;  // 對方玩家
}

message endResponse {
    Player winner = 1;  // 勝方
    Player loser  = 2;  // 敗方
}
// spin request
message SpinRequest {
    repeated RollTable symbolResult = 1;  // 盤面
}

// spin result
message SpinResult {
    repeated Spin spin = 1;
    GameInfo info      = 2;  // 遊戲資訊
}

message GameInfo {
    uint64 totalScore      = 1;  // 總分
    int64 hp               = 2;  // 剩餘血量
    int64 blockCount       = 3;  // 阻擋數
    int64 otherBlockCount  = 4;  // 對方阻擋數
    int64 actBlockCount    = 5;  // 給對方阻擋數
    int64 otherHp          = 6;  // 對方剩餘血量
    int64 actScore         = 7;  // 給對方攻擊
    uint64 otherTotalScore = 8;  // 對方總分
}

message Spin {
    repeated RollTable symbolResult = 1;  // 盤面
    uint64 winCoin                  = 2;  // 贏的分數
    int64 combo                     = 3;  // combo 數
}
message RollTable {
    repeated string row = 1;
}