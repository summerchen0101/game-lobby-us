syntax = "proto3";
package qiuqiu;

option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/qiuqiu";

// MessageType
enum MessageType {
  PingPong        = 0;

  // [RPC]
  // 加入房間
  // * req: JoinRoomRequest
  // * resp: JoinRoomResponse
  JoinRoom = 1;

  // 離開房間
  LeaveRoom = 2;

  // 取得房間資訊
  // * resp: GetRoomResponse
  GetRoom = 11;

  // 玩家下注動作
  // * req: RoomPlayerActionRequest
  // * resp: RoomPlayerActionResponse
  RoomPlayerBetAction = 21;

  // 玩家準備好動作
  RoomPlayerGetReady = 22;

  // 玩家選擇牌組
  RoomPlayerChooseFinalCard = 23;


  // [PUSH]
  //  RoomInfoEvent   = 1001; // 房間訊息事件
  RoomClosedEvent = 1002; // 房間關閉事件。 data: RoomClosedEventData

  JoinRoomEvent                 = 1011; // (廣播)加入房間事件。 data: JoinRoomEventData
  LeaveRoomEvent                = 1012; // (廣播)離開房間事件。 data: LeaveRoomEventData
  BalanceNotEnoughEvent         = 1013; // (廣播)用戶餘額不足事件，用戶需離開房間。 data: BalanceNotEnoughEventData
  RoomPlayerGetReadyEvent       = 1014; // (廣播)用戶 get ready 事件。 data: RoomPlayerGetReadyEventData
  ExceedContinueRoundLimitEvent = 1015; // (廣播)到達用戶同桌局數上限，用戶需離開房間。 data: ExceedContinueRoundLimitEventData
  WaitUserReadyTimeoutEvent     = 1016; // (廣播)等待用戶 get ready 超時，用戶需離開房間。 data: WaitUserReadyTimeoutEventData

  NotifyRoomPlayerActionEvent = 1022;  // (廣播)通知玩家執行動作事件。 data: NotifyRoomPlayerBetActionEventData
  RoomPlayerBetActionEvent    = 1023;  // (廣播)玩家動作事件。 data: RoomPlayerBetActionEvent
  SettlementEvent             = 1024;  // (廣播)房間回合結算事件。 data: SettleEventData
  PrepareEvent                = 1025;  // (廣播)房間準備中事件。
  ShuffleEvent                = 1026;  // (廣播)房間洗牌事件。 data: ShuffleEventData
  PlayerDealEvent             = 1027;  // (用戶)對單一用戶發手牌事件。 data: PlayerDealEventData
  DealEvent                   = 1028;  // (廣播)發牌事件。 data: DealEventData
  CountdownRoundEvent         = 1029;  // (廣播)倒數開局事件。 data: CountdownRoundEventData
  StopCountdownRoundEvent     = 1030;  // (廣播)停止倒數開局事件。 data: StopCountdownRoundEventData
  OpenCardsEvent              = 1031;  // (廣播)開牌事件。 data: OpenCardsEventData
}

// 骨牌
enum Domino {
  TOP0_BTM0 = 0;
  TOP0_BTM1 = 10;
  TOP1_BTM1 = 11;
  TOP0_BTM2 = 20;
  TOP1_BTM2 = 21;
  TOP2_BTM2 = 22;
  TOP0_BTM3 = 30;
  TOP1_BTM3 = 31;
  TOP2_BTM3 = 32;
  TOP3_BTM3 = 33;
  TOP0_BTM4 = 40;
  TOP1_BTM4 = 41;
  TOP2_BTM4 = 42;
  TOP3_BTM4 = 43;
  TOP4_BTM4 = 44;
  TOP0_BTM5 = 50;
  TOP1_BTM5 = 51;
  TOP2_BTM5 = 52;
  TOP3_BTM5 = 53;
  TOP4_BTM5 = 54;
  TOP5_BTM5 = 55;
  TOP0_BTM6 = 60;
  TOP1_BTM6 = 61;
  TOP2_BTM6 = 62;
  TOP3_BTM6 = 63;
  TOP4_BTM6 = 64;
  TOP5_BTM6 = 65;
  TOP6_BTM6 = 66;
  TOPx_BYMx = 999; // 不顯示的牌
}

// 牌型
enum DominoCardType {
  DOMINO_CARD_TYPE_UNKNOWN  = 0;
  KARTU_BIASA               = 1; // 散牌
  QIUQIU                    = 2; // 左右兩組骨牌各別點數總和都為9點
  BIG                       = 3; // 所有牌點數總和≧39
  SMALL                     = 4; // 所有牌點數總和≦9
  TWIN                      = 5; // 每張牌都是雙牌
  SIX_DEVIL                 = 6; // 每張骨牌都是6點，最大的特殊牌型
}

// InitRoomOptions
// 打私房時，CreatePassRoomReq 的 data 字段結構: InitPasswordRoomOptions
message InitPasswordRoomOptions {
  int64 actionTime = 1;  // 玩家動作時間秒數，只有密碼房有用
}

message JoinRoomRequest {
  string roomID    = 1;  // 房間編號
  uint64 token     = 2;  // 代幣
  string latitude  = 5;  // 經度
  string longitude = 6;  // 緯度
}

message JoinRoomResponse {
  RoomPlayer player = 1; // 玩家本身
}

message RoomPlayer {
  uint64 userID                    = 1;  // 玩家用戶編號
  string avatarURL                 = 2;  // 頭像 URL
  string nickname                  = 3;  // 暱稱
  uint64 vipLevel                  = 4;  // VIP 等級
  uint64 level                     = 5;  // level
  int64 balance                    = 6;  // 餘額
  bool isFake                      = 7;  // 是否是機器人
  bool isPlaying                   = 8;  // 此局是否有玩
  uint32 roomBaseID                = 9;  // 0 代表站著，座位編號 1~7
  PlayerActionType lastActionType  = 10; // 玩家最後動作類型
  int64 betAmount                  = 11; // 玩家加注金額
  int64 currentStageBetAmount      = 12; // 玩家當前回合階段總押注金額
  PlayerHandCards handCards        = 13; // 結算階段時會顯示玩家手牌
  string latitude                  = 14; // 經度
  string longitude                 = 15; // 緯度
  bool prepareReady                = 16; // 準備好參與遊戲了
  bool chooseFinalCardReady        = 17; // 選好最終牌型了
}

message GetRoomResponse {
  Room room                       = 1;
  repeated RoomPlayer roomPlayers = 2;
}

// RoomPlayerActionType 房間玩家動作類型
enum PlayerActionType {
  UnknownRoomPlayerAction = 0;
  GET_READY               = 1;  // 準備好
  BLIND                   = 2;  // 底注
  FOLD                    = 3;  // 棄牌
  CHECK                   = 4;  // 過牌
  CALL                    = 5;  // 跟注
  RAISE                   = 6;  // 加注
  ALL_IN                  = 7;  // 全下
}

message PlayerHandCards {
  repeated Domino cards            = 1; // 玩家個人手牌，根據遊戲進行階段會有 0 或 3 - 4 張
  DominoCardType dominoSpecialType = 2; // 特殊牌型
  uint32 LeftPoint                 = 3; // 左邊兩張牌總和取個位數
  uint32 RightPoint                = 4; // 右邊兩張牌總和取個位數
}

// RoundStage 回合階段
enum RoundStage {
  ROUND_STAGE_UNKNOWN = 0;
  PREPARE             = 1;  // 準備階段
  SHUFFLE             = 2;  // 洗牌階段，此時用戶會下盲注
  FIRST_DEAL          = 3;  // 第一輪發牌
  FIRST_BET           = 4;  // 第一輪下注
  SECOND_DEAL         = 5;  // 第二輪發牌
  SECOND_BET          = 6;  // 第二輪下注
  OPEN_CARD           = 7;  // 開牌階段
  SETTLEMENT          = 8;  // 結算階段
}

message Room {
  string roomID               = 1;
  string roundID              = 2;
  int64 blindToken            = 3;  // 底注金額
  RoundStage roundStage       = 4;  // 回合狀態
  uint64 dealerID             = 5;  // 莊家ID
  uint32 dealerBaseID         = 6;  // 莊家座位ID
  uint64 actionUserID         = 7;  // 當前動作者ID
  uint32 actionUserBaseID     = 8;  // 當前動作者座位ID
  int64 actionUserStartAtMs   = 9;  // 等待當前動作開始時間(毫秒)
  int64 actionUserEndAtMs     = 10; // 等待當前動作結束時間(毫秒)
  int64 centerPotAmount       = 11; // 底池金額
  int64 currentStageBetAmount = 12; // 當前回合階段押注金額
  repeated int64 pots         = 13; // 主池/邊池 第一個是主池
  repeated int64 displayPots  = 14; // 顯示用的主池/邊池 第一個是主池
  int32 remainCardNumber      = 15; // 剩餘卡牌
}

message RoomClosedEventData {
  string roomID    = 1;
  string roundID   = 2;
}

message JoinRoomEventData {
  string roomID     = 1;
  string roundID    = 2;
  uint64 userID     = 3;  // 玩家用戶編號
  string avatarURL  = 4;  // 頭像 URL
  string nickname   = 5;  // 暱稱
  uint64 vipLevel   = 6;  // VIP 等級
  uint64 level      = 7;  // level
  int64 balance     = 8;  // 餘額
  bool isFake       = 9;  // 是否是機器人
  bool isPlaying    = 10; // 此局是否有玩
  uint32 roomBaseID = 11; // 0 代表站著，座位編號 1~7
  string latitude   = 12; // 經度
  string longitude  = 13; // 緯度
}

message LeaveRoomEventData {
  string roomID    = 1;
  uint64 userID    = 2;
}

message BalanceNotEnoughEventData {
  string roomID = 1;
  uint64 userID = 2;
  int64 balance = 3;
}

message ExceedContinueRoundLimitEventData {
  string roomID = 1;
  uint64 userID = 2;
  int64 balance = 3;
}

message WaitUserReadyTimeoutEventData {
  string roomID = 1;
  uint64 userID = 2;
}

 // [RPC] 玩家押注動作請求
message RoomPlayerBetActionRequest {
  PlayerActionType roomPlayerActionType = 1;  // 房間玩家動作類型 (FOLD, CHECK, CALL, RAISE, ALL_IN)
  int64 betAmount                      = 2;  // 押注金額
}

message RoomPlayerBetActionResponse {
  int64 currentRoundStageBetAmount = 1;  // 回合階段當前押注金額
}

// [PUSH] 通知玩家執行動作事件
message NotifyRoomPlayerBetActionEventData {
  string roomID              = 1; // 房間編號
  string roundID             = 2; // 回合編號
  RoundStage roundStage      = 3;  // 回合狀態
  uint64 actionUserID        = 4; // 玩家ID
  uint32 actionUserBaseID    = 5; // 玩家座位ID
  int64 actionStartAtMs      = 6; // 執行動作開始時間(毫秒)
  int64 actionEndAtMs        = 7; // 執行動作結束時間(毫秒)
}

// [PUSH] 玩家執行哪些動作及更新餘額獎池的事件
message RoomPlayerBetActionEventData {
  string roomID                     = 1;  // 房間編號
  string roundID                    = 2;  // 回合編號
  RoundStage roundStage             = 3;  // 回合狀態
  uint64 actionUserID               = 4;  // 當前動作玩家ID
  uint32 actionUserBaseID           = 5;  // 當前動作玩家ID
  PlayerActionType playerActionType = 6;  // 當前動作玩家動作類型
  int64 betAmount                  = 7;  // 當前動作玩家押注金額
  int64 balance                     = 8;  // 當前動作玩家餘額
  int64 CenterPotAmount            = 9;  // 當前底池金額
  int64 CurrentStageBetAmount      = 10; // 當前該階段押注金額
}

// [PUSH] SettleEventData 房間回合結算事件
message SettleEventData {
  string roomID                           = 1;  // 房間編號
  string roundID                          = 2;  // 回合編號
  repeated PlayerHandCard PlayerHandCards = 3;  // 玩家 (棄牌的不給)
  repeated Pot pots                       = 4;  // 主池/邊池 第一個是主池

  message PlayerHandCard {
    uint64 userID            = 1;
    PlayerHandCards handCard = 2;
  }
}

message Pot {
  int64 totalAmount            = 1; // 該池總額
  repeated PotPlayer potPlayers = 2; // 贏該池的玩家IDs

  message PotPlayer {
    uint64 userID     = 1; // 贏該池的玩家ID
    uint32 userBaseID = 2; // 玩家座位ID
    int64 gainAmount = 3; // 贏該池金額
    int64 balance     = 4; // 餘額
  }
}

// [PUSH] ShuffleEventData 房間回合洗牌事件
message ShuffleEventData {
  string roomID           = 1;  // 房間編號
  string roundID          = 2;  // 回合編號
  uint32 dealerBaseID     = 3;  // 莊家座位ID
  int64 blindToken       = 4;  // 底注
  int64 centerPotAmount  = 5;  // 底池金額
  repeated Player players = 6;

  message Player {
    uint64 UserID     = 1;
    int64 balance     = 2; // 餘額
    bool isPlaying    = 3; // 此局是否有玩
    uint32 roomBaseID = 4; // 0 代表站著，座位編號 1~7
  }
}

// [PUSH] PlayerDealEventData 對單一用戶發手牌事件
message PlayerDealEventData {
  string roomID             = 1;  // 房間編號
  string roundID            = 2;  // 回合編號
  RoundStage roundStage     = 3;  // 回合狀態
  uint64 userID             = 4;  // 玩家ID
  int64 balance             = 5;  // 玩家餘額
  PlayerHandCards handCards = 6;  // 玩家手牌
}

// [PUSH] DealEventData 通知房間所有用戶發手牌事件
message DealEventData {
  string roomID             = 1;  // 房間編號
  string roundID            = 2;  // 回合編號
  RoundStage roundStage     = 3;  // 回合狀態
}

// [PUSH] RoomPlayerGetReadyEventData 玩家 Get Ready 事件
message RoomPlayerGetReadyEventData {
  string roomID         = 1;  // 房間編號
  string roundID        = 2;  // 回合編號
  uint64 userID         = 3;  // 玩家ID
  RoundStage roundStage = 4;  // 該局階段
}

message RoomPlayerChooseFinalCardRequest {
  repeated Domino handCards = 1; // 4 張牌 (左至右排序)
}

message PrepareEventData {
  string roomID  = 1;
  string roundID = 2;
}

message CountdownRoundEventData {
  string roomID  = 1;
}

message StopCountdownRoundEventData {
  string roomID  = 1;
}

message OpenCardsEventData {
  string roomID  = 1;
}

// +++++++++++++++++++++
// +  Tape             +
// +++++++++++++++++++++

// BetOrderTape 後台注單 tape
message BetOrderTape {
  string RoomID                       = 1;
  string RoundID                      = 2;
  int64 roomLevel                     = 3;  // 房間等級
  int64 blindToken                    = 4;  // 底注
  int64 minToken                      = 5;  // 進房需要最少的代幣數量
  int64 maxToken                      = 6;  // 進房需要最多的代幣數量 (-1表示無上限)
  repeated BetOrderTapePlayer players = 7;  // 玩家
  repeated int64 pots                 = 8;  // 主池/邊池 第一個是主池
}

message BetOrderTapePlayer {
  uint64 userID                   = 1;
  string nickname                 = 2;
  uint32 roomBaseID               = 3;  // 座位ID
  int64 betAmount                 = 4;  // 回合押注金額
  int64 gainAmount                = 5;  // 回合收入金額
  PlayerActionType lastActionType = 6;  // 抽水
  repeated Domino firstDealCards  = 7;  // 牌型
  PlayerHandCards finalHandCards  = 8;  // 牌型
  bool isDealer                   = 9;  // 莊家
  bool isFake                     = 10; // 機器人
}

