syntax = "proto3";
package ranking;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/ranking";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/pagination/pagination.proto";

message AddCompetitionRequest {
    Competition competition                                  = 1;
    repeated CompetitionAwardSetting competitionAwardSetting = 2;  // 賽事獎項明細
}
message UpdateCompetitionRequest {
    uint64 competitionID                                     = 1;   // 賽事 ID
    int64 endTime                                            = 2;   // 賽事結束時間
    yesno.YesNo enable                                       = 3;   // 賽事開關
    uint64 updatedUserID                                     = 4;   // 修改玩家 ID
    int64 startTime                                          = 5;   // 賽事開始時間
    int64 closeTime                                          = 6;   // 賽事關閉時間
    string introduction                                      = 7;   // 簡介
    int64 sort                                               = 8;   // 排序
    string url                                               = 9;   // 跳轉網址
    string name                                              = 10;  // 名稱
    int64 publishTime                                        = 11;  // 發布時間
    string gameIDs                                           = 12;  // 賽事遊戲
    int64 betMin                                             = 13;  // 注金低
    int64 betMax                                             = 14;  // 注金高
    int64 rankingCount                                       = 15;  // 總排行人數
    int64 awardCont                                          = 16;  // 獎勵人數
    CompetitionType competitionType                          = 17;  // 賽事類別
    OrderConditionType orderConditionType                    = 18;  // 排行條件
    repeated CompetitionAwardSetting competitionAwardSetting = 19;  // 賽事獎項明細
}

message ListCompetitionRequest {
    string name                                      = 1;  // 賽事名稱
    yesno.YesNo enable                               = 2;  // 賽事開關
    EnableType enableType                            = 3;
    uint32 page                                      = 4;
    uint32 perPage                                   = 5;
    int64 endTimeGte                                 = 6;  // 賽事結束時間 >=
    int64 endTimeLte                                 = 7;  // 賽事結束時間 <=
    repeated uint64 competitionIDs                   = 8;
    bool preloadAwardSetting                         = 9;
    yesno.YesNo isReviewed                           = 10; // 賽事是否審核過
    yesno.YesNo isDeactivated                        = 11; // 已關閉/失效
    int64 startTimeGte                               = 12; // 賽事開始時間 >=
    int64 startTimeLte                               = 13; // 賽事開始時間 <=
    string NameLike                                  = 14; // 賽事名稱模糊搜尋
    repeated CompetitionType competitionTypes        = 15; // 賽事類別
    repeated OrderConditionType orderConditionTypes  = 16; // 排行條件
}

message ListCompetitionResponse {
    repeated Competition competition = 1;
    pagination.Pagination page       = 2;
}
message GetCompetitionRequest {
    uint64 competitionID = 1;  // 賽事 ID
}
message GetCompetitionResponse {
    Competition competition = 1;
}
message Competition {
    uint64 id                                                = 1;   // 賽事 ID
    string name                                              = 2;   // 賽事名稱
    CompetitionType competitionType                          = 3;   // 賽事類別
    int64 startTime                                          = 4;   // 賽事起始時間
    int64 endTime                                            = 5;   // 賽事結束時間
    int64 publishTime                                        = 6;   // 賽事發佈時間
    int64 closeTime                                          = 7;   // 賽事關閉時間
    string gameIDs                                           = 8;   // 賽事遊戲 ID 可以多選 ,用逗號串接
    int64 betMin                                             = 9;   // 最小注金等級
    int64 betMax                                             = 10;  // 最大注金等級
    string introduction                                      = 11;  // 賽事簡介
    OrderConditionType orderConditionType                    = 12;  // 排行條件
    int64 rankingCount                                       = 13;  // 總排行人數
    int64 awardCount                                         = 14;  // 獎勵人數
    yesno.YesNo enable                                       = 15;  // 賽事是否開啟
    int64 CreatedTime                                        = 16;  // 新增時間
    int64 UpdatedTime                                        = 17;  // 修改時間
    uint64 CreatedUserID                                     = 18;  // 新增 UserID
    uint64 UpdatedUserID                                     = 19;  // 修改 UserID
    repeated CompetitionAwardSetting competitionAwardSetting = 20;  // 賽事獎項明細
    int64 sort                                               = 21;  // 排序
    string url                                               = 22;  // 跳轉網址設置
    ranking.EnableType enableType                            = 23;  // 狀態類型
    yesno.YesNo isReviewed                                   = 24;  // 賽事是否審核過
    int64 reviewedTime                                       = 25;  // 審核時間
    int64 deactivatedTime                                    = 26;  // 下架時間
}

message CompetitionAwardSetting {
    int64 id                                 = 1;  // 賽事獎項設置 ID
    uint64 competitionID                     = 2;  // 賽事 ID
    int64 ranking                            = 3;  // 名次
    string award                             = 4;  // 獎項名稱
    DistributeType distributeType            = 5;  // 派發類型
    uint64 itemID                            = 6;  // 道具ID，獎項類型為 DistributeTypeAuto 必填
    uint32 quantity                          = 7;  // 數量
    int64 rankingGte                         = 8;  // 名次 >=
    int64 rankingLte                         = 9;  // 名次 <=
    repeated CompetitionAwardItem awardItems = 10; // 獎項
}

message CompetitionAwardItem {
    DistributeType distributeType  = 1;  // 派發類型
    uint64 itemID                  = 2;  // 道具ID (獎項類型為 DistributeTypeAuto 時，必填)
    string award                   = 3;  // 獎項名稱
    uint32 quantity                = 4;  // 數量
}

enum DistributeType {
    UNKNOWN_AWARD_TYPE     = 0;
    DISTRIBUTE_TYPE_MANUAL = 1; // 手動
    DISTRIBUTE_TYPE_AUTO   = 2; // 自動
}

enum CompetitionType {
    UNKNOWN_COMPETITION_TYPE = 0;
    SLOT_GAME                = 1;  // 老虎機
    MAHJONG                  = 2;  // 麻將
    CHESS_AND_CARDS_BET      = 3;  // 棋牌押注
    CHESS_AND_CARDS_TABLE    = 4;  // 棋牌湊桌
    ARCADE                   = 5;  // 街機
    POKER                    = 6;  // 德撲
    LOTTERY                  = 7;  // 彩票
    FISH                     = 8;  // 漁機
    SEVEN_POKER                     = 9;  // 7pk
    ALL_SLOT_GAME                     = 10;  // 全老虎機


}
enum OrderConditionType {
    UNKNOWN_ORDER_CONDITION_TYPE = 0;
    WIN_COIN                     = 1;  // 單局贏分
    RATE                         = 2;  // 單局倍率
    MAHJONG_BASE                 = 3;  // 麻將單局台數
    MAHJONG_ROUND_SCORE          = 4;  // 麻將單圈贏分
    TOTAL_WIN_COIN               = 5;  // 總贏分
    TOTAL_SCORE                  = 6;  // 總輸贏分
    TOTAL_BET                    = 7;  // 總壓分

}
enum EnableType {
    UNKNOWN_ENABLE_TYPE = 0;
    NO_START            = 1;  // 敬請期待(審核通過後，介於發佈時間跟賽事開始之間)
    ING                 = 2;  // 競賽中(審核通過後，介於賽事開始跟結束之間)
    END                 = 3;  // 已結束
    CLOSE               = 4;  // 關閉
    NO_IDEA             = 5;  // 未分類
    SCHEDULED           = 6;  // 已排程 (審核通過後，發佈時間未到)
}

message DistributeCompetitionAwardReq {
    uint64 competitionID = 1; // 賽事ID
}

message GetCompetitionRankingListReq {
    uint64 competitionID = 1;
}

message GetCompetitionRankingListResp {
    repeated CompetitionRanking list = 1;
}

message CompetitionRanking {
    uint64 userID      = 1; // 使用者 ID
    int64 ranking      = 2; // 排名
    float winRate      = 3; // 贏分倍率
    int64 winData      = 4; // 贏分
    uint64 gameID      = 5; // 遊戲ID
    uint64 gameOrderID = 6; // 注單ID
}

message ListCompetitionUserAwardRecordsReq {
    uint32 page                    = 1;
    uint32 perPage                 = 2;
    repeated uint64 competitionIDs = 3;
    repeated uint64 userIDs        = 4;
    SortCompetitionUserAward sort  = 5;
}

enum SortCompetitionUserAward {
    SORT_UNKNOWN         = 0;
    SORT_RANK_ASC        = 1;
    SORT_CREATED_AT_DESC = 2;
}

message ListCompetitionUserAwardRecordsResp {
    pagination.Pagination pagination            = 1;
    repeated CompetitionUserAwardRecord records = 2;
}

message CompetitionUserAwardRecord {
    uint64 competitionID  = 1;
    uint64 userID         = 2;
    int64 ranking         = 3; // 排名
    int64 receivedAtMs    = 4; // 領獎時間
    int64 createdAtMs     = 5; // 領獎時間
}

message ReviewCompetitionRequest {
    uint64 competitionID  = 1;
    uint64 operatorID     = 2;
}

message DeactivateCompetitionRequest {
    uint64 competitionID  = 1;
    uint64 operatorID     = 2;
}