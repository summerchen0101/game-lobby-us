syntax = "proto3";
package ranking;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/ranking";

import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/pagination/pagination.proto";

import "proto/ranking/competition.proto";

import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";

service rankingService {
    rpc IncJackPot(IncJackPotReq) returns (google.protobuf.Empty);
    rpc ResetJackPot(ResetJackPotReq) returns (google.protobuf.Empty);
    rpc ListJackPot(ListJackPotReq) returns (ListJackPotResp);

    // 建立/更新 JP白名單
    rpc UpsertJackPotWhitelist(UpsertJackPotWhitelistReq) returns (google.protobuf.Empty);
    // 取得 JP白名單
    rpc ListJackPotWhitelist(ListJackPotWhitelistReq) returns (ListJackPotWhitelistResp);
    // 建立/更新 活動JP設定遊戲設定
    rpc UpsertEventJackPotGamesSetting(UpsertEventJackPotGamesSettingReq) returns (google.protobuf.Empty);
    // 取得 活動JP設定遊戲設定
    rpc ListEventJackPotGamesSetting(ListEventJackPotGamesSettingReq) returns (ListEventJackPotGamesSettingResp);
    // 
    rpc ListTopJackPotBingos(google.protobuf.Empty) returns (ListTopJackPotBingosResp);

    // AddRanking 增加單筆排行榜紀錄
    rpc AddRanking(AddRankingRequest) returns (google.protobuf.Empty);

    // GetDisplayMenus 取得排行榜顯示選單
    rpc GetDisplayMenus(google.protobuf.Empty) returns (GetDisplayMenusResponse);

    // ListRanking 列出排行榜紀錄
    rpc ListRanking(ListRankingRequest) returns (ListRankingResponse);
    rpc AddCompetition(AddCompetitionRequest) returns (google.protobuf.Empty);
    rpc UpdateCompetition(UpdateCompetitionRequest) returns (google.protobuf.Empty);
    rpc ListCompetition(ListCompetitionRequest) returns (ListCompetitionResponse);
    rpc GetCompetition(GetCompetitionRequest) returns (GetCompetitionResponse);
    rpc ReviewCompetition(ReviewCompetitionRequest) returns (google.protobuf.Empty);
    rpc DeactivateCompetition(DeactivateCompetitionRequest) returns (google.protobuf.Empty);
    // 刪除所有排行榜紀錄
    rpc DeleteAllRanking(google.protobuf.Empty) returns (google.protobuf.Empty);

    rpc CreateJackPotBingo(CreateJackPotBingoReq) returns (google.protobuf.Empty);
    rpc ListJackPotBingo(ListJackPotBingoReq) returns (ListJackPotBingoResp);

    rpc GetCompetitionRankingList(GetCompetitionRankingListReq) returns (GetCompetitionRankingListResp);
    rpc DistributeCompetitionAward(DistributeCompetitionAwardReq) returns (google.protobuf.Empty);
    rpc ListCompetitionUserAwardRecords(ListCompetitionUserAwardRecordsReq) returns (ListCompetitionUserAwardRecordsResp);
}

enum WalletType {
    UNKNOWN_WALLET_TYPE = 0;
    GC                  = 1; // GC
    SC                  = 2; // SC
}

message CreateJackPotBingoReq {
    uint64 gameID           = 1;
    JackPotType jackPotType = 2;
    uint64 userID           = 3;
    int64 Award             = 4;
    int64 amount            = 5;
    BigWinLevel level       = 6;
    int64 betAmount         = 7;
    yesno.YesNo isJP        = 8;
    string avatarURL        = 9;
    string nickname         = 10;
    uint64 vipLevel         = 11;
    uint64 playerLevel      = 12;
    yesno.YesNo IsEventJP   = 13;
    WalletType walletType   = 14;
}

message ListTopJackPotBingosResp {
    repeated CreateJackPotBingoReq topJackPotBingos = 1;
}

message ListJackPotBingoReq {
    uint32 perPage               = 1;
    uint32 page                  = 2;
    repeated int64 Awards        = 3;
    int64 Award                  = 4;
    JackPotType jackPotTypeNotIn = 5;
    uint64 userID                = 7;
    WalletType walletType        = 8;
}

message ListJackPotBingoResp {
    pagination.Pagination page          = 1;
    repeated JackPotBingo jackPotBingos = 2;
}

message JackPotBingo {
    uint64 gameID           = 1;
    JackPotType jackPotType = 2;
    uint64 userID           = 3;
    int64 Award             = 4;
    int64 amount            = 5;
    uint64 createdAtMs      = 6;
    BigWinLevel level       = 7;
    int64 betAmount         = 8;
    WalletType walletType   = 9;
}

enum BigWinLevel {
    UNKNOWN_BIG_WIN_LEVEL = 0;
    BIG_WIN_LEVEL         = 1;
    MEGA_WIN_LEVEL        = 2;
    SUPER_MEGA_WIN_LEVEL  = 3;
}

enum JackPotType {
    UNKNOWN_JACK_POT_TYPE       = 0;
    SLOT_JACK_POT               = 1;
    HUNDRED_JACK_POT            = 2;
    FISHING_JACK_POT            = 3;
    VIDEO_JACK_POT              = 4;
    EVENT_JACK_POT              = 5;
    HUNDRED_COLOR_DICE_JACK_POT = 6; // 百人繽紛骰(色彩遊戲)
    BIG_WIN                     = 99;
}

message IncJackPotReq {
    JackPotType jackPotType = 1;
    int64 Awards            = 2;
    int64 amount            = 3;
    int64 totalAmount       = 4;
    WalletType walletType   = 5;
}

message ResetJackPotReq {
    JackPotType jackPotType = 1;
    int64 Awards            = 2;
    int64 amount            = 3;
    uint64 userID           = 4;
    WalletType walletType   = 5;
}

message ListJackPotReq {
    repeated int64 awards   = 2;
    JackPotType jackPotType = 1;
    WalletType walletType   = 3;
}

message ListJackPotResp {
    repeated JackPotMoneyPool jackPotMoneyPool = 1;
}

message JackPotMoneyPool {
    int64 award  = 1;
    int64 amount = 2;
    // int64 totalAmount = 3;
    int64 initMoney         = 5;
    JackPotType jackPotType = 4;
    int32 bingoStatus       = 6;
    WalletType walletType   = 7;
}

message UpsertJackPotWhitelistReq {
    repeated JackPotWhitelist jackPotWhitelist = 1;
    WalletType walletType                      = 2;
}

message ListJackPotWhitelistReq {
    JackPotWhitelistOptions opts = 1;
    WalletType walletType        = 2;
}

message ListJackPotWhitelistResp {
    repeated JackPotWhitelist jackPotWhitelist = 1;
}

message JackPotWhitelist {
    uint64 userID         = 1; // UID
    uint64 updaterID      = 2;
    int64 updatedAtMs     = 3; // 資料更新時間
    string remark         = 4; // 備註
    WalletType walletType = 5;

    yesno.YesNo jackpot1Enable        = 21; // JP1
    yesno.YesNo jackpot2Enable        = 22; // JP2
    yesno.YesNo jackpot3Enable        = 23; // JP3
    yesno.YesNo jackpotMiniGameEnable = 24; // MiniGame
    yesno.YesNo jackpotHundredEnable  = 25; // Hundred JP
    yesno.YesNo jackpotEventEnable    = 26; // Event JP
    yesno.YesNo jackpotVideoEnable    = 27; // Video JP

    yesno.YesNo isDeleted = 99; // 是否刪除，用於upsert
}

message JackPotWhitelistOptions {
    repeated uint64 userIDIn                   = 1;
    repeated uint64 updaterIDIn                = 2;
    google.protobuf.UInt64Value updatedAtMsGte = 3;
    google.protobuf.UInt64Value updatedAtMsLte = 4;
    WalletType walletType                      = 5;

    yesno.YesNo jackpot1Enable        = 21; // JP1
    yesno.YesNo jackpot2Enable        = 22; // JP2
    yesno.YesNo jackpot3Enable        = 23; // JP3
    yesno.YesNo jackpotMiniGameEnable = 24; // MiniGame
    yesno.YesNo jackpotHundredEnable  = 25; // Hundred JP
    yesno.YesNo jackpotEventEnable    = 26; // Event JP
    yesno.YesNo jackpotVideoEnable    = 27; // Video JP

    yesno.YesNo isDeleted = 99;
}

message UpsertEventJackPotGamesSettingReq {
    repeated EventJackPotGamesSetting eventJackPotGamesSetting = 1;
    WalletType walletType                                      = 2;
}

message ListEventJackPotGamesSettingReq {
    EventJackPotGamesSettingOptions opts = 1;
    WalletType walletType                = 2;
}

message ListEventJackPotGamesSettingResp {
    repeated EventJackPotGamesSetting eventJackPotGamesSetting = 1;
}

// EventJackPotGamesSetting 活動JP設定遊戲設定
message EventJackPotGamesSetting {
    uint64 gameID         = 1;
    uint64 updaterID      = 2;
    int64 updatedAtMs     = 3; // 資料更新時間
    yesno.YesNo enable    = 4;
    WalletType walletType = 5;
}

message EventJackPotGamesSettingOptions {
    repeated uint64 gameIDIn                   = 1;
    repeated uint64 updaterIDIn                = 2;
    google.protobuf.UInt64Value updatedAtMsGte = 3;
    google.protobuf.UInt64Value updatedAtMsLte = 4;
    yesno.YesNo enable                         = 5;
}

message AddRankingRequest {
    Ranking ranking       = 1;
    WalletType walletType = 2;
}

message GetDisplayMenusResponse {
    repeated RankingType menus = 1;
}

message ListRankingRequest {
    RankingType ranking_type = 1;
    uint64 user_id           = 2;
    uint32 page              = 3;
    uint32 perPage           = 4;
    WalletType walletType    = 5;
}

message ListRankingResponse {
    repeated Ranking ranking          = 1; // 只顯示前100筆
    ranking.Ranking self_best_ranking = 2;
    pagination.Pagination page        = 3;
}

enum RecordType {
    UNKNOWN_RECORD_TYPE = 0;
    SLOT                = 1;
}

enum RankingType {
    UNKNOWN_RANKING_TYPE = 0;
    // LIMITED_TIME_SLOT 限時slot
    LIMITED_TIME_SLOT = 1;
    // ACCUMULATION_slot 累積slot
    ACCUMULATION_SLOT = 2;
    // 富豪榜
    ACCUMULATION_GOLD = 5;

    // 競賽榜
    COMPETITION = 6;
}

message Ranking {
    message User {
        uint64 id         = 1;
        string avatar_url = 2;
        string name       = 3;
        uint64 vip_level  = 4;
        uint64 lv         = 5;
    }

    message Reward {
        int32 no       = 1;
        bytes img      = 2;
        string content = 3;
    }

    int64 no               = 1;
    User user              = 2;
    RecordType record_type = 3;
    uint64 game_id         = 4;
    int64 create_time      = 5;

    // for slot 錦標賽（時間內獲得最高單賠率排名）
    // for slot 榮譽榜（單把內獲得最高單賠率排名）
    string machine_logo = 11;
    string betting_odds = 12; // 賠率
    bytes playback      = 13; // 回放
    bytes init_data     = 14; // slot init data

    // for 富豪榜
    uint64 gold = 23;
    // for 活躍榜
    int64 activity = 24;
}
