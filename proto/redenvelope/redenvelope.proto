syntax = "proto3";
package redenvelope;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/redenvelope";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/pagination/pagination.proto";

import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";
import "google/protobuf/empty.proto";

// redEnvelopeService 紅包相關服務
service redEnvelopeService {
    // Send 發送紅包
    rpc Send(SendRequest) returns (SendResponse);

    // Snatch 搶紅包 - 階段一（直接搶）
    rpc Snatch(SnatchRequest) returns (SnatchResponse);

    // Answer 搶紅包 - 階段二（要回覆的紅包類型才需要調用）
    rpc Answer(AnswerRequest) returns (google.protobuf.Empty);

    // CheckMaxSendingLimit 確認送紅包金額上限
    // need_sms = yes：則在 SendRequest 再上收到的 SMS code
    // need_sms = no：直接 Send
    rpc CheckMaxSendingLimit(CheckMaxSendingLimitRequest) returns (CheckMaxSendingLimitResponse);

    // ListRedEnvelopes 列紅包
    rpc ListRedEnvelopes(ListRedEnvelopesRequest) returns (ListRedEnvelopesResponse);
    rpc ListRedEnvelopeHistories(ListRedEnvelopeHistoriesRequest) returns (ListRedEnvelopeHistoriesResponse);
    rpc ListPlayerSend(ListPlayerSendReq) returns (ListRedEnvelopesResponse);
    rpc ListPlayerSnatch(ListPlayerSnatchReq) returns (ListRedEnvelopesResponse);

    rpc ListConditionSend(ListConditionSendReq) returns (ListConditionSendResp);
    rpc ListConditionSnatch(ListConditionSnatchReq) returns (ListConditionSnatchResp);
    rpc CountConditionRedEnvelope(CountConditionReq) returns (google.protobuf.Empty);

    rpc ListRoomUnSnatch(ListRoomUnSnatchReq) returns (ListRoomUnSnatchResp);

    // RedEnvelop OverView 紅包收發總覽
    rpc RedEnvelopOverView(RedEnvelopOverViewRequest) returns (RedEnvelopOverViewResponse);
    rpc RedEnvelopOverViewDetail(RedEnvelopOverViewDetailRequest) returns (RedEnvelopOverViewDetailResponse);

    //    // ListRedEnvelopeRanks 列出紅包排行
    //    rpc ListRedEnvelopeRanks(ListRedEnvelopeRanksRequest) returns (ListRedEnvelopeRanksResponse);

    // VerifyAnswer 發送者驗證紅包答案
    rpc VerifyAnswer(VerifyAnswerRequest) returns (VerifyAnswerResponse);
    rpc VerifyDailyAmount(VerifyDailyAmountRequest) returns (google.protobuf.Empty);
    rpc CleanDailyAmount(google.protobuf.Empty) returns (google.protobuf.Empty);

    rpc RefundRedEnvelopesByUpdateExpireTime(RefundRedEnvelopesByUpdateExpireTimeReq) returns (google.protobuf.Empty);

    // 排程相關
    // ListExpiredRedEnvelopes 列出逾期需要退款紅包
    rpc ListRefundRedEnvelopes(google.protobuf.Empty) returns (ListRefundRedEnvelopesResponse);

    // BatchUpdateRedEnvelopeRefundState 批次更新紅包退款狀態
    rpc BatchUpdateRedEnvelopeRefundState(BatchUpdateRedEnvelopeRefundStateRequest) returns (google.protobuf.Empty);
}

message RefundRedEnvelopesByUpdateExpireTimeReq {
    string roomID = 1;
}

message ListRoomUnSnatchReq {
    uint64 userID          = 1;
    repeated string roomID = 2;
}

message ListRoomUnSnatchResp {
    repeated RedEnvelope redEnvelopes = 1;  // 紅包id
}

message ListConditionSendReq {
    uint64 userID  = 1;
    uint32 page    = 2;
    uint32 perPage = 3;
}

message ListConditionSnatchReq {
    uint64 userID = 1;
}

message ListConditionSendResp {
    repeated Condition condition = 1;
    pagination.Pagination page   = 2;
}

message CountConditionReq {
    uint64 userID      = 1;
    uint64 countUserID = 2;
}
message Condition {
    uint64 userID          = 1;
    string nickName        = 6;
    uint64 totalAmount     = 2;
    uint64 nowAmount       = 3;
    uint64 createdAtMs     = 4;
    uint64 finishedAtMs    = 7;
    ConditionStatus status = 5;
}

message ListConditionSnatchResp {
    uint64 userID       = 1;
    uint64 totalAmount  = 2;
    uint64 nowAmount    = 3;
    uint64 createdAtMs  = 4;
    uint64 finishedAtMs = 5;
}

// SnatchRequest 搶紅包請求
message SnatchRequest {
    uint64 redEnvelopeID = 1;  // 紅包id
    uint64 snatcherID    = 2;  // 搶紅包者id
}

// SnatchResponse 搶紅包響應
message SnatchResponse {
    yesno.YesNo isSnatchSuccess = 1;  // 搶單是否成功
    yesno.YesNo needAnswer      = 2;  // 是否需要回答
    RedEnvelope redEnvelope     = 3;
    Answer answer               = 4;  // 回答
}

// AnswerRequest 搶紅包回覆請求
// StatusCode: 204
message AnswerRequest {
    uint64 redEnvelopeID = 1;  // 紅包id
    string answerID      = 2;
    uint64 snatcherID    = 3;
    string attachment    = 4;
}

// VerifyAnswerRequest 驗證紅包答案請求
message VerifyAnswerRequest {
    uint64 redEnvelopeID = 1;
    string answerID      = 2;
    uint64 sendID        = 3;
    yesno.YesNo isPass   = 4;
}

// VerifyAnswerRequest 驗證紅包答案請求
message VerifyAnswerResponse {
    Answer answer      = 1;
    string roomID      = 4;
    uint64 roomType    = 3;
    yesno.YesNo isPass = 2;
}

// VerifyDailyAmountRequest 驗證每日紅包上限
message VerifyDailyAmountRequest {
    uint64 userID = 1;
}

// SendResponse 發紅包響應 204
message SendRequest {
    RedEnvelopeType type = 1;
    string message       = 2;  // 題目 or 來自發送者的祝福
    int64 totalMoney     = 3;  // 紅包金額
    int64 quota          = 4;  // 紅包數量
    uint64 senderID      = 5;
    string roomID        = 6;
    uint64 ID            = 7;
    int64 roomType       = 8;
    string roomName      = 9;
    uint64 receiverID    = 10;
}

//此結構為serverPush你懂的
message SendResponse {
    uint64 redEnvelopeID = 1;
    RedEnvelopeType type = 2;
    string message       = 3;
}

