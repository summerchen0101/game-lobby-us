// ListRedEnvelopesRequest 紅包列表請求
message ListRedEnvelopesRequest {
    string roomID        = 1;
    int64 roomType       = 2;
    yesno.YesNo unSnatch = 3;
    yesno.YesNo notBless = 4;
    uint64 userID        = 5;
}

// ListRedEnvelopesResponse 紅包列表響應
message ListRedEnvelopesResponse {
    repeated RedEnvelope redEnvelopes = 1;
    pagination.Pagination page        = 2;
}

// ListRedEnvelopesRequest 紅包列表請求
message ListPlayerSendReq {
    uint64 userID  = 1;
    uint32 page    = 2;
    uint32 perPage = 3;
}

// ListRedEnvelopesRequest 紅包列表請求
message ListPlayerSnatchReq {
    uint64 userID  = 1;
    uint32 page    = 2;
    uint32 perPage = 3;
}

message ListRedEnvelopeHistoriesRequest {
    uint32 page                     = 1;
    uint32 perPage                  = 2;
    repeated uint64 userIDs         = 3;
    int64 createdAtMsGte            = 4;
    int64 createdAtMsLte            = 5;
    RedEnvelopeType type            = 6;
    uint64 id                       = 7;
    bool answerIgnoreEmpitySnatcher = 8;  // answer 明細是否忽略沒有搶的紅包
    repeated uint64 ids             = 9;
    bool isShowFriendSendOneToOne   = 10;  // 是否只顯示一對一發的紅包(來源是朋友的紅包)
    State state                     = 11;
}

message ListRedEnvelopeHistoriesResponse {
    pagination.Pagination pagination  = 2;
    repeated RedEnvelope redEnvelopes = 1;
}

