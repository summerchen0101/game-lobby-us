// ListExpiredRedEnvelopesResponse 過期紅包列表請求
// 排程用
message ListRefundRedEnvelopesResponse {
    repeated RedEnvelope redEnvelopes = 1;
}

// BatchUpdateRedEnvelopeRefundStateRequest 批次更新紅包退款狀態請求
// 排程用
message BatchUpdateRedEnvelopeRefundStateRequest {
    repeated uint64 redEnvelopeIDs = 1;
    RefundState refundState        = 2;
}

// CheckMaxSendingLimitRequest 檢驗最大發送限額請求
message CheckMaxSendingLimitRequest {
    uint64 creatorID = 1;
    int64 money      = 2;
    int64 quota      = 3;
}

// CheckMaxSendingLimitResponse 檢驗最大發送限額響應
message CheckMaxSendingLimitResponse {
    yesno.YesNo needSMS = 1;
}

// RedEnvelopeState 紅包狀態
enum RedEnvelopeState {
    UNKNOWN_RED_ENVELOPE_STATE = 0;
    ALL_ANSWERED               = 1;  // 紅包答案都驗證完畢
    HAS_UNVERIFIED_ANSWER      = 2;  // 紅包有未驗證的答案
}

// RefundState 退款狀態
enum RefundState {
    UNKNOWN_REFUND_STATE = 0;
    REFUNDED             = 1;  // 已退款
    NOT_REFUNDED         = 2;  // 未退款
    NO_NEED_REFUND       = 3;  // 無須退款
}

// DeliveryStatus 發送狀態 (後台流向列表的狀態)
enum DeliveryStatus {
    UNKNOWN_DELIVERY_STATE = 0;
    WAITING_RECEIVE        = 1;  // 待領取
    ALREADY_RECEIVE        = 2;  // 已領取
    RECEIVE_REFUND         = 3;  // 退款
}

// RedEnvelopeType 紅包類型
enum RedEnvelopeType {
    UNKNOWN_RED_ENVELOPE_TYPE = 0;
    // 祝福紅包
    BLESS = 1;
    // 口令紅包
    KEYWORD = 2;
    // 圖片紅包
    PHOTO = 3;
    // 影片紅包
    VIDEO = 4;
    // 語音紅包
    VOICE = 5;
    //條件
    CONDITION = 6;
    //返還
    PAY_BACK = 7;
    // 其他類型紅包
    OTHER = 15;
}

// RedEnvelopeType 紅包類型
enum State {
    UNKNOWN_STATE = 0;
    // 已領取
    SNATCHED = 1;
    //未搶
    UN_SNATCH = 2;
    //退款
    REFUND = 3;
}

// RedEnvelopeVerifyState 紅包審核狀態
enum RedEnvelopeVerifyState {
    UNKNOWN_VERIFY_STATE = 0;
    UNVERIFIED           = 1;  // 未審核
    NO_NEED_VERIFIED     = 2;  // 不需審核
    VERIFIED_PASS        = 3;  // 審核通過
    VERIFIED_NOT_PASS    = 4;  // 審核未通過
}

// RedEnvelope 紅包
message RedEnvelope {
    uint64 ID               = 1;
    string roomID           = 2;
    uint64 roomType         = 14;
    string roomName         = 15;
    RedEnvelopeType type    = 3;
    RedEnvelopeState state  = 4;
    int64 money             = 5;
    int64 quota             = 6;
    string question         = 7;
    uint64 creatorID        = 8;
    int64 createTimeMs      = 9;
    int64 expireTimeMs      = 10;
    repeated Answer answers = 11;
    string creatorNickname  = 12;
    RefundState refundState = 13;
}

message Answer {
    string ID                          = 1;
    uint64 redEnvelopeID               = 2;
    uint64 snatcherID                  = 3;
    int64 receiveMoney                 = 4;
    RedEnvelopeVerifyState verifyState = 5;
    string attachment                  = 6;
    string snatcherNickname            = 7;
    int64 createTimeMs                 = 8;
}

message RedEnvelopOverViewRequest {
    repeated uint64 userIDs         = 3;
    int64 createdAtMsGte            = 4;
    int64 createdAtMsLte            = 5;
    RedEnvelopeType type            = 6;
    uint64 id                       = 7;
    bool answerIgnoreEmpitySnatcher = 8;  // answer 明細是否忽略沒有搶的紅包
}

message RedEnvelopOverViewResponse {
    repeated PlayerRedEnvelopOverView overviews = 1;
}

message PlayerRedEnvelopOverView {
    uint64 userID          = 1;
    uint64 totalSendAmount = 2;
    uint64 totalRecvAmount = 3;
}

message RedEnvelopOverViewDetailRequest {
    uint32 page          = 1;
    uint32 perPage       = 2;
    uint64 userID        = 3;
    int64 createdAtMsGte = 4;
    int64 createdAtMsLte = 5;
    RedEnvelopeType type = 6;
    uint64 id            = 7;

    RedEnvelopOverViewType category = 8;
    repeated uint64 userIDs         = 9;
    State state                     = 10;
}

enum RedEnvelopOverViewType {
    ALL  = 0;
    SEND = 1;
    RECV = 2;
}

message RedEnvelopOverViewDetail {
    uint64 id                       = 1;
    uint64 userID                   = 2;
    RedEnvelopOverViewType category = 3;
    uint64 answer                   = 4;
    uint64 amount                   = 5;
    uint64 redEnvelopeTotalAmount   = 6;
    RedEnvelopeType type            = 7;
    int64 createTimeMs              = 8;
}

message RedEnvelopOverViewDetailResponse {
    pagination.Pagination pagination         = 1;
    repeated RedEnvelopOverViewDetail detail = 2;
}
enum ConditionStatus {
    UNKNOWN = 0;
    DONE    = 1;
    NOT_YET = 2;
}
enum RecordType {
    UNKNOWN_TYPE  = 0;
    DONE_TYPE     = 1;
    ADD_AMOUNT    = 2;
    REDUCE_AMOUNT = 4;
    CREATE        = 3;
}