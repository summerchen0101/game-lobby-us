syntax = "proto3";
package relation;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/relation";

import "google/protobuf/empty.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/pagination/pagination.proto";

service RelationService {
    // List list friend by user id
    rpc List(ListReq) returns (ListResp);

    rpc Get(GetReq) returns (GetResp);

    // Create  friend  relation but not confirm
    rpc Create(CreateReq) returns (google.protobuf.Empty);

    rpc UpdateFriendNickname(UpdateFriendNicknameReq) returns (google.protobuf.Empty);

    rpc ListFriendNickname(ListFriendNicknameReq) returns (ListFriendNicknameResp);

    // Confirm  confirm friend  relation
    rpc Confirm(ConfirmReq) returns (google.protobuf.Empty);
    // Cancel  cancel friend  relation
    rpc Cancel(CancelReq) returns (CancelResp);
    // ListBlackList list blacklist by user id
    rpc ListBlackList(ListBlackReq) returns (ListBlackResp);
    // AddBlackList add user into blacklist
    rpc AddBlackList(AddBlackReq) returns (google.protobuf.Empty);
    // CancelBlackList delete user from blacklist
    rpc CancelBlackList(CancelBlackReq) returns (google.protobuf.Empty);
    rpc CheckAndDelConfirmFriend(google.protobuf.Empty) returns (google.protobuf.Empty);
}

message ListReq {
    uint64 userID             = 1;
    FriendStatus friendStatus = 2;
    uint32 page               = 3;
    uint32 perPage            = 4;
}

message ListResp {
    repeated Friend friend     = 1;
    pagination.Pagination page = 2;
}

message GetReq {
    string ID       = 1;
    uint64 userID   = 2;
    uint64 friendID = 3;
}

message GetResp {
    Friend friend = 1;
}

message CreateReq {
    uint64 userID         = 1;
    string userNickname   = 4;
    uint64 friendID       = 2;
    string friendNickname = 3;
}

message UpdateFriendNicknameReq {
    uint64 friendID       = 1;
    string friendNickname = 2;
}

message ListFriendNicknameReq {
    repeated string ID = 1;
}

message ListFriendNicknameResp {
    map<string, string> friendNickname = 1;
}

message ConfirmReq {
    uint64 userID   = 1;
    uint64 friendID = 2;
}

message CancelReq {
    uint64 userID   = 1;
    uint64 friendID = 2;
}

message CancelResp {
    string roomID = 1;
}

message ListBlackReq {
    uint64 userID  = 1;
    uint32 page    = 2;
    uint32 perPage = 3;
}

message ListBlackResp {
    repeated uint64 BlockID    = 1;
    pagination.Pagination page = 2;
}

message AddBlackReq {
    uint64 userID  = 1;
    uint64 blockID = 2;
}

message CancelBlackReq {
    uint64 userID  = 1;
    uint64 blockID = 2;
}

message Friend {
    string ID                 = 1;
    uint64 friendID           = 2;
    FriendStatus friendStatus = 3;
    uint64 userID             = 4;
    string nickname           = 5;
}

// FriendStatus friend status
enum FriendStatus {
    UNKNOWN_FRIEND_STATUS = 0;
    NEED_CONFIRM          = 1;
    CONFIRM               = 2;
    FRIEND                = 3;
    BLACK                 = 4;
    BLACKENED             = 5;
}