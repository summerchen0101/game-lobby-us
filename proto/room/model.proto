syntax = "proto3";
package room;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/room";

import "proto/roomcontroller/model.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";

message CreateRoomRequest {
    string roomID                      = 1;
    uint64 gameID                      = 2;
    roomcontroller.RoomLevel roomLevel = 3;
    roomcontroller.RoomType roomType   = 4;
    bytes data                         = 5;
    uint64 playerCount                 = 6;
    uint64 userID                      = 7;
}

message ChangeRoomRequest {
    string roomID                      = 1;
    uint64 gameID                      = 2;
    bytes data                         = 3;
    uint64 playerCount                 = 4;
    roomcontroller.RoomLevel roomLevel = 5;
}

message CloseRoomRequest {
    string roomID = 1;
}

message GetRoomReq {
    string roomID = 1;
}

message GetRoomResponse {
    map<string, Room> rooms = 1;
    yesno.YesNo needClose   = 2;
}

message Room {
    map<uint64, UserInfo> users      = 1;  // map[userID]UserInfo
    roomcontroller.RoomType roomType = 2;
}

message UserInfo {
    string nickname = 1;
    string imageURL = 2;
    int64 baseID    = 3;
    uint64 vipLevel = 4;
    uint64 level    = 5;
}

message TournamentsRoundStartReq {
    uint64 tournamentsID    = 1;  // 錦標賽ID
    uint64 gameID           = 2;  // 遊戲ID
    repeated string roomIDs = 3;  // 房間編號
}

message TournamentsRoundStartResp {
}