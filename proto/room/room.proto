syntax = "proto3";
package room;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/room";

import "google/protobuf/empty.proto";
import "proto/room/model.proto";

service RoomService {
    rpc CreateRoom(CreateRoomRequest)
        returns (google.protobuf.Empty);
    rpc CloseRoom(CloseRoomRequest)
        returns (google.protobuf.Empty);
    rpc GetRoom(google.protobuf.Empty)
        returns (GetRoomResponse);
    rpc GetRoomID(GetRoomReq)
        returns (GetRoomResponse);
    rpc CheckRoom(google.protobuf.Empty)
        returns (google.protobuf.Empty);
    rpc ChangeRoom(ChangeRoomRequest)
        returns (google.protobuf.Empty);

    // 錦標賽回合開始 ->觸發遊戲流程開始/繼續進行
    rpc TournamentsRoundStart(TournamentsRoundStartReq)
        returns (TournamentsRoundStartResp);
}