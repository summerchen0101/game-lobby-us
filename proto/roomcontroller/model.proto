message ListUserRoomRequest {
    uint64 userID           = 1;
    repeated uint64 userIDs = 2;
    uint64 keeper           = 5;
    uint32 page             = 3;
    uint32 perPage          = 4;
    uint64 gameID           = 6;  // 遊戲ID
}

message ListUserRoomResponse {
    pagination.Pagination page = 1;
    repeated Room rooms        = 2;
}

message TournamentsRoundStartReq {
    uint64 tournamentsID    = 1;  // 錦標賽ID
    uint64 gameID           = 2;  // 遊戲ID
    repeated string roomIDs = 3;  // 房間編號
}

message TournamentsRoundStartResp {
}