syntax = "proto3";
package roomcontroller;

option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/roomcontroller";

import "google/protobuf/empty.proto";
import "proto/roomcontroller/model.proto";
import "proto/gamemanager/gamemanager.proto";

service RoomService {
    rpc ListRooms(ListRoomsRequest)
        returns (ListRoomsResponse);

    rpc GetRoom(GetRoomRequest)
        returns (GetRoomResponse);

    rpc RegisterPod(RegisterPodRequest)
        returns (google.protobuf.Empty);

    rpc AddUserToRoom(AddUserToRoomRequest)
        returns (Room);

    rpc RemoveUserFromRoom(RemoveUserFromRoomRequest)
        returns (Room);

    rpc ChangeUserType(ChangeUserTypeRequest)
        returns (google.protobuf.Empty);

    rpc ListRoomUsers(ListRoomUsersRequest)
        returns (ListRoomUsersResponse);

    rpc GetUserGame(GetUserGameRequest)
        returns (gamemanager.Game);

    rpc GetUserRoom(GetUserGameRequest)
        returns (GetUserGameResp);

    rpc JoinRoom(JoinRoomRequest)
        returns (google.protobuf.Empty);

    rpc CheckAuth(CheckRoomAuthRequest)
        returns (google.protobuf.Empty);

    rpc CreatePrivateRoom(CreatePrivateRoomRequest)
        returns (CreatePrivateRoomResponse);

    rpc CreatePasswordRoom(CreatePasswordRoomReq)
        returns (CreatePasswordRoomResp);

    rpc CreateRepoRoom(CreateRepoRoomReq)
        returns (google.protobuf.Empty);

    rpc DeleteRepoRoom(DeleteRepoRoomReq)
        returns (google.protobuf.Empty);

    rpc JoinPasswordRoom(JoinPasswordRoomReq)
        returns (JoinPasswordRoomResp);

    rpc JoinRandomRoom(JoinRandomRoomRequest)
        returns (JoinRandomRoomResponse);

    rpc ChangeRoomTypeWhenLeave(ChangeRoomTypeRequest)
        returns (google.protobuf.Empty);

    rpc ChangeRoomType(ChangeRoomTypeRequest)
        returns (google.protobuf.Empty);

    rpc LockRoom(LockRoomRequest)
        returns (google.protobuf.Empty);

    rpc CheckRoomStatus(google.protobuf.Empty)
        returns (google.protobuf.Empty);

    rpc CheckRoomIDStatus(CheckRoomIDStatusRequest)
        returns (google.protobuf.Empty);

    rpc CheckPrivateRoomClose(google.protobuf.Empty)
        returns (google.protobuf.Empty);

    rpc PlayerTogether(PlayerTogetherRequest)
        returns (PlayerTogetherResponse);

    rpc PlayerTogetherTimeout(PlayerTogetherTimeoutRequest)
        returns (PlayerTogetherTimeoutResponse);

    rpc PlayerTogetherCancel(PlayerTogetherCancelRequest)
        returns (google.protobuf.Empty);

    rpc PlayerTogetherExist(PlayerTogetherRequest)
        returns (PlayerTogetherResponse);

    rpc PlayerTogetherExistTimeout(PlayerTogetherTimeoutRequest)
        returns (PlayerTogetherTimeoutResponse);

    rpc ListAllRooms(google.protobuf.Empty)
        returns (ListRoomsResponse);

    rpc ListUserRoom(ListUserRoomRequest)
        returns (ListUserRoomResponse);

    rpc GetNowPlayingCount(GetNowPlayingCountReq)
        returns (GetNowPlayingCountResp);

    // 錦標賽回合開始 ->觸發遊戲流程開始/繼續進行
    rpc TournamentsRoundStart(TournamentsRoundStartReq)
        returns (TournamentsRoundStartResp);
}
