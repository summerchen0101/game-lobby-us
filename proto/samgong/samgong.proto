syntax = "proto3";
package samgong;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/samgong";

enum SamgongType {
    PING_PONG        = 0;
    JOIN_ROOM        = 1;  // 加入房間
    USER_KICK_BEFORE = 2;
    SERVER_UPDATE    = 3;

    LEAVE     = 11;  // 離開
    BET       = 12;  // 下注 // Req: betReq
    OUT_CARD  = 13;  // 補牌 // Resp: GetDeskResp
    DESK_INFO = 14;  // 牌桌資訊 // Resp: GetDeskResp
    STOP_CARD = 15;  // 停牌
}
enum TableStatus {
    UNKNOWN_TABLE_STATUS      = 0;
    BET_START_STATUS          = 1001;  // 下注開始... // Resp: GetDeskResp
    BET_END_STATUS            = 1002;  // 下注結束...
    CARD_STATUS               = 1003;  // 發牌...// Resp: GetDeskResp
    SYSTEM_OUT_CARD_STATUS    = 1004;  // 系統補牌... // Resp: GetDeskResp
    OUT_CARD_START_STATUS     = 1005;  // 補牌開始...
    OUT_CARD_END_STATUS       = 1006;  // 補牌結束...// Resp: GetDeskResp
    CARD_RACE_STATUS          = 1007;  // 比牌中...
    SETTLE_STATUS             = 1008;  // 結算中...  // Resp: SettleResp
    END                       = 1009;  // 結束...
    ROBOT_OUT_CARD_END_STATUS = 1010;  // 機器人補牌結束... // Resp: GetDeskResp
}
enum PlayerStatus {
    UNKNOWN_PLAYER_STATUS   = 0;
    BET_PLAYER_STATUS       = 1;  // 下注...
    CARD_PLAYER_STATUS      = 2;  // 發牌...
    OUT_CARD_PLAYER_STATUS  = 3;  // 補牌...
    STOP_CARD_PLAYER_STATUS = 4;  // 停牌...
}
enum SamgongCardType {
    UNKNOWN_CARD_TYPE = 0;  //兩對
    Hangus            = 1;  //爆牌
    KARTU_BIASA       = 2;  //點數組合
    SAMGONG           = 3;  //三公
    TRIS              = 4;  //三條
    MURNI_KECIL       = 5;  //幸運五
    MURNI_BESAR       = 6;  //七小龍
    MURNI_SAMGONG     = 7;  //至尊三公
}

message BetReq {
    int64 betAmount = 1;
}
message GetDeskResp {
    DeskInfo deskInfo              = 1;
    repeated PlayerInfo playerInfo = 2;
}
message DeskInfo {
    string roundID     = 1;  //局號
    TableStatus status = 2;  //桌子狀態
    int64 startTime    = 3;
    int64 endTime      = 4;
}

message PlayerInfo {
    uint64 userID   = 1;
    string nickname = 2;
    string imageURL = 3;
    uint64 vipLevel = 4;
    uint64 level    = 5;
    int64 balance   = 6;
    CardInfo card   = 7;
    int64 betAmount = 8;
    int64 winLose   = 9;
    bool isDealer   = 10;
    int64 baseID    = 11;
}

message CardInfo {
    repeated int64 cards     = 1;
    SamgongCardType cardType = 2;
    uint64 cardMultiple      = 3;
    int64 points             = 4;
}

message SettleResp {
    repeated PlayerInfo player = 1;
}
