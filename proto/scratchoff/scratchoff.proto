syntax = "proto3";
package scratchoff;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/scratchoff";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/pagination/pagination.proto";
import "google/protobuf/empty.proto";

service ScratchoffService {
    rpc ListOnlineUser(google.protobuf.Empty) returns (ListOnlineUserResponse);
}
enum ScratchOffType {
    PING_PONG      = 0;
    LIST_GAME_INFO = 1;  // 刮刮樂遊戲清單
    BUY            = 2;  // 購買
    DRAW           = 3;  // 開獎
    BUY_RECORD     = 4;  // 購買記錄
    CHECK_ORDER    = 5;  // 確認是否還有尚未兌獎的刮刮樂
    QUICKLY_DRAW   = 6;  // 快速開獎
    GAME_INFO      = 7;  // 遊戲資訊
}
enum DrawType {
    UN_KNOW = 0;
    FIRST   = 1;   // 頭獎
    SECOND  = 2;   // 二獎
    THIRD   = 3;   // 三獎
    FOURTH  = 4;   // 肆獎
    FIFTH   = 5;   // 五獎
    OTHER1  = 6;   // 小獎1
    OTHER2  = 7;   // 小獎2
    OTHER3  = 8;   // 小獎3
    OTHER4  = 9;   // 小獎4
    OTHER5  = 10;  // 小獎5
    OTHER6  = 11;  // 小獎6
    OTHER7  = 12;  // 小獎7
    OTHER8  = 13;  // 小獎8
}
enum MahjongType {
    DOTS_1       = 0;   // 一筒
    DOTS_2       = 1;   // 二筒
    DOTS_3       = 2;   // 三筒
    DOTS_4       = 3;   // 四筒
    DOTS_5       = 4;   // 五筒
    DOTS_6       = 5;   // 六筒
    DOTS_7       = 6;   // 七筒
    DOTS_8       = 7;   // 八筒
    DOTS_9       = 8;   // 九筒
    BAMBOO_1     = 9;   // 一索
    BAMBOO_2     = 10;  // 二索
    BAMBOO_3     = 11;  // 三索
    BAMBOO_4     = 12;  // 四索
    BAMBOO_5     = 13;  // 五索
    BAMBOO_6     = 14;  // 六索
    BAMBOO_7     = 15;  // 七索
    BAMBOO_8     = 16;  // 八索
    BAMBOO_9     = 17;  // 九索
    CHARACTERS_1 = 18;  // 一萬
    CHARACTERS_2 = 19;  // 二萬
    CHARACTERS_3 = 20;  // 三萬
    CHARACTERS_4 = 21;  // 四萬
    CHARACTERS_5 = 22;  // 五萬
    CHARACTERS_6 = 23;  // 六萬
    CHARACTERS_7 = 24;  // 七萬
    CHARACTERS_8 = 25;  // 八萬
    CHARACTERS_9 = 26;  // 九萬
    WINDS_EAST   = 27;  // 東
    WINDS_SOUTH  = 28;  // 南
    WINDS_WEST   = 29;  // 西
    WINDS_NORTH  = 30;  // 北
    WINDS_RED    = 31;  // 中
    WINDS_GREEN  = 32;  // 發
    WINDS_WHITE  = 33;  // 白
}

message ListGameInfoRequest {
    int32 page    = 1;
    int32 perPage = 2;
}
message ListGameInfoResponse {
    repeated GameInfo gameInfo = 1;
    pagination.Pagination page = 2;
}

message GameInfo {
    uint64 gameID        = 1;
    int64 amount         = 2;
    yesno.YesNo isFirst  = 3;  // 頭獎是否中獎中完
    yesno.YesNo isSecond = 4;  // 二獎是否中獎中完
    yesno.YesNo isThird  = 5;  // 三獎是否中獎中完
    yesno.YesNo isFourth = 6;  // 四獎是否中獎中完
    yesno.YesNo isFifth  = 7;  // 五獎是否中獎中完
    string name          = 8;  // 名稱
    yesno.YesNo status   = 9;  // 是否顯示
}

message BuyRecordRequest {
    uint64 userID = 1;
    int32 page    = 2;
    int32 perPage = 3;
}
message BuyRecordResponse {
    repeated BuyRecord buyRecord = 1;
    pagination.Pagination page   = 2;
}
message BuyRecord {
    uint64 userID       = 1;
    string name         = 2;  // 名稱
    int64 winCoin       = 3;  // 兌換金幣
    int64 betCoin       = 4;  // 消費金幣
    int64 winTime       = 5;  // 兌換時間
    int64 gameID        = 6;  // 遊戲 ID
    uint64 scratchOffID = 7;  // 刮刮卡編號
    int64 buyTime       = 8;  //購買時間
}
message BuyRequest {
    uint64 userID = 1;
    int64 gameID  = 2;  // 遊戲 ID
    int64 amount  = 3;  // 購買金額
}
message BuyResponse {
    uint64 orderID               = 1;
    repeated RollTable rollTable = 2;
    int64 balance                = 3;  //餘額
}
message DrawRequest {
    uint64 userID  = 1;
    int64 gameID   = 2;  // 遊戲 ID
    uint64 orderID = 3;  // 訂單 ID
}
message DrawResponse {
    uint64 orderID                 = 1;
    repeated RollTable rollTable   = 2;
    repeated DrawDetail drawDetail = 3;  // 中獎明細
    DrawResult drawResult          = 4;  // 中獎統計結果
    int64 balance                  = 5;  //餘額
}

message RollTable {
    repeated string row = 1;
}
message DrawDetail {
    int64 area        = 1;  // 第幾區
    int64 amount      = 2;  // 金額
    DrawType drawType = 3;  // 中獎類型
}
message DrawResult {
    int64 totalAmount = 2;  // 總金額金額
    DrawType drawType = 3;  // 中獎類型
}
message CheckOrderRequest {
    uint64 userID = 1;
}
message CheckOrderResponse {
    yesno.YesNo isOrder          = 1;  // 是否還有尚未刮完的刮刮樂
    uint64 orderID               = 2;
    repeated RollTable rollTable = 3;
    int64 gameID                 = 4;
}
message QuicklyDrawRequest {
    uint64 userID = 1;
    int64 gameID  = 2;  // 遊戲 ID
    int64 amount  = 3;  // 購買金額
}
message QuicklyDrawResponse {
    uint64 orderID                 = 1;
    repeated RollTable rollTable   = 2;
    repeated DrawDetail drawDetail = 3;  // 中獎明細
    DrawResult drawResult          = 4;  // 中獎統計結果
    int64 balance                  = 5;  //餘額
}

message GameInfoRequest {
    int64 gameID = 1;  // 遊戲 ID
}
message GameInfoResponse {
    int64 orderCount = 1;  // 已賣出張數
}
message ListOnlineUserResponse {
    repeated uint64 userIDs = 1;
}