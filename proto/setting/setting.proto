syntax = "proto3";
package setting;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/setting";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";
import "google/protobuf/empty.proto";

service SettingService {
    rpc Create(CreateReq) returns (google.protobuf.Empty);
    rpc Update(Setting) returns (google.protobuf.Empty);
    rpc Get(GetReq) returns (Setting);

    rpc ListCulture(google.protobuf.Empty) returns (ListCultureResp);

    rpc ListUsersSetting(ListUsersSettingReq) returns (ListUsersSettingResp);
}
message CreateReq {
    uint64 userID = 1;
}
message GetReq {
    uint64 userID = 1;
}

message GetSettingResp {
    Setting setting         = 1;
    LoginStates loginStates = 2;
}

message Setting {
    uint64 ID         = 1;
    float music       = 2;  // 音樂
    float soundEffect = 3;  // 音效
    uint64 cultureID  = 6;  // 語系
    uint64 userID     = 7;  // 使用者 ID
}
message LoginStates {
    yesno.YesNo isFbLogin     = 1;
    yesno.YesNo isMegaLogin   = 2;
    yesno.YesNo isLineLogin   = 3;
    yesno.YesNo isCellPhone   = 4;  // 手機號碼是否認證
    yesno.YesNo isGoogleLogin = 5;
    yesno.YesNo isIphoneLogin = 6;
}
message ListCultureResp {
    repeated Culture cultures = 1;
}

message Culture {
    uint64 id        = 1;
    string name      = 2;
    string shortName = 3;
    int64 clientID   = 4;  // 前端所需對應的ＩＤ
}

message ListUsersSettingReq {
    repeated uint64 userIDs    = 1;
    repeated uint64 cultureIDs = 2;  // 語系
}

message ListUsersSettingResp {
    map<uint64, Setting> settings = 1;
}