syntax = "proto3";
package sevenpoker;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/sevenpoker";

enum SevenType {
    PING_PONG        = 0;
    JOIN_ROOM        = 1;  //GetDeskResp
    USER_KICK_BEFORE = 2;
    SERVER_UPDATE    = 3;

    LEAVE     = 11;  //204
    GET_DESK  = 12;  //GetDeskResp
    BET       = 13;  //204
    OPEN_CARD = 16;  //204

    START_BET_PUSH         = 21;  //GetDeskResp
    DEAL_FINISH_TWO_PUSH   = 22;  //GetDeskResp
    DEAL_FINISH_THREE_PUSH = 23;  //GetDeskResp
    DEAL_FINISH_FOUR_PUSH  = 24;  //GetDeskResp
    COUNT_COIN_PUSH        = 25;  //推CountCoin

    PLAYER_KICK_PUSH = 30;  //only you 204
    ROOM_CLOSE       = 31;
}

enum TableStatus {
    UNKNOWN_TABLE_STATUS = 0;
    IDLE_TIME            = 1;
    START_BET            = 2;
    DEAL_FINISH_TWO      = 3;
    DEAL_FINISH_THREE    = 4;
    DEAL_FINISH_FOUR     = 5;
    COUNT_COIN           = 6;
}

enum CardType {
    UNKNOWN_CARD_TYPE = 0;   //兩對
    ROYAL_FLUSH       = 10;  //皇家同花順
    FIVE_OF_A_KING    = 9;   //五梅
    STRAIGHT_FLUSH    = 8;   //同花順
    FOUR_OF_A_KING    = 7;   //鐵支
    FULL_HOUSE        = 6;   //葫蘆
    FLUSH             = 5;   //同花
    STRAIGHT          = 4;   //順子
    THREE_OF_A_KING   = 3;   //三條
    TWO_PAIR          = 2;   //兩對
    NOTHING           = 1;   //沒牌型
}

message BetReq {
    uint64 betAmount = 1;
}
//
//message AutoBetReq {
//    AutoBetType autoBetType                           = 1;
//    AutoType autoType                                 = 2;
//    ContinueCount continueCount                       = 3;
//    RepeatedAutoBetAmount repeatedAutoBetAmount       = 4;
//    EarnItsCostAutoBetAmount earnItsCostAutoBetAmount = 5;
//    repeated BetType betType                          = 6;
//}

message MotherCard {
    repeated Card card   = 1;
    string roundID       = 2;
    repeated int64 cards = 3;
}

message GetDeskResp {
    DeskInfo deskInfo     = 1;
    PlayerInfo playerInfo = 2;
}

message DeskInfo {
    string roundID                              = 1;  //局號
    TableStatus status                          = 2;  //桌子狀態
    int64 time                                  = 3;  //剩餘倒數時間
    int64 roomLevel                             = 4;  //房間等級,目前無用
    repeated MotherCard motherCard              = 5;  //區塊鏈母牌,後6局
    repeated MotherCard motherCardLastFiveRound = 6;  //區塊鏈母牌,前5局
}

//
//message MotherCard {
//    repeated Card card = 1;
//}
//
//message MotherCardHistory {
//    repeated Card motherCard = 1;
//    string roundID           = 2;
//}

message CountCoin {
    int64 winLoseAmount = 1;
    uint64 balance      = 2;
    GetDeskResp desk    = 3;
}

message PlayerInfo {
    uint64 userID               = 1;
    string nickname             = 2;
    string imageURL             = 3;
    uint64 vipLevel             = 4;
    uint64 level                = 5;
    uint64 balance              = 6;
    CardInfo card               = 7;
    repeated WithCard withCards = 8;
    uint64 betAmount            = 9;
    repeated uint64 betSlice    = 10;
    int64 winLose               = 11;
}

message WithCard {
    repeated int64 withCard = 1;
}
message CardInfo {
    repeated int64 cards     = 1;
    CardType cardType        = 2;
    uint64 cardMultiple      = 3;
    repeated int64 cardSlice = 4;
}

message Card {
    int64 card        = 1;
    string originCode = 2;
    string hashCode   = 3;
}
