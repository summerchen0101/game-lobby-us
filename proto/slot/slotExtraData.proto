// 130 LucyLuck
// 1: Mg 一般消除得分事件（有得分，＋掉落補圖） 2: Mg 寶箱事件（消除得分＋寶箱＋掉落補圖） 3: Mg Bonus事件 (Bonus 消除＋掉落補圖）
// 4: Fg 一般消除得分事件（有得分，＋掉落補圖） 5: Fg 寶箱事件（消除得分＋寶箱＋掉落補圖） 6: Fg Bonus事件 (Bonus 消除＋掉落補圖）
message LucyLuck {
    repeated SpinResult.RollTable originalResult = 1; // 原始盤面
    repeated SpinResult.RollTable eventResult    = 2; // 事件後盤面
    repeated TreasureBox initTreasureBoxes       = 3; // 每局開始或底板重置後的寶箱資訊（其他階段不回傳）
    int32 gainFreeGameTimes                      = 4; // 當局獲得 freeGame 次數
    int32 remainFreeGameTimes                    = 5; // 當局剩餘的 freeGame 次數 (累積的次數-當局次數+獲得次數)
    repeated int32 bingoTreasureIDs              = 6; // 寶箱中獎ID（寶箱事件才會有值)
    int64 fgBonusMultiplier                      = 7; // fg 的獎金乘倍倍率
    repeated slot.MatchedGroup matchedGroups     = 8; // 有得分之相同圖標

    message TreasureBox {
        string symbol      = 1; // 寶箱 EA, EB, EC
        string prize       = 2; // 獎品 EF, ED, EE
        int32 width        = 3; // 寶箱寬度
        int32 height       = 4; // 寶箱高度
        Cell anchor        = 5; // 寶箱左上角位置(起始位置)
        repeated Cell grid = 6; // 寶箱盤面
        int32 id           = 7; // 寶箱ID (辨識符）
    }

    message Cell {
        int32 x          = 1; // 左→右 (0-based)
        int32 y          = 2; // 上→下 (0-based)
        int64 multiplier = 3; // 倍率
    }
}

