syntax = "proto3";
package slot;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/slot";
import "proto/slot/slot.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";

// Slot 2 ExtraData
message Bugs {
    repeated SpinResult.RollTable eventResult             = 1;
    string bugsType                                       = 2;  // Wild Catch Type
    int64 childSize                                       = 3;  // Roaming Wild Child Size
    Vector vector                                         = 4;  // Roaming Wild Child Destination Coordinate
    repeated SpinResult.RollTable originalWildCatchResult = 5;  // FG wildCatch 原始盤面
}

// Slot 2 ExtraData - Vector (座標) Data
message Vector {
    int64 x = 1;
    int64 y = 2;
}

message Zoo {
    repeated SpinResult.RollTable eventResult = 1;
    string symbol                             = 2;  // 中獎的圖標
    int64 multiplier                          = 3;  // FG 倍率
    uint64 score                              = 4;  // FG 尚未乘過倍率的分數
}

// Slot 4 ExtraData
message Beach {
    repeated SpinResult.RollTable eventResult    = 1;  // MG ReSpin FG  sexyMultiplier  wildFlow partyQueen 盤面
    repeated SpinResult.RollTable originalResult = 2;  // FG wildFlow 原始盤面
    int64 multiplier                             = 3;  // MG 倍率
    int64 fgMultiplier                           = 4;  // FG 倍率
    int64 sexyMultiplier                         = 5;  // FG sexyMultiplier 倍率
}
// Slot 5 ExtraData
message Robot {
    repeated SpinResult.RollTable eventResult = 1;
    int64 energy                              = 2;  // 目前能量
    string bigSymbol                          = 3;  // FG 大機器人圖標
    RobotIndex robotIndex                     = 4;  // FG 大機器人座標
    repeated RobotIndex attackIndex           = 5;  // FG 大機器人攻擊座標
    int64 attack                              = 6;  // FG 攻擊招式
    int64 maxEnergy                           = 7;  // 最大能量
}
message RobotIndex {
    int64 x = 1;
    int64 y = 2;
}

// Slot 6 ExtraData
message Aladdin {
    repeated SpinResult.RollTable eventResult = 1;  // MG 瘦精靈 or 胖精靈 ReSpin.  魔毯事件變化後盤面
    repeated LightLink lightLinkData          = 2;  // FG - LightLink Data ( 新出現的符號 )
    int64 freeGameTime                        = 3;
    repeated int64 multiData                  = 4;  // FG - LightLink 結算 - 獎金 倍率範圍
    int64 coveredCoin                         = 5;  // FG - LightLink 結算 - 被大轉盤蓋住的 3x3. 4x4 的金額
}

// Slot 6 ExtraData - LightLink Data ( 新出現的符號 )
message LightLink {
    int64 x       = 1;
    int64 y       = 2;
    int64 money   = 3;
    string symbol = 4;
}

message Dragon {
    repeated SpinResult.RollTable bingoResult = 1;  // 中獎和噴火後盤面
    repeated DragonEgg egg                    = 2;  // 蛋的資訊
    int64 fire                                = 3;  // FG 0:沒吐 1:噴火
    int64 fgIsDrop                            = 4;  // FG 0:spin盤面 1:drop 盤面
    int64 freeGameTime                        = 5;  // FG 次數
}

message DragonEgg {
    int64 x      = 1;  // x
    int64 y      = 2;  // y
    int64 amount = 3;  // 蛋破掉得到的錢
}
// Slot 12 ExtraData
message Nurse {
    repeated SpinResult.RollTable eventResult = 1;  // MG   女護士事件變化後盤面
    repeated LightLink lightLinkData          = 2;  // FG - LightLink Data ( 新出現的符號 )
    int64 freeGameTime                        = 3;
    repeated int64 multiData                  = 4;  // FG - LightLink 結算 - 獎金 倍率範圍
    int64 coveredCoin                         = 5;  // FG - LightLink 結算 - 被大轉盤蓋住的 3x3. 的金額
}

message JackPot {
    int64 type   = 1;  // 第幾獎
    int64 amount = 2;  // 金額
    int64 index  = 3;  // 中獎流水號
}

// Slot 13 PVE
message PVE {
    repeated SpinResult.RollTable eventResult    = 1;  // 技能變化後盤面
    repeated PVESkillResult skillResult          = 2;  // 技能影響的位置
    int64 combo                                  = 3;  // 目前 combo 數
    int64 checkpoint                             = 4;  // 下一盤盤面數
    repeated PVEBingoResult bingoResult          = 5;  // 技能影響的位置
    repeated SpinResult.RollTable originalResult = 6;  // fg 原始盤面
    int64 freeGameTime                           = 7;  // fg 剩餘次數
}
message PVESkillResult {
    int64 x       = 1;  // x
    int64 y       = 2;  // y
    string symbol = 3;  // 圖標
}
message PVEBingoResult {
    int64 score      = 1;  // 中獎總分數
    int64 bingoCount = 2;  // 中獎個數
    string symbol    = 3;  // 圖標
    bool isDouble    = 4;  // 是否X2
    int64 wayCount   = 5;  // 中獎線數
    int64 bingoScore = 6;  // 中獎個數分數
    float rate       = 7;  // 倍率
}
// Slot 8 egypt
message Egypt {
    repeated string doubleSymbol              = 1;  // x2 的 symbol 圖標
    string bugSymbol                          = 2;  // 事件1 飛甲蟲停留的圖標
    repeated string bingoSymbol               = 3;  // 消失的圖標
    repeated SpinResult.RollTable eventResult = 4;  // fg 盤面
    int64 freeGameTime                        = 5;  // fg 次數
}

enum MiniGameType {
    UN_KNOW        = 0;
    MEGA           = 1;   // mega
    MAJOR          = 2;   // major
    MINOR          = 3;   // minor
    MINI           = 4;   // mini
    AMOUNT_X3      = 5;   // 3 倍金額
    AMOUNT_X4      = 6;   // 4 倍金額
    AMOUNT_X5      = 7;   // 5 倍金額
    AMOUNT_X6      = 8;   // 6 倍金額
    AMOUNT_X7      = 9;   // 7 倍金額
    AMOUNT_X8      = 10;  // 8 倍金額
    MINI_FREE_GAME = 11;  // free game
}
// mini
message MiniGame {
    uint64 id         = 1;  // 流水號 1:轉盤 2:彈珠台 3:戳戳樂
    MiniGameType type = 2;  // 第幾獎
    int64 amount      = 3;  // 金額
    int64 index       = 4;  // 戳戳樂所需
}
// Slot 13 三國
message Kingdoms {
    int64 bossID                              = 1;  // boss id 1: 小兵 2: 華雄 3: 董卓
    int64 bossHp                              = 2;  // boss 血量
    int64 bossBonus                           = 3;  // boss 死亡後拿到的獎金
    int64 energy                              = 4;  // 目前累積能量
    int64 energyAttack                        = 5;  // 能量滿之後的攻擊力
    repeated SpinResult.RollTable eventResult = 6;  // fg 劉備盤面的變化
    int64 bossTotalHp                         = 7;  // boss 總血量
}

// Slot 1 海盜
message Pirate {
    repeated SpinResult.RollTable eventResult = 1;  // MG: reSpin 後的盤面 FG: sticky wild 後的盤面 , pirate attack 前的盤面 , treasure Hunt 盤面
    int64 treasureMoney                       = 2;  // 寶箱金額
}

// Slot 16 777
message Slot777 {
    repeated SpinResult.RollTable eventResult = 1;
}

// Slot 11 cow
message Cow {
    repeated SpinResult.RollTable eventResult    = 1;  // MG: reSpin 後的盤面 FG: 射擊後的盤面
    repeated SpinResult.RollTable originalResult = 2;  // FG: 射擊前的盤面
    int64 freeGameTime                           = 3;  // freeGame 次數
}

// Slot 21 mahjong
message mahjong {
    repeated SpinResult.RollTable eventResult = 1;  // MG FG:搓牌後的盤面
    int64 isDrop                              = 2;  // 0:spin盤面 1:落下盤面
    int64 freeGameTime                        = 3;  // FG 次數
    repeated SpinResult.RollTable bingoResult = 4;  // 中獎盤面
    repeated mahjongWResult wResult           = 5;  // FG w symbol 增加 fg 次數的位置
    string symbol                             = 6;  // 咪牌的symbol
}

message mahjongWResult {
    int64 x = 1;
    int64 y = 2;
}

// Slot 27 diaoChan
message diaoChan {
    repeated SpinResult.RollTable eventResult    = 1;  // MG: 跳舞動畫後的盤面  FG:消除後的盤面 跳舞動畫後的盤面 滿版盤面 整輪盤面
    int64 isDrop                                 = 2;  // 0: spin盤面 1:落下盤面
    int64 freeGameTime                           = 3;  // FG 次數
    repeated SpinResult.RollTable originalResult = 4;  // FG: 跳舞動畫後的盤面
}

// Slot 32 hipHop
message hipHop {
    repeated SpinResult.RollTable eventResult    = 1;  // MG: 大男孩跳舞完後的盤面 , w擴散事件1-4 FG: 大男孩移動後盤面  耍帥後的盤面, 出現整輪w盤面 ,假跑1 , 假跑2
    string replaceSymbol                         = 2;  // MG: 全盤事件假跑置換的圖標
    int64 freeGameTime                           = 3;  // freeGame 次數
    int64 indexX                                 = 4;  // FG:大男孩移動後 X 軸位置
    int64 indexOriginalX                         = 5;  // FG:大男孩移動原始 X 軸位置
    repeated SpinResult.RollTable originalResult = 6;  // FG: 耍帥前的盤面
}

// Slot 23 bird
message bird {
    repeated SpinResult.RollTable eventResult    = 1;  // 落下盤面 MG:跳舞重新排列後盤面,飛入鸚鵡後盤面 W and WX2 FG: 跳舞重新排列後盤面 飛入鸚鵡後盤面 W and WX2   w擴散後事件1-4 盤面
    int64 isDrop                                 = 2;  // 0: spin盤面 1:落下盤面
    int64 freeGameTime                           = 3;  // freeGame 次數
    repeated SpinResult.RollTable originalResult = 4;  // FG: 跳舞重新排列前盤面 飛入鸚鵡前盤面 W and WX2  w擴散前事件1-4 盤面
    int64 indexX                                 = 5;  // FG: 擴散事件 X 軸的位置
}

// Slot 29 maid
message maid {
    repeated SpinResult.RollTable eventResult    = 1;  // 落下盤面 MG: w變高後盤面 FG:成倍盤面
    int64 freeGameTime                           = 2;  // freeGame 次數
    repeated SpinResult.RollTable originalResult = 3;  // FG: w變高前盤面
    repeated int64 indexX                        = 4;  // MG: w變高 x 軸位置 FG: w變高 x 軸位置
    int64 isDrop                                 = 5;  // 0: spin盤面 1:落下盤面
}

// Slot 31 hotel
message hotel {
    repeated SpinResult.RollTable wToHighAfterResult = 1;  // MG: w變高後盤面 FG:w變高後盤面
    int64 freeGameTime                               = 2;  // freeGame 次數
    repeated SpinResult.RollTable originalResult     = 3;  // FG: w變高前盤面
    repeated int64 wChangeIndex                      = 4;  // MG: w變高 x 軸位置 FG: w變高 x 軸位置
    repeated SpinResult.RollTable symbolChangeResult = 5;  // MG:轉換圖標後盤面 FG: 轉換圖標後盤面
}

// Slot 30 fish
message fish {
    repeated SpinResult.RollTable eventResult    = 1;  // MG: w成倍後盤面 FG: w成倍後盤面 w長高後盤面
    int64 freeGameTime                           = 2;  // freeGame 次數
    repeated SpinResult.RollTable originalResult = 3;  // FG: w變高前盤面
    int64 isDrop                                 = 4;  // 0: spin盤面 1:落下盤面
    int64 multiplier                             = 5;  // 倍率
    int64 score                                  = 6;  // 尚未乘過倍率的分數
    int64 pearlRate                              = 7;  // 珍珠的成倍數
}
// Slot 34 shanghai
message shanghai {
    repeated SpinResult.RollTable eventResult = 1;
    int64 multiplier                          = 2;  // 倍率
    uint64 score                              = 3;  // 尚未乘過倍率的分數
    int64 freeGameTimes                       = 4;  // fg 次數
}
// Slot 35 super777
message super777 {
    repeated SpinResult.RollTable eventResult    = 1;  // MG有事件時，為重轉盤面，FG預設事件時，為預設盤面，FG有事件時，為重轉盤面
    int64 freeGameTime                           = 2;  // freeGame 次數
    repeated SpinResult.RollTable originalResult = 3;  // FG有事件時，為預設盤面
    int64 symboCount                             = 4;  // 777圖標個數
    int64 symboScore                             = 5;  // 777圖標個數所對應分數
    string fakeSymbol                            = 6;  // 假全盤圖標
}
// Slot 40 santaizi
message santaizi {
    repeated SpinResult.RollTable eventResult    = 1;  // FG: 事件後盤面
    int64 freeGameTime                           = 2;  // freeGame 次數
    repeated SpinResult.RollTable originalResult = 3;  // MG: 事件前盤面, FG: 事件前盤面
    int64 multiplier                             = 4;  // 倍率
}
// Slot 37 candy
message candy {
    repeated SpinResult.RollTable eventResult = 1;
    int64 freeGameTime                        = 2;  // freeGame 次數
    int64 eCount                              = 3;  // E 數量
    int64 skill                               = 4;  // 技能編號: 0, 1, 2, ...
    string skillSym                           = 6;  // 技能 symbol: XA, XB, XC, ...
    int64 skillSymReel                        = 7;  // 技能 symbol reel 位置, 0: 最左邊
    int64 skillSymRow                         = 8;  // 技能 symbol row 位置， 0： 最上面
    bool isDrop                               = 9;  // 0: spin盤面 1:落下盤面
}
// Slot 38 catWoman
message catWoman {
    repeated SpinResult.RollTable eventResult       = 1;  // 泡泡爆炸後盤面
    int64 freeGameTime                              = 2;  // freeGame 次數
    repeated SpinResult.RollTable originalResult    = 3;  // 泡泡爆炸前盤面
    repeated SpinResult.RollTable bubbleTableBefore = 4;  // 爆炸前泡泡盤面
    repeated SpinResult.RollTable bubbleTableAfter  = 5;  // 爆炸後泡泡盤面
    repeated catWomanMoney catWomanMoney            = 6;  // 爆炸後金額的位置和倍率
}
message catWomanMoney {
    int64 x    = 1;
    int64 y    = 2;
    int64 rate = 3;
}
// Slot 20 fox
message fox {
    repeated SpinResult.RollTable eventResult    = 1;  // mg:擴散後盤面 fg:擴散後盤面
    int64 freeGameTime                           = 2;  // freeGame 次數
    repeated SpinResult.RollTable originalResult = 3;  // fg:原始盤面,擴散前盤面
    int64 card1                                  = 4;  // mg fg 第一個牌子
    int64 card2                                  = 5;  // fg 第二個牌子
    int64 cardOperator                           = 6;  // fg 牌子的操作
    string replaceSymbol                         = 7;  // mg fg 擴散圖標
    int64 cardTotal                              = 8;  // fg 牌子total
    int64 score                                  = 9;  // 成倍前分數
}
// Slot 15 christmas
message christmas {
    repeated SpinResult.RollTable eventResult    = 1;  // fg :事件後盤面
    int64 freeGameTime                           = 2;  // freeGame 次數
    repeated SpinResult.RollTable originalResult = 3;  // fg:原始盤面
    repeated string eventIDs                     = 4;  // 上面彩球eventID
}

// Slot 36 dragonLegend
message dragonLegend {
    repeated SpinResult.RollTable eventResult    = 1;  // mg: 消除後盤面 fg :事件後盤面,消除後盤面
    int64 freeGameTime                           = 2;  // freeGame 次數
    repeated SpinResult.RollTable originalResult = 3;  // fg:原始盤面
    int64 multiplier                             = 4;  // 倍率
    repeated int64 moneyPool                     = 5;  // 喜從天降
    int64 isDrop                                 = 6;  // 0:spin盤面 1:落下盤面
}

// Slot 47 fortunes
message fortunes {
    int64 freeGameTime                           = 1;  // freeGame 次數
    repeated SpinResult.RollTable originalResult = 2;  // fg:盤面
    int64 jpBingoIndex                           = 3;  // jp 中獎 1: grand 2: major 3:minor 4:mini
    int64 jpBingoMoney                           = 4;  // jp 中獎金額
}

// Slot 46 fruit
message fruit {
    repeated SpinResult.RollTable eventResult    = 1;  // mg: reSpin 盤面 fg : reSpin 盤面
    repeated SpinResult.RollTable originalResult = 2;  // fg:盤面
    bool isFull                                  = 3;  // 是否全盤
    int64 sevenCount                             = 4;  // 7個數
    string reSpinSymbol                          = 5;  // reSpin 的圖標
}

// Slot 43 spicyGirl
message spicyGirl {
    repeated SpinResult.RollTable originalResult = 1;  // fg:原始盤面
    int64 multiplier                             = 2;  // 加碼倍率
    int64 freeGameTimes                          = 3;  // freeGame 次數
    repeated spicyGirlJP jpData                  = 4;  // 彩池資訊
    int64 sevenCount                             = 5;  // 7 的個數
    int64 sevenScore                             = 6;  // 7 個數獎的分數
    string fullSymbol                            = 7;  // 滿盤圖標
}
message spicyGirlJP {
    int64 jpIndex = 1;  // 1:彩池1, 2:彩池2, 3:彩池3
    int64 jpMoney = 2;  // 彩池金額
}

// Slot 49 sambaGirl
message sambaGirl {
    repeated SpinResult.RollTable originalResult = 1;  // fg:原始盤面
    repeated SpinResult.RollTable eventResult    = 2;  // MG: w 乘倍後盤面
    int64 freeGameTimes                          = 3;  // freeGame 次數
    int64 wMultiple                              = 4;  // wild symbol multiple
}

// Slot 50 thor
message thor {
    repeated SpinResult.RollTable eventResult = 1;  // fg:原始盤面, mg:落下盤面, fg:落下盤面
    int64 freeGameTime                        = 2;  // freeGame 次數
    int64 isDrop                              = 3;  // 0: spin盤面, 1: 落下盤面
}

message pharaohTreasure {
    repeated SpinResult.RollTable table = 1;
    uint64 leftGameCnt                  = 2;
    repeated string muls                = 3;  // Ex: [2X, 5X, X10]
    uint64 mulSum                       = 4;
    bool isDrop                         = 5;
}

message Lucifer {
    repeated SpinResult.RollTable table = 1;
    uint64 leftGameCnt                  = 2;
}

message halloween{
    table table             = 1;
    optional table second_table      = 2; // only show if fg with double
    int32 mini                        = 3;
    int32 minor                       = 4;
    int32 major                       = 5;
    int32 grand                       = 6;
    int32 left_spin_cnt                 = 7;
    optional int32 second_left_spin_cnt = 8; // only show if fg with double
    bool is_extra = 9;
    bool is_double = 10;
    bool is_multi = 11;
}
message table {
    repeated SpinResult.RollTable reels = 1;
}

message Arthur {
    int32 left_game_cnt = 1;
    oneof data {
        ArthurFg fg = 2;
        ArthurBg bg = 3;
        ArthurBg sbg = 4;
    }
}
message ArthurFg{
    table table1 = 1; // before EC
    table table2 = 2; // after EC
}
message ArthurBg{
    table table = 1;
    int32 left_spin_cnt = 2;
}

message FishDragon{
    int32 left_game_cnt = 1;
    repeated string rolls = 2;
    table table = 3;
}

message Athena{
    int32 left_game_cnt = 1;
    table table = 2;
}

message RuneStorm{
    int32 left_game_cnt = 1;
    table table = 2;
    int32 right_scatters = 3;
    repeated string left_runes = 4; // 0 is first collected, execute from n-1 to 0
    repeated RuneStormAction actions = 5; // 0 is first executed
    repeated RuneStormRunes rune_on_symbols = 6;
    optional RuneStormFgUpgrade fg_upgrade = 7;
}
message RuneStormFgUpgrade{
    repeated string cards = 1;
    repeated string runes = 2; // 0 is first collected, execute from n-1 to 0
    repeated RuneStormAction actions = 3; // 0 is first executed, use y as cards index(x is always 0)
}
message RuneStormAction{
    repeated RuneStormAdd adds = 1;
}
message RuneStormAdd{
    int32 x = 1;
    int32 y = 2;
    int32 val = 3;
}
message RuneStormRunes{
    int32 x = 1;
    int32 y = 2;
    repeated string runes = 3; // 0 is first generated
}
// 150
message JaguarTemple{
    int32 left_game_cnt = 1;
    table table = 2;
    repeated string collectors = 3;
}

message WestChili{
    int32 left_game_cnt = 1;
    table table = 2;
    optional WestChiliCum cum = 3;
    optional table table2 = 4; // if trigger falling tree
    optional pos which_ea_to_sfg = 5;
    optional int64 falling_tree_event_score = 6;
    optional int64 now_scatter_count = 7;
}
message WestChiliCum{
    int32 sa = 1;
    int32 sb = 2;
    int32 sc = 3;
    int32 sd = 4;
}

message ElementalMask{
    int32 left_game_cnt = 1;
    table table = 2;
    repeated ElementalMaskMove moves = 3;
    repeated ElementalMaskMerge merges = 4;
}
message ElementalMaskMove{
    int32 fromX = 1;
    int32 fromY = 2;
    int32 toX = 3;
    int32 toY = 4;
}
message ElementalMaskMerge{
    repeated pos froms = 1;
    pos to = 2;
    int32 final_rate = 3;
}
message pos{
    int32 x = 1;
    int32 y = 2;
}

message PowerWealthGod{
    int32 left_game_cnt = 1;
    table table = 2;
    optional table table2 = 3; // after processing bingoed xx_E to wild
    int32 ladder = 4; // Ex. 3
    optional int32 cum_ss = 5;
    bool is_drop = 6;
}

message cowCoin {
    repeated SpinResult.RollTable originalResult = 1;  // fg:原始盤面
    int64 freeGameTime                           = 2;  // freeGame 次數
    int64 totalWinRate                           = 3;  // 總倍率
    int64 isNext                                 = 4;  // 0: 同一轉, 1: 下一轉
    repeated SpinResult.RollTable eventResult    = 5;  // fg: 事件後盤面
}
message HoldAndSpinInfo {
    int64 mini  = 1;
    int64 minor = 2;
    int64 major = 3;
    int64 grand = 4;
}
message HoldAndSpin {
    int64 times                                  = 1;
    repeated SpinResult.RollTable originalResult = 2;  // 盤面
    yesno.YesNo isGrand                          = 3;
    HoldAndSpinInfo holdAndSpinInfo              = 4;
    repeated SpinResult.RollTable eventResult    = 5;  // 事件後盤面
    int64 X                                      = 6;
    int64 Y                                      = 7;
}

// Slot 51 dragonLegend2
message dragonLegend2 {
    repeated SpinResult.RollTable eventResult    = 1;  // mg: 消除後盤面 fg :事件後盤面,消除後盤面
    int64 freeGameTime                           = 2;  // freeGame 次數
    repeated SpinResult.RollTable originalResult = 3;  // fg:原始盤面
    int64 multiplier                             = 4;  // 倍率
    repeated int64 moneyPool                     = 5;  // 喜從天降
    int64 isDrop                                 = 6;  // 0:spin盤面 1:落下盤面
}
// Slot 52 happy777
message happy777 {
