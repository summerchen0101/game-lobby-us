// 147 墨香江湖
message InkPaintingWuxia {
    // ========== 盤面相關 ==========
    repeated SpinResult.RollTable originalResult = 1;  // 原始盤面 (消除前的盤面)
    repeated SpinResult.RollTable eventResult    = 2;  // 盤面結果 (消除/掉落後的盤面)
    bool isDrop                                  = 3;  // 是否為掉落事件

    // ========== 倍數相關 ==========
    int64 accumulatedMultiplier                  = 4;  // 累積倍數 (主遊戲無得分時重置，免費遊戲持續累積)
    repeated MultiplierInfo multiplierInfos      = 5;  // 盤面上的倍數符號資訊列表

    // ========== 框架變化相關 ==========
    repeated FrameChangeInfo frameChanges        = 6;  // 框架變化資訊列表

    // ========== 免費遊戲相關 ==========
    int64 currentFreeGameTimes                   = 7;  // 當前剩餘免費遊戲次數
    int64 gainFreeGameTimes                      = 8;  // 額外獲得的免費遊戲次數 (4個 Scatter 觸發)

    // ========== 仙人點化相關 ==========
    int64 xianRenMultiplier                      = 9;  // 仙人點化倍數 (30~500倍)

    // ========== 玄門落寶相關 ==========
    repeated XuanMenBox xuanMenBoxes             = 10; // 玄門落寶寶箱列表 (共20個)

    int64 totalScore                             = 11; // main game跟free game spin後總得分會先乘上100給前端

    // ========== 倍數符號資訊 ==========
    // SA 符號可帶倍數，格式如: "SA_2", "SA_3", "SA_5" 等
    message MultiplierInfo {
        int64 x          = 1; // X 軸位置 (0-5, 共6軸)
        int64 y          = 2; // Y 軸位置 (0-5, 行數依軸而異)
        int64 multiplier = 3; // 倍數值 (如: 2, 3, 5, 10 等)
        string symbol    = 4; // 完整符號 (如: "SA_2", "SA_G_3" 等)
    }

    // ========== 框架變化資訊 ==========
    // 銀框中獎 -> 金框 + 新符號
    // 金框中獎 -> Wild
    message FrameChangeInfo {
        int64 x            = 1; // X 軸位置
        int64 y            = 2; // Y 軸位置
        string oldSymbol   = 3; // 變化前符號 (如: "K_S#2H" 銀框K)
        string newSymbol   = 4; // 變化後符號 (如: "T_G#2H" 金框T, 或 "W" Wild)
        int64 oldFrameType = 5; // 變化前框架類型 (0=無框, 1=銀框, 2=金框)
        int64 newFrameType = 6; // 變化後框架類型
    }

    // ========== 玄門落寶寶箱 ==========
    // 主遊戲隨機觸發，從畫面上方落下20個寶箱
    // 寶箱面額為總押注的 1,2,3,4,5,6,7,8,10,14,16,18,20,24,30,40 倍
    message XuanMenBox {
        int64 index      = 1; // 寶箱索引 (0-19)
        int64 multiplier = 2; // 倍數
    }
}

