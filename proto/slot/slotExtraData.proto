}

// 142 馬年吉祥
message HorseYear {
    repeated SpinResult.RollTable originalResult = 1; // 原始盤面 (免費遊戲初始盤面)
    repeated SpinResult.RollTable eventResult    = 2; // 事件結果盤面 (消除後/下落後的盤面)
    bool isDrop                                  = 3; // 是否為下落事件
    int64 wildMultiplier                         = 4; // WILD 倍數
    int64 currentFreeGameTimes                   = 5; // 當前免費遊戲剩餘次數
    int64 collectedEA                            = 6; // 已收集的升級金幣 (EA) 數量
    int64 currentStage                           = 7; // 當前階段 (0-based)，每收集 3 個 EA 升級一階
    int64 plan                                   = 8; // 免費遊戲方案
    SuperScatterEffect superScatterEffect        = 9; // Super Scatter (SSS) 額外效果
    repeated EAInfo eaInfos                      = 10; // 升級金幣位置資訊

    // 升級金幣 (EA) 位置資訊
    message EAInfo {
        int64 x = 1; // X 座標 (軸)
        int64 y = 2; // Y 座標 (列)
    }

    // Super Scatter (SSS) 額外效果
    message SuperScatterEffect {
        int64 extraSpins = 1; // 額外免費遊戲次數 (1~10)
        int64 startStage = 2; // 開始階段 (2~4)
    }
}

// 144 蒸氣龐克
// 1: Mg 一般 | 2: Mg 轉盤事件 | 3: Mg 神秘事件A | 4: Mg神秘事件B
// 5: Fg 一般 | 6: Fg 轉盤事件 | 7: Fg 神秘事件A
message SteamPunk {
    repeated SpinResult.RollTable originalResult  = 1; // 原始盤面
    repeated SpinResult.RollTable eventResult     = 2; // 事件後盤面
    repeated Wheel wheels                         = 3; // 轉盤資訊(轉盤事件&神秘事件A才給)
    repeated WinningWheelAward winningWheelAwards = 4; // 轉盤中獎資訊 (神秘事件B只給變動的獎項)
    repeated slot.MatchedLine matchedLines        = 5; // 線獎詳情(如果是線獎才會有資料）
    int32 gainFreeGameTimes                       = 6; // 當局獲得 freeGame 次數
    int32 remainFreeGameTimes                     = 7; // 當局剩餘的 freeGame 次數 (累積的次數-當局次數+獲得次數)

  message Wheel {
       int32 id                 = 1; // id
       int32 x                  = 2; // x 軸
       int32 y                  = 3; // y 軸
       repeated string awards   = 4; // 轉盤所有獎項，根據 Index 排序(0-based) ex: [x10, 10x, 2500x, SSA, SSB]
  }

   message WinningWheelAward {
       int32 wheelId         = 1; // 轉盤ID
       int32 winningAwardIdx = 2; // 中獎獎項Index (0-based)
       string award          = 3; // 獎項 ex: x10, 10x, 2500x, SSA
   }
}

message PixelDungeon {
    repeated SpinResult.RollTable eventResult = 1;  // fg:原始盤面, mg:落下盤面, fg:落下盤面
    int64 freeGameTime                        = 2;  // freeGame 次數
    int64 isDrop                              = 3;  // 0: spin盤面, 1: 落下盤面
    int64 mulBonus                            = 4;
}

// 124 戰神賽特2 - 覺醒之力
message Seth2 {
    repeated SpinResult.RollTable originalResult = 1; // 原始盤面 (掉落前的盤面)
    repeated SpinResult.RollTable eventResult    = 2; // 盤面結果 (消除/掉落後的盤面)
    bool isDrop                                  = 3; // 是否為掉落事件
    bool triggeredMultiplier                     = 4; // 是否觸發倍數圖標 (由左側賽特觸發)
    bool triggeredUpgrade                        = 5; // 是否觸發升級圖標 (由右側奈芙蒂斯觸發)
    repeated MultiplierInfo multiplierInfos      = 6; // 盤面上的倍數/升級圖標資訊列表
    int64 collectMultiplier                      = 7; // 收集的總倍數 (無法再消除時收集)
    bool hasUpgrade                              = 8; // 是否有升級事件發生

    // ========== 免費遊戲/覺醒之力相關 ==========
    int64 currentFreeGameTimes                   = 9;  // 當前剩餘免費遊戲次數
    int64 gainFreeGameTimes                      = 10; // 獲得的額外免費遊戲次數 (3個或以上 Scatter 觸發)
    int64 multiplierAccumulator                  = 11; // 乘倍累加器 (免費遊戲累積的總倍數)

    // ========== 覺醒之力特有 ==========
    PowerAwakening powerAwakening                = 12; // 力量覺醒資訊 (3個黃金賽特 + 倍數球觸發)
    LockAwakening lockAwakening                  = 13; // 鎖定覺醒資訊 (3個黃金奈芙蒂斯 + 倍數球觸發)

    int64 scatterWinCoin                         = 14;


    // ========== 倍數圖標資訊 ==========
    message MultiplierInfo {
        int64 x          = 1; // X 軸位置 (0-4, 共5軸)
        int64 y          = 2; // Y 軸位置 (0-5, 共6行)
        int64 multiplier = 3; // 倍數值 (如: 2, 3, 4, 6, 8, 10, 12, 15, 18, 25, 50, 55, 60, 65, 80, 100, 150, 200, 250, 500, 750, 1000)
        // 符號類型 (EA/EB/EC/ED: 倍數圖標, EE/EF/EG/EH: 升級圖標)
        // EA: 綠色倍數, EB: 藍色倍數, EC: 紫色倍數, ED: 紅色倍數
        // EE: 綠色升級, EF: 藍色升級, EG: 紫色升級, EH: 紅色升級
        string symbol    = 4;
        // 是否為升級圖標 (true: EE/EF/EG/EH, false: EA/EB/EC/ED)
        bool isUpgrade   = 5;
    }

    // ========== 力量覺醒 (Power Awakening) ==========
    // 觸發條件: 3個黃金賽特(EI) + 盤面有倍數球
    // 效果: 隨機選擇一個倍數球，分裂成3-6個相同倍數球
    message PowerAwakening {
        int64 x                                            = 1; // 被選中分裂的倍數球 X 軸位置
        int64 y                                            = 2; // 被選中分裂的倍數球 Y 軸位置
        string symbol                                      = 3; // 被選中分裂的倍數球符號 (含倍數, 如: "EA_2", "EB_10")
        repeated PowerAwakeningPosition affectedPositions  = 4; // 分裂後影響的位置列表
    }

    // 力量覺醒影響的位置
    message PowerAwakeningPosition {
        int64 index = 1; // 索引 (用於前端動畫順序)
        int64 x     = 2; // X 軸位置
        int64 y     = 3;  // Y 軸位置
    }

    // ========== 鎖定覺醒 (Lock Awakening) ==========
    // 觸發條件: 3個黃金奈芙蒂斯(EJ) + 盤面有倍數球
    // 效果: 鎖定盤面上的倍數球，持續6局
    message LockAwakening {
        repeated LockedMultiplier lockedMultipliers = 1; // 被鎖定的倍數球列表
    }

    // 鎖定的倍數球資訊
    message LockedMultiplier {
        int64 index           = 1; // 索引 (用於識別)
        int64 x               = 2; // X 軸位置
        int64 y               = 3; // Y 軸位置
        int64 multiplier      = 4; // 倍數值
        int64 remainingRounds = 5; // 剩餘鎖定局數 (初始為7，等效存活 6 局，每局減1，到0時解鎖)
        // 鎖定特效顏色 (根據剩餘局數變化)
        // 1: 紫色 (剩餘5-6局, 第1-2局)
        // 2: 藍色 (剩餘3-4局, 第3-4局)
        // 3: 綠色 (剩餘1-2局, 第5-6局)
        int64 lockColor       = 6;
        string symbol         = 7; // 保存完整符號（例如 "EA_2", "EE_3"）
    }
}

