    int64 step                  = 1;  // 第幾步
    int64 diceRoll              = 2;  // 骰到幾
    int64 currentPosition       = 3;  // 走到哪
    string bonusType            = 4;  // start,reward,freeGame,wildReel,board,multiplier,end
    yesno.YesNo isBackStep      = 5;  // 是否為回退格
    yesno.YesNo isBackPosition  = 6;  // 是否為回退位置
    int64 value                 = 7;  // ex: bonusType=reward value=0.5X*100=50, bonusType=freeGame value=1
    int64 totalReward           = 8;  // 累積多少獎金
    int64 totalFreeGameTimes    = 9;  // 累積多少free game次數
    int64 totalWildReels        = 10; // 累積多少條滾輪有wild
    int64 totalBoard            = 11; // 累積幾個盤面
    int64 totalMultiplier       = 12; // 累積乘倍
    int64 changeIndex           = 13; // 地圖上哪個座標要被改
    string changeBonusType      = 14; // 座標要被改成什麼類型 ex:reward
    int64 changeValue           = 15; // 座標要被改成類型的值 ex:50
}

