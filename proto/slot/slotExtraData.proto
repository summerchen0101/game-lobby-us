        string act          = 2; // he behavior modes are divided into eb, ec, ed, and ee.
        int64 id            = 3; // chopper index.
        int64 prevReel      = 4;
        int64 prevOffset    = 5;
        int64 reel          = 6; // 5 reels, 0-4.
        int64 offset        = 7; // the position on each reel.
    }
}

