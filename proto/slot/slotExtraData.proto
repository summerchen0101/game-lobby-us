        int64 index             = 2; // 0: D, 1: C, 2: B, 3: A
        int64 ball              = 3; // init value: 0
        int64 strike            = 4; // init value: 0 
    }
}

// 112 黑幫戰爭
// EventCode: 1=MG, 2=FG
message GangsterWar {
