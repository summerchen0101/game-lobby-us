    repeated SpinResult.RollTable eventResult     = 2; // 事件後的盤面（ex乘倍後）
    repeated slot.MatchedWay matchedWays          = 3; // way 獎詳情
    int64 gainFreeGameTimes                       = 4; // 獲得 freeGame 次數
    int64 remainFreeGameTimes                     = 5; // 剩餘的 freeGame 次數 (累積的次數-當局次數+獲得次數)
