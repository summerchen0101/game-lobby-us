    bool isFinalBonusGame                                  = 9; // 是否為最終獎勵遊戲
    repeated TopGunMagazine magazines                      = 10;// 消除後彈夾位置
    message TopGunShootPosition {
        int64 index   = 1;
        int64 x       = 2;
        int64 y       = 3;
        string symbol = 4;
    }
    message TopGunMagazine {
        int64 index   = 1;
        int64 x       = 2;
        int64 y       = 3;
        int64 bullets = 4;
    }
}

// 139
message Pitcher {
    repeated SpinResult.RollTable originalResult    = 1;
    repeated SpinResult.RollTable eventResult       = 2;
