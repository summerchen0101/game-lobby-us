syntax = "proto3";
package sportquiz;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/sportquiz";

import "google/protobuf/empty.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/pagination/pagination.proto";
import "proto/sportquiz/sportquiz.proto";

service SportQuizService {
    rpc CreateLeague(CreateLeagueReq) returns (google.protobuf.Empty);
    rpc DeleteLeague(DeleteLeagueReq) returns (google.protobuf.Empty);
    rpc ListLeagues(ListLeaguesReq) returns (ListLeaguesResp);

    rpc CreateTeam(CreateTeamReq) returns (google.protobuf.Empty);
    rpc DeleteTeam(DeleteTeamReq) returns (google.protobuf.Empty);
    rpc ListTeams(ListTeamsReq) returns (ListTeamsResp);

    rpc CreateQuiz(CreateQuizReq) returns (google.protobuf.Empty);
    rpc DeleteQuiz(DeleteQuizReq) returns (google.protobuf.Empty);
    rpc UpdateQuizStatus(UpdateQuizStatusReq) returns (google.protobuf.Empty);
    rpc UpdateQuiz(UpdateQuizReq) returns (google.protobuf.Empty);
    rpc QuizDraw(QuizDrawReq) returns (google.protobuf.Empty);
    rpc ListQuizzes(ListQuizzesReq) returns (ListQuizzesResp);

    rpc CreateQuizBetting(CreateQuizBettingReq) returns (google.protobuf.Empty);
    rpc ListQuizBetting(ListQuizBettingReq) returns (ListQuizBettingResp);

    rpc CheckDraw(google.protobuf.Empty) returns (google.protobuf.Empty);
}

message BetReq {
    string quizID    = 1;
    OddType oddType  = 2;
    uint64 betAmount = 3;
    BetType betType  = 4;
    uint64 nowOdd    = 5;
}

message BetResp {
    uint64 balance = 1;
}

message CreateLeagueReq {
    string name     = 1;
    LeagueType type = 2;
}

message DeleteLeagueReq {
    string leagueID = 1;
}

message ListLeaguesReq {
    LeagueType type = 1;
}

message ListLeaguesResp {
    repeated League leagues = 1;
}

message CreateTeamReq {
    string leagueID = 1;
    string name     = 2;
}

message DeleteTeamReq {
    string teamID = 1;
}

message ListTeamsReq {
    string leagueID = 1;
}

message ListTeamsResp {
    repeated Team teams = 1;
}

message CreateQuizReq {
    string leagueID         = 1;
    string homeTeamID       = 2;
    string awayTeamID       = 3;
    repeated Odds odds      = 4;
    yesno.YesNo isHomeAway  = 5;
    uint64 startingAtMs     = 6;
    uint64 bettingStartAtMs = 7;
    uint64 bettingEndAtMs   = 8;
}

message DeleteQuizReq {
    string quizID = 1;
}

message UpdateQuizReq {
    string quizID            = 1;
    yesno.YesNo isHomeAway   = 2;
    repeated Odds updateOdds = 7;
    repeated Odds deleteOdds = 8;
    repeated Odds addOdds    = 9;
    uint64 startingAtMs      = 4;
    uint64 bettingStartAtMs  = 5;
    uint64 bettingEndAtMs    = 6;
}

message QuizDrawReq {
    string quizID   = 1;
    int64 homePoint = 2;
    int64 awayPoint = 3;
}

message UpdateQuizStatusReq {
    string quizID   = 1;
    QuizType status = 2;
}

message ListQuizzesReq {
    LeagueType leagueType   = 1;
    uint64 status           = 2;
    uint64 startingAtMs     = 3;
    uint64 bettingStartAtMs = 4;
    uint64 bettingEndAtMs   = 5;
    string leagueID         = 6;
    uint32 page             = 7;
    uint32 perPage          = 8;
}

message ListQuizzesResp {
    repeated Quiz quizzes      = 1;
    pagination.Pagination page = 2;
}

message CreateQuizBettingReq {
    uint64 UserID        = 1;
    uint64 BettingAmount = 2;
    uint64 BettingOdds   = 3;
    uint64 BettingType   = 4;
    uint64 BettingPoint  = 5;
    uint64 Status        = 6;
}

message ListQuizBettingReq {
    uint32 page    = 1;
    uint32 perPage = 2;
    uint64 userID  = 3;
}

message ListQuizBettingResp {
    repeated QuizBetting quizBetting = 1;
    pagination.Pagination page       = 2;
}