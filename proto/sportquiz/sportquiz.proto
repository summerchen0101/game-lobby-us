message Quiz {
    string ID               = 1;
    LeagueType leagueType   = 2;
    string leagueID         = 3;
    string homeTeamID       = 4;
    string homeTeamName     = 5;
    string awayTeamID       = 6;
    string awayTeamName     = 7;
    repeated Odds odds      = 8;
    QuizType status         = 15;
    yesno.YesNo isHomeAway  = 14;
    uint64 homeFinalPoint   = 16;
    uint64 awayFinalPoint   = 17;
    uint64 startingAtMs     = 9;
    uint64 bettingStartAtMs = 10;
    uint64 bettingEndAtMs   = 11;
    uint64 createdAtMs      = 12;
    uint64 updatedAtMs      = 13;
}

message QuizBetting {
    string orderID                 = 1;
    string quizID                  = 10;
    LeagueType leagueType          = 17;
    string leagueName              = 18;
    uint64 userID                  = 2;
    uint64 bettingAmount           = 3;
    uint64 bettingOdds             = 4;
    BettingOddType bettingOddsType = 5;
    OddType oddType                = 6;
    int64 bettingPoint             = 7;
    QuizBettingStatus status       = 8;
    uint64 createdAtMs             = 9;
    uint64 updatedAtMs             = 11;
    int64 winLose                  = 12;
    string homeTeamName            = 13;
    string awayTeamName            = 14;
    yesno.YesNo isHomeAway         = 15;
    uint64 startingAtMs            = 16;
}

message Odds {
    OddType type            = 1;
    int64 point             = 2;
    uint64 leftBettingOdd   = 3;
    uint64 middleBettingOdd = 4;
    uint64 rightBettingOdd  = 5;
    uint64 betLevel         = 6;
}

message League {
    string ID          = 1;
    string name        = 2;
    LeagueType type    = 3;
    uint64 createdAtMs = 4;
}

message Team {
    string ID          = 1;
    string leagueID    = 2;
    string name        = 3;
    uint64 createdAtMs = 4;
}

enum LeagueType {
    UNKNOWN_LEAGUE_TYPE = 0;
    BASEBALL            = 1;
    BASKETBALL          = 2;
    FOOTBALL            = 3;
}

enum OddType {
    UNKNOWN_ODD_TYPE = 0;
    POINT_SPREAD     = 1;
    NO_POINT_SPREAD  = 2;
    BIG_SMALL        = 3;
    SINGLE_DOUBLE    = 4;
}

enum BetType {
    UNKNOWN_BET_TYPE = 0;
    LEFT             = 1;
    MIDDLE           = 2;
    RIGHT            = 3;
}

enum QuizType {
    UNKNOWN_QUIZ_TYPE          = 0;
    WAITING_FOR_CREATE         = 1;
    STILL_NOT_OPEN             = 2;
    BETTING                    = 3;
    STOP_BET                   = 4;
    WAITING_FOR_DRAW           = 5;
    WAITING_FOR_CANCEL         = 6;
    WAITING_FOR_CANCEL_IN_STOP = 7;
    WAITING_FOR_OPEN           = 11;
    CANCELED                   = 8;
    OPENING                    = 10;
    FINISH                     = 9;
}

enum QuizBettingStatus {
    UNKNOWN_QUIZ_BETTING_STATUS = 0;
    BET_STATUS                  = 1;
    CANCELED_STATUS             = 2;
    FINISH_STATUS               = 3;
    WAITING_FOR_DRAW_STATUS     = 4;
}

enum BettingOddType {
    UNKNOWN_BETTING_ODD_TYPE = 0;
    BETTING_LEFT             = 1;
    BETTING_MIDDLE           = 2;
    BETTING_RIGHT            = 3;
}