syntax = "proto3";
package sportquiz;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/sportquiz";

import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";

enum QuizApiType {
    PING_PONG        = 0;
    JOIN_ROOM        = 1;
    USER_KICK_BEFORE = 2;
    SERVER_UPDATE    = 3;

    LEAVE             = 11;  //204
    LIST_LEAGUE       = 12;  //ListLeagueResp
    LIST_QUIZ         = 13;  //ListQuizResp
    LIST_QUIZ_Betting = 15;  //ListQuizBettingResp
    BET               = 14;  //204

    QUIZ_PUSH = 21;  //推Quiz

    PLAYER_KICK_PUSH = 30;  //only you 204
    ROOM_CLOSE       = 31;
}

