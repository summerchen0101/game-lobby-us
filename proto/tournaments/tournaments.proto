syntax = "proto3";
package tournaments;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/tournaments";

import "google/protobuf/empty.proto";

import "proto/tournaments/model.proto";

import "gitlab.ffglobaltech.com/us888/ciri/commonpb/pagination/pagination.proto";

service TournamentsService {
    // 後台
    // ListTournaments 取得錦標賽列表(後台使用)
    rpc ListTournaments(ListTournamentsReq) returns (ListTournamentsResp);
    // CreateTournamentsForHoldem 建立德州樸克錦標賽(後台使用)
    rpc CreateTournamentsForHoldem(CreateTournamentsForHoldemReq) returns (google.protobuf.Empty);
    // EditTournamentsForHoldem 建立德州樸克錦標賽(後台使用)
    rpc EditTournamentsForHoldem(EditTournamentsForHoldemReq) returns (google.protobuf.Empty);
    // GetTournamentsAwardWinningRecord 取得錦標賽獎勵派發紀錄
    rpc GetTournamentsAwardWinningRecord(GetTournamentsAwardWinningRecordReq) returns (GetTournamentsAwardWinningRecordResp);
    // ListTournamentsAwardWinningRecords 取得錦標賽獎勵派發紀錄
    rpc ListTournamentsAwardWinningRecords(ListTournamentsAwardWinningRecordsReq) returns (ListTournamentsAwardWinningRecordsResp);
    // AuditTournamentsAwardWinningRecord 審查錦標賽獎勵派發紀錄(後台使用) -> 如果審核通過，就派發獎勵
    rpc AuditTournamentsAwardWinningRecord(AuditTournamentsAwardWinningRecordReq) returns (AuditTournamentsAwardWinningRecordResp);
    // ListTournamentsRegisterPlayers 取得錦標賽註冊玩家列表
    rpc ListTournamentsRegisterPlayers(ListTournamentsRegisterPlayersReq) returns (ListTournamentsRegisterPlayersResp);
    // PublishTournaments 發布錦標賽到遊戲端
    rpc PublishTournaments(PublishTournamentsReq) returns (PublishTournamentsResp);

    // SettleForTournaments 牌局結算同步給錦標賽 -> 觸發重算統計資訊、重新配桌、玩家出局... 並返回
    rpc SettleForTournaments(SettleForTournamentsReq) returns (SettleForTournamentsResp);
    // CheckTournamentsRoom 檢查錦標賽房間 (依更新的時間戳)
    rpc CheckTournamentsRoom(CheckTournamentsRoomReq) returns (CheckTournamentsRoomResp);

    // // ListBlindStructureSet 取得盲住結構組合
    // rpc ListBlindStructureSet(ListBlindStructureSetReq) returns (ListBlindStructureSetResp);

    // 遊戲端
    // ListGameSideTournamentsInfo 取得錦標賽資訊(game side)
    rpc ListGameSideTournamentsInfo(ListGameSideTournamentsInfoReq) returns (ListGameSideTournamentsInfoResp);
    // GetGameSideTournamentsInfo 取得單一錦標賽資訊(game side)
    rpc GetGameSideTournamentsInfo(GetGameSideTournamentsInfoReq) returns (GetGameSideTournamentsInfoResp);
    // ListGameSidePrizeSetting 取得錦標賽獎勵(game side)
    rpc ListGameSidePrizeSetting(ListGameSidePrizeSettingReq) returns (ListGameSidePrizeSettingResp);
    // GetGameSideHoldemTournamentsSetting 取得德州樸克錦標賽設定(game side)
    rpc GetGameSideHoldemTournamentsSetting(GetGameSideHoldemTournamentsSettingReq) returns (GetGameSideHoldemTournamentsSettingResp);
    // GetGameSideBlindStructureSet 取得德州樸克錦標賽盲住結構組合
    rpc GetGameSideBlindStructureSet(GetGameSideBlindStructureSetReq) returns (GetGameSideBlindStructureSetResp);
    // ListGameSidePostTournamentsRanking 取得德州樸克錦標賽賽後排名(game side) -> 賽事結束後提供
    rpc ListGameSidePostTournamentsRanking(ListGameSidePostTournamentsRankingReq) returns (ListGameSidePostTournamentsRankingResp);
    // ListGameSideRealTimeTournamentsRanking 取得德州樸克錦標賽即時排名(game side) -> 賽事結束前提供
    rpc ListGameSideRealTimeTournamentsRanking(ListGameSideRealTimeTournamentsRankingReq) returns (ListGameSideRealTimeTournamentsRankingResp);
    // ListMyBestTournamentsRanking 取得我的錦標賽最佳排行 -> 只計算完賽的
    rpc ListMyBestTournamentsRanking(ListMyBestTournamentsRankingReq) returns (ListMyBestTournamentsRankingResp);
    // ListMyRegisteredTournaments 取得我已報名的錦標賽資訊列表
    rpc ListMyRegisteredTournaments(ListMyRegisteredTournamentsReq) returns (ListMyRegisteredTournamentsResp);
    // GetMyRegisteredTournaments 取得單筆我已報名的錦標賽資訊
    rpc GetMyRegisteredTournaments(GetMyRegisteredTournamentsReq) returns (GetMyRegisteredTournamentsResp);
    // PreJoinTournamentsRoom 在加入房間前的預先檢查流程
    rpc PreJoinTournamentsRoom(PreJoinTournamentsRoomReq) returns (PreJoinTournamentsRoomResp);
    // // SharedTournamentsAwardWinningRecord 分享錦標賽獎勵派發紀錄
    // rpc SharedTournamentsAwardWinningRecord(SharedTournamentsAwardWinningRecordReq) returns (SharedTournamentsAwardWinningRecordResp);

    // RegisterTournaments 報名錦標賽 (首購/重買)
    rpc RegisterTournaments(RegisterTournamentsReq) returns (RegisterTournamentsResp);
    // AddOnTournaments 續買/多買籌碼
    rpc AddOnTournaments(AddOnTournamentsReq) returns (AddOnTournamentsResp);
}

message ListGameSideTournamentsInfoReq {
    uint32 page    = 1;  // 頁數
    uint32 perPage = 2;  // 每頁幾筆

    GameSideTournamentsInfoOptions opts = 3;
}

message ListGameSideTournamentsInfoResp {
    pagination.Pagination pagination                         = 1;  // 分頁資訊
    repeated GameSideTournamentsInfo gameSideTournamentsInfo = 2;
}

message GetGameSideTournamentsInfoReq {
    GameSideTournamentsInfoOptions opts = 3;
}

message GetGameSideTournamentsInfoResp {
    GameSideTournamentsInfo gameSideTournamentsInfo = 2;
}

message ListGameSidePrizeSettingReq {
    uint64 tournamentsID = 1;  // 錦標賽id
}

message ListGameSidePrizeSettingResp {
    uint64 tournamentsID                                = 1;  // 錦標賽id
    repeated GameSidePrizeSetting gameSidePrizeSettings = 2;  // 獎項設定
}

message GetGameSideHoldemTournamentsSettingReq {
    uint64 tournamentsID = 1;  // 錦標賽id
}

message GetGameSideHoldemTournamentsSettingResp {
    uint64 tournamentsID                              = 1;  // 錦標賽id
    HoldemTournamentsSetting holdemTournamentsSetting = 2;  // 德州樸克錦標賽設定
}

message GetGameSideBlindStructureSetReq {
    uint64 setID = 1;  // 盲住結構組合id
}

message GetGameSideBlindStructureSetResp {
    uint64 setID                        = 1;  // 盲住結構組合id
    BlindStructureSet blindStructureSet = 2;
}

message ListGameSidePostTournamentsRankingReq {
    uint64 tournamentsID = 3;  // 錦標賽id
}

message ListGameSidePostTournamentsRankingResp {
    uint64 tournamentsID                                                   = 1;  // 錦標賽id
    repeated GameSidePostTournamentsRanking gameSidePostTournamentsRanking = 2;
}

message ListGameSideRealTimeTournamentsRankingReq {
    uint64 tournamentsID = 3;  // 錦標賽id
}

message ListMyBestTournamentsRankingReq {
    // uint32 page                         = 1;  // 頁數
    // uint32 perPage                      = 2;  // 每頁幾筆
    MyBestTournamentsRankingOptions opts = 3;
}

message ListMyBestTournamentsRankingResp {
    // pagination.Pagination pagination                                     = 1;  // 分頁資訊
    repeated tournaments.MyBestTournamentsRanking myBestTournamentsRanking = 2;
}

message ListGameSideRealTimeTournamentsRankingResp {
    uint64 tournamentsID                                                           = 1;  // 錦標賽id
    repeated GameSideRealTimeTournamentsRanking gameSideRealTimeTournamentsRanking = 2;
}

// ListMyRegisteredTournamentsReq 取得我已報名的錦標賽資訊列表
message ListMyRegisteredTournamentsReq {
    uint32 page                         = 1;  // 頁數
    uint32 perPage                      = 2;  // 每頁幾筆
    MyRegisteredTournamentsOptions opts = 3;
}

message ListMyRegisteredTournamentsResp {
    pagination.Pagination pagination                                     = 1;  // 分頁資訊
    repeated tournaments.MyRegisteredTournaments myRegisteredTournaments = 2;
}

// GetMyRegisteredTournamentsReq 取得單筆我已報名的錦標賽資訊
message GetMyRegisteredTournamentsReq {
    MyRegisteredTournamentsOptions opts = 3;
}

message GetMyRegisteredTournamentsResp {
    tournaments.MyRegisteredTournaments myRegisteredTournament = 2;
}

// PreJoinTournamentsRoomReq 在加入房間前的預先檢查流程
message PreJoinTournamentsRoomReq {
    uint64 userID        = 1;
    uint64 tournamentsID = 2;  // 錦標賽ID
}

message PreJoinTournamentsRoomResp {
    tournaments.MyRegisteredTournaments myRegisteredTournaments = 2;
}

message ListTournamentsReq {
    uint32 page             = 1;  // 頁數
    uint32 perPage          = 2;  // 每頁幾筆
    TournamentsOptions opts = 3;
}

message ListTournamentsResp {
    pagination.Pagination pagination = 1;  // 分頁資訊
    repeated Tournaments tournaments = 2;
}

message CreateTournamentsForHoldemReq {
    Tournaments tournaments = 1;
}

message EditTournamentsForHoldemReq {
    uint64 tournamentsID                                                      = 1;
    UpdateTournamentsParams updateTournamentsParams                           = 2;
    repeated PrizeSetting replacePrizeSettings                                = 3;
    UpdateHoldemTournamentsSettingParams updateHoldemTournamentsSettingParams = 4;
    BlindStructureSet replaceBlindStructureSet                                = 5;
}

message GetTournamentsAwardWinningRecordReq {
    TournamentsAwardWinningRecordOptions opts = 3;
}

message GetTournamentsAwardWinningRecordResp {
    TournamentsAwardWinningRecord tournamentsAwardWinningRecord = 2;
}

message ListTournamentsAwardWinningRecordsReq {
    uint32 page                               = 1;  // 頁數
    uint32 perPage                            = 2;  // 每頁幾筆
    TournamentsAwardWinningRecordOptions opts = 3;
}

message ListTournamentsAwardWinningRecordsResp {
    pagination.Pagination pagination                                      = 1;  // 分頁資訊
    repeated TournamentsAwardWinningRecord tournamentsAwardWinningRecords = 2;
}

message AuditTournamentsAwardWinningRecordReq {
    uint64 tournamentsID                                     = 1;
    repeated uint64 approvedTournamentsAwardWinningRecordIDs = 2;
    uint64 auditBy                                           = 3;
}

message AuditTournamentsAwardWinningRecordResp {
}

message ListTournamentsRegisterPlayersReq {
    uint32 page                            = 1;  // 頁數
    uint32 perPage                         = 2;  // 每頁幾筆
    TournamentsRegisterPlayersOptions opts = 3;
}

message ListTournamentsRegisterPlayersResp {
    pagination.Pagination pagination                               = 1;  // 分頁資訊
    repeated TournamentsRegisterPlayers tournamentsRegisterPlayers = 2;
}

message PublishTournamentsReq {
}

message PublishTournamentsResp {
}

message SettleForTournamentsReq {
    uint64 tournamentsID = 1;  // 錦標賽ID
    uint64 gameID        = 2;  // 遊戲ID
    string roomID        = 3;  // 房間編號
    string roundID       = 4;  // 回合編號
    bytes reqData        = 5;  // 依照遊戲ID參照不同的序列化結構
}

message SettleForTournamentsResp {
    uint64 tournamentsID = 1;  // 錦標賽ID
    uint64 gameID        = 2;  // 遊戲ID
    string roomID        = 3;  // 房間編號
    string roundID       = 4;  // 回合編號
    bytes respData       = 5;  // 依照遊戲ID參照不同的序列化結構
}

message CheckTournamentsRoomReq {
}

message CheckTournamentsRoomResp {
}

// message ListBlindStructureSetReq {
// }

// message ListBlindStructureSetResp {
// }

message RegisterTournamentsReq {
    uint64 userID        = 1;
    uint64 tournamentsID = 2;  // 報名的錦標賽ID
    // repeated tournaments.RegFee regFees = 3;  // 交付的報名費 -> 改成後端自己判斷要消耗的報名費項目 票券>金幣
}

message RegisterTournamentsResp {
}

message AddOnTournamentsReq {
    uint64 userID        = 1;
    uint64 tournamentsID = 2;  // 報名的錦標賽ID
    // repeated tournaments.RegFee regFees = 3;  // 交付的報名費 -> 改成後端自己判斷要消耗的報名費項目 票券>金幣
}

message AddOnTournamentsResp {
}
