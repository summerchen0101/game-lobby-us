syntax = "proto3";
package virtualgood;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/virtualgood";

import "google/protobuf/empty.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/pagination/pagination.proto";

// 管理物品｜物品與物品之間的關係
service virtualGoodService {
    // ListVirtualGoods 列出物品
    rpc ListDigitalGoods(ListDigitalGoodsReq) returns (ListDigitalGoodsResp);
    // GetVirtualGoods 取得物品
    rpc GetDigitalGood(GetDigitalGoodReq) returns (GetDigitalGoodResp);
    rpc ListDefaultDigitalGoods(google.protobuf.Empty) returns (ListDefaultDigitalGoodsResp);
    // rpc BatchCreateDigitalGoods(BatchCreateDigitalGoodsReq) returns (google.protobuf.Empty);

    rpc ListProducts(ListProductsReq) returns (ListProductsResp);
    rpc GetProduct(GetProductReq) returns (GetProductResp);
    rpc ListGatewayProducts(ListGatewayProductsReq) returns (ListGatewayProductsResp);
    rpc BatchDeleteInsertProductContent(BatchDeleteInsertProductContentReq) returns (google.protobuf.Empty);
    rpc UpdateProductStatus(UpdateProductStatusReq) returns (google.protobuf.Empty);
    rpc GetRandProductItem(GetRandProductItemReq) returns (GetRandProductItemResp);
    // rpc UpdateProducts(UpdateProductsReq) returns (google.protobuf.Empty);
    // rpc DeleteInsertProductContents(DeleteInsertProductContentsReq) returns (google.protobuf.Empty);
    // rpc ListProductContents(ListProductContentsReq) returns (ListProductContentsResp);

    rpc ListProductItems(ListProductItemsReq) returns (ListProductItemsResp);
    rpc UpdateProduct(UpdateProductReq) returns (google.protobuf.Empty);
    rpc UpdateItem(UpdateItemReq) returns (google.protobuf.Empty);
    rpc DeleteItem(DeleteItemReq) returns (google.protobuf.Empty);
    rpc ListGoodTypes(ListGoodTypesReq) returns (ListGoodTypesResp);

    rpc UpdateProductPaymentGateway(UpdateProductPaymentGatewayReq) returns (google.protobuf.Empty);

    // rpc GetProductStageSettings(GetProductStageSettingReq) returns (GetProductStageSettingResp);
}
message BatchCreateDigitalGoodsReq {
    repeated DigitalGood digitalGoods = 1;
}
message ListProductContentsReq {
    uint64 productID = 1;
}
message ListProductContentsResp {
    repeated ProductContent productContent = 1;
}
message DeleteInsertProductContentsReq {
    uint64 deleteProductID                 = 1;
    repeated ProductContent productContent = 2;
}
message UpdateProductsReq {
    uint64 id           = 1;
    int64 originalPrice = 2;
    int64 specialPrice  = 3;
}
message ListDigitalGoodsReq {
    VirtualGoodType virtualGoodType           = 1; // 單一物品類型
    repeated VirtualGoodType virtualGoodTypes = 2; // 多種物品類型
    uint64 itemID                             = 3;
    repeated uint64 itemIDs                   = 4;
    yesno.YesNo isDefault                     = 5; // 是否預設
    yesno.YesNo status                        = 6;
    uint32 page                               = 7;
    uint32 perPage                            = 8;
}

message ListDigitalGoodsResp {
    repeated DigitalGood digitalGoods = 1;
    pagination.Pagination page        = 2;
}

message GetDigitalGoodReq {
    uint64 itemID = 1;
}

message GetDigitalGoodResp {
    DigitalGood digitalGood = 1;
}

message ListDefaultDigitalGoodsResp {
    repeated DigitalGoodDefault defaults = 1;
}

message DigitalGood {
    uint64 itemID            = 1;
    string name              = 2;
    VirtualGoodType goodType = 3; // 虛寶類型
    int64 price              = 5; // 金額
    int64 createdAtMs        = 6;

    // For Drop
    string itemDataMemo = 7;
    string drop         = 8;
    string tag          = 9;

    // For Role|Skin
    uint64 limitNum = 10;

    repeated DigitalGoodLink link = 11;
    uint64 chestID                = 12; // 寶箱 ID
    yesno.YesNo status            = 13;
}

message DigitalGoodLink {
    uint64 itemID            = 1; // child 商品 ItemID ex : skin
    uint64 virtualItemID     = 2; // parent 商品 ItemID ex : 角色
    string name              = 3;
    VirtualGoodType goodType = 4; // 虛寶類型
}

message DigitalGoodDefault {
    uint64 itemID           = 1; // child 商品 ItemID ex : skin
    int64 amount            = 2;
    DigitalGood digitalGood = 3;
}

message ListProductsReq {
    yesno.YesNo status            = 1;
    PayType payType               = 2;
    uint64 paymentType            = 3;
    PaymentGateway paymentGateway = 4;
    int64 buyLevelLimit           = 5;
    int64 buyLimit                = 6;
    repeated uint64 productIDs    = 7;
}

message ListProductsResp {
    repeated Products products = 1;
}

message Products {
    Product product                               = 1;
    repeated ProductPaymentGateway paymentGateway = 2;
    repeated ProductContent productContent        = 3;
}

message GetProductReq {
    uint64 productID              = 1;
    uint64 paymentType            = 2;
    PaymentGateway paymentGateway = 3;
}

message GetProductResp {
    Product product                               = 1;
    repeated ProductPaymentGateway paymentGateway = 2;
    repeated ProductContent productContent        = 3;
}

message ListGatewayProductsReq {
    PayType payType                                         = 1 [deprecated = true];
    repeated PayType payTypes                               = 8;
    uint64 paymentType                                      = 2 [deprecated = true];
    repeated uint64 paymentTypes                            = 6;
    PaymentGateway paymentGateway                           = 3 [deprecated = true];
    repeated PaymentGateway paymentGateways                 = 7;
    int64 buyLevelLimit                                     = 4;
    int64 buyLimit                                          = 5;
    int64 startingAtMs                                      = 9;
    int64 expiredAtMs                                       = 10;
    uint64 productID                                        = 11 [deprecated = true];
    repeated uint64 productIDs                              = 12;
    yesno.YesNo paymentGatewayStatus                        = 13;
    yesno.YesNo status                                      = 14;
    repeated string appVersionIn                            = 15;
    ProductMappingStageOptions productMappingStageOptions   = 16;
    ProductStageSettingsOptions productStageSettingsOptions = 17;
}

message ProductMappingStageOptions {
    string appVersion   = 1;
    string productStage = 2;
    int64 productID     = 3;
}

message ProductStageSettingsOptions {
    string appVersion   = 1;
    string productStage = 2;
}

message ListGatewayProductsResp {
    repeated Products gatewayProducts = 1;
}

message GatewayProducts {
    Product product                        = 1;
    ProductPaymentGateway paymentGateway   = 2;
    repeated ProductContent productContent = 3;
}

message Product {
    uint64 ID               = 1;
    string name             = 2;
    DropType dropType       = 3;
    yesno.YesNo status      = 4;
    PayType payType         = 5;
    string originalPrice    = 6;
    string specialPrice     = 7;
    int64 buyLevelLimit     = 8;
    int64 buyLimit          = 9;
    int64 expiredAtMs       = 10;
    int64 startingAtMs      = 12;
    ProductType productType = 13;
    // ProductMappingStage productMappingStage = 14;
    string appVersion   = 15; // product_mapping_stage.app_version
    string productStage = 16; // product_mapping_stage.product_stage
    string vipLimit     = 17; // product_mapping_stage.vip_limit
    int64 exp           = 18;
}

message ProductMappingStage {
    string appVersion   = 1;
    string productStage = 2;
    uint64 productID    = 3;
    string vipLimit     = 4;
}

message ProductPaymentGateway {
    uint64 productID              = 1;
    string info                   = 2;
    string icon                   = 3;
    string storeName              = 8;
    PaymentGateway paymentGateway = 4;
    uint64 paymentType            = 5;
    string paymentID              = 6;
    yesno.YesNo status            = 7;
}

message UpdateProductPaymentGatewayParams {
    yesno.YesNo status = 7;
}

// Product 商品
message ProductContent {
    uint64 productID              = 1;
    uint64 itemID                 = 2;
    string itemName               = 3;
    PaymentGateway paymentGateway = 4;
    uint64 paymentType            = 5;
    VirtualGoodType goodType      = 8;
    int64 amount                  = 6;
    int64 percent                 = 7;
    int64 sort                    = 9;
}
message ListProductContentReq {
}
enum VirtualGoodType {
    UNKNOWN_VIRTUAL_GOOD_TYPE = 0;

    GC_FREE_GAME_VOUCHER_100              = 3; // GC FG券_100
    GC_FREE_GAME_VOUCHER_1000             = 4; // GC FG券_1000
    GC_FREE_GAME_VOUCHER_10000            = 5; // GC FG券_10000
    GC_FREE_GAME_VOUCHER_100000           = 31; // GC FG券_100000
    GC_FREE_GAME_VOUCHER_FRAGMENTS_100    = 6; // GC FG券碎片_100
    GC_FREE_GAME_VOUCHER_FRAGMENTS_1000   = 7; // GC FG券碎片_1000
    GC_FREE_GAME_VOUCHER_FRAGMENTS_10000  = 8; // GC FG券碎片_10000
    GC_FREE_GAME_VOUCHER_FRAGMENTS_100000 = 30; // GC FG券碎片_100000
    
    SC_FREE_GAME_VOUCHER_100              = 9; // SC FG券_100
    SC_FREE_GAME_VOUCHER_1000             = 10; // SC FG券_1000
    SC_FREE_GAME_VOUCHER_10000            = 11; // SC FG券_10000
    SC_FREE_GAME_VOUCHER_100000           = 33; // SC FG券_100000
    SC_FREE_GAME_VOUCHER_FRAGMENTS_100    = 12; // SC FG券碎片_100
    SC_FREE_GAME_VOUCHER_FRAGMENTS_1000   = 13; // SC FG券碎片_1000
    SC_FREE_GAME_VOUCHER_FRAGMENTS_10000  = 14; // SC FG券碎片_10000
    SC_FREE_GAME_VOUCHER_FRAGMENTS_100000 = 32; // SC FG券碎片_100000

    GC_GOLD_TICKET = 26; // GC 金幣券
    SC_GOLD_TICKET = 27; // SC 金幣券

    PLAYER_INFO_AVATAR  = 10001; // 頭像
    PLAYER_INFO_ROLE    = 10002; // 角色

    GC_GOLD = 15001; // GC 金幣
    SC_GOLD = 15002; // SC 金幣
}

enum CardType {
    UNKNOWN_CARD_TYPE    = 0;
    BUG_BOY              = 70; // 昆蟲男孩
    ADVENTURE_GIRL       = 80; // 探險女孩
    FORTUNE_OF_GOD       = 90; // 財神爺
    MAGIC_LAMP           = 100; // 神燈精靈
    NURSE                = 110; // 甜心護士
    DRAGON               = 120; // 提亞瑪特(巨龍)
    BEACH_GIRL           = 130; // 沙灘女孩
    ANUBIS               = 140; // 阿努比斯
    LITTLE_WITCH         = 150; // 小魔女
    PRINCESS_JASMINE     = 160; // 茉莉公主
    ALADDIN              = 170; // 阿拉丁
    TYRANNY_OF_DONG_ZHUO = 180; // 暴虐董卓
    COW                  = 190; // 荒野牛仔
    SMALL_HEAD_HOME      = 200; // 小頭家
    ROBOT                = 210; // 鋼鐵超人
    HANYU                = 220; // 韓瑜
    CATWOMAN_BAST        = 230; // 貓女芭絲特
    DIAOCHAN             = 240; // 舞姬貂蟬
    GOD_OF_WAR_LU_BU     = 250; // 戰神呂布
    EGYPT                = 260; // 埃及艷後
    WU_SHENG_GUAN_YU     = 270; // 武聖關羽
    FOX                  = 280; // 九尾狐
    LUDMILLA             = 290; // 米拉
    VESPA                = 300; // 偉士牌
    IPHONE15             = 310; // iphone15
    IPADAIR              = 320; // ipadair
    DYSON                = 330; // dyson
    PS5                  = 340; // ps5

}
// PaymentGateway which gateway you pay
enum ProductType {
    UNKNOWN_PRODUCT_TYPE = 0;
    UNLIMITED            = 1;
    DAILY                = 2;
    FOREVER              = 3;
}

// PaymentGateway which gateway you pay
enum DropType {
    UNKNOWN_DROP_TYPE = 0;
    ALL               = 1;
    BY_PERCENT        = 2;
}

// PaymentGateway which gateway you pay
enum PayType {
    UNKNOWN_PAY_TYPE  = 0;
    BY_GOLDEN_COIN    = 1;
    BY_MOM            = 2;
    FREE              = 3;
    FORTUNE_MONEY     = 4;
    MEGA_PACKAGE      = 5;
    CHARACTER_PACKAGE = 6;
    SPECIAL_PACKAGE   = 7;
}

// PaymentGateway which gateway you pay
enum PaymentGateway {
    UNKNOWN_PAYMENT_GATEWAY = 0;

    // 印尼盾 第三方支付
    IDRRealPay = 1;
    IDRNicePay = 2;
    IDRTopPay  = 3;
    IDRWowPay  = 4;
    IDRDeePay  = 6;
    IDRHaloPay = 7;

    // 菲律賓披索 第三方支付
    PHPLetsPayGCash       = 11; // 原生
    PHPLetsPayGCashII     = 12; // 跑分
    PHPLetsPayMaya        = 13;
    PHPHaloPay            = 14;
    PHPFastPay            = 15;

    // 美金 第三方支付
    USDPayPlus             = 21;
}
message BatchDeleteInsertProductContentReq {
    repeated uint64 productIds             = 1;
    repeated ProductContent productContent = 2;
}
message UpdateProductStatusReq {
    uint64 productId   = 1;
    yesno.YesNo status = 2;
}
message GetRandProductItemReq {
    repeated ProductContent productContent = 1;
}
message GetRandProductItemResp {
    ProductContent productContent = 1;
}

message ListProductItemsReq {
    uint32 page              = 1;
    uint32 perPage           = 2;
    uint64 productID         = 3; // 角色單抽 5009, 商城十連抽 5007, 卡牌 5010
    uint64 itemID            = 4;
    VirtualGoodType goodType = 5;
    CardType collectID       = 6;
}

message ListProductItemsResp {
    pagination.Pagination page        = 1;
    repeated ProductItem productItems = 2;
    string price                      = 3;
}

message ProductItem {
    uint64 id                = 1; // 流水號
    VirtualGoodType goodType = 2; // 虛寶類型
    int64 goodTypeExp        = 3; // 虛寶到期時間
    uint64 itemID            = 4; // 品項ＩＤ
    string itemName          = 5; // 品項名稱
    int64 percent            = 6; // 權重
    uint64 chestID           = 7; // 寶箱
    CardType collectID       = 8; // 卡牌組代號
}

message UpdateProductReq {
    uint64 productID = 1; // 產品ＩＤ
    int64 price      = 2; // 金幣
}

message UpdateItemReq {
    uint64 id        = 1; // 流水號
    uint64 productID = 2; // 產品ＩＤ
    uint64 itemID    = 3; // 品項ＩＤ
    string itemName  = 4; // 品項名稱
    int64 percent    = 5; // 權重
    uint64 chestID   = 6; // 寶箱
}

message DeleteItemReq {
    uint64 id = 1; // 流水號
}

message ListGoodTypesReq {
    uint64 productID = 1; // 產品ＩＤ
}

message ListGoodTypesResp {
    repeated VirtualGoodType goodTypes = 1; // 虛寶類型列表
}

message UpdateProductPaymentGatewayReq {
    uint64 productID                               = 1;
    UpdateProductPaymentGatewayParams updateParams = 2;
}

// message GetProductStageSettingReq {
//     string appVersion   = 1;
//     string productStage = 2;
// }

// message GetProductStageSettingResp {
//     ProductStageSetting productStageSetting = 1;
// }

message ProductStageSetting {
    string appVersion   = 1;
    string productStage = 2;
    int64 lowestPrice   = 3;
}
