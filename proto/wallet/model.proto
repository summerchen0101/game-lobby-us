syntax = "proto3";
package wallet;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/wallet";

import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";

// TournamentsWallet 錦標賽錢包 單場單次買入有效
message TournamentsWallet {
    uint64 tournamentsID = 1;  // 錦標賽ID
    uint64 userID        = 2;
    int64 timesOfBuying  = 3;  // 第幾次買入
    int64 chipAmount     = 4;  // 錦標賽籌碼
    yesno.YesNo isOut    = 5;  // 是否出局 (籌碼餘額小於大盲)
    yesno.YesNo isEnd    = 6;  // 賽事是否結束
    int64 createdAtMs    = 7;  // 建立時間
    int64 updatedAtMs    = 8;  // 更新時間
    uint64 id            = 9;
}

message TournamentsWalletOptions {
    repeated uint64 tournamentsIDIn = 1;
    repeated uint64 userIDIn        = 2;
    repeated int64 timesOfBuyingIn  = 3;
    int64 chipAmountGte             = 4;
    int64 chipAmountLte             = 5;
    yesno.YesNo isOut               = 6;
    yesno.YesNo isEnd               = 7;
    repeated uint64 idIn            = 8;
}

message TournamentsWalletStatistics {
    uint64 tournamentsID  = 1;  // 錦標賽ID
    int64 totalChipAmount = 2;  // 總籌碼量
    int64 minChipAmount   = 3;  // 最少籌碼量
    int64 maxChipAmount   = 4;  // 最多籌碼量
    int64 avgChipAmount   = 5;  // 平均籌碼量
}