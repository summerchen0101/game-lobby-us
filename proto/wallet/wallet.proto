syntax = "proto3";
package wallet;
option go_package = "gitlab.ffglobaltech.com/us888/pluto/protos/wallet";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/yesno/yesno.proto";

import "google/protobuf/empty.proto";
import "proto/wallet/model.proto";
import "google/protobuf/wrappers.proto";
import "gitlab.ffglobaltech.com/us888/ciri/commonpb/pagination/pagination.proto";

service WalletService {
    // Trade bank support receipt to wallet trade money
    rpc Trade(Receipt) returns (TradeResp);

    rpc RechargeAmount(RechargeAmountReq) returns (Bag);

    rpc DiamondTrade(DiamondTradeReq) returns (TradeResp);
    // rpc TokenTrade(TokenTradeReq) returns (TradeResp);

    rpc ExchangeToken(ExchangeTokenReq) returns (Token);
    rpc GetToken(GetTokenReq) returns (Token);
    rpc ListTokens(ListTokenReq) returns (ListTokenResp);
    rpc RefundToken(RefundTokenReq) returns (RefundTokenResp);
    rpc RefundTokenExpired(google.protobuf.Empty) returns (RefundTokenExpiredResp);

    rpc ListFrozenRecords(ListFrozenRecordsRequest) returns (ListFrozenRecordsResponse);
    // Get get user balance
    rpc Get(GetReq) returns (Bag);
    // Create create at first wallet for user
    rpc Create(CreateReq) returns (google.protobuf.Empty);

    // BatchNormalTrade batch trade, and return each user's bag
    rpc BatchNormalTrade(BatchNormalTradeReq) returns (BatchNormalTradeResp);  // 僅限 ActionNormal

    // GetRecord get wallet record
    rpc GetRecord(GetRecordReq) returns (GetRecordResp);
    // ListRecords list wallet records
    rpc ListRecords(ListRecordsReq) returns (ListRecordsResp);
    // ListBags list wallet bags
    rpc ListBags(ListBagsReq) returns (ListBagsResp);

    // CountWallets return total of wallet according to CountWalletsReq
    rpc CountWallets(CountWalletsReq) returns (CountWalletsResp);

    rpc SystemWalletOverView(google.protobuf.Empty) returns (SystemWalletOverViewResp);

    rpc ListSystemBags(google.protobuf.Empty) returns (ListSystemBagsResp);
    rpc SystemBagsRecharge(SystemBagsRechargeReq) returns (google.protobuf.Empty);

    rpc PlayerPaymentPointReFund(PlayerPaymentPointReFundReq) returns (PlayerPaymentPointReFundResp);  // 玩家支付退款

    rpc ListBagsRanking(ListBagsReq) returns (ListBagsResp);  // 富豪榜清單

    rpc ListStatement(ListStatementRequest) returns (ListRecordsResp);  // 列出紅包&充值紀錄

    // 錦標賽使用
    // CreateTournamentsWallet 建立錦標賽錢包
    rpc CreateTournamentsWallet(CreateTournamentsWalletReq) returns (google.protobuf.Empty);
    // GetTournamentsWallet 取得錦標賽錢包
    rpc GetTournamentsWallet(GetTournamentsWalletReq) returns (GetTournamentsWalletResp);
    // AddChipToTournamentsWallet 向錦標賽錢包加錢
    rpc AddChipToTournamentsWallet(AddChipToTournamentsWalletReq) returns (AddChipToTournamentsWalletResp);
    // TournamentsBatchNormalTrade batch trade, and return each user's bag
    rpc TournamentsBatchNormalTrade(TournamentsBatchNormalTradeReq) returns (TournamentsBatchNormalTradeResp);  // 僅限 ActionNormal

    rpc BatchUpdateTournamentsWallet(BatchUpdateTournamentsWalletReq) returns (BatchUpdateTournamentsWalletResp);

    rpc GetTournamentsWalletStatistics(GetTournamentsWalletStatisticsReq) returns (GetTournamentsWalletStatisticsResp);

    rpc RecordPlayerDailyBalance(google.protobuf.Empty) returns (google.protobuf.Empty);

    rpc ListWalletMaxRecords(ListWalletMaxRecordsReq) returns (ListWalletMaxRecordsResp);
    rpc GetWalletMaxRecord(GetWalletMaxRecordReq) returns (GetWalletMaxRecordResp);
    rpc LikeWalletMaxRecord(LikeWalletMaxRecordReq) returns (LikeWalletMaxRecordResp);

    rpc FreezeWithdrawAmount(FreezeWithdrawAmountReq) returns (Bag);
    rpc UnfreezeWithdrawAmount(UnfreezeWithdrawAmountReq) returns (Bag);
    rpc WithdrawAmount(WithdrawAmountReq) returns (Bag);
}

service WalletJobService {
    rpc CheckFrozenExpired(google.protobuf.Empty) returns (google.protobuf.Empty);
}

enum Const {
    Unknown      = 0;
    SystemWallet = 1; // 官方錢包
}

message GetRecordReq {
    string tradeID        = 1;
    TradeEvent tradeEvent = 2;
}

message GetRecordResp {
    Record record = 1;
}

message GetTokenReq {
    uint64 userID = 1;
    uint64 gameID = 2;
    string roomID = 3;
}

message ListTokenReq {
    uint64 userID = 1;
    uint64 gameID = 2; // option
}

message ListTokenResp {
    repeated Token tokens = 1;
}

message ExchangeTokenReq {
    uint64 amount          = 1;
    uint64 gameID          = 2;
    uint64 expireTime      = 3;
    uint64 userID          = 4;
    uint64 tokenLockAmount = 5;
    string roomID          = 6;
}

message RefundTokenReq {
    uint64 userID          = 1;
    uint64 gameID          = 2;
    uint64 tokenLockAmount = 3;
    string roomID          = 4;
}

message RefundTokenResp {
    Token token = 1;
}

message RefundTokenExpiredResp {
    repeated Token tokens = 1;
}
// 記帳分類
enum TradeEvent {
    UNKNOWN_EVENT = 0; // 請勿使用

    Payment = 1; // 充值 使用者付款

    BET = 2; // 注單

    // DEVICE_CAST means cast coin by casino device
    DEVICE_CAST = 4;

    // CHAT_ROOM_CREATE means cast coin by create chat room
    CHAT_ROOM = 5;

    // COMMISSION means trade by commission
    COMMISSION = 6;

    FROZEN = 7; // 凍結
    SAVE   = 8; // 保險金

    DIVIDEND = 10; // 分潤  ex:俱樂部
    BURN     = 12; // 燒毀!!!!!!

    STORE_BUY_ITEM                 = 13; // 商城購買物品
    LIKE_RICH_DADDY                = 71; // 抖內金主爸爸花費
    RICH_DADDY_LOVE                = 72; // 抖內金主爸爸回饋
    REPEATED_CARD_EXCHANGE_TO_GOLD = 14; // 重複的卡片兌換成金幣
    COLLECTION_EXCHANGE_TO_GOLD    = 15; // 集滿的組合兌換成金幣
    GOLD_LOOT                      = 16; // 抽到金幣

    PAYMENT_BUY_GOLD      = 17; // 儲值/支付 購買金幣
    PAYMENT_BUY_BBC_POINT = 39; // 儲值/支付 購買頭家點

    PAYMENT_REFUND_GOLD      = 26; // 支付退款金幣
    PAYMENT_REVISE_PAID_GOLD = 27; // 支付補單給予金幣

    GAME_TOKEN_EXCHANGE = 18; // 遊戲代幣兌換
    GAME_TOKEN_REFUND   = 32; // 遊戲代幣兌換

    OFFICAL_RECHARGE = 19; // 官方充值
    OFFICAL_REFOUND  = 20; // 官方退款
    OFFICAL_LEVY     = 21; // 官方徵收

    RED_ENVELOPE_SEND      = 3;
    RED_ENVELOPE_RECV      = 22; // 紅包接收
    RED_ENVELOPE_REFUND    = 9; // 紅包退回
    RED_EVVELOPE_COMMISION = 23; // 紅包水錢

    PAYMENT_POINT_EXCHANGE_TO_GOLD = 24; // 玩家點數 兌換成金幣

    SYSTEM_WALLET_RECHARGE = 25; // 官方錢包充值
    SERIAL_NUMBER          = 28; // 序號

    Bot_RECHARGE = 29; // 官方充值
    Bot_LEVY     = 30; // 官方徵收

    OFFICIAL_SYSTEM_MANAGER_SEND = 31;

    DAILY_FORTUNE_COIN          = 33;
    DAILY_LOGIN_AWARD           = 34; // 每日登入獎勵
    GUILD_REFERRER_AWARD        = 35; // 工會推薦獎金
    GUILD_EXTEND                = 36; // 工會展延
    DIAMOND_TRADE               = 37; // 上級給分
    BOSS_RECHARGE               = 38; // 老闆充值
    ACTIVITY_LUCKY              = 40; // 幸運轉盤給錢
    REGISTER_TOURNAMENTS        = 41; // 錦標賽報名
    BUY_ADD_ON                  = 42; // 購買addOn
    TOURNAMENTS_AWARD           = 43; // 錦標賽獎勵
    PROMOTION_TASK_AWARD        = 45; // 推廣任務獎勵
    BINDING_REFERRER_CODE_AWARD = 46; // 綁定推薦人代碼獎勵

    DailyMissonAward    = 51; // 每日任務獎金
    SummonedPlayerAward = 52; // 召回獎金

    AddAuctionFee            = 60; // 拍賣上架費
    AuctionSellerGain        = 61; // 拍賣賣方獲得
    AuctionBuyerCost         = 62; // 拍賣買方花費
    AuctionSalerFee          = 63; // 拍賣賣方手續費
    AuctionBid               = 64; // 拍賣競標
    AuctionRefund            = 65; // 拍賣退款
    PLAYER_DAILY_SCORE_AWARD = 66; // 每日回饋

    WITHDRAW_AMOUNT           = 101; // 提現
    WITHDRAW_AMOUNT_SEND_BACK = 102; // 提現退回
}

// CoinType express coin Golden or Silver
enum CoinType {
    UNKNOWN_COIN_TYPE = 0;
    GOLDEN            = 1;
    TOKEN             = 2;
}

// Bag is member's wallet
message Bag {
    uint64 userID            = 1; // 使用者ID
    repeated Coin coins      = 2; // 包含的錢幣（我怕有多幣種
    uint64 updatedAtMs       = 3;
    yesno.YesNo isFakePlayer = 4;
    int64 level              = 5; // 機器人等級
    repeated Token tokens    = 6; // 預扣金
}

message Token {
    uint64 userID      = 1; // 使用者ID
    uint64 gameID      = 2; // 包含的錢幣（我怕有多幣種
    string roomID      = 6;
    int64 amount       = 5;
    uint64 createdAtMs = 3;
    uint64 expireAtMs  = 4;
}

message Coin {
    int64 amount             = 1; // 遊戲可用數量  = 總數量 - saveAmount; 可移轉數量 = amount - frozenAmount
    CoinType type            = 2; // 幣種 1.金幣 2.暫時沒有
    int64 saveAmount         = 3; // 保險箱金額
    int64 frozenAmount       = 4; // 凍結金額
    int64 payable            = 5; // 應付
    int64 gameToken          = 6; // 遊戲代幣
    int64 paymentPointAmount = 7; // 支付點數
    int64 redeemableAmount   = 8; // 可提金額
}

// Receipt means Bank Receipt to wallet
message Receipt {
    uint64 fromUserID             = 1; // trade with system use ID==Const SystemWallet
    uint64 toUserID               = 2; // trade with system use ID==Const SystemWallet
    map<uint64, int64> fakePlayer = 9;
    string recordID               = 3;
    TradeEvent tradeEvent         = 4;
    TradeCoin coin                = 5;
    uint64 gameID                 = 6; // 遊戲ID
    string roomID                 = 8;
    string remark                 = 7; // 註記
}

// Receipt means Bank Receipt to wallet
message DiamondTradeReq {
    uint64 fromUserID     = 1; // trade with system use ID==Const SystemWallet
    uint64 toUserID       = 2; // trade with system use ID==Const SystemWallet
    string recordID       = 3;
    TradeEvent tradeEvent = 4;
    int64 amount          = 5;
    string remark         = 6; // 註記
}

//// Receipt means Bank Receipt to wallet
// message TokenTradeReq {
//     uint64 fromUserID     = 1;  // trade with system use ID==Const SystemWallet
//     uint64 toUserID       = 2;  // trade with system use ID==Const SystemWallet
//     string recordID       = 3;
//     TradeEvent tradeEvent = 4;
//     int64 amount          = 5;
//     uint64 gameID         = 6;  // 遊戲ID
//
//     string remark = 7;  //註記
// }

message TradeResp {
    Bag fromBag       = 1;
    Bag toBag         = 2;
    Bag formBagBefore = 3;
    Bag toBagBefore   = 4;
}

// TradeCoin means Bank Receipt trade detail
message TradeCoin {
    int64 amount  = 1;
    CoinType type = 2;

    // 錢包操作類型
    enum ActionType {
        ActionNormal             = 0; // 一般操作 針對 wallet amount //遊戲可用數量  = 總數量 - saveAmount; 可移轉數量 = amount - frozenAmount
        ActionAddAmountAndFrozen = 1; // 凍結 若有值 會同時增加  amount , frozen_amount
        ActionSaving             = 2; // 保險箱金額 若有值 會扣去 amount 增加 save_amount

        ActionFrozen   = 3; //!!!僅限自己對自己!!!單純 僅增加 frozen_amount
        ActionUnFrozen = 4; //!!!僅限自己對自己!!!解凍 單存扣掉 frozen_amount
        ActionUnSaving = 5; // 保險金移出 若有值 會扣去 save_amount 增加 amount

        ActionAddAmountAndSaving = 6; //!!!!保險箱金額 若有值 會同時增加  amount , save_amount = 直接增加 save_amount

        ActionMoveAmountToPayable = 7; //!!!僅限自己對自己!!!從可用amount 移入 payable_amount (待出款) ; 同時官方抽成 2% 水錢無條件進位
        ActionMovePayableToSaving = 8; // 從 payable_amount 移入對象 保險 save_amount
        ActionMovePayableToAmount = 9; // 從可用 payable_amount (待出款) 移入對象  amount

        ActionReduceAmount = 10; //!!!僅限自己對自己!!! wallet amount 適用在線下出款 , 錢幣銷毀 amount

        ActionTokenTrade = 11; // 從 from token 移入 to token
        //        ActionMoveAmountToToken = 12;  // 從可用amount 移入 game_token
        //        ActionMoveTokenToAmount = 13;  // 從game_token 移入 可用amount

        ActionAddPaymentPoint    = 14; // !!!僅限自己對自己!!! 單純 增加 payment point
        ActionPaymentPointToGlod = 15; // !!!僅限自己對自己!!! 將 payment point 扣除 後由官方錢包 amount 轉移到玩家 amount =>  payment point:amount １：１００

        ActionAmountRecharge = 16; // 僅限 systemwallet, from 必定會被覆蓋為0 ,to 則為 systemwallet

        ActionReduceFormPaymentPoint = 17; //!!!! PlayerPaymentPointReFund 中使用 減少  payment point
        ActionReduceFormSavingAmount = 18; //!!!! PlayerPaymentPointReFund 中使用 減少  saving amount
    }
    ActionType action      = 3;
    uint64 forzenUntilAtMs = 4; // 配合 ActionType Frozen
}

message CreateReq {
    uint64 userID            = 1;
    yesno.YesNo isFakePlayer = 2;
    int64 amount             = 3;
}

message GetReq {
    uint64 userID      = 1;
    bool requireTokens = 2;
}

message BatchNormalTradeReq {
    repeated Receipt receipts = 1;
}

message BatchNormalTradeResp {
    map<uint64, Bag> userBags       = 1; // userID : user's bag
    map<uint64, Bag> userBagsBefore = 2; // userID : user's bag
}

message RechargeAmountReq {
    uint64 userID         = 1; // trade with system use ID==Const SystemWallet
    string recordID       = 2;
    int64 amount          = 3;
    string remark         = 4; // 註記
    TradeEvent tradeEvent = 5;
    string appVersion     = 6;
}

message Record {
    uint64 id                 = 12;
    string tradeID            = 1;
    uint64 fromUserID         = 2;
    uint64 toUserID           = 3;
    TradeEvent tradeEvent     = 4;
    int64 createdAtMs         = 6;
    uint64 gameID             = 7; // 遊戲 ID
    int32 action              = 8; // 對應 ActionType enum
    uint64 fromUserAfterCoin  = 9; // from交易後餘額
    uint64 toUserAfterCoin    = 10; // to交易後餘額
    string remark             = 11; // 註記
    uint64 fromUserBeforeCoin = 13; // from交易前餘額
    uint64 toUserBeforeCoin   = 14; // to交易前餘額

    Coin coin          = 5; // to 的trade 資訊
    Coin fromTradeCoin = 15; // from 的 trade 資訊

    BalanceChanges fromBalanceChanges = 16; // from 餘額變動
    BalanceChanges toBalanceChanges   = 17; // to 餘額變動
}

message BalanceChanges {
    AmountChanges coinAmount         = 1;
    AmountChanges paymentPointAmount = 2;
    AmountChanges saveAmount         = 3;
    AmountChanges payableAmount      = 4;
    AmountChanges frozenAmount       = 5;
    AmountChanges tokenAmount        = 6; // 不分遊戲房間的總預扣
}

message AmountChanges {
    int64 before = 1;
    int64 after  = 2;
}

message ListRecordsReq {
    int64 createdAtMsGte            = 1;
    int64 createdAtMsLte            = 2;
    uint32 page                     = 3;
    uint32 perPage                  = 4;
    uint64 userID                   = 5;
    TradeEvent tradeEvent           = 6;
    repeated uint64 userIDs         = 7;
    repeated TradeEvent tradeEvents = 10;

    enum FlowStatus {
        All                 = 0;
        InCome              = 1; // 收
        Expenditure         = 2; // 支
        InComeNeqFromUID    = 3; // 收，to & from 不同人
        ExpenditureNeqToUID = 4; // 支，to & from 不同人
        InternalTransfer    = 5; // 內轉，to & from 同人
    }

    repeated SortbyCondition sortBy = 8;
    FlowStatus flowStatus           = 9;

    repeated string tradeIDs = 11;

    string tradeIDPrefix           = 12; // tradeID 字首查找
    repeated string tradeIDPrefixs = 13; // tradeID  字首查找

    AmountRange coinAmountRange                = 14; // amount 範圍 ex: gte: 100, lte: 200 -> 搜尋 100 ~ 200 或 -100 ~ -200
    google.protobuf.Int64Value paymentPointGte = 15;
    google.protobuf.Int64Value paymentPointLte = 16;

    message AmountRange {
        uint64 gte            = 1;
        uint64 lte            = 2;
        bool orNegativeAmount = 3; // 也查詢負值
    }
}

message ListRecordsResp {
    pagination.Pagination pagination = 1; // 分頁資訊
    repeated Record record           = 2;
}

message ListBagsReq {
    uint32 page              = 1;
    uint32 perPage           = 2;
    repeated uint64 userIDs  = 3;
    string orderBy           = 4;
    yesno.YesNo isFakePlayer = 5;
    enum Sort {
        NoSet             = 0;
        AmountDesc        = 1;
        AmountAcs         = 2;
        SaveAndAmountDesc = 3;
        SaveAndAmountAsc  = 4;
        UserIDDesc        = 5;
        UserIDAsc         = 6;
        GameTokenDesc     = 7;
        GameTokenAsc      = 8;
    }
    Sort sort   = 6;
    int64 level = 7; // 機器人等級
}

message ListBagsResp {
    pagination.Pagination pagination = 1; // 分頁資訊
    repeated Bag bags                = 2;
}

message ListFrozenRecordsRequest {
    uint64 userID     = 1;
    CoinType coinType = 2;
}

message FrozenRecord {
    CoinType coinType      = 1;
    uint64 forzenAmount    = 2;
    uint64 forzenUntilAtMs = 3;
    uint64 createdAtMS     = 4;
}

message ListFrozenRecordsResponse {
    repeated FrozenRecord frozenRecords = 1;
}

message SystemWalletOverViewResp {
    message Data {
        Bag totalSumBags   = 1; // 錢包餘額總和
        uint64 walletCount = 2; // 錢包數量
    }

    repeated Data data = 1;
}

message BagRecharge {
    uint64 id        = 1;
    uint64 amountInc = 2;
}
message SystemBagsRechargeReq {
    repeated BagRecharge data = 1;
    string remark             = 2;
}

message ListSystemBagsResp {
    pagination.Pagination pagination = 1; // 分頁資訊
    repeated SysBag bags             = 2;
}

message SysBag {
    uint64 id           = 1;
    repeated Coin coins = 2; // 包含的錢幣（我怕有多幣種
    uint64 updatedAtMs  = 3;
}

message PlayerPaymentPointReFundReq {
    uint64 userID            = 1;
    string recordID          = 2; // request id
    int64 paymentPointAmount = 3; // 支付點數  優先從支付點數扣除 若不足 則依照比例從 可用餘額 ,保險箱 扣除金幣
    string remark            = 4; // 備註
}

message PlayerPaymentPointReFundResp {
    Bag bag       = 1;
    Bag bagBefore = 2;
}
enum SortbyCondition {
    SortByCreatedAtASC     = 0;
    SortByCreatedAtDESC    = 1;
    SortByPaymentPointASC  = 2;
    SortByPaymentPointDESC = 3;
    SortByCoinAmountASC    = 4;
    SortByCoinAmountDESC   = 5;
    SortByIDASC            = 6; // wallet_records 根據 _id 排序 ASC
    SortByIDDESC           = 7; // wallet_records 根據 _id 排序 DESC
}
message ListStatementRequest {
    int64 createdAtMsGte    = 1;
    int64 createdAtMsLte    = 2;
    uint32 page             = 3;
    uint32 perPage          = 4;
    uint64 userID           = 5;
    repeated uint64 userIDs = 6;

    repeated SortbyCondition sortBy = 7;
    repeated string tradeIDs        = 8;
    string tradeIDPrefix            = 9; // tradeID 字首查找
    repeated string tradeIDPrefixs  = 10; // tradeID  字首查找

    int64 redEvenlopRecvAmountGte = 11;
    int64 redEvenlopRecvAmountLte = 12;
    int64 paymentPointGte         = 13;
    int64 paymentPointLte         = 14;

    yesno.YesNo filterPaymentPoint = 15; // 過濾儲值金額(”流水列表“使用)
}

message CountWalletsReq {
    repeated uint64 userIDIn         = 1;
    repeated CoinType coinTypeIn     = 2;
    yesno.YesNo isFakePlayer         = 3;
    repeated int64 fakePlayerLevelIn = 4;
    uint64 userID                    = 5;
}

message CountWalletsResp {
    uint64 total = 1;
}

message CreateTournamentsWalletReq {
    TournamentsWallet tournamentsWallet = 1;
}

message GetTournamentsWalletReq {
    TournamentsWalletOptions opts = 1;
}

message GetTournamentsWalletResp {
    TournamentsWallet tournamentsWallet = 1;
}

message AddChipToTournamentsWalletReq {
    uint64 tournamentsWalletID    = 1; // 錦標賽錢包ID
    TournamentsWalletOptions opts = 2; // 選填 filter 其他條件
    int64 addChipAmount           = 3;
}

message AddChipToTournamentsWalletResp {
    TournamentsWallet tournamentsWallet = 1;
}

message TournamentsBatchNormalTradeReq {
    repeated TournamentsReceipt tournamentsReceipts = 1;
}

message TournamentsBatchNormalTradeResp {
    map<uint64, TournamentsWallet> userTournamentsWalletsAfter  = 1; // userID : user's TournamentsWallet after trading
    map<uint64, TournamentsWallet> userTournamentsWalletsBefore = 2; // userID : user's TournamentsWallet before traing
}

// TournamentsReceipt means Tournaments Receipt to wallet
message TournamentsReceipt {
    string recordID      = 1;
    uint64 gameID        = 2; // 遊戲ID
    uint64 tournamentsID = 3; // 錦標賽ID
    string roomID        = 4; // roomID
    uint64 fromUserID    = 5;
    uint64 toUserID      = 6;
    string remark        = 7; // 註記

    int64 tradeChipAmount = 30; // 交易的籌碼量

    map<uint64, int64> fakePlayer = 60;
}

message BatchUpdateTournamentsWalletReq {
    TournamentsWalletOptions opts = 2; // 選填 filter 其他條件
    yesno.YesNo isOut             = 3;
    yesno.YesNo isEnd             = 4;
}

message BatchUpdateTournamentsWalletResp {
    // repeated TournamentsWallet tournamentsWallets = 1;
}

message GetTournamentsWalletStatisticsReq {
    uint64 tournamentsID = 1; // 錦標賽ID
}

message GetTournamentsWalletStatisticsResp {
    TournamentsWalletStatistics tournamentsWalletStatistics = 2;
}

message ListWalletMaxRecordsReq {
    uint64 createdDateTimeGte = 1;
    uint64 createdDateTimeLt  = 2;
    uint32 limit              = 3;
    repeated string ids       = 4;
}

message ListWalletMaxRecordsResp {
    repeated ListWalletMaxRecordsRespRecord records = 1;
}

message ListWalletMaxRecordsRespRecord {
    string id               = 1;
    uint64 userID           = 2;
    uint64 amount           = 3;
    uint64 createdDateTime  = 4;
    int64 likeTimes         = 5;
}

message GetWalletMaxRecordReq {
    string id = 1;
}

message GetWalletMaxRecordResp {
    string id               = 1;
    uint64 userID           = 2;
    uint64 amount           = 3;
    uint64 createdDateTime  = 4;
    int64 likeTimes         = 5;
}

message LikeWalletMaxRecordReq {
    string id = 1;
}

