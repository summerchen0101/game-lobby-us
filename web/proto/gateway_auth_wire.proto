syntax = "proto3";

package pinocchio;

// 與 proto/pinocchio/service.proto、model.proto 欄位編號一致之子集；供 Web Gateway SERVER_LOGIN 編解碼用。
// 變更請同步上列主檔並執行 npm run proto:generate

message LoginRequest {
  string username = 1;
  string password = 2;
  string ip = 3;
}

message Account {
  uint64 accountID = 1;
  string username = 2;
}

message LoginResponse {
  Account account = 1;
}

// 可選：若後端在 data 內帶入 JWT 與簡要使用者，與純 pinocchio LoginResponse 二擇一
message ServerLoginData {
  string access_token = 1;
  string token_type = 2;
  uint64 user_id = 3;
  string display_name = 4;
}
