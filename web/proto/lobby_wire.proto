syntax = "proto3";

package megaman;

// Web wire：無 import，供 protobufjs 單檔解析。欄位編號須與下列主 repo 訊息一致：
// - LobbyGetResponse 樹：proto/megaman/lobby.proto、proto/wallet/wallet.proto（Bag/Coin/Token）、
//   proto/gamemanager/gamemanager.proto（Game/ListGameResponse）、proto/playerinfo/model.proto（PlayerInfo 前段）、
//   proto/kaixilo/kaixilo.proto（ListParasitesResp）、proto/megaman/campaign.proto（Campaign/ListHomePageCampaignResponse）、
//   ciri/commonpb pagination（Pagination）
// - 商城：proto/megaman/product.proto、proto/virtualgood/virtualgood.proto（ProductContent、enum）
// - 付款推播：proto/megaman/payment.proto（PaymentPush、Item）、proto/megaman/message.proto（MsgResp）、
//   proto/msg/msg.proto Message（apiType=14、data=10）→ WirePushMessage
// - 帳號綁定：proto/megaman/playerinfo.proto MegaAccountBindingRequest/Response
// - WalletUseRequest：與 megaman lobby WalletUseRequest 欄位 1 二進位相容（WalletType 與 ActiveWalletMode 均 1=GC、2=SC）
// - JP：ApiType 14 / 141 / 1043（見 proto/gateway/gateway.proto）。Push 多為 SlotJackPotInfo（int64 陣列）；GET_JACKPOT_INFO(141) 為 ListJackPotResp（JackPotInfo 列，依 type+award+wallet+amount 組大廳三格，見 docs/lobby_jackpot.md）。

enum YesNo {
  NO = 0;
  YES = 1;
}

enum GameStatus {
  UNKNOWN_GAME_STATUS = 0;
  ENABLE = 1;
  DISABLE = 2;
  MAINTAINING = 3;
  COMING = 4;
}

enum GameCategory {
  UNKNOWN_CATEGORY = 0;
  SLOT = 1;
  TABLE = 2;
  OTHER = 3;
  SCRATCHOFF = 4;
}

enum GameLabel {
  UNKNOWN_LABEL = 0;
  HOT = 1;
  LATEST = 2;
  UNDER_MAINTENANCE = 3;
  COMING_SOON = 4;
  GENERAL = 5;
}

enum GameLogoPictureSize {
  UNKNOWN_GAME_LOGO_PICTURE_SIZE = 0;
  BIG = 1;
  MEDIUM = 2;
  SMALL = 3;
}

enum GameJoinRoomPolicy {
  GAME_JOIN_UNKNOWN = 0;
  GAME_JOIN_OCCUPIED = 1;
  GAME_JOIN_RESERVE = 2;
}

// Gateway ApiType 112：切換使用中錢包（GC/SC）；與後端約定一致時送此 body。
enum ActiveWalletMode {
  ACTIVE_WALLET_UNKNOWN = 0;
  ACTIVE_WALLET_GC = 1;
  ACTIVE_WALLET_SC = 2;
}

// 欄位 1 與 proto/megaman/lobby.proto WalletUseRequest.walletType 同號同線型；枚舉數值對齊 WalletType。
message WalletUseRequest {
  ActiveWalletMode mode = 1;
}

// Gateway push（如 SLOT_JACKPOT_INFO_PUSH 14）：累積獎池；jackpot_amounts 前三個元素對應大廳 JP1～JP3。
message SlotJackPotInfo {
  repeated int64 jackpot_amounts = 1;
}

// GET_JACKPOT_INFO (141) 回應；對齊 proto/megaman/ranking.proto。大廳僅用 SLOT_JACK_POT + award 1～3 + amount + walletType（與目前 GC/SC）組三格，勿以 info 陣列前後順序當 JP1～JP3。
enum JackPotType {
  UNKNOWN_JACK_POT_TYPE = 0;
  SLOT_JACK_POT = 1;
  HUNDRED_JACK_POT = 2;
  FISHING_JACK_POT = 3;
  VIDEO_JACK_POT = 4;
  EVENT_JACK_POT = 5;
  HUNDRED_COLOR_DICE_JACK_POT = 6;
  BIG_WIN = 99;
}

message JackPotInfo {
  JackPotType JackPotType = 1;
  float amount = 2;
  int64 award = 3;
  WalletType walletType = 4;
}

message ListJackPotResp {
  repeated JackPotInfo info = 1;
}

message Game {
  uint64 ID = 1;
  string displayName = 2;
  GameStatus status = 3;
  GameCategory category = 4;
  GameLabel label = 5;
  int64 updateTimeMS = 8;
  uint64 updater = 9;
  string iconURL = 10;
  uint64 roomMinNums = 16;
  int32 sort = 14;
  GameJoinRoomPolicy joinRoomPolicy = 15;
  int64 maintainTime = 17;
  string maintainReason = 18;
  string path = 19;
  YesNo gameLockByToken = 20;
  YesNo isBlockchain = 21;
  int64 hotSort = 22;
  int64 slotSort = 23;
  int64 cardSort = 24;
  GameLogoPictureSize logoPictureSize = 25;
  int64 otherSort = 26;
  int64 videoSort = 27;
  int64 fishSort = 28;
  int64 arcadeSort = 29;
  int64 lotterySort = 30;
  int64 battleSort = 31;
  int64 classicSort = 32;
  int64 rtpMin = 33;
  int64 rtpMax = 34;
  int64 unlockLevel = 35;
  int64 unlockVipLevel = 36;
  int64 rtpMinGC = 37;
  int64 rtpMaxGC = 38;
  string providerName = 39;
}

message ListGameResponse {
  repeated Game games = 1;
  Pagination pagination = 2;
}

// 與 proto/playerinfo/model.proto PlayerInfo 欄位編號對齊（LOBBY_GET 常用子集）。
enum WalletType {
  UNKNOWN_WALLET_TYPE = 0;
  GC = 1;
  SC = 2;
}

message PlayerInfo {
  uint64 userID = 1;
  string nickname = 2;
  uint32 gender = 3;
  uint32 playerKind = 4;
  uint64 vipLevel = 5;
  uint64 vipExp = 6;
  uint64 level = 7;
  uint64 exp = 8;
  uint64 avatarID = 10;
  string cellPhone = 26;
  uint64 vipCurrentLevelBetExp = 41;
  uint64 vipCurrentLevelBetExpRequired = 42;
  WalletType walletType = 85;
}

// 對齊 proto/backpack/backpack.proto GoodState（頭像列表用）
enum GoodState {
  UNKNOWN_GOOD_STATE = 0;
  IN_USE = 1;
  IN_ACTIVE = 2;
  UNUSABLE = 3;
}

// 對齊 proto/megaman/playerinfo.proto ListPlayerAvatars / UpdatePlayerCurrentAvatar
message PlayerAvatarsInfo {
  uint64 avatarID = 1;
  string avatarUrl = 2;
  GoodState goodState = 3;
}

message ListPlayerAvatarsResponse {
  repeated PlayerAvatarsInfo avatarsInfo = 1;
}

message UpdatePlayerCurrentAvatarRequest {
  uint64 avatarID = 1;
  string avatarURL = 2;
  YesNo isFBAvatar = 3;
}

// --- wallet.Bag（對齊 proto/wallet/wallet.proto）與 LOBBY_GET 衛星型別 ---

enum CoinType {
  UNKNOWN_COIN_TYPE = 0;
  GOLDEN = 1;
  TOKEN = 2;
}

message Coin {
  int64 amount = 1;
  CoinType type = 2;
  int64 saveAmount = 3;
  int64 frozenAmount = 4;
  int64 payable = 5;
  int64 gameToken = 6;
  int64 paymentPointAmount = 7;
  int64 redeemableAmount = 8;
}

message WalletToken {
  uint64 userID = 1;
  uint64 gameID = 2;
  uint64 createdAtMs = 3;
  uint64 expireAtMs = 4;
  int64 amount = 5;
  string roomID = 6;
}

message Bag {
  uint64 userID = 1;
  repeated Coin coins = 2;
  uint64 updatedAtMs = 3;
  YesNo isFakePlayer = 4;
  int64 level = 5;
  repeated WalletToken tokens = 6;
}

// 對齊 proto/kaixilo/kaixilo.proto ListParasitesResp
message ListParasitesResp {
  repeated uint64 parasiteIDs = 2;
  uint64 userID = 3;
}

// 對齊 proto/megaman/lobby.proto ThirdPartyGameInfo
message ThirdPartyGameInfo {
  string platform = 1;
  string gameType = 2;
  string gameName = 3;
  string gameUID = 4;
  string status = 5;
  string gameLaunchURL = 6;
}

// ApiType GetThirdPartyGameInfo = 701；對齊 proto/megaman/lobby.proto
message GetThirdPartyGameInfoRequest {
  string platform = 1;
  string gameUID = 2;
}

message GetThirdPartyGameInfoResponse {
  ThirdPartyGameInfo thirdPartyGameInfo = 1;
}

// 對齊 proto/megaman/campaign.proto 所依賴之 campaign 子集 + megaman.Campaign
enum CampaignType {
  CampaignTypeALL = 0;
  ADVERTISE = 1;
  COMMODITY = 2;
}

enum CampaignImageType {
  ImageTypeALL = 0;
  ImgURL = 1;
  ICON_ID = 2;
  ImgSource = 3;
}

message CampaignImage {
  CampaignImageType type = 1;
  string value = 2;
}

message HomePageCampaign {
  string id = 1;
  CampaignType type = 2;
  CampaignImage image = 3;
  int64 startedAtMs = 4;
  int64 endedAtMs = 5;
  YesNo hasAction = 6;
  int64 sort = 7;
  string name = 8;
}

// 對齊 ciri pagination.Pagination（常見欄位編號；若後端升級請比對 commonpb）
message Pagination {
  uint32 page = 1;
  uint32 perPage = 2;
  uint64 total = 3;
}

message ListHomePageCampaignResponse {
  repeated HomePageCampaign campaign = 1;
  Pagination page = 2;
  int64 dailyRewardRecivedAtMs = 3;
}

// 與 proto/megaman/lobby.proto LobbyGetResponse 欄位 1–22 對齊
message LobbyGetResponse {
  Bag bag = 1;
  ListGameResponse games = 2;
  PlayerInfo playerInfo = 3;
  ListParasitesResp parasite = 4;
  PlayerInfo kaixiloOwner = 5;
  bool isEnterSecondPasswordSetting = 6;
  ListHomePageCampaignResponse campaign = 7;
  bool isEnterLoginAwardSetting = 8;
  bool canSendStrangerMsg = 9;
  bool isNew = 10;
  bool isDiamond = 11;
  bool canSendCondition = 12;
  int64 currency = 13;
  repeated uint64 jackPotGameList = 14;
  bool isSummonedPlayer = 15;
  string version = 16;
  string versionDetail = 17;
  bool canShowRichDaddies = 18;
  Bag bagGC = 19;
  string email = 20;
  string phone = 21;
  repeated ThirdPartyGameInfo thirdPartyGameInfoList = 22;
}

// --- Shop / payment wire（對齊 proto/megaman/product.proto、payment.proto、wallet.Coin、virtualgood.ProductContent、msg.Message）---

message Item {
  uint64 itemID = 1;
  uint64 amount = 2;
  string name = 3;
}

message PaymentPush {
  Coin coin = 1;
  uint64 status = 2;
  string amount = 3;
  repeated Item item = 4;
  string errorMsg = 5;
  string reason = 6;
}

// SEND_MESSAGE_PUSH 內層：對齊 proto/megaman/message.proto MsgResp 與 proto/msg/msg.proto Message 之欄位 10、14。
message WirePushMessage {
  bytes data = 10;
  int64 apiType = 14;
}

message MsgResp {
  WirePushMessage msg = 1;
  string roomID = 2;
}

enum PaymentGateway {
  UNKNOWN_PAYMENT_GATEWAY = 0;
  IDRRealPay = 1;
  IDRNicePay = 2;
  IDRTopPay = 3;
  IDRWowPay = 4;
  IDRDeePay = 6;
  IDRHaloPay = 7;
  PHPLetsPayGCash = 11;
  PHPLetsPayGCashII = 12;
  PHPLetsPayMaya = 13;
  PHPHaloPay = 14;
  PHPFastPay = 15;
  USDPayPlus = 21;
}

enum VirtualGoodType {
  UNKNOWN_VIRTUAL_GOOD_TYPE = 0;
  GC_FREE_GAME_VOUCHER_100 = 3;
  GC_FREE_GAME_VOUCHER_1000 = 4;
  GC_FREE_GAME_VOUCHER_10000 = 5;
  GC_FREE_GAME_VOUCHER_100000 = 31;
  GC_FREE_GAME_VOUCHER_FRAGMENTS_100 = 6;
  GC_FREE_GAME_VOUCHER_FRAGMENTS_1000 = 7;
  GC_FREE_GAME_VOUCHER_FRAGMENTS_10000 = 8;
  GC_FREE_GAME_VOUCHER_FRAGMENTS_100000 = 30;
  SC_FREE_GAME_VOUCHER_100 = 9;
  SC_FREE_GAME_VOUCHER_1000 = 10;
  SC_FREE_GAME_VOUCHER_10000 = 11;
  SC_FREE_GAME_VOUCHER_100000 = 33;
  SC_FREE_GAME_VOUCHER_FRAGMENTS_100 = 12;
  SC_FREE_GAME_VOUCHER_FRAGMENTS_1000 = 13;
  SC_FREE_GAME_VOUCHER_FRAGMENTS_10000 = 14;
  SC_FREE_GAME_VOUCHER_FRAGMENTS_100000 = 32;
  GC_GOLD_TICKET = 26;
  SC_GOLD_TICKET = 27;
  PLAYER_INFO_AVATAR = 10001;
  PLAYER_INFO_ROLE = 10002;
  GC_GOLD = 15001;
  SC_GOLD = 15002;
}

// 欄位編號對齊 proto/virtualgood/virtualgood.proto ProductContent（goodType=8、amount=6、percent=7、sort=9）。
message ProductContent {
  uint64 productID = 1;
  uint64 itemID = 2;
  string itemName = 3;
  PaymentGateway paymentGateway = 4;
  uint64 paymentType = 5;
  int64 amount = 6;
  int64 percent = 7;
  VirtualGoodType goodType = 8;
  int64 sort = 9;
}

message ListProductsRequest {}

message ListProductsResponseProduct {
  uint64 productID = 1;
  repeated uint64 paymentTypes = 2;
  repeated ProductContent productContents = 3;
  string originalPrice = 4;
  string price = 5;
}

message ListProductsResponse {
  repeated ListProductsResponseProduct products = 1;
}

message BuyProductRequest {
  uint64 productID = 1;
  uint64 paymentType = 2;
}

message BuyProductResponse {
  string orderID = 1;
  string paymentURL = 2;
}

// 對齊 proto/megaman/playerinfo.proto（Gateway MegaAccountBinding）
message MegaAccountBindingRequest {
  uint64 userID = 1;
  string phone = 2;
  string countryCode = 3;
  string email = 4;
  string password = 5;
  string answer = 6;
  string firstName = 7;
  string lastName = 8;
  string birthday = 9;
  string country = 10;
  string city = 11;
  string state = 12;
  string zip = 13;
  string address = 14;
  string language = 15;
}

message MegaAccountBindingResponse {
  YesNo needSMSAnswer = 1;
  string phoneNum = 2;
}

// --- Withdraw / redeem — 對齊 proto/megaman/payment.proto；Gateway ApiType ListWithdrawOrders=621, CreateWithdrawOrder=623, WithdrawSuccessPush=1048 ---

// 對齊 proto/payment/payment.proto WithdrawOrderPaymentStatus（ListWithdrawOrdersReq 篩選為 repeated int32）
enum WithdrawOrderPaymentStatus {
  UnknownWithdrawOrderPaymentStatus = 0;
  Reviewing = 1;
  Passed = 2;
  Rejected = 3;
  Proccessing = 4;
  Success = 5;
  Failed = 6;
  ExpirationRejected = 7;
}

message WithdrawSuccessPush {
  uint64 userID = 1;
  string actualAmount = 2;
  string nickname = 3;
}

message ListWithdrawOrdersReq {
  repeated int64 userIDIn = 1;
  repeated int32 withdrawOrderPaymentStatusIn = 2;
  int64 startedAtTimestampMillisecond = 11;
  int64 endedAtTimestampMillisecond = 12;
  int64 page = 13;
  int64 perPage = 14;
}

message ListWithdrawOrdersRespWithdrawOrder {
  string withdrawOrderUID = 1;
  string amount = 2;
  string fee = 3;
  int32 withdrawOrderPaymentStatus = 4;
  int64 createdAtTimestampMillisecond = 5;
  string remark = 6;
}

message ListWithdrawOrdersResp {
  int64 total = 1;
  repeated ListWithdrawOrdersRespWithdrawOrder withdrawOrders = 2;
}

// paymentType：proto/dsk/dsk.proto PaymentTypeRec（美國提現 PayPal=13、CreditCard=14、CashAPP=15、ACH=16）。
message CreateWithdrawOrderReq {
  int64 userID = 1;
  string amount = 2;
  int64 paymentType = 3;
  string paypalEmail = 101;
  string cardNumber = 102;
  string cardValidCode = 103;
  string appAccount = 104;
  string accountNumber = 105;
  string routingNumber = 106;
}

message CreateWithdrawOrderResp {
  string withdrawOrderUID = 1;
}
