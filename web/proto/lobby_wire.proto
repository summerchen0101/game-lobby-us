syntax = "proto3";

package megaman;

// 與 proto/megaman/lobby.proto 之 LobbyGetResponse 欄位 2、proto/gamemanager/gamemanager.proto
// 之 ListGameResponse / Game 編號對齊，供前端解碼；若主 repo 變更請同步。

enum YesNo {
  NO = 0;
  YES = 1;
}

enum GameStatus {
  UNKNOWN_GAME_STATUS = 0;
  ENABLE = 1;
  DISABLE = 2;
  MAINTAINING = 3;
  COMING = 4;
}

enum GameCategory {
  UNKNOWN_CATEGORY = 0;
  SLOT = 1;
  TABLE = 2;
  OTHER = 3;
  SCRATCHOFF = 4;
}

enum GameLabel {
  UNKNOWN_LABEL = 0;
  HOT = 1;
  LATEST = 2;
  UNDER_MAINTENANCE = 3;
  COMING_SOON = 4;
  GENERAL = 5;
}

enum GameLogoPictureSize {
  UNKNOWN_GAME_LOGO_PICTURE_SIZE = 0;
  BIG = 1;
  MEDIUM = 2;
  SMALL = 3;
}

enum GameJoinRoomPolicy {
  GAME_JOIN_UNKNOWN = 0;
  GAME_JOIN_OCCUPIED = 1;
  GAME_JOIN_RESERVE = 2;
}

// Gateway ApiType 112：切換使用中錢包（GC/SC）；與後端約定一致時送此 body。
enum ActiveWalletMode {
  ACTIVE_WALLET_UNKNOWN = 0;
  ACTIVE_WALLET_GC = 1;
  ACTIVE_WALLET_SC = 2;
}

message WalletUseRequest {
  ActiveWalletMode mode = 1;
}

// Gateway 推播 type 14：Slot 累積獎池（伺服器主動下發）；jackpot_amounts 至少 1 筆，前端取前三格顯示。
message SlotJackPotInfo {
  repeated int64 jackpot_amounts = 1;
}

message Game {
  uint64 ID = 1;
  string displayName = 2;
  GameStatus status = 3;
  GameCategory category = 4;
  GameLabel label = 5;
  int64 updateTimeMS = 8;
  uint64 updater = 9;
  string iconURL = 10;
  uint64 roomMinNums = 16;
  int32 sort = 14;
  GameJoinRoomPolicy joinRoomPolicy = 15;
  int64 maintainTime = 17;
  string maintainReason = 18;
  string path = 19;
  YesNo gameLockByToken = 20;
  YesNo isBlockchain = 21;
  int64 hotSort = 22;
  int64 slotSort = 23;
  int64 cardSort = 24;
  GameLogoPictureSize logoPictureSize = 25;
  int64 otherSort = 26;
  int64 videoSort = 27;
  int64 fishSort = 28;
  int64 arcadeSort = 29;
  int64 lotterySort = 30;
  int64 battleSort = 31;
  int64 classicSort = 32;
  int64 rtpMin = 33;
  int64 rtpMax = 34;
  int64 unlockLevel = 35;
  int64 unlockVipLevel = 36;
  int64 rtpMinGC = 37;
  int64 rtpMaxGC = 38;
  string providerName = 39;
}

message ListGameResponse {
  repeated Game games = 1;
}

// 與 proto/playerinfo/model.proto PlayerInfo 前段欄位編號對齊，供 LOBBY_GET 解出玩家基本資訊。
message PlayerInfo {
  uint64 userID = 1;
  string nickname = 2;
  uint32 gender = 3;
  uint32 playerKind = 4;
  uint64 vipLevel = 5;
  uint64 vipExp = 6;
  uint64 level = 7;
  uint64 exp = 8;
}

// 與 proto/megaman/lobby.proto LobbyGetResponse 欄位 2、3 對齊（欄位 1 bag 等由解碼器略過）。
message LobbyGetResponse {
  ListGameResponse games = 2;
  PlayerInfo playerInfo = 3;
}

// --- Shop / payment wire（對齊 proto/megaman/product.proto、payment.proto、wallet.Coin、virtualgood.ProductContent、msg.Message）---

enum CoinType {
  UNKNOWN_COIN_TYPE = 0;
  GOLDEN = 1;
  TOKEN = 2;
}

message Coin {
  int64 amount = 1;
  CoinType type = 2;
  int64 saveAmount = 3;
  int64 frozenAmount = 4;
  int64 payable = 5;
  int64 gameToken = 6;
  int64 paymentPointAmount = 7;
  int64 redeemableAmount = 8;
}

message Item {
  uint64 itemID = 1;
  uint64 amount = 2;
  string name = 3;
}

message PaymentPush {
  Coin coin = 1;
  uint64 status = 2;
  string amount = 3;
  repeated Item item = 4;
  string errorMsg = 5;
  string reason = 6;
}

// SEND_MESSAGE_PUSH payload：對齊 proto/megaman/message.proto MsgResp、msg.Message（僅解 apiType、data）。
message WirePushMessage {
  bytes data = 10;
  int64 apiType = 14;
}

message MsgResp {
  WirePushMessage msg = 1;
  string roomID = 2;
}

enum PaymentGateway {
  UNKNOWN_PAYMENT_GATEWAY = 0;
  IDRRealPay = 1;
  IDRNicePay = 2;
  IDRTopPay = 3;
  IDRWowPay = 4;
  IDRDeePay = 6;
  IDRHaloPay = 7;
  PHPLetsPayGCash = 11;
  PHPLetsPayGCashII = 12;
  PHPLetsPayMaya = 13;
  PHPHaloPay = 14;
  PHPFastPay = 15;
  USDPayPlus = 21;
}

enum VirtualGoodType {
  UNKNOWN_VIRTUAL_GOOD_TYPE = 0;
  GC_FREE_GAME_VOUCHER_100 = 3;
  GC_FREE_GAME_VOUCHER_1000 = 4;
  GC_FREE_GAME_VOUCHER_10000 = 5;
  GC_FREE_GAME_VOUCHER_100000 = 31;
  GC_FREE_GAME_VOUCHER_FRAGMENTS_100 = 6;
  GC_FREE_GAME_VOUCHER_FRAGMENTS_1000 = 7;
  GC_FREE_GAME_VOUCHER_FRAGMENTS_10000 = 8;
  GC_FREE_GAME_VOUCHER_FRAGMENTS_100000 = 30;
  SC_FREE_GAME_VOUCHER_100 = 9;
  SC_FREE_GAME_VOUCHER_1000 = 10;
  SC_FREE_GAME_VOUCHER_10000 = 11;
  SC_FREE_GAME_VOUCHER_100000 = 33;
  SC_FREE_GAME_VOUCHER_FRAGMENTS_100 = 12;
  SC_FREE_GAME_VOUCHER_FRAGMENTS_1000 = 13;
  SC_FREE_GAME_VOUCHER_FRAGMENTS_10000 = 14;
  SC_FREE_GAME_VOUCHER_FRAGMENTS_100000 = 32;
  GC_GOLD_TICKET = 26;
  SC_GOLD_TICKET = 27;
  PLAYER_INFO_AVATAR = 10001;
  PLAYER_INFO_ROLE = 10002;
  GC_GOLD = 15001;
  SC_GOLD = 15002;
}

message ProductContent {
  uint64 productID = 1;
  uint64 itemID = 2;
  string itemName = 3;
  PaymentGateway paymentGateway = 4;
  uint64 paymentType = 5;
  int64 amount = 6;
  int64 percent = 7;
  VirtualGoodType goodType = 8;
  int64 sort = 9;
}

message ListProductsRequest {}

message ListProductsResponseProduct {
  uint64 productID = 1;
  repeated uint64 paymentTypes = 2;
  repeated ProductContent productContents = 3;
  string originalPrice = 4;
  string price = 5;
}

message ListProductsResponse {
  repeated ListProductsResponseProduct products = 1;
}

message BuyProductRequest {
  uint64 productID = 1;
  uint64 paymentType = 2;
}

message BuyProductResponse {
  string orderID = 1;
  string paymentURL = 2;
}
